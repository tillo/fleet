# OpenObserve admin credentials. Pushed to Akeyless before first deploy.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openobserve-admin
  namespace: openobserve
spec:
  refreshInterval: 5m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: openobserve-admin
    creationPolicy: Owner
  data:
  - remoteRef: { key: /mdapi/openobserve/o2/root-email }
    secretKey: ZO_ROOT_USER_EMAIL
  - remoteRef: { key: /mdapi/openobserve/o2/root-password }
    secretKey: ZO_ROOT_USER_PASSWORD
