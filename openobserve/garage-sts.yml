apiVersion: v1
kind: Service
metadata:
  name: garage-headless
  namespace: openobserve
  labels:
    app: garage
spec:
  clusterIP: None
  selector:
    app: garage
  ports:
  - { name: rpc, port: 3901 }
  - { name: s3, port: 3900 }
  - { name: admin, port: 3903 }
---
apiVersion: v1
kind: Service
metadata:
  name: garage
  namespace: openobserve
  labels:
    app: garage
spec:
  selector:
    app: garage
  ports:
  - { name: s3, port: 3900, targetPort: 3900 }
  - { name: admin, port: 3903, targetPort: 3903 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: garage
  namespace: openobserve
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  serviceName: garage-headless
  replicas: 1
  selector:
    matchLabels:
      app: garage
  template:
    metadata:
      labels:
        app: garage
    spec:
      containers:
      - name: garage
        image: dxflrs/garage:v2.3.0
        env:
        - name: GARAGE_CONFIG_FILE
          value: /etc/garage/garage.toml
        envFrom:
        - secretRef:
            name: garage-tokens
        ports:
        - { name: rpc, containerPort: 3901 }
        - { name: s3, containerPort: 3900 }
        - { name: admin, containerPort: 3903 }
        readinessProbe:
          tcpSocket: { port: 3900 }
          periodSeconds: 5
        livenessProbe:
          tcpSocket: { port: 3901 }
          periodSeconds: 30
          failureThreshold: 5
        volumeMounts:
        - { name: meta, mountPath: /var/lib/garage/meta }
        - { name: data, mountPath: /var/lib/garage/data }
        - { name: config, mountPath: /etc/garage/garage.toml, subPath: garage.toml }
        resources:
          requests: { cpu: 100m, memory: 256Mi }
          limits:   { cpu: "1",  memory: 2Gi }
      volumes:
      - name: config
        configMap:
          name: garage-config
  volumeClaimTemplates:
  - metadata:
      name: meta
    spec:
      accessModes: [ReadWriteOnce]
      storageClassName: harvester-longhorn-2replicas
      resources: { requests: { storage: 2Gi } }
  - metadata:
      name: data
    spec:
      accessModes: [ReadWriteOnce]
      storageClassName: harvester-longhorn-2replicas
      resources: { requests: { storage: 50Gi } }
