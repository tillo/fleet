## Prometheus ServiceMonitor for the openobserve-namespace Garage instance.
## See bootstrap/garage-sm.yml for the auth pattern.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: garage
  namespace: openobserve
  labels:
    app: garage
spec:
  selector:
    matchLabels:
      app: garage
  namespaceSelector:
    matchNames:
      - openobserve
  endpoints:
    - port: admin
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      authorization:
        type: Bearer
        credentials:
          name: garage-tokens
          key: GARAGE_METRICS_TOKEN
