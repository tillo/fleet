apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-config
  namespace: openobserve
data:
  garage.toml: |
    metadata_dir = "/var/lib/garage/meta"
    data_dir = "/var/lib/garage/data"
    db_engine = "lmdb"

    # Single-node deployment: replication_factor=1.
    replication_factor = 1
    consistency_mode = "consistent"

    rpc_bind_addr = "[::]:3901"
    rpc_public_addr = "garage-0.garage-headless.openobserve.svc.cluster.local:3901"
    # rpc_secret loaded from env (GARAGE_RPC_SECRET)

    [s3_api]
    s3_region = "garage"
    api_bind_addr = "[::]:3900"
    # OpenObserve uses path-style addressing (force_path_style=true).

    [admin]
    api_bind_addr = "[::]:3903"
    # admin_token + metrics_token loaded from env.
