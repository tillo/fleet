# MetalLB install with strict opt-in via --lb-class.
#
# WHY --lb-class: without it, MetalLB controller actively clears
# status.loadBalancer.ingress on Services whose IP isn't in any of its
# pools (Red Hat KB 7034718, MetalLB issue #2396). With this flag set,
# MetalLB ignores every LoadBalancer Service that doesn't carry
# spec.loadBalancerClass=metallb. Pure opt-in — safe coexistence with
# Harvester's kube-vip (which manages ingress-expose).

# Metrics on 7475 (non-default 7472 was free at last review but kept
# off the default in case another hostNetwork pod ever wants 7472).
prometheus:
  metricsPort: 7475

# Top-level loadBalancerClass — chart renders this as --lb-class=metallb
# on BOTH controller and speaker. Verified via `helm template`.
loadBalancerClass: metallb

controller:
  replicaCount: 1

speaker:
  frr:
    enabled: false

# The validating webhook intercepts only metallb.io CRDs (verified live —
# rules.resources is {bgppeers, ipaddresspools, bgpadvertisements,
# communities, bfdprofiles, l2advertisements}). Default failurePolicy=Fail
# is therefore safe — only writes to MetalLB's own CRDs would block.
