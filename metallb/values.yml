# MetalLB install for test/migration. Single test pool initially; production
# pools (192.168.1.40-99) added as we migrate Services off PureLB+kube-vip.

# Metrics off 7472 — historic conflict with PureLB lbnodeagent.
prometheus:
  metricsPort: 7475

speaker:
  frr:
    enabled: false

controller:
  replicaCount: 1

# Webhook intercepts ONLY metallb.io CRDs (verified live: rules.resources is
# {bgppeers, ipaddresspools, bgpadvertisements, communities, bfdprofiles,
# l2advertisements}). It never touches Service objects. Default failurePolicy=Fail
# is therefore safe — only writes to MetalLB CRDs would block if controller is
# down. Leaving as-is.
