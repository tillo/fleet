defaultNamespace: metallb-system
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
helm:
  maxHistory: 25
  releaseName: metallb
  repo: https://metallb.github.io/metallb
  chart: metallb
  # Intentionally no `version:` -- Fleet tracks the repo's latest chart
  # and applies any new release on the next GitRepo poll cycle.
  valuesFiles:
    - values.yml
diff:
  comparePatches:
    # MetalLB controller rotates a CA into each CRD's conversion webhook
    # clientConfig at runtime; Fleet would otherwise mark the bundle as
    # drifted on every rotation.
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: bfdprofiles.metallb.io
      operations:
        - {op: remove, path: /spec/conversion/webhook/clientConfig/caBundle}
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: bgpadvertisements.metallb.io
      operations:
        - {op: remove, path: /spec/conversion/webhook/clientConfig/caBundle}
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: bgppeers.metallb.io
      operations:
        - {op: remove, path: /spec/conversion/webhook/clientConfig/caBundle}
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: communities.metallb.io
      operations:
        - {op: remove, path: /spec/conversion/webhook/clientConfig/caBundle}
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: ipaddresspools.metallb.io
      operations:
        - {op: remove, path: /spec/conversion/webhook/clientConfig/caBundle}
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: l2advertisements.metallb.io
      operations:
        - {op: remove, path: /spec/conversion/webhook/clientConfig/caBundle}
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: servicel2statuses.metallb.io
      operations:
        - {op: remove, path: /spec/conversion/webhook/clientConfig/caBundle}
