# TEST-1: dummy Service. Verifies MetalLB allocates the EXACT pinned
# spec.loadBalancerIP rather than picking a random IP from the pool.
# Will be deleted once test concludes.
apiVersion: v1
kind: Namespace
metadata:
  name: lb-test
---
apiVersion: v1
kind: Service
metadata:
  name: dummy
  namespace: lb-test
  labels:
    lb.mdapi.ch: metallb-test
  annotations:
    kube-vip.io/ignore: "true"
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.1.100
  ports:
    - {name: tcp, port: 12345, targetPort: 12345, protocol: TCP}
  # No selector → no endpoints, but Service still gets an LB IP allocated.
