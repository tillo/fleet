## ExternalSecret pulling the statuspage page-id and API key from Akeyless.
## The adapter reads them as env vars STATUSPAGE_PAGE_ID and STATUSPAGE_API_KEY.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: statuspage
  namespace: monitoring
spec:
  refreshInterval: 1m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: statuspage
    creationPolicy: Owner
  data:
    - remoteRef:
        key: /mdapi/statuspage/page-id
      secretKey: STATUSPAGE_PAGE_ID
    - remoteRef:
        key: /mdapi/statuspage/api-key
      secretKey: STATUSPAGE_API_KEY
