## ConfigMap holding the adapter script + the alertname→component_id mapping.
## Updating the script or the mapping is a fleet commit + helm upgrade; the
## Deployment uses a checksum annotation so pods restart on change.

apiVersion: v1
kind: ConfigMap
metadata:
  name: statuspage-adapter
  namespace: monitoring
data:
  ## Component name (as used in alert labels) -> statuspage component_id.
  ## Source of truth: memory file reference_statuspage_components.md.
  ##
  ## Layout (10 components, free-tier cap):
  ##   Mail / Sign-in (SSO) / Files & Documents / Websites / DNS /
  ##   Smart Home / Internet / NTP / Backups / Platform.
  ##
  ## The legacy-alias block (Identity, GitLab, Tools, Files, Notes, Home,
  ## VPN, Router) was removed 2026-05-25 once every monitoring rule had
  ## been relabeled. If a new alert is added with an unmapped component
  ## label, the adapter logs "unknown component" (throttled) — that's the
  ## intended signal to either rename or add a mapping here.
  components.json: |
    {
      "Mail":              "63dvnwpp5t5k",
      "Sign-in (SSO)":     "lfkb1wbp5y67",
      "Platform":          "2yyn4m9qj6sh",
      "Files & Documents": "74cp13q9xddn",
      "Backups":           "tpmgs9xk4nh2",
      "Websites":          "hmpsfntgbtf7",
      "DNS":               "rcn8wr2jf8fy",
      "Smart Home":        "3jwq6n0k63kk",
      "Internet":          "nhcp6n34h9vb",
      "NTP":               "pvy2j6vcy78v"
    }

  adapter.py: |
    #!/usr/bin/env python3
    """
    Alertmanager -> statuspage.io component-state adapter.

    Two paths keep statuspage components in sync with reality:

    1. WEBHOOK path (reactive, low-latency)
       Alertmanager POSTs to /webhook on every alert state change. We
       group alerts by `component` label and PATCH worst-status per comp.

    2. RECONCILE path (periodic, drift-safe)
       Background thread polls Alertmanager's /api/v2/alerts every
       RECONCILE_INTERVAL_SEC and PATCHes any component whose derived
       status differs from the last value we sent. Catches cases where:
         - an alert-rule rewrite makes a previously-firing alert silently
           disappear (no resolved webhook is ever emitted)
         - a webhook POST is lost (adapter OOM at exactly that moment)
         - components are manually toggled in the statuspage UI and now
           disagree with reality

    Both paths read severity (critical/warning/info) and translate to
    statuspage states (major_outage / degraded_performance / operational).
    """
    import json, os, sys, threading, time, urllib.parse, urllib.request, urllib.error
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    PAGE_ID    = os.environ["STATUSPAGE_PAGE_ID"]
    API_KEY    = os.environ["STATUSPAGE_API_KEY"]
    COMPONENTS = json.loads(open("/etc/adapter/components.json").read())
    BIND_PORT  = int(os.environ.get("BIND_PORT", "8080"))
    ## rancher-monitoring was retired 2026-06-24; the AM that feeds the
    ## webhook is vmalertmanager-mdapi — reconcile must read the same one.
    AM_URL     = os.environ.get("ALERTMANAGER_URL",
                                "http://vmalertmanager-mdapi.monitoring.svc.cluster.local:9093")
    RECONCILE_INTERVAL_SEC = int(os.environ.get("RECONCILE_INTERVAL_SEC", "60"))

    # Cache of (component_id -> last_status_we_sent). Updated by both
    # the webhook path and the reconcile path; used to suppress no-op
    # PATCHes (saves API quota, avoids audit-log spam on statuspage).
    LAST_SENT = {}
    LAST_SENT_LOCK = threading.Lock()

    # severity -> statuspage status (firing case). Resolved always -> operational.
    # Severity 'none' is used by Prometheus meta-rules (InfoInhibitor etc.)
    # that always fire as signal, not as actual problems — they should never
    # degrade a component, even if the component label happens to be mapped.
    SEVERITY_STATUS = {
        "critical": "major_outage",
        "warning":  "degraded_performance",
        ## info = auto-solving/informational per the alert-severity policy
        ## (2026-07-09) — must never degrade the public statuspage. The CVE
        ## digest + upgrade-available infos carry component=Platform and are
        ## always active; mapping info to degraded kept Platform permanently
        ## degraded via the reconcile loop (found 2026-07-19).
        "info":     "operational",
        "none":     "operational",
    }
    STATUS_RANK = {
        "operational":          0,
        "under_maintenance":    1,
        "degraded_performance": 2,
        "partial_outage":       3,
        "major_outage":         4,
    }

    # Throttle the "unknown component" warning so a steady-state of N firing
    # alerts in an unmapped bucket (e.g. component=General catch-all) doesn't
    # produce one log line per webhook per component.
    UNKNOWN_COMP_LOG_INTERVAL_SEC = 600
    _unknown_comp_last_log: dict[str, float] = {}
    _unknown_comp_lock = threading.Lock()

    def log(msg):
        print(msg, file=sys.stderr, flush=True)

    def log_unknown_component(comp: str, n_alerts: int):
        now = time.time()
        with _unknown_comp_lock:
            last = _unknown_comp_last_log.get(comp, 0)
            if now - last < UNKNOWN_COMP_LOG_INTERVAL_SEC:
                return
            _unknown_comp_last_log[comp] = now
        log(f"WARN: alert with unknown component '{comp}' (alerts: {n_alerts}) "
            f"— throttled, next log in {UNKNOWN_COMP_LOG_INTERVAL_SEC}s")

    def patch_component(component_id: str, status: str):
        """Set a single component's status via PATCH. Suppress if unchanged.

        Returns numeric HTTP code on completed PATCH, 0 on cached no-op, or
        a negative sentinel on transport failure. CRITICAL: must never raise
        — both call sites (webhook handler and reconcile loop) iterate over
        multiple components, and a single transient DNS/network failure
        should not abort the rest of the pass. Pre-2026-05-25 the only
        caught exception was HTTPError; a URLError (Errno -3 EAGAIN from
        glibc resolver during a router reboot) propagated up, killed the
        reconcile thread silently, and the page stopped tracking reality
        until the next pod restart.
        """
        with LAST_SENT_LOCK:
            if LAST_SENT.get(component_id) == status:
                return 0  # cached, no-op
        body = json.dumps({"component": {"status": status}}).encode()
        req = urllib.request.Request(
            f"https://api.statuspage.io/v1/pages/{PAGE_ID}/components/{component_id}",
            data=body,
            headers={"Authorization": f"OAuth {API_KEY}", "Content-Type": "application/json"},
            method="PATCH",
        )
        try:
            with urllib.request.urlopen(req, timeout=10) as r:
                with LAST_SENT_LOCK:
                    LAST_SENT[component_id] = status
                return r.status
        except urllib.error.HTTPError as e:
            log(f"statuspage PATCH {component_id} -> {status}: HTTP {e.code} {e.read().decode()[:200]}")
            return e.code
        except urllib.error.URLError as e:
            # DNS failure (Errno -3 Try again), connection refused, TLS handshake
            # timeout. Don't cache — next call will retry. Return -1 sentinel so
            # the reconcile loop logs the drift but keeps going.
            log(f"statuspage PATCH {component_id} -> {status}: URLError {e.reason}")
            return -1
        except Exception as e:
            log(f"statuspage PATCH {component_id} -> {status}: {type(e).__name__}: {e}")
            return -2

    def derive_status(alerts: list) -> str:
        """
        Given the alerts touching one component (firing + resolved mixed),
        compute the worst-case current status. Resolved alerts contribute nothing.
        """
        worst = "operational"
        for a in alerts:
            if a.get("status") != "firing":
                continue
            sev = a.get("labels", {}).get("severity", "warning")
            candidate = SEVERITY_STATUS.get(sev, "degraded_performance")
            if STATUS_RANK[candidate] > STATUS_RANK[worst]:
                worst = candidate
        return worst

    class H(BaseHTTPRequestHandler):
        # Default is HTTP/1.0; blackbox http_2xx requires HTTP/1.1+. One-line
        # override is the cheapest fix.
        protocol_version = "HTTP/1.1"

        def log_message(self, fmt, *args):
            log("adapter: " + fmt % args)

        def do_POST(self):
            if self.path != "/webhook":
                self._reply(404, "unknown path")
                return
            length = int(self.headers.get("content-length", "0"))
            try:
                body = json.loads(self.rfile.read(length))
            except Exception as e:
                self._reply(400, f"bad json: {e}")
                return

            # Group alerts by component label
            by_component = {}
            for a in body.get("alerts", []):
                comp = a.get("labels", {}).get("component")
                if not comp:
                    continue
                by_component.setdefault(comp, []).append(a)

            results = []
            for comp, alerts in by_component.items():
                cid = COMPONENTS.get(comp)
                if not cid:
                    log_unknown_component(comp, len(alerts))
                    continue
                target_status = derive_status(alerts)
                code = patch_component(cid, target_status)
                results.append(f"{comp}({cid})={target_status}:{code}")
                log(f"OK component={comp} status={target_status} http={code}")

            self._reply(200, " ".join(results) or "no-op")

        def do_GET(self):
            if self.path == "/healthz":
                self._reply(200, "ok")
            else:
                self._reply(404, "")

        def _reply(self, code, body=""):
            self.send_response(code)
            self.send_header("Content-Type", "text/plain")
            self.end_headers()
            if body:
                self.wfile.write(body.encode())

    def reconcile_once():
        """Fetch active alerts from Alertmanager, derive worst-status per
        component, PATCH any that have drifted."""
        try:
            req = urllib.request.Request(f"{AM_URL}/api/v2/alerts")
            with urllib.request.urlopen(req, timeout=10) as r:
                alerts = json.loads(r.read())
        except Exception as e:
            log(f"reconcile: fetch alertmanager failed: {e}")
            return
        # Build per-component active-alert lists (firing only).
        by_component = {comp: [] for comp in COMPONENTS}
        for a in alerts:
            if a.get("status", {}).get("state") != "active":
                continue
            comp = a.get("labels", {}).get("component")
            if comp in by_component:
                # Synthesize a webhook-style "firing" alert shape so
                # derive_status() can read it without branching.
                by_component[comp].append({
                    "status": "firing",
                    "labels": a.get("labels", {}),
                })
        for comp, comp_alerts in by_component.items():
            cid = COMPONENTS[comp]
            target = derive_status(comp_alerts)
            # Belt-and-braces: patch_component already swallows exceptions,
            # but if a future refactor reintroduces one, don't let it abort
            # the rest of this reconcile pass.
            try:
                code = patch_component(cid, target)
            except Exception as e:
                log(f"reconcile: {comp}({cid}) patch raised {type(e).__name__}: {e}")
                continue
            if code and code != 0:
                log(f"reconcile: {comp}({cid})={target} http={code}")

    def reconcile_loop():
        # Stagger 30s before first run so webhooks settle.
        time.sleep(30)
        while True:
            reconcile_once()
            time.sleep(RECONCILE_INTERVAL_SEC)

    if __name__ == "__main__":
        log(f"adapter starting on :{BIND_PORT}")
        log(f"loaded {len(COMPONENTS)} components: {sorted(COMPONENTS.keys())}")
        log(f"reconcile against {AM_URL} every {RECONCILE_INTERVAL_SEC}s")
        threading.Thread(target=reconcile_loop, daemon=True).start()
        # ThreadingHTTPServer (vs HTTPServer) handles each request in its
        # own thread, so /healthz can respond even when a /webhook POST
        # is busy doing PATCH calls to statuspage.io. Without this the
        # kubelet readiness probe timed out (3s) the moment a webhook
        # arrived during reconcile, and the pod got SIGKILLed.
        ThreadingHTTPServer(("0.0.0.0", BIND_PORT), H).serve_forever()
