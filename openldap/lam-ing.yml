apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lam
  namespace: openldap
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: LAM
    flame.pawelmalak/url: https://lam.mdapi.ch
    flame.pawelmalak/category: Identity
    flame.pawelmalak/icon: account-group
    flame.pawelmalak/order: '50'
spec:
  ingressClassName: nginx
  rules:
    - host: lam.mdapi.ch
      http:
        paths:
          - backend:
              service:
                name: lam
                port:
                  number: 80
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - lam.mdapi.ch
      secretName: lam-cert
