apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openldap-env-secret
spec:
  refreshInterval: 1m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: openldap-env-secret
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/openldap/openldap-env-secret/ADMIN_PASS
      secretKey: ADMIN_PASS
    - remoteRef:
        key: /mdapi/openldap/openldap-env-secret/CONFIG_PASS
      secretKey: CONFIG_PASS
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openldap-import
spec:
  refreshInterval: 1m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: openldap-import
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/openldap/openldap-import/import.ldif
      secretKey: import.ldif
