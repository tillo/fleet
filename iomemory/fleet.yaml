defaultNamespace: iomemory-driver
namespace: iomemory-driver
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
  # The loader DaemonSet is privileged (insmod into host kernel).
  pod-security.kubernetes.io/enforce: privileged
  pod-security.kubernetes.io/warn: privileged
  pod-security.kubernetes.io/audit: privileged
# prod cluster only — never the Rackspace test cluster
targets:
  - clusterName: mdapi-prod
