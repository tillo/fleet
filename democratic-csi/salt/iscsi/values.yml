csiDriver:
  name: "ch.tillo.home.salt.iscsi"

# Lane B (boot-safe, pinned 2026-06-12): pin the democratic-csi driver image to
# the latest release v1.9.5 + IfNotPresent (chart default is :latest + Always =
# a CSI driver that can't recover from each node's cache when the registry is
# down). Renovate owns the bump. Keys are controller.driver.image + node.driver.image.
controller:
  driver:
    image:
      tag: v1.9.5
      pullPolicy: IfNotPresent

node:
  driver:
    image:
      tag: v1.9.5
      pullPolicy: IfNotPresent

storageClasses:
  - name: salt-iscsi
    defaultClass: false
    reclaimPolicy: Delete
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      fsType: ext4
    annotations:
      cdi.harvesterhci.io/storageProfileCloneStrategy: snapshot
      cdi.harvesterhci.io/storageProfileVolumeModeAccessModes: '{"Block":["ReadWriteOnce"]}'
      cdi.harvesterhci.io/storageProfileVolumeSnapshotClass: salt-iscsi
      cdi.harvesterhci.io/filesystemOverhead: '0.05'
    mountOptions: []
    secrets:
      provisioner-secret:
      controller-publish-secret:
      node-stage-secret:
      node-publish-secret:
      controller-expand-secret:

volumeSnapshotClasses:
  - name: salt-iscsi
    secrets:
      snapshotter-secret:

driver:
  existingConfigSecret: salt-iscsi-driver-config
  config:
    driver: freenas-iscsi
    