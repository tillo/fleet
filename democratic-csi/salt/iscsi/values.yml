csiDriver:
  name: "ch.tillo.home.salt.iscsi"

storageClasses:
  - name: salt-iscsi
    defaultClass: false
    reclaimPolicy: Delete
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      fsType: ext4

    mountOptions: []
    secrets:
      provisioner-secret:
      controller-publish-secret:
      node-stage-secret:
      node-publish-secret:
      controller-expand-secret:

volumeSnapshotClasses:
  - name: salt-iscsi
    secrets:
      snapshotter-secret:

driver:
  existingConfigSecret: salt-iscsi-driver-config
  config:
    driver: salt-iscsi
    