csiDriver:
  name: "ch.tillo.home.salt.nfs"
  fsGroupPolicy: File

# Lane B (boot-safe, pinned 2026-06-12): pin the democratic-csi driver image to
# the latest release v1.9.5 + IfNotPresent (chart default is :latest + Always =
# a CSI driver that can't recover from each node's cache when the registry is
# down). Renovate owns the bump. Keys are controller.driver.image + node.driver.image.
controller:
  driver:
    image:
      tag: v1.9.5
      pullPolicy: IfNotPresent

node:
  driver:
    image:
      tag: v1.9.5
      pullPolicy: IfNotPresent

storageClasses:
  - name: salt-nfs
    defaultClass: false
    reclaimPolicy: Delete
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      fsType: nfs
    annotations:
      cdi.harvesterhci.io/storageProfileCloneStrategy: snapshot
      cdi.harvesterhci.io/storageProfileVolumeModeAccessModes: '{"Filesystem":["ReadWriteMany"]}'
      cdi.harvesterhci.io/storageProfileVolumeSnapshotClass: salt-nfs
      cdi.harvesterhci.io/filesystemOverhead: '0.05'
    mountOptions:
      - noatime
      - nfsvers=4
    secrets:
      provisioner-secret:
      controller-publish-secret:
      node-stage-secret:
      node-publish-secret:
      controller-expand-secret:

volumeSnapshotClasses:
  - name: salt-nfs
    secrets:
      snapshotter-secret:

driver:
  existingConfigSecret: salt-nfs-driver-config
  config:
    driver: freenas-nfs
    