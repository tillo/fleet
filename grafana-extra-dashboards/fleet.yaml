## Rancher + Longhorn Grafana dashboards as ConfigMaps in cattle-dashboards.
## The custom Grafana's dashboard sidecar (monitoring/grafana) imports them
## (label grafana_dashboard=1) and routes them by the grafana_folder annotation
## into "Rancher" / "Longhorn" folders. These are NOT chart-shipped while the
## embedded Grafana is disabled (Rancher dashboards gate on grafana.enabled;
## Longhorn isn't in the chart at all), so they're carried here. Datasources
## were normalized to uid victoriametrics. To refresh on a Harvester upgrade,
## re-extract files/rancher/* from the chart and re-run gen (see session notes).
defaultNamespace: cattle-dashboards
helm:
  maxHistory: 25
