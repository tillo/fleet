apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoconfig
  namespace: mail
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
spec:
  selector:
    matchLabels:
      app: autoconfig
  replicas: 1
  template:
    metadata:
      labels:
        app: autoconfig
    spec:
      containers:
      - name: autoconfig
        image: registry.mdapi.ch/mdapi/autoconfig
        ports:
        - containerPort: 80
        env:
        - name: TZ
          value: Europe/Zurich
        - name: MAIL_HOSTNAME
          value: mail.mdapi.ch
        - name: DISPLAY_NAME
          value: "Martino Dell'Ambrogio Personal Infrastructure"
        - name: DISPLAY_SHORT_NAME
          value: MDAPI
      imagePullSecrets:
      - name: mdapi-registry
