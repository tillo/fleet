certificate: mail-cert
# Track our own daily-rebuilt image (upstream :edge + apt security upgrade)
# instead of the docker.io upstream tag which is frozen at v15.1.0 (2025-08-12).
image:
  name: registry.mdapi.ch/mdapi/docker-mailserver
  tag: latest
  pullPolicy: Always
# Chart doesn't expose imagePullSecrets, so we provide our own ServiceAccount
# via extraDeploy below and skip the chart's SA template.
serviceAccount:
  create: false
  name: docker-mailserver
deployment:
  # Keel watches these annotations to auto-redeploy on new image digest.
  # We track :latest of our own daily-rebuilt image at registry.mdapi.ch
  # — force policy re-pulls on every poll regardless of tag.
  # pull-secret tells Keel which Secret in this ns holds the registry creds,
  # since the chart can't put imagePullSecrets on the PodSpec (it bolts the
  # secret onto a ServiceAccount via extraDeploy instead — fine for kubelet
  # pulls, invisible to Keel's HEAD requests).
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 4h"
    keel.sh/pull-secret: mdapi-registry
  env:
    ACCOUNT_PROVISIONER: LDAP
    LOG_LEVEL: info
    SUPERVISOR_LOGLEVEL: info
    ENABLE_CLAMAV: 1
    POSTMASTER_ADDRESS: tillo@tillo.ch
    OVERRIDE_HOSTNAME: mail.mdapi.ch
    TZ: Europe/Zurich
    RSPAMD_LEARN: 1
    RSPAMD_CHECK_AUTHENTICATED: 1
    ENABLE_MANAGESIEVE: 1
    VIRUSMAILS_DELETE_DELAY: 30
    POSTFIX_MESSAGE_SIZE_LIMIT: "102400000"
    PFLOGSUMM_TRIGGER: logrotate
    PFLOGSUMM_RECIPIENT: tillo@tillo.ch
    LOGWATCH_INTERVAL: weekly
    LOGWATCH_RECIPIENT: tillo@tillo.ch
    LDAP_SEARCH_BASE: dc=mdapi,dc=ch
    LDAP_QUERY_FILTER_USER: "(&(objectClass=room)(cn=%s)(ou:dn:=People))"
    LDAP_QUERY_FILTER_GROUP: "(&(objectClass=room)(cn=%s)(ou:dn:=group))"
    LDAP_QUERY_FILTER_ALIAS: "(&(objectClass=room)(cn=%s)(ou:dn:=alias))"
    LDAP_QUERY_FILTER_DOMAIN: "(&(objectClass=room)(cn=%s)(ou:dn:=domain))"
    DOVECOT_USER_FILTER: "(&(objectClass=room)(cn=%u)(ou:dn:=People))"
    DOVECOT_PASS_FILTER: "(&(objectClass=posixAccount)(mail=%u)(ou:dn:=People))"
    DOVECOT_USER_ATTRS: "=uid=5000,=gid=5000,description=home=/var/mail/%$"
    DOVECOT_PASS_ATTRS: "userPassword=password"
    DOVECOT_AUTH_BIND: "no"
    ENABLE_SASLAUTHD: 1
    SASLAUTHD_MECHANISMS: rimap
    SASLAUTHD_MECH_OPTIONS: "127.0.0.1"
    LDAP_SERVER_HOST: null
    SPAM_SUBJECT: ""
  secretEnvironments:
  - docker-mailserver-env-secret
  resources:
    limits:
      cpu: "4"
      ephemeral-storage: 500Mi
      memory: 6Gi
    requests:
      cpu: "1"
      ephemeral-storage: 100Mi
      memory: 1536Mi
persistent_volume_claims:
  mail-config:
    size: 1G
    storageClass: harvester-longhorn-2replicas
  mail-data:
    size: 100G
    storageClass: harvester-longhorn-2replicas
  mail-state:
    size: 10G
    storageClass: harvester-longhorn-2replicas
  mail-log:
    size: 20G
    storageClass: harvester-longhorn-2replicas
service:
  type: LoadBalancer
  loadBalancerClass: metallb
  externalTrafficPolicy: Cluster
  loadBalancerIP: 192.168.1.48
rspamd:
  ingress:
    enabled: true
    annotations:
      cert-manager.io/issuer: letsencrypt-prod
      flame.pawelmalak/type: app
      flame.pawelmalak/name: Spam Filter
      flame.pawelmalak/url: https://rspamd.mdapi.ch
      flame.pawelmalak/category: Mail
      flame.pawelmalak/icon: email-check
      flame.pawelmalak/order: '20'
      nginx.ingress.kubernetes.io/auth-response-headers: Authorization
      nginx.ingress.kubernetes.io/auth-signin: https://auth.mdapi.ch/admin/oauth2/start?rd=https://$host$escaped_request_uri
      nginx.ingress.kubernetes.io/auth-url: http://oauth2-proxy-admin.oauth2-proxy.svc.cluster.local/admin/oauth2/auth
      nginx.ingress.kubernetes.io/enable-modsecurity: "true"
      nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
      nginx.ingress.kubernetes.io/modsecurity-snippet: |
        SecRuleEngine On
        SecAuditEngine RelevantOnly
        SecAuditLogRelevantStatus "^(?:5|4(?!04))"
        SecAuditLogParts ABIJDEFHZ
        SecAuditLogType Serial
        SecAuditLogFormat JSON
        SecAuditLog /dev/stdout
        SecDebugLog /tmp/modsec_debug.log
        Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
        SecRule REQUEST_URI "@beginsWith /checkv2" \
          "id:1000,\
          phase:1,\
          pass,\
          t:none,\
          nolog,\
          ctl:ruleRemoveById=949110"
    host: rspamd.mdapi.ch
    tls:
      enabled: true
      secret: rspamd-cert
dovecot:
  fullTextSearch:
    enabled: true
configMaps:
  postfix-main.cf:
    create: true
    path: postfix-main.cf
    data: |
      mynetworks = 127.0.0.0/8 10.52.0.0/22 192.168.1.0/24
      # Recognize $myhostname (mail.mdapi.ch) as a local destination so that
      # cron output from system users (e.g. clamav@mail.mdapi.ch) doesn't
      # try to relay back to ourselves and bounce as "loops back to myself".
      mydestination = $myhostname, localhost.$mydomain, localhost
  dovecot.cf:
    create: true
    path: dovecot.cf
    data: |
      service imap {
            vsz_limit = 16GB
      }
      service indexer-worker {
            vsz_limit = 16GB
      }
      service decode2text {
            executable = script /usr/lib/dovecot/decode2text.sh
            user = docker
            unix_listener decode2text {
                  mode = 0666
            }
      }
      {{- if .Values.proxyProtocol.enabled }}
        haproxy_trusted_networks = {{ .Values.proxyProtocol.trustedNetworks }}

        {{- if and (.Values.deployment.env.ENABLE_IMAP) (not .Values.deployment.env.SMTP_ONLY) }}
        service imap-login {
            inet_listener imap {
                port = 143
            }

            inet_listener imaps {
                port = 993
                ssl = yes
            }

            inet_listener imap_proxyprotocol {
                haproxy = yes
                port = 10143
                ssl = no
            }

            inet_listener imaps_proxyprotocol {
                haproxy = yes
                port = 10993
                ssl = yes
            }
        }
        {{- end -}}

        {{- if and (.Values.deployment.env.ENABLE_POP3) (not .Values.deployment.env.SMTP_ONLY) }}
        service pop3-login {
            inet_listener pop3 {
                port = 110
            }

            inet_listener pop3s {
                port = 995
                ssl = yes
            }

            inet_listener pop3_proxyprotocol {
                haproxy = yes
                port = 10110
                ssl = no
            }

            inet_listener pop3s_proxyprotocol {
                haproxy = yes
                port = 10995
                ssl = yes
            }
        }
        {{- end -}}

        {{- if and (.Values.deployment.env.ENABLE_MANAGESIEVE) (not .Values.deployment.env.SMTP_ONLY) }}
        service managesieve-login {
            inet_listener sieve {
                port = 4190
            }

            inet_listener sieve_proxyprotocol {
                haproxy = yes
                port = 14190
            }
        }
        {{- end -}}
      {{- end -}}
  user-patches.sh:
    create: true
    path: user-patches.sh
    data: |
      #!/bin/bash

      cat <<EOF >/etc/rspamd/local.d/multimap.conf
      sender_from_regexp {
        type = "from";
        filter = "email:addr";
        map = "file:///etc/rspamd/maps.d/sender_from_regexp.inc";
        symbol = "SENDER_FROM_REGEXP";
        regexp = true;
        score = 1.0;
      }
      EOF

      cat <<EOF >/etc/rspamd/maps.d/sender_from_regexp.inc
      \w+@\w+\.(?:tillo|mdapi)\.ch SENDER_FROM_REGEXP:-10:edgestuff
      EOF

      # Removed by docker-mailserver Dockerfile
      curl -o /usr/lib/dovecot/decode2text.sh https://raw.githubusercontent.com/bdraco/dovecot/refs/heads/master/src/plugins/fts/decode2text.sh
      chmod +x /usr/lib/dovecot/decode2text.sh
      
      # decode2text dependencies
      apt -y update
      apt -y install --no-install-recommends poppler-utils catdoc antiword unzip

      # Necessary for doveadm -A
      echo -e "iterate_attrs = cn=user\niterate_filter = (&(objectClass=room)(ou:dn:=People))" >> /etc/dovecot/dovecot-ldap.conf.ext

      {{- if .Values.proxyProtocol.enabled }}
      # NOTE: Keep in sync with upstream advice:
      # https://github.com/docker-mailserver/docker-mailserver/blob/v15.0.0/docs/content/examples/tutorials/mailserver-behind-proxy.md?plain=1#L238-L268

      # Duplicate the config for the submission(s) service ports (587 / 465) with adjustments for the PROXY ports (10587 / 10465) and `syslog_name` setting:
      postconf -Mf submission/inet | sed -e s/^submission/10587/ -e 's/submission/submission-proxyprotocol/' >> /etc/postfix/master.cf
      postconf -Mf submissions/inet | sed -e s/^submissions/10465/ -e 's/submissions/submissions-proxyprotocol/' >> /etc/postfix/master.cf
      # Enable PROXY Protocol support for these new service variants:
      postconf -P 10587/inet/smtpd_upstream_proxy_protocol=haproxy
      postconf -P 10465/inet/smtpd_upstream_proxy_protocol=haproxy

      # Create a variant for port 25 too (NOTE: Port 10025 is already assigned in DMS to Amavis):
      postconf -Mf smtp/inet | sed -e s/^smtp/12525/ >> /etc/postfix/master.cf
      # Enable PROXY Protocol support:
      # - Uses a different setting as port 25 is handled via the postscreen service
      # - Optionally configure a `syslog_name` to distinguish in logs:
      postconf -P \
        12525/inet/postscreen_upstream_proxy_protocol=haproxy \
        12525/inet/syslog_name=postfix/smtpd-proxyprotocol

      # Add the `proxy:` prefix to share this cache between each running postscreen service via `proxymap`:
      postconf 'postscreen_cache_map = proxy:btree:$data_directory/postscreen_cache'
      {{- end }}

      perl -p -i -e 's/^result_attribute = mail$/result_attribute = cn/g' /etc/postfix/ldap-domains.cf

      perl -p -i -e 's/^result_attribute = mail$/result_attribute = description/g' /etc/postfix/ldap-aliases.cf
      perl -p -i -e 's/^result_attribute         = mail$/result_attribute = description/g' /etc/postfix/ldap-groups.cf

      cp /etc/postfix/ldap-users.cf /etc/postfix/ldap-usersmap.cf
      perl -p -i -e 's/^result_attribute = mail$/result_attribute = description/g' /etc/postfix/ldap-users.cf
      perl -p -i -e 's/^result_attribute = mail$/result_attribute = cn/g' /etc/postfix/ldap-usersmap.cf
      postconf 'virtual_alias_maps = ldap:/etc/postfix/ldap-aliases.cf, ldap:/etc/postfix/ldap-groups.cf, ldap:/etc/postfix/ldap-usersmap.cf'

      # Redirect local-system cron output (clamav, amavis, etc.) to POSTMASTER.
      # Without this, mail to e.g. clamav@mail.mdapi.ch is delivered to a local
      # mailbox no one reads; combined with myhostname now in mydestination this
      # cleanly funnels operational mail to the postmaster.
      # NOTE: bare "dollar-u" syntax (no braces) -- Fleet substitutes brace
      # form and would fail to resolve a Fleet variable for the loop var.
      for u in clamav amavis nobody amavisd; do
        grep -q "^$u:" /etc/aliases || echo "$u: $POSTMASTER_ADDRESS" >> /etc/aliases
      done
      newaliases
extraDeploy:
- apiVersion: v1
  kind: ServiceAccount
  metadata:
    name: docker-mailserver
  imagePullSecrets:
  - name: mdapi-registry
- apiVersion: external-secrets.io/v1
  kind: ExternalSecret
  metadata:
    name: docker-mailserver-env-secret
  spec:
    refreshInterval: 1m0s

    secretStoreRef:
      kind: ClusterSecretStore
      name: cm-akeyless

    target:
      name: docker-mailserver-env-secret
      creationPolicy: Owner

    data:
      - remoteRef:
          key: /mdapi/mail/docker-mailserver-env-secret/DOVECOT_URIS
        secretKey: LDAP_SERVER_HOST
      - remoteRef:
          key: /mdapi/mail/docker-mailserver-env-secret/DOVECOT_URIS
        secretKey: DOVECOT_URIS
      - remoteRef:
          key: /mdapi/mail/docker-mailserver-env-secret/LDAP_BIND_DN
        secretKey: LDAP_BIND_DN
      - remoteRef:
          key: /mdapi/mail/docker-mailserver-env-secret/LDAP_BIND_PW
        secretKey: LDAP_BIND_PW
