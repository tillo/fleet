apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: autoconf
  namespace: mail
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: autoconf.mdapi.ch
      http:
        paths:
          - backend:
              service:
                name: autoconf
                port:
                  number: 80
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - autoconf.mdapi.ch
      secretName: autoconf-cert
