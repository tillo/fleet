apiVersion: v1
kind: ConfigMap
metadata:
  name: roundcube-config
  namespace: mail
data:
  # Loaded after the upstream image's own conf.d files (lexical order: zz-*).
  # Lifts PHP memory_limit so the 200 MB ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE
  # doesn't run into the image-default 64M cap during MIME assembly.
  zz-overrides.ini: |
    memory_limit = 512M
  configuration.php: |
    <?php
    // core
    $config['support_url'] = "mailto:tillo@tillo.ch";
    $config['enable_spellcheck'] = true;
    $config['spellcheck_dictionary'] = true;
    $config['product_name'] = "MDAPI Webmail";
    // zipdownload
    $config['zipdownload_selection'] = '500MB';
    $config['zipdownload_charset'] = 'UTF-8';
    // managesieve
    $config['managesieve_host'] = 'tls://mail.mdapi.ch:4190';
    // emoticons
    $config['emoticons_display'] = true;
    // markasjunk
    $config['markasjunk_spam_patterns'] = array(
      'patterns'     => array('/^(Subject:\s*)(.*)$/m'),
      'replacements' => array('$1***SPAM*** $2')
    );
    $config['markasjunk_ham_patterns'] = array(
      'patterns'     => array('/^(Subject:\s*)\*\*\*SPAM\*\*\*(.*)$/m'),
      'replacements' => array('$1$2')
    );
    $config['markasjunk_move_spam'] = true;
    $config['markasjunk_move_ham'] = true;
    $config['markasjunk_read_spam'] = true;
    $config['markasjunk_unread_ham'] = true;
    // show_additional_headers
    $config['show_additional_headers'] = ['From','To','X-Spamd-Result','X-Assp-Spam-Level'];
    // password
    $rcmail_config['password_driver'] = 'ldap_simple';
    $rcmail_config['password_confirm_current'] = true;
    $rcmail_config['password_ldap_host'] = 'openldap.openldap.svc.cluster.local';
    $rcmail_config['password_ldap_basedn'] = 'dc=mdapi,dc=ch';
    $rcmail_config['password_ldap_searchDN'] = 'uid=roundcube,ou=People,dc=mdapi,dc=ch';
    $rcmail_config['password_ldap_search_base'] = 'ou=People,dc=mdapi,dc=ch';
    $rcmail_config['password_ldap_search_filter'] = '(mail=%login)';
    $rcmail_config['password_ldap_encodage'] = 'ssha';
    $rcmail_config['password_ldap_pwattr'] = 'userPassword';
    $rcmail_config['password_ldap_force_replace'] = true;
    // newmail_notifier
    $rcmail_config['newmail_notifier_basic'] = true;
    $rcmail_config['newmail_notifier_desktop'] = true;
