apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: roundcube-env-secret
spec:
  refreshInterval: 1m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: roundcube-env-secret
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/mail/roundcube-env-secret/ROUNDCUBEMAIL_DB_PASSWORD
      secretKey: ROUNDCUBEMAIL_DB_PASSWORD
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: roundcube-secrets
spec:
  refreshInterval: 1m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: roundcube-secrets
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/mail/roundcube-secrets/secrets.php
      secretKey: secrets.php
