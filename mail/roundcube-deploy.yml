apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundcube
  namespace: mail
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/match-tag: "true"
spec:
  selector:
    matchLabels:
      app: roundcube
  replicas: 1
  template:
    metadata:
      labels:
        app: roundcube
    spec:
      containers:
      - name: roundcube
        image: roundcube/roundcubemail:latest
        ports:
        - containerPort: 80
        env:
        - name: TZ
          value: Europe/Zurich
        - name: ROUNDCUBEMAIL_DEFAULT_HOST
          value: ssl://docker-mailserver.mail.svc.cluster.local
        - name: ROUNDCUBEMAIL_DEFAULT_PORT
          value: "993"
        - name: ROUNDCUBEMAIL_SMTP_SERVER
          value: tls://docker-mailserver.mail.svc.cluster.local
        - name: ROUNDCUBEMAIL_SMTP_PORT
          value: "587"
        - name: ROUNDCUBEMAIL_PLUGINS
          value: archive,zipdownload
        - name: ROUNDCUBEMAIL_INSTALL_PLUGINS
          value: "1"
        - name: ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE
          value: "100M"
        - name: ROUNDCUBEMAIL_ASPELL_DICTS
          value: en,it,fr,de,pl
        - name: ROUNDCUBEMAIL_DB_TYPE
          value: mysql
        - name: ROUNDCUBEMAIL_DB_HOST
          value: roundcube-mariadb.mail.svc.cluster.local
        - name: ROUNDCUBEMAIL_DB_USER
          value: roundcube
        - name: ROUNDCUBEMAIL_DB_NAME
          value: roundcube
        envFrom:
        - secretRef:
            name: roundcube-env-secret
