image:
  tag: latest
auth:
  database: roundcube
  username: roundcube
  existingSecret: roundcube-mariadb-credentials
persistence:
  storageClass: harvester-longhorn-2replicas
  size: 10G
extraEnvVars:
- name: TZ
  value: Europe/Zurich
- name: MARIADB_AUTO_UPGRADE
  value: "1"
extraObjects:
- apiVersion: external-secrets.io/v1
  kind: ExternalSecret
  metadata:
    name: roundcube-mariadb-credentials
  spec:
    refreshInterval: 1m0s

    secretStoreRef:
      kind: ClusterSecretStore
      name: cm-akeyless

    target:
      name: roundcube-mariadb-credentials
      creationPolicy: Owner

    data:
      - remoteRef:
          key: /mdapi/mail/roundcube-mariadb-credentials/mariadb-root-password
        secretKey: mariadb-root-password
      - remoteRef:
          key: /mdapi/mail/roundcube-mariadb-credentials/mariadb-password
        secretKey: mariadb-password
keel:
  policy: force
  trigger: poll
  match-tag: "true"
  images:
    - repository: image.repository
      tag: image.tag
