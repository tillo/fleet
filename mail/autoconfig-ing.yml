apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: autoconfig
  namespace: mail
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: Mail Autoconfig
    flame.pawelmalak/url: https://autoconfig.mdapi.ch
    flame.pawelmalak/category: Mail
    flame.pawelmalak/icon: email-cog
    flame.pawelmalak/order: '30'
    nginx.ingress.kubernetes.io/server-alias: "autoconfig.coders.ch,autoconfig.coiffuredreams.ch,autoconfig.dellambrogio.ch,autoconfig.textopolis.net,autoconfig.tillo.ch,autoconfig.lithia.eu"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecAuditEngine RelevantOnly
      SecAuditLogRelevantStatus "^(?:5|4(?!04))"
      SecAuditLogParts ABIJDEFHZ
      SecAuditLogType Serial
      SecAuditLogFormat JSON
      SecAuditLog /dev/stdout
      SecDebugLog /tmp/modsec_debug.log
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
spec:
  ingressClassName: nginx
  rules:
    - host: autoconfig.mdapi.ch
      http:
        paths:
          - backend:
              service:
                name: autoconfig
                port:
                  number: 80
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - autoconfig.mdapi.ch
      - autoconfig.coders.ch
      - autoconfig.coiffuredreams.ch
      - autoconfig.dellambrogio.ch
      - autoconfig.textopolis.net
      - autoconfig.tillo.ch
      - autoconfig.lithia.eu
      secretName: autoconfig-cert
