apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: autoconfig
  namespace: mail
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: autoconfig.mdapi.ch
      http:
        paths:
          - backend:
              service:
                name: autoconfig
                port:
                  number: 80
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - autoconfig.mdapi.ch
      secretName: autoconfig-cert
