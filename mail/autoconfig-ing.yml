apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: autoconfig
  namespace: mail
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/server-alias: "autoconfig.coders.ch,autoconfig.coiffuredreams.ch,autoconfig.dellambrogio.ch,autoconfig.textopolis.net,autoconfig.tillo.ch,autoconfig.lithia.eu"
spec:
  ingressClassName: nginx
  rules:
    - host: autoconfig.mdapi.ch
      http:
        paths:
          - backend:
              service:
                name: autoconfig
                port:
                  number: 80
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - autoconfig.mdapi.ch
      - autoconfig.coders.ch
      - autoconfig.coiffuredreams.ch
      - autoconfig.dellambrogio.ch
      - autoconfig.textopolis.net
      - autoconfig.tillo.ch
      - autoconfig.lithia.eu
      secretName: autoconfig-cert
