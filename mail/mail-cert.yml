apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mail-cert
  namespace: mail
spec:
  dnsNames:
    - 'mail.mdapi.ch'
    - 'mail.coders.ch'
    - 'mail.coiffuredreams.ch'
    - 'mail.dellambrogio.ch'
    - 'mail.textopolis.net'
    - 'mail.tillo.ch'
    - 'mail.lithia.eu'
  issuerRef:
    kind: Issuer
    name: letsencrypt-prod
  secretName: mail-cert
