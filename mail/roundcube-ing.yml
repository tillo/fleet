apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: roundcube
  namespace: mail
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: webmail.mdapi.ch
      http:
        paths:
          - backend:
              service:
                name: roundcube
                port:
                  number: 80
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - webmail.mdapi.ch
      secretName: webmail-cert
