apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoconf
  namespace: mail
spec:
  selector:
    matchLabels:
      app: autoconf
  replicas: 1
  template:
    metadata:
      labels:
        app: autoconf
    spec:
      containers:
      - name: autoconf
        image: registry.mdapi.ch/mdapi/autoconfig
        ports:
        - containerPort: 80
        env:
        - name: TZ
          value: Europe/Zurich
        - name: MAIL_HOSTNAME
          value: mail.mdapi.ch
        - name: DISPLAY_NAME
          value: "Martino Dell'Ambrogio Personal Infrastructure"
        - name: DISPLAY_SHORT_NAME
          value: MDAPI
      imagePullSecrets:
      - name: mdapi-registry
