# RWX file driver (StorageClass ceph-filesystem). Name = rook-ceph.cephfs.csi.ceph.com,
# the provisioner the rook-ceph-cluster chart set on the ceph-filesystem StorageClass.
# Empty spec → inherits everything from the OperatorConfig driverSpecDefaults
# (cephFsClientType defaults to the kernel client).
apiVersion: csi.ceph.io/v1
kind: Driver
metadata:
  name: rook-ceph.cephfs.csi.ceph.com
  namespace: rook-ceph
spec: {}
