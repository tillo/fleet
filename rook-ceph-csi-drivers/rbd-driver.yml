# RWO block driver (StorageClass ceph-block). Name = rook-ceph.rbd.csi.ceph.com, which
# is the provisioner the rook-ceph-cluster chart set on the ceph-block StorageClass.
# Empty spec → inherits everything from the OperatorConfig driverSpecDefaults.
apiVersion: csi.ceph.io/v1
kind: Driver
metadata:
  name: rook-ceph.rbd.csi.ceph.com
  namespace: rook-ceph
spec: {}
