# Redis broker (Valkey) for the demo paperless instance. Ephemeral — broker only.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-kustodyan-valkey
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paperless-kustodyan-valkey
  template:
    metadata:
      labels:
        app: paperless-kustodyan-valkey
    spec:
      automountServiceAccountToken: false
      containers:
        - name: valkey
          image: valkey/valkey:8
          args: ["--save", "", "--appendonly", "no"]
          ports:
            - containerPort: 6379
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { memory: 192Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: paperless-kustodyan-valkey
spec:
  selector:
    app: paperless-kustodyan-valkey
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
