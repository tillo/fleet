# EverTrust Horizon — eval values for mdapi-prod.
# Image is private (registry.evertrust.io); pull secret supplied globally.
global:
  imagePullSecrets:
    - evertrust-registry

# Single replica for the eval.
replicas: 1

# --- Hard-required secrets (chart fails to render without these) ---
license:
  secretName: horizon-license
  secretKey: license

# Default vault: tink with a local cleartext keyset (no masterKeyURI -> cleartext).
defaultVault:
  type: tink
  keyset:
    secretName: horizon-vault-keyset
    secretKey: keyset

# Allow the in-cluster MCP bridge (evertrust-mcp ns) to reach the REST API by its
# Service FQDN. Play's AllowedHostsFilter otherwise rejects it ("Host not allowed").
# This list REPLACES the chart default, so keep localhost:9000. The ingress hostname
# (horizon.mdapi.ch) is added automatically by the chart helper.
allowedHosts:
  - localhost:9000
  - horizon.horizon.svc.cluster.local:9000

# --- Analytics: embedded DuckDB read-model for search + dashboards ---
# Offloads certificate/event/discovery-event search & dashboard queries off MongoDB
# (Mongo stays the system of record; DuckDB is a rebuildable read replica).
# Sets ANALYTICS=true + ANALYTICS_URL=jdbc:duckdb:/opt/horizon/var/analytics.db.
analytics:
  enabled: true

# persistence.enabled=true makes the chart deploy Horizon as a StatefulSet and mount
# a PVC at /opt/horizon/var so the DuckDB store survives restarts (otherwise it
# re-syncs from Mongo on every pod start). One claim: `analytics`.
persistence:
  enabled: true
  volumeClaimTemplates:
    analytics:
      storageClass: harvester-longhorn-2replicas
      accessModes:
        - ReadWriteOnce
      size: "10Gi"
      mountPath: "/opt/horizon/var"

# Analytics adds RAM/CPU (DuckDB + initial sync). Raise the memory request/limit
# for the read-model, but DO NOT set a CPU limit: a CPU limit throttles JVM
# startup + the analytics sync (CFS throttling), which starves the 1s internal
# liveness check and crash-loops the pod. The chart default sets no limits.
resources:
  requests:
    # Lowered 500m->50m while node `qua` is DOWN (qui/quo are ~100% CPU-REQUESTED
    # from qua's evicted pods, though actual CPU use is ~45%). 50m lets horizon-0
    # schedule; with NO cpu limit it still bursts for JVM/analytics. Raise back to
    # ~300-500m once qua is recovered and cluster CPU-request pressure eases.
    cpu: 50m
    memory: 1Gi
  limits:
    memory: 2Gi

# The first analytics sync (certs + events + discovery events into DuckDB) is
# slow; widen the startup grace to 200×3s = 10min so a slow initial sync doesn't
# trip the startup probe into a restart loop.
startupProbe:
  enabled: true
  failureThreshold: 200
  periodSeconds: 3

# --- Datastore: self-managed single-node MongoDB REPLICASET (rs0) ---
# Horizon config import/export needs multi-document transactions, which MongoDB
# only supports on a replica set (even a 1-member one). The chart's bundled
# temporaryDatabase is standalone-only, so disable it and run our own single-node
# RS below in extraObjects, reusing the `horizon-mongodb` name/Service/PVC so the
# existing data converts in place. One member, no anti-affinity — purely the
# Horizon transactions technicality.
temporaryDatabase:
  enabled: false
externalDatabase:
  # rendered verbatim as the MONGODB_URI env value spec, so it must be value/valueFrom.
  uri:
    value: "mongodb://horizon-mongodb.horizon.svc.cluster.local:27017/horizon?replicaSet=rs0"

# upgrade + upgradeCompatibilityCheck left at chart defaults (enabled): the RS (rs0)
# is initiated now, so their pre/post-upgrade hooks connect fine via ?replicaSet=rs0.
# (They were temporarily disabled only during the standalone->RS swap.)

# --- Ingress: mdapi conventions (rke2 nginx + ModSec, namespaced LE issuer) ---
ingress:
  enabled: true
  ingressClassName: nginx
  hostname: horizon.mdapi.ch
  tls: true
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    # Horizon exposes a CRUD REST API (PUT/PATCH/DELETE) -> raise CRS allowed
    # methods before the CRS include (default set trips 949110 otherwise).
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecAction "id:900200,phase:1,pass,nolog,setvar:tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE"
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf

# --- Supporting resources (rendered via the chart's extraObjects/tpl pass).
#     NOTE: keep these free of `{{ }}` — the chart runs `tpl` over each entry,
#     so any Go-template braces would be evaluated by Helm, not ESO. ---
extraObjects:
  # Image pull secret for registry.evertrust.io. Full dockerconfigjson is stored
  # in Akeyless and mapped directly (mergePolicy: Merge keeps the fetched key and
  # only overlays the dockerconfigjson type) — avoids an ESO Go-template here.
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: evertrust-registry
    spec:
      refreshInterval: 1m0s
      secretStoreRef:
        kind: ClusterSecretStore
        name: cm-akeyless
      target:
        name: evertrust-registry
        creationPolicy: Owner
        template:
          type: kubernetes.io/dockerconfigjson
          mergePolicy: Merge
      data:
        - remoteRef:
            key: /kyos/evertrust/registry/dockerconfigjson
          secretKey: .dockerconfigjson

  # Horizon license (Evertrust-provided -> /kyos).
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: horizon-license
    spec:
      refreshInterval: 1m0s
      secretStoreRef:
        kind: ClusterSecretStore
        name: cm-akeyless
      target:
        name: horizon-license
        creationPolicy: Owner
      data:
        - remoteRef:
            key: /kyos/horizon/license/license
          secretKey: license

  # Tink vault keyset (generated by us -> /mdapi).
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: horizon-vault-keyset
    spec:
      refreshInterval: 1m0s
      secretStoreRef:
        kind: ClusterSecretStore
        name: cm-akeyless
      target:
        name: horizon-vault-keyset
        creationPolicy: Owner
      data:
        - remoteRef:
            key: /mdapi/horizon/vault-keyset/keyset
          secretKey: keyset

  # TSIG key for cert-manager DNS-01 (copied from joplin -> /mdapi/horizon).
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: tsig-secret
    spec:
      refreshInterval: 1m0s
      secretStoreRef:
        kind: ClusterSecretStore
        name: cm-akeyless
      target:
        name: tsig-secret
        creationPolicy: Owner
      data:
        - remoteRef:
            key: /mdapi/horizon/tsig-secret/tsig-secret-key
          secretKey: tsig-secret-key

  # Namespaced ACME issuer (DNS-01 via BIND RFC2136), modeled on joplin's.
  - apiVersion: cert-manager.io/v1
    kind: Issuer
    metadata:
      name: letsencrypt-prod
    spec:
      acme:
        email: tillo@tillo.ch
        privateKeySecretRef:
          name: letsencrypt-prod
        server: https://acme-v02.api.letsencrypt.org/directory
        solvers:
          - dns01:
              rfc2136:
                nameserver: 31.3.128.59:53
                tsigKeyName: mdapi
                tsigAlgorithm: HMACSHA256
                tsigSecretSecretRef:
                  name: tsig-secret
                  key: tsig-secret-key
            selector:
              dnsZones:
                - 'mdapi.ch'
          - http01:
              ingress:
                class: nginx

  # --- Single-node MongoDB replica set (rs0) for Horizon transactions ---
  # Reuse the chart's `horizon-mongodb` PVC + Service name (data + saved admin
  # password preserved; standalone->RS is an in-place conversion). The Deployment
  # uses a distinct name (horizon-mongodb-rs) to avoid Helm's immutable-selector
  # clash when superseding the chart's deployment. uid/fsGroup 1001 matches the
  # chart so the existing /data/db is readable. One member, no anti-affinity.
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: horizon-mongodb
    spec:
      storageClassName: harvester-longhorn-2replicas
      accessModes: [ReadWriteOnce]
      resources:
        requests:
          storage: 5Gi
  - apiVersion: v1
    kind: Service
    metadata:
      name: horizon-mongodb
    spec:
      type: ClusterIP
      ports:
        - name: mongo
          port: 27017
          targetPort: mongo
      selector:
        app: horizon-mongodb-rs
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: horizon-mongodb-rs
    spec:
      replicas: 1
      strategy:
        type: Recreate
      selector:
        matchLabels:
          app: horizon-mongodb-rs
      template:
        metadata:
          labels:
            app: horizon-mongodb-rs
        spec:
          securityContext:
            fsGroup: 1001
          containers:
            - name: mongo
              image: mongo:7
              args: ["--replSet", "rs0", "--bind_ip_all"]
              securityContext:
                runAsUser: 1001
                runAsNonRoot: true
              ports:
                - name: mongo
                  containerPort: 27017
              volumeMounts:
                - name: data
                  mountPath: /data/db
              startupProbe:
                tcpSocket: { port: mongo }
                failureThreshold: 30
                periodSeconds: 5
              readinessProbe:
                tcpSocket: { port: mongo }
                periodSeconds: 10
              livenessProbe:
                tcpSocket: { port: mongo }
                initialDelaySeconds: 30
                periodSeconds: 10
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: horizon-mongodb
  # One-shot, idempotent rs.initiate (single member). Plain Job (runs on create).
  - apiVersion: batch/v1
    kind: Job
    metadata:
      name: horizon-mongodb-rs-init
    spec:
      backoffLimit: 30
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: rs-init
              image: mongo:7
              command: ["bash", "-c"]
              args:
                - |
                  host=horizon-mongodb.horizon.svc.cluster.local:27017
                  for i in $(seq 1 80); do
                    mongosh --host "$host" --quiet --eval 'db.runCommand({ping:1})' >/dev/null 2>&1 && break
                    echo "waiting for mongod ($i)..."; sleep 3
                  done
                  mongosh --host "$host" --quiet --eval '
                    try { rs.status(); print("rs already initiated"); }
                    catch (e) {
                      rs.initiate({_id:"rs0", members:[{_id:0, host:"horizon-mongodb.horizon.svc.cluster.local:27017"}]});
                      print("rs initiated");
                    }'

  # ModSec carve-out for the ACME protocol path. The main `horizon` ingress runs
  # ModSec (WAF), which 403s ACME's JWS POSTs (new-acct/new-order). This second
  # Ingress for the same host serves only /acme with ModSec OFF -> the ACME server
  # (Horizon, profile acme-tls -> stream-mdapi -> Issuing CA 01) works while the
  # rest of horizon.mdapi.ch keeps the WAF. nginx merges per-path locations.
  - apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: horizon-acme
      annotations:
        # enable-modsecurity:false only OMITS `modsecurity on;` for this location,
        # so /acme still inherits the server-level `modsecurity on;` and 403s the
        # ACME POSTs. Enable the modsec block in this location but turn the engine
        # OFF (SecRuleEngine Off) — the reliable per-path ModSec disable.
        nginx.ingress.kubernetes.io/enable-modsecurity: "true"
        nginx.ingress.kubernetes.io/modsecurity-snippet: |
          SecRuleEngine Off
    spec:
      ingressClassName: nginx
      tls:
        - hosts: [horizon.mdapi.ch]
          secretName: horizon.mdapi.ch-tls
      rules:
        - host: horizon.mdapi.ch
          http:
            paths:
              - path: /acme
                pathType: Prefix
                backend:
                  service:
                    name: horizon
                    port:
                      name: http
              # EST protocol endpoints (simpleenroll/simplereenroll carry PKCS#10) —
              # same WAF carve-out as ACME so enrollment POSTs aren't 403'd.
              - path: /.well-known/est
                pathType: Prefix
                backend:
                  service:
                    name: horizon
                    port:
                      name: http
