# EverTrust Horizon — eval values for mdapi-prod.
# Image is private (registry.evertrust.io); pull secret supplied globally.
# zot-pull covers the patched main image on zot.mdapi.ch; evertrust-registry
# stays for the horizon-migration image the upgrade/check Jobs pull.
global:
  imagePullSecrets:
    - evertrust-registry
    - zot-pull

# Custom Horizon build (mdapi/horizon-ciphertrust, proj 213): vendor 2.10.2 plus a
# bytecode hook in TinkKeyset.$init$ adding a `ciphertrust://` vault master-key
# scheme backed by ch.tillo.tink:tink-ciphertrust (CipherTrust Manager REST).
# Rebuilt per Horizon version — bump this tag together with HORIZON_VERSION there.
# Rehearsed 2026-07-10 on a Mongo copy (RUNBOOK Step 0, horizon-rehearsal ns): PASS.
image:
  registry: zot.mdapi.ch
  repository: mdapi/horizon-ciphertrust
  tag: "2.10.2"

# Single replica for the eval.
replicas: 1

# EST simplereenroll (unattended auto-renewal) authenticates via mTLS. The horizon-acme
# carve-out ingress requests the client cert and passes it upstream in the `ssl-client-cert`
# header (auth-tls-pass-certificate-to-upstream). This sets Horizon's HTTP_CERTIFICATE_HEADER
# env so it reads the client cert from that header and accepts the X509 reenroll.
# (Standalone form — mutually exclusive with ingress.clientCertificateAuth, which would target
# the chart's MAIN ingress; the EST paths live on the separate horizon-acme ingress.)
clientCertificateHeader: "ssl-client-cert"

# --- Hard-required secrets (chart fails to render without these) ---
license:
  secretName: horizon-license
  secretKey: license

# Default vault: tink keyset wrapped by the CipherTrust Manager KEK
# `horizon-vault-kek` (AES-256, unexportable, owned by CM svc user
# svc-horizon-vault). The horizon-vault-keyset ES below now feeds the WRAPPED
# keyset (/mdapi/horizon/vault-keyset-wrapped/keyset — same key material as the
# old plaintext keyset, re-enveloped; plaintext kept at
# /mdapi/horizon/vault-keyset/keyset as the rollback artifact).
# NOTE: CM (VM `cm`, ns ciphertrust) is now on Horizon's boot path — if CM is
# down, horizon-0 hangs NotReady at vault init until CM returns (verified in
# the Step 0 rehearsal). Rollback = revert this commit (vendor image +
# plaintext keyset re-render within the ES refreshInterval).
defaultVault:
  type: tink
  masterKeyURI: "ciphertrust://cm.mdapi.ch/horizon-vault-kek"
  keyset:
    secretName: horizon-vault-keyset
    secretKey: keyset

# CM service-user credentials for the ciphertrust:// KEK; the hook reads them
# from VAULT_TINK_CREDENTIALS_PATH (same config key the built-in wrapped
# schemes use for their credential files).
environment:
  - name: VAULT_TINK_CREDENTIALS_PATH
    value: /opt/horizon/cm/credentials.json
extraVolumes:
  - name: cm-credentials
    secret:
      secretName: horizon-cm-credentials
extraVolumeMounts:
  - name: cm-credentials
    mountPath: /opt/horizon/cm
    readOnly: true

# Allow the in-cluster MCP bridge (evertrust-mcp ns) to reach the REST API by its
# Service FQDN. Play's AllowedHostsFilter otherwise rejects it ("Host not allowed").
# This list REPLACES the chart default, so keep localhost:9000. The ingress hostname
# (horizon.mdapi.ch) is added automatically by the chart helper.
allowedHosts:
  - localhost:9000
  - horizon.horizon.svc.cluster.local:9000

# --- Analytics: embedded DuckDB read-model for search + dashboards ---
# Offloads certificate/event/discovery-event search & dashboard queries off MongoDB
# (Mongo stays the system of record; DuckDB is a rebuildable read replica).
# Sets ANALYTICS=true + ANALYTICS_URL=jdbc:duckdb:/opt/horizon/var/analytics.db.
analytics:
  enabled: true

# persistence.enabled=true makes the chart deploy Horizon as a StatefulSet and mount
# a PVC at /opt/horizon/var so the DuckDB store survives restarts (otherwise it
# re-syncs from Mongo on every pod start). One claim: `analytics`.
persistence:
  enabled: true
  volumeClaimTemplates:
    analytics:
      storageClass: harvester-longhorn-2replicas
      accessModes:
        - ReadWriteOnce
      size: "10Gi"
      mountPath: "/opt/horizon/var"

# Analytics adds RAM/CPU (DuckDB + initial sync). Raise the memory request/limit
# for the read-model, but DO NOT set a CPU limit: a CPU limit throttles JVM
# startup + the analytics sync (CFS throttling), which starves the 1s internal
# liveness check and crash-loops the pod. The chart default sets no limits.
resources:
  requests:
    # Restored to 300m now that qua is recovered (the 50m was a temporary fit while
    # qua was down and qui/quo were CPU-request-saturated, 2026-06-19). No cpu limit,
    # so it still bursts freely for JVM startup + analytics.
    cpu: 300m
    memory: 1Gi
  limits:
    memory: 2Gi

# The first analytics sync (certs + events + discovery events into DuckDB) is
# slow; widen the startup grace to 200×3s = 10min so a slow initial sync doesn't
# trip the startup probe into a restart loop.
startupProbe:
  enabled: true
  failureThreshold: 200
  periodSeconds: 3

# --- Datastore: self-managed single-node MongoDB REPLICASET (rs0) ---
# Horizon config import/export needs multi-document transactions, which MongoDB
# only supports on a replica set (even a 1-member one). The chart's bundled
# temporaryDatabase is standalone-only, so disable it and run our own single-node
# RS below in extraObjects, reusing the `horizon-mongodb` name/Service/PVC so the
# existing data converts in place. One member, no anti-affinity — purely the
# Horizon transactions technicality.
temporaryDatabase:
  enabled: false
externalDatabase:
  # rendered verbatim as the MONGODB_URI env value spec, so it must be value/valueFrom.
  uri:
    value: "mongodb://horizon-mongodb.horizon.svc.cluster.local:27017/horizon?replicaSet=rs0"

# upgrade + upgradeCompatibilityCheck left at chart defaults (enabled): the RS (rs0)
# is initiated now, so their pre/post-upgrade hooks connect fine via ?replicaSet=rs0.
# (They were temporarily disabled only during the standalone->RS swap.)

# --- Ingress: mdapi conventions (rke2 nginx + ModSec, namespaced LE issuer) ---
ingress:
  enabled: true
  ingressClassName: nginx
  hostname: horizon.mdapi.ch
  tls: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    # Horizon exposes a CRUD REST API (PUT/PATCH/DELETE) -> raise CRS allowed
    # methods before the CRS include (default set trips 949110 otherwise).
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecAction "id:900200,phase:1,pass,nolog,setvar:tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE"
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf

# --- Metrics: Horizon exposes Kamon/Pekko metrics on the `kamon` port (9095).
# The chart's own ServiceMonitor sends a blank Content-Type, which Prometheus 3.x
# (rancher-monitoring runs v3.5.0) rejects: "non-compliant scrape target sending
# blank Content-Type and no fallback_scrape_protocol specified". The 2.4.1 chart
# can't set ServiceMonitor.spec.fallbackScrapeProtocol, so disable the chart SM and
# ship our own (in extraObjects below) with that field set. (2026-06-22)
monitoring:
  enabled: false

# --- Supporting resources (rendered via the chart's extraObjects/tpl pass).
#     NOTE: keep these free of `{{ }}` — the chart runs `tpl` over each entry,
#     so any Go-template braces would be evaluated by Helm, not ESO. ---
extraObjects:
  # Image pull secret for registry.evertrust.io. Full dockerconfigjson is stored
  # in Akeyless and mapped directly (mergePolicy: Merge keeps the fetched key and
  # only overlays the dockerconfigjson type) — avoids an ESO Go-template here.
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: evertrust-registry
    spec:
      refreshInterval: 1m0s
      secretStoreRef:
        kind: ClusterSecretStore
        name: cm-akeyless
      target:
        name: evertrust-registry
        creationPolicy: Owner
        template:
          type: kubernetes.io/dockerconfigjson
          mergePolicy: Merge
      data:
        - remoteRef:
            key: /kyos/evertrust/registry/dockerconfigjson
          secretKey: .dockerconfigjson

  # Horizon license (Evertrust-provided -> /kyos).
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: horizon-license
    spec:
      refreshInterval: 1m0s
      secretStoreRef:
        kind: ClusterSecretStore
        name: cm-akeyless
      target:
        name: horizon-license
        creationPolicy: Owner
      data:
        - remoteRef:
            key: /kyos/horizon/license/license
          secretKey: license

  # Tink vault keyset (generated by us -> /mdapi), WRAPPED by the CM KEK since
  # 2026-07-10 (rollback: point back to /mdapi/horizon/vault-keyset/keyset).
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: horizon-vault-keyset
    spec:
      refreshInterval: 1m0s
      secretStoreRef:
        kind: ClusterSecretStore
        name: cm-akeyless
      target:
        name: horizon-vault-keyset
        creationPolicy: Owner
      data:
        - remoteRef:
            key: /mdapi/horizon/vault-keyset-wrapped/keyset
          secretKey: keyset

  # CipherTrust Manager service-user credentials (svc-horizon-vault) for the
  # ciphertrust:// master key, mounted as credentials.json via extraVolumes.
  # The full JSON doc is stored ready-made in Akeyless (no ESO template here —
  # the chart runs `tpl` over extraObjects, which would eat `{{ }}`).
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: horizon-cm-credentials
    spec:
      refreshInterval: 1m0s
      secretStoreRef:
        kind: ClusterSecretStore
        name: cm-akeyless
      target:
        name: horizon-cm-credentials
        creationPolicy: Owner
      data:
        - remoteRef:
            key: /mdapi/ciphertrust/svc-horizon-vault/credentials.json
          secretKey: credentials.json

  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: horizon-mongodb
    spec:
      storageClassName: harvester-longhorn-2replicas
      accessModes: [ReadWriteOnce]
      resources:
        requests:
          storage: 5Gi
  - apiVersion: v1
    kind: Service
    metadata:
      name: horizon-mongodb
    spec:
      type: ClusterIP
      ports:
        - name: mongo
          port: 27017
          targetPort: mongo
      selector:
        app: horizon-mongodb-rs
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: horizon-mongodb-rs
    spec:
      replicas: 1
      strategy:
        type: Recreate
      selector:
        matchLabels:
          app: horizon-mongodb-rs
      template:
        metadata:
          labels:
            app: horizon-mongodb-rs
        spec:
          securityContext:
            fsGroup: 1001
          containers:
            - name: mongo
              image: mongo:7
              args: ["--replSet", "rs0", "--bind_ip_all"]
              securityContext:
                runAsUser: 1001
                runAsNonRoot: true
              ports:
                - name: mongo
                  containerPort: 27017
              volumeMounts:
                - name: data
                  mountPath: /data/db
              startupProbe:
                tcpSocket: { port: mongo }
                failureThreshold: 30
                periodSeconds: 5
              readinessProbe:
                tcpSocket: { port: mongo }
                periodSeconds: 10
              livenessProbe:
                tcpSocket: { port: mongo }
                initialDelaySeconds: 30
                periodSeconds: 10
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: horizon-mongodb
  # One-shot, idempotent rs.initiate (single member). Plain Job (runs on create).
  - apiVersion: batch/v1
    kind: Job
    metadata:
      name: horizon-mongodb-rs-init
    spec:
      backoffLimit: 30
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: rs-init
              image: mongo:7
              command: ["bash", "-c"]
              args:
                - |
                  host=horizon-mongodb.horizon.svc.cluster.local:27017
                  for i in $(seq 1 80); do
                    mongosh --host "$host" --quiet --eval 'db.runCommand({ping:1})' >/dev/null 2>&1 && break
                    echo "waiting for mongod ($i)..."; sleep 3
                  done
                  mongosh --host "$host" --quiet --eval '
                    try { rs.status(); print("rs already initiated"); }
                    catch (e) {
                      rs.initiate({_id:"rs0", members:[{_id:0, host:"horizon-mongodb.horizon.svc.cluster.local:27017"}]});
                      print("rs initiated");
                    }'

  # Client-CA bundle the horizon-acme ingress uses to verify EST client certs for mTLS
  # reenroll (auth-tls-secret). ca.crt = MDAPI Issuing CA 01 + MDAPI Root CA — public CA
  # certs (not secret), inlined so the trust anchor is Fleet-managed.
  - apiVersion: v1
    kind: Secret
    metadata:
      name: est-client-ca
    type: Opaque
    stringData:
      ca.crt: |
        -----BEGIN CERTIFICATE-----
        MIICETCCAZegAwIBAgIQJWLvVrFzdklVpPqeC4qvYDAKBggqhkjOPQQDAzA1MQsw
        CQYDVQQGEwJDSDEOMAwGA1UECgwFbWRhcGkxFjAUBgNVBAMMDU1EQVBJIFJvb3Qg
