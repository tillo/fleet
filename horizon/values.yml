  # ModSec carve-out for the ACME protocol path. The main `horizon` ingress runs
  # ModSec (WAF), which 403s ACME's JWS POSTs (new-acct/new-order). This second
  # Ingress for the same host serves only /acme with ModSec OFF -> the ACME server
  # (Horizon, profile acme-tls -> stream-mdapi -> Issuing CA 01) works while the
  # rest of horizon.mdapi.ch keeps the WAF. nginx merges per-path locations.
  - apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: horizon-acme
      annotations:
        # enable-modsecurity:false only OMITS `modsecurity on;` for this location,
        # so /acme still inherits the server-level `modsecurity on;` and 403s the
        # ACME POSTs. Enable the modsec block in this location but turn the engine
        # OFF (SecRuleEngine Off) — the reliable per-path ModSec disable.
        nginx.ingress.kubernetes.io/enable-modsecurity: "true"
        nginx.ingress.kubernetes.io/modsecurity-snippet: |
          SecRuleEngine Off
        # mTLS for EST simplereenroll (auto-renewal): request the client cert but make it
        # OPTIONAL so /acme and the challenge-based simpleenroll (no client cert) still work;
        # pass the presented cert upstream as `ssl-client-cert` for Horizon's X509 reenroll.
        nginx.ingress.kubernetes.io/auth-tls-verify-client: "optional"
        nginx.ingress.kubernetes.io/auth-tls-secret: "horizon/est-client-ca"
        nginx.ingress.kubernetes.io/auth-tls-verify-depth: "2"
        nginx.ingress.kubernetes.io/auth-tls-pass-certificate-to-upstream: "true"
    spec:
      ingressClassName: nginx
      tls:
        - hosts: [horizon.mdapi.ch]
          secretName: horizon.mdapi.ch-tls
      rules:
        - host: horizon.mdapi.ch
          http:
            paths:
              - path: /acme
                pathType: Prefix
                backend:
                  service:
                    name: horizon
                    port:
                      name: http
              # EST protocol endpoints (simpleenroll/simplereenroll carry PKCS#10) —
              # same WAF carve-out as ACME so enrollment POSTs aren't 403'd.
              - path: /.well-known/est
                pathType: Prefix
                backend:
                  service:
                    name: horizon
                    port:
                      name: http

  # ServiceMonitor for Horizon's Kamon metrics (port `kamon`/9095). Replaces the
  # chart's built-in SM (disabled via monitoring.enabled=false above) solely to add
  # fallbackScrapeProtocol, which Prometheus 3.x needs because Kamon's exposition
  # response carries a blank Content-Type. Spec is otherwise identical to the chart's.
  - apiVersion: monitoring.coreos.com/v1
    kind: ServiceMonitor
    metadata:
      name: horizon
      labels:
        app.kubernetes.io/instance: horizon
        app.kubernetes.io/name: horizon
    spec:
      fallbackScrapeProtocol: PrometheusText0.0.4
      namespaceSelector:
        matchNames:
          - horizon
      selector:
        matchLabels:
          app.kubernetes.io/instance: horizon
          app.kubernetes.io/name: horizon
      endpoints:
        - path: /metrics
          port: kamon
