defaultNamespace: horizon
namespace: horizon
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
helm:
  maxHistory: 25
  releaseName: horizon
  # EverTrust Horizon (CLM) — training/eval instance.
  # Chart repo is ANONYMOUS (the kyos partner account is NOT granted on the
  # `charts` repo and 403s if creds are sent — verified 2026-06-18), so this
  # follows the normal public-chart convention. The private bit is the IMAGE
  # registry (registry.evertrust.io), handled by the evertrust-registry
  # imagePullSecret (ExternalSecret in extraObjects).
  # NOTE: trailing slash is REQUIRED. The repo index lists a relative chart
  # URL ("horizon-2.4.1.tgz"); without the trailing slash Fleet resolves it
  # against ".../repository/" (dropping "charts") -> 400. helm pull masks this
  # but Fleet's fetch does not. (verified 2026-06-18)
  repo: https://repo.evertrust.io/repository/charts/
  chart: horizon
  version: 2.4.1          # Lane-B pinned (appVersion 2.10.1); bump deliberately
  valuesFiles:
    - values.yml
