apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: frigate-env-secret
spec:
  refreshInterval: 1m

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: frigate-env-secret
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/frigate/frigate-env-secret/FRIGATE_RSTP_PASSWORD
      secretKey: FRIGATE_RTSP_PASSWORD
    - remoteRef:
        key: /mdapi/frigate/frigate-env-secret/PLUS_API_KEY
      secretKey: PLUS_API_KEY
