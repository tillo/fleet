apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frigate
  namespace: frigate
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: NVR
    flame.pawelmalak/url: https://frigate.mdapi.ch
    flame.pawelmalak/category: Domotics
    flame.pawelmalak/icon: cctv
    flame.pawelmalak/order: '50'
    nginx.ingress.kubernetes.io/auth-response-headers: Authorization
    nginx.ingress.kubernetes.io/auth-signin: https://auth.mdapi.ch/admin/oauth2/start?rd=https://$host$escaped_request_uri
    nginx.ingress.kubernetes.io/auth-url: https://auth.mdapi.ch/admin/oauth2/auth
spec:
  ingressClassName: nginx
  rules:
    - host: frigate.mdapi.ch
      http:
        paths:
          - backend:
              service:
                name: frigate
                port:
                  number: 5000
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - frigate.mdapi.ch
      secretName: frigate-cert
