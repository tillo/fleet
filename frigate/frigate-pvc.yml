apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frigate-config
spec:
  storageClassName: mdapidev
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frigate-media
spec:
  storageClassName: mdapidev
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
