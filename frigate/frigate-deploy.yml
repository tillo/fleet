apiVersion: apps/v1
kind: Deployment
metadata:
  name: frigate
  namespace: frigate
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 4h"
spec:
  selector:
    matchLabels:
      app: frigate
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: frigate
        # Intentional CPU cap (6c, blast-radius control — see container note).
        # Software decode bursts to the lid by design, so frigate is exempt
        # from ContainerCpuThrottling (monitoring-rules/18-cpu-throttling.yml),
        # honored via the KSM pod-label allowlist in rancher-monitoring-config.
        monitoring.mdapi.ch/cpu-throttle-exempt: "true"
    spec:
      # Frigate 0.17.1 ships go2rtc 1.9.10. Newer go2rtc (1.9.14) has WebRTC
      # ICE/Filter rework that may fix the SDP offer Google's SDM service
      # rejects with 500 for some Nest cam generations (see balconycam). The
      # initContainer downloads the binary; the frigate container mounts it
      # over the bundled path via subPath.
      # 2026-07-13: switched to our patched 1.9.14-nestfix1 build
      # (gitlab.mdapi.ch/mdapi/go2rtc): upstream's nest source extends the
      # Google media session only ONCE (one-shot timer) and shares one
      # session-state object across same-credential cameras, so every Nest
      # cam renegotiated (with an ffmpeg "no PPS/no frame" wedge + watchdog
      # restart = 20s outage) every 5-10 min. Version string of the fixed
      # build: "1.9.14+dev.b5948cf.dirty". Revert = restore the github URL.
      initContainers:
      - name: fetch-go2rtc
        image: busybox:latest
        command:
        - sh
        - -c
        - |
          set -eu
          cd /go2rtc-override
          if [ ! -x go2rtc ]; then
            wget -qO go2rtc https://gitlab.mdapi.ch/api/v4/projects/214/packages/generic/go2rtc/1.9.14-nestfix1/go2rtc_linux_amd64
            echo "2ef746791322a4c1bdb5c4e86a9d5014d930784cf97794739235cd5885f6ea81  go2rtc" | sha256sum -c
            chmod +x go2rtc
          fi
          /go2rtc-override/go2rtc --version
        volumeMounts:
        - name: go2rtc-override
          mountPath: /go2rtc-override
      containers:
      - name: frigate
        image: ghcr.io/blakeblackshear/frigate:stable
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        # Frigate stays on VPA Off because Coral USB + GPU passthroughs
        # re-init on pod restart and miss frames during bring-up. Limit
        # held at 6c (down from 8c) after the 2026-06-06 cascade: Frigate
        # does software video decode (no Coral/iGPU on the Xeon nodes), so
        # an 8c burst on a loaded peer can starve etcd during a drain.
        # 6c caps the blast radius while still covering the multi-camera
        # detector burst (VPA observation-only target was 5814m).
        resources:
          requests:
            cpu: 4
            memory: 3Gi
          limits:
            cpu: 6
            memory: 4Gi
#        command: ['/bin/sh']
#        args:
#        - '+x'
#        - '-c'
#        - >-
#          tail -f /dev/null
        env:
        - name: TZ
          value: Europe/Zurich
        envFrom:
          - secretRef:
              name: frigate-env-secret
        volumeMounts:
        - name: frigate-config
          mountPath: /config
        - name: frigate-media
          mountPath: /media
        - name: frigate-shm
          mountPath: /dev/shm
        - name: frigate-tmp
          mountPath: /tmp
        - name: go2rtc-override
          mountPath: /usr/local/go2rtc/bin/go2rtc
          subPath: go2rtc
      # === Nest WebRTC bridge sidecars — DISABLED, NOT NEEDED ============
      # 2026-05-18 update to the original story below: the "Google peer
      # drops at ~20 s every cycle" symptom was caused by a stale SDM
      # device handle (the balconycam ID in our refresh_token's grant no
      # longer matched the device after some prior re-pair in Google
      # Home). After remove + re-add in Google Home, fresh OAuth consent
      # via the partnerconnections URL with prompt=consent, and updating
      # NEST_REFRESH_TOKEN + NEST_DEVICE_ID in the frigate-nest-balconycam
      # secret, the device works perfectly through go2rtc's NATIVE
      # `nest://` connector on the PVC config — no Python bridge needed.
      # The bridge was a workaround for the wrong root cause.
      #
      # Original investigation notes preserved below for posterity. Leave
      # the sidecar block commented out; if balconycam ever flakes again,
      # first re-run the SDM remove/re-add/re-grant cycle before
      # re-enabling the bridge.
      # -----------------------------------------------------------------
      # Original (pre-2026-05-18) investigation:
      # 1. Google SDM returned 500 for balconycam GenerateWebRtcStream
      #    from server-side WebRTC clients (Scrypted, our aiortc bridge)
      #    but worked for browsers — explained by the stale device
      #    handle, not a per-device backend quirk.
      # 2. With SDP fixes (google-nest-sdm#1116 + Scrypted offer
      #    sanitization) the bridge briefly opened the WebRTC peer, got
      #    media flowing, then Google's peer dropped at ~20 s.
      # 3. ~20 s up / ~5 s down was too fast for Frigate's ffmpeg
      #    DESCRIBE to catch the publish window; bridge's 5 s retry
      #    burned SDM quota.
      # -----------------------------------------------------------------
      # - name: mediamtx
      #   image: bluenviron/mediamtx:latest
      #   imagePullPolicy: Always
      #   ports:
      #   - containerPort: 8555
      #     name: rtsp-relay
      #   volumeMounts:
      #   - name: nest-bridge-scripts
      #     mountPath: /mediamtx.yml
      #     subPath: mediamtx.yml
      #   resources:
      #     requests: {cpu: 20m, memory: 32Mi}
      #     limits: {cpu: 1, memory: 256Mi}
      # - name: nest-bridge-balconycam
      #   image: python:3-slim
      #   imagePullPolicy: IfNotPresent
      #   command:
      #   - sh
      #   - -c
      #   - |
      #     set -eu
      #     pip install --quiet --no-cache-dir 'aiortc>=1.14' 2>&1 | tail -5
      #     exec python3 /scripts/bridge.py
      #   envFrom:
      #   - secretRef:
      #       name: frigate-nest-balconycam
      #   env:
      #   - name: RTSP_OUT_URL
      #     value: rtsp://127.0.0.1:8555/balconycam
      #   - name: DIAG_BLACKHOLE
      #     value: "0"
      #   volumeMounts:
      #   - name: nest-bridge-scripts
      #     mountPath: /scripts
      #   resources:
      #     requests: {cpu: 100m, memory: 128Mi}
      #     limits: {cpu: 1, memory: 512Mi}
      # =================================================================
      # Sidecar: 6-hourly off-site sync of /media/frigate/recordings → Garage S3.
      # Skips files newer than 24h so Frigate's local retention drives local TTL.
      - name: rclone-recordings-s3
        image: rclone/rclone:latest
        command:
        - sh
        - -c
        - |
          set -u
          : "${BUCKET:?BUCKET env required}"
          while true; do
            rclone copy --min-age 24h --transfers 4 --s3-no-check-bucket \
              /media/frigate/recordings "garage:${BUCKET}" 2>&1 || true
            sleep 21600
          done
        envFrom:
        - secretRef:
            name: garage-frigate-s3
        volumeMounts:
        - name: frigate-media
          mountPath: /media
          readOnly: true
        ## 6-hourly S3 sync bursts to several cores during transfer; the 1c
        ## lid was throttling 19% of CFS periods, stretching syncs past
        ## their window. 2c lets the rclone parallel chunks finish faster.
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 2
            memory: 512Mi
      volumes:
      - name: frigate-config
        persistentVolumeClaim:
          claimName: frigate-config
      - name: frigate-media
        persistentVolumeClaim:
          claimName: frigate-media
      - name: frigate-shm
        emptyDir:
          medium: Memory
          sizeLimit: 1G
      - name: frigate-tmp
        emptyDir:
          medium: Memory
          sizeLimit: 1G
      - name: go2rtc-override
        emptyDir:
          sizeLimit: 100M
      # - name: nest-bridge-scripts   # re-add with the sidecar block above
      #   configMap:
      #     name: frigate-nest-bridge
