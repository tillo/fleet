apiVersion: apps/v1
kind: Deployment
metadata:
  name: frigate
  namespace: frigate
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
spec:
  selector:
    matchLabels:
      app: frigate
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: frigate
    spec:
      # Frigate 0.17.1 ships go2rtc 1.9.10. Newer go2rtc (1.9.14) has WebRTC
      # ICE/Filter rework that may fix the SDP offer Google's SDM service
      # rejects with 500 for some Nest cam generations (see balconycam). The
      # initContainer downloads the upstream binary; the frigate container
      # mounts it over the bundled path via subPath.
      initContainers:
      - name: fetch-go2rtc
        image: busybox:1.37
        command:
        - sh
        - -c
        - |
          set -eu
          cd /go2rtc-override
          if [ ! -x go2rtc ]; then
            wget -qO go2rtc https://github.com/AlexxIT/go2rtc/releases/download/v1.9.14/go2rtc_linux_amd64
            chmod +x go2rtc
          fi
          /go2rtc-override/go2rtc --version
        volumeMounts:
        - name: go2rtc-override
          mountPath: /go2rtc-override
      containers:
      - name: frigate
        image: ghcr.io/blakeblackshear/frigate:stable
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: 4
            memory: 3Gi
          limits:
            cpu: 6
            memory: 4Gi
#        command: ['/bin/sh']
#        args:
#        - '+x'
#        - '-c'
#        - >-
#          tail -f /dev/null
        env:
        - name: TZ
          value: Europe/Zurich
        envFrom:
          - secretRef:
              name: frigate-env-secret
        volumeMounts:
        - name: frigate-config
          mountPath: /config
        - name: frigate-media
          mountPath: /media
        - name: frigate-shm
          mountPath: /dev/shm
        - name: frigate-tmp
          mountPath: /tmp
        - name: go2rtc-override
          mountPath: /usr/local/go2rtc/bin/go2rtc
          subPath: go2rtc
      # === Nest WebRTC bridge sidecars — currently disabled ============
      # Both the mediamtx relay + nest-bridge-balconycam aiortc bridge are
      # disabled because aiortc's WebRTC peer drops the SDM connection ~23s
      # after going to `connected` (tested with MediaBlackhole — not a sink
      # issue). Likely missing RTCP feedback aiortc doesn't send and Google's
      # SDM peer expects. Need to investigate aiortc's RTCP RR generation or
      # switch to a Go-based pion-webrtc client.
      # Re-enable: uncomment both containers + the nest-bridge-scripts
      # volume below + switch /config/config.yaml's balconycam source from
      # the direct nest: URL to rtsp://127.0.0.1:8555/balconycam.
      # ConfigMap (frigate-nest-bridge) and Secret (frigate-nest-balconycam)
      # are kept in place so re-enabling is a YAML-only change.
      # -----------------------------------------------------------------
      # - name: mediamtx
      #   image: bluenviron/mediamtx:latest
      #   imagePullPolicy: Always
      #   ports:
      #   - containerPort: 8555
      #     name: rtsp-relay
      #   volumeMounts:
      #   - name: nest-bridge-scripts
      #     mountPath: /mediamtx.yml
      #     subPath: mediamtx.yml
      #   resources:
      #     requests: {cpu: 20m, memory: 32Mi}
      #     limits: {cpu: 1, memory: 256Mi}
      # - name: nest-bridge-balconycam
      #   image: python:3.12-slim
      #   imagePullPolicy: IfNotPresent
      #   command:
      #   - sh
      #   - -c
      #   - |
      #     set -eu
      #     pip install --quiet --no-cache-dir 'aiortc>=1.14' 2>&1 | tail -5
      #     exec python3 /scripts/bridge.py
      #   envFrom:
      #   - secretRef:
      #       name: frigate-nest-balconycam
      #   env:
      #   - name: RTSP_OUT_URL
      #     value: rtsp://127.0.0.1:8555/balconycam
      #   volumeMounts:
      #   - name: nest-bridge-scripts
      #     mountPath: /scripts
      #   resources:
      #     requests: {cpu: 100m, memory: 128Mi}
      #     limits: {cpu: 1, memory: 512Mi}
      # =================================================================
      # Sidecar: 6-hourly off-site sync of /media/frigate/recordings → Garage S3.
      # Skips files newer than 24h so Frigate's local retention drives local TTL.
      - name: rclone-recordings-s3
        image: rclone/rclone:1.69
        command:
        - sh
        - -c
        - |
          set -u
          : "${BUCKET:?BUCKET env required}"
          while true; do
            rclone copy --min-age 24h --transfers 4 --s3-no-check-bucket \
              /media/frigate/recordings "garage:${BUCKET}" 2>&1 || true
            sleep 21600
          done
        envFrom:
        - secretRef:
            name: garage-frigate-s3
        volumeMounts:
        - name: frigate-media
          mountPath: /media
          readOnly: true
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 1
            memory: 512Mi
      volumes:
      - name: frigate-config
        persistentVolumeClaim:
          claimName: frigate-config
      - name: frigate-media
        persistentVolumeClaim:
          claimName: frigate-media
      - name: frigate-shm
        emptyDir:
          medium: Memory
          sizeLimit: 1G
      - name: frigate-tmp
        emptyDir:
          medium: Memory
          sizeLimit: 1G
      - name: go2rtc-override
        emptyDir:
          sizeLimit: 100M
      # - name: nest-bridge-scripts   # uncomment with the bridge sidecars above
      #   configMap:
      #     name: frigate-nest-bridge
