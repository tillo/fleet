apiVersion: apps/v1
kind: Deployment
metadata:
  name: frigate
  namespace: frigate
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
spec:
  selector:
    matchLabels:
      app: frigate
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: frigate
    spec:
      containers:
      - name: frigate
        image: ghcr.io/blakeblackshear/frigate:stable
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: 4
            memory: 3Gi
          limits:
            cpu: 6
            memory: 4Gi
#        command: ['/bin/sh']
#        args:
#        - '+x'
#        - '-c'
#        - >-
#          tail -f /dev/null
        env:
        - name: TZ
          value: Europe/Zurich
        envFrom:
          - secretRef:
              name: frigate-env-secret
        volumeMounts:
        - name: frigate-config
          mountPath: /config
        - name: frigate-media
          mountPath: /media
        - name: frigate-shm
          mountPath: /dev/shm
        - name: frigate-tmp
          mountPath: /tmp
      # Sidecar: 6-hourly off-site sync of /media/frigate/recordings → Garage S3.
      # Skips files newer than 24h so Frigate's local retention drives local TTL.
      - name: rclone-recordings-s3
        image: rclone/rclone:1.69
        command:
        - sh
        - -c
        - |
          set -u
          : "${BUCKET:?BUCKET env required}"
          while true; do
            rclone copy --min-age 24h --transfers 4 --s3-no-check-bucket \
              /media/frigate/recordings "garage:${BUCKET}" 2>&1 || true
            sleep 21600
          done
        envFrom:
        - secretRef:
            name: garage-frigate-s3
        volumeMounts:
        - name: frigate-media
          mountPath: /media
          readOnly: true
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 1
            memory: 512Mi
      volumes:
      - name: frigate-config
        persistentVolumeClaim:
          claimName: frigate-config
      - name: frigate-media
        persistentVolumeClaim:
          claimName: frigate-media
      - name: frigate-shm
        emptyDir:
          medium: Memory
          sizeLimit: 1G
      - name: frigate-tmp
        emptyDir:
          medium: Memory
          sizeLimit: 1G
