apiVersion: apps/v1
kind: Deployment
metadata:
  name: frigate
  namespace: frigate
spec:
  selector:
    matchLabels:
      app: frigate
  replicas: 1
  template:
    metadata:
      labels:
        app: frigate
    spec:
      containers:
      - name: frigate
        image: ghcr.io/blakeblackshear/frigate:stable
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        command: ['/bin/sh']
        args:
        - '+x'
        - '-c'
        - >-
          /init
          || sleep infinity
        env:
        - name: TZ
          value: Europe/Zurich
        envFrom:
          - secretRef:
              name: frigate-env-secret
        volumeMounts:
        - name: frigate-config
          mountPath: /config
        - name: frigate-media
          mountPath: /media
        - name: frigate-shm
          mountPath: /dev/shm
        - name: frigate-tmp
          mountPath: /tmp
      volumes:
      - name: frigate-config
        persistentVolumeClaim:
          claimName: frigate-config
      - name: frigate-media
        persistentVolumeClaim:
          claimName: frigate-media
      - name: frigate-shm
        emptyDir:
          medium: Memory
          sizeLimit: 1G
      - name: frigate-tmp
        emptyDir:
          medium: Memory
          sizeLimit: 1G
