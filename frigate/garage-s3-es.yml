apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garage-frigate-s3
spec:
  refreshInterval: 1m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: garage-frigate-s3
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        RCLONE_CONFIG_GARAGE_TYPE: "s3"
        # 2026-06-22: moved off bootstrap/garage (decommissioning) to Ceph RGW.
        # Recordings are operational data -> kept in-cluster, NOT off-site backups.
        # RGW user 'frigate' (rook-ceph-objectstore-users/objectstoreuser-frigate.yml);
        # creds in Akeyless /mdapi/frigate/garage-s3/{access,secret}_key.
        RCLONE_CONFIG_GARAGE_PROVIDER: "Ceph"
        RCLONE_CONFIG_GARAGE_ENDPOINT: "http://rook-ceph-rgw-ceph-objectstore.rook-ceph.svc:80"
        RCLONE_CONFIG_GARAGE_REGION: "us-east-1"
        RCLONE_CONFIG_GARAGE_ACCESS_KEY_ID: "{{ .access_key }}"
        RCLONE_CONFIG_GARAGE_SECRET_ACCESS_KEY: "{{ .secret_key }}"
        BUCKET: "frigate-recordings"

  data:
    - remoteRef:
        key: /mdapi/frigate/garage-s3/access_key
      secretKey: access_key
    - remoteRef:
        key: /mdapi/frigate/garage-s3/secret_key
      secretKey: secret_key
