defaultNamespace: kube-system
namespace: kube-system
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
helm:
  maxHistory: 25
diff:
  comparePatches:
    # ingress-expose: ignore kube-vip-managed runtime annotations and
    # auto-allocated nodePorts so Fleet doesn't fight kube-vip on every
    # VIP failover or kube-proxy nodePort rotation.
    - apiVersion: v1
      kind: Service
      name: ingress-expose
      namespace: kube-system
      operations:
        - {op: remove, path: /metadata/annotations/kube-vip.io~1vipHost}
        - {op: remove, path: /metadata/annotations/kube-vip.io~1hwaddr}
        - {op: remove, path: /spec/ports/0/nodePort}
        - {op: remove, path: /spec/ports/1/nodePort}
