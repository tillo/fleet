apiVersion: v1
kind: Service
metadata:
  name: ingress-expose
  namespace: kube-system
  annotations:
    # kube-vip claims this Service because of the security-ignore opt-in;
    # vipHost + hwaddr are set by kube-vip at runtime (ignored via
    # fleet.yaml comparePatches).
    kube-vip.io/ignore-service-security: "true"
    kube-vip.io/loadbalancerIPs: 192.168.1.191
spec:
  type: LoadBalancer
  # spec.loadBalancerIP pins .191 explicitly. PureLB's default pool is
  # 192.168.1.40-99 — .191 is out-of-pool, so PureLB skips this Service.
  # kube-vip sees the annotation + the spec field and claims it.
  loadBalancerIP: 192.168.1.191
  externalTrafficPolicy: Local
  selector:
    app.kubernetes.io/name: rke2-ingress-nginx
    app.kubernetes.io/component: controller
  ports:
    - {name: https, port: 443, targetPort: 443, protocol: TCP}
    - {name: http,  port: 80,  targetPort: 80,  protocol: TCP}
