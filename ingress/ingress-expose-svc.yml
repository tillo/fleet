apiVersion: v1
kind: Service
metadata:
  name: ingress-expose
  namespace: kube-system
  annotations:
    # kube-vip claims this Service because of the security-ignore opt-in;
    # the loadbalancerIPs annotation pins .191. vipHost + hwaddr are set
    # by kube-vip at runtime (ignored via fleet.yaml comparePatches).
    kube-vip.io/ignore-service-security: "true"
    kube-vip.io/loadbalancerIPs: 192.168.1.191
    # Point PureLB at a non-existent ServiceGroup so its allocator skips
    # this Service and releases .47 back to the default pool.
    purelb.io/service-group: kube-vip
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app.kubernetes.io/name: rke2-ingress-nginx
    app.kubernetes.io/component: controller
  ports:
    - {name: https, port: 443, targetPort: 443, protocol: TCP}
    - {name: http,  port: 80,  targetPort: 80,  protocol: TCP}
