apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: recaptcha-secret
spec:
  refreshInterval: 1m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: recaptcha-secret
    creationPolicy: Owner
  data:
    - remoteRef:
        key: /mdapi/dellambrogio/recaptcha-secret-key
      secretKey: RECAPTCHA_SECRET_KEY
