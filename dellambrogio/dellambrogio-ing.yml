apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dellambrogio
  namespace: dellambrogio
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecAuditEngine RelevantOnly
      SecAuditLogRelevantStatus "^(?:5|4(?!04))"
      SecAuditLogParts ABIJDEFHZ
      SecAuditLogType Serial
      SecAuditLogFormat JSON
      SecAuditLog /dev/stdout
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
spec:
  ingressClassName: nginx
  rules:
    - host: dellambrogio.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dellambrogio
                port:
                  number: 80
    - host: www.dellambrogio.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dellambrogio
                port:
                  number: 80
    - host: dellambrogio.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dellambrogio
                port:
                  number: 80
    - host: www.dellambrogio.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dellambrogio
                port:
                  number: 80
    - host: dellambrogio.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dellambrogio
                port:
                  number: 80
    - host: www.dellambrogio.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dellambrogio
                port:
                  number: 80
    - host: dellambrogio.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dellambrogio
                port:
                  number: 80
    - host: www.dellambrogio.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dellambrogio
                port:
                  number: 80
  tls:
    - hosts:
        - dellambrogio.ch
        - www.dellambrogio.ch
      secretName: dellambrogio-ch-cert
    - hosts:
        - dellambrogio.com
        - www.dellambrogio.com
      secretName: dellambrogio-com-cert
    - hosts:
        - dellambrogio.org
        - www.dellambrogio.org
      secretName: dellambrogio-org-cert
    - hosts:
        - dellambrogio.net
        - www.dellambrogio.net
      secretName: dellambrogio-net-cert
