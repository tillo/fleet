defaultNamespace: monitoring
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
helm:
  maxHistory: 25
  takeOwnership: true
  releaseName: vm-operator
  repo: https://victoriametrics.github.io/helm-charts/
  chart: victoria-metrics-operator
  # Intentionally no `version:` -- Fleet tracks the repo's latest chart
  # and applies any new release on the next GitRepo poll cycle.
  valuesFiles:
    - values.yml
