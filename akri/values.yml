udev:
  discovery:
    enabled: true
    # Chart default 10m/24m is too tight; CPUThrottlingHigh fired on
    # akri-udev-discovery DaemonSet pods.
    resources:
      cpuRequest: 25m
      memoryRequest: 32Mi
      cpuLimit: 100m
      memoryLimit: 64Mi
controller:
  resources:
    cpuRequest: 25m
    memoryRequest: 128Mi
    cpuLimit: 50m
    memoryLimit: 192Mi
