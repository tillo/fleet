udev:
  discovery:
    enabled: true
    # USB enumeration is bursty: idle most of the time but spikes during
    # discovery cycles. With cpuLimit=100m, every cycle hit the cgroup
    # ceiling and fired CPUThrottlingHigh on all three nodes. Bumped
    # request to give the scheduler a realistic hint and lifted limit
    # so transient bursts aren't throttled.
    resources:
      cpuRequest: 50m
      memoryRequest: 32Mi
      cpuLimit: 300m
      memoryLimit: 64Mi
controller:
  resources:
    cpuRequest: 25m
    memoryRequest: 128Mi
    cpuLimit: 50m
    memoryLimit: 192Mi
