apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: akri-self-heal-pushover
spec:
  refreshInterval: 1m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: akri-self-heal-pushover
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/akri-self-heal/pushover-token
      secretKey: PUSHOVER_TOKEN
    - remoteRef:
        key: /mdapi/akri-self-heal/pushover-user
      secretKey: PUSHOVER_USER
