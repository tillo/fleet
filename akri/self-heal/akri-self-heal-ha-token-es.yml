apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: akri-self-heal-ha-token
spec:
  refreshInterval: 1m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: akri-self-heal-ha-token
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/home-assistant/home-assistant-env-secret/HOMEASSISTANT_API_TOKEN
      secretKey: HOMEASSISTANT_API_TOKEN
