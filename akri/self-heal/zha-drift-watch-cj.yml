apiVersion: batch/v1
kind: CronJob
metadata:
  name: zha-drift-watch
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 180
      template:
        spec:
          serviceAccountName: akri-self-heal
          restartPolicy: Never
          nodeSelector:
            kubernetes.io/hostname: qui
          tolerations:
            - operator: Exists
          containers:
            - name: watch
              image: alpine/k8s:1.34.3
              envFrom:
                - secretRef:
                    name: akri-self-heal-ha-token
                    optional: true
              command: [/bin/sh, -c]
              args:
                - |
                  set -eu

                  ZHA_ENTRY_ID=01JH0J6RRTCW09CTP9XQZC7945
                  HA_URL=http://home-assistant.home-assistant.svc.cluster.local:8123
                  STATE_CM=zbt-1-state

                  # Find the ZBT-1 (cp210x VID:PID 10c4:ea60) on the host
                  DEV=""
                  for d in /host-sys/bus/usb/devices/*; do
                    [ -f "$d/idVendor" ] && [ -f "$d/idProduct" ] || continue
                    if [ "$(cat $d/idVendor)" = "10c4" ] && [ "$(cat $d/idProduct)" = "ea60" ]; then
                      DEV="$d"; break
                    fi
                  done
                  if [ -z "$DEV" ]; then
                    echo "ZBT-1 (10c4:ea60) not found on host /sys"; exit 0
                  fi

                  CURRENT="bus=$(cat $DEV/busnum) dev=$(cat $DEV/devnum)"
                  LAST=$(kubectl -n akri get cm "$STATE_CM" -o jsonpath='{.data.busdev}' 2>/dev/null || echo "")

                  if [ -z "$LAST" ]; then
                    echo "first run, recording baseline: $CURRENT"
                    kubectl -n akri create cm "$STATE_CM" --from-literal=busdev="$CURRENT" \
                      --dry-run=client -o yaml | kubectl apply -f -
                    exit 0
                  fi

                  if [ "$CURRENT" = "$LAST" ]; then
                    echo "no drift: $CURRENT"; exit 0
                  fi

                  echo "DRIFT detected: was='$LAST' now='$CURRENT'"
                  kubectl -n akri create cm "$STATE_CM" --from-literal=busdev="$CURRENT" \
                    --dry-run=client -o yaml | kubectl apply -f -

                  if [ -n "${HOMEASSISTANT_API_TOKEN:-}" ]; then
                    echo "reloading ZHA config entry $ZHA_ENTRY_ID via HA API"
                    code=$(curl -sk -o /tmp/r -w "%{http_code}" \
                      -X POST -H "Authorization: Bearer $HOMEASSISTANT_API_TOKEN" \
                      -H "Content-Type: application/json" \
                      "$HA_URL/api/services/homeassistant/reload_config_entry" \
                      -d "{\"entry_id\":\"$ZHA_ENTRY_ID\"}")
                    if [ "$code" = "200" ]; then
                      echo "ZHA reload OK"; exit 0
                    fi
                    echo "ZHA reload failed (HTTP $code, body: $(cat /tmp/r 2>/dev/null)); falling back to pod restart"
                  else
                    echo "HOMEASSISTANT_API_TOKEN not present (Akeyless not synced yet); falling back to pod restart"
                  fi

                  kubectl -n home-assistant delete pod -l app=home-assistant --wait=false

                  # TODO: Pushover notification once /mdapi/akri-self-heal/pushover-{token,user}
                  # are populated in Akeyless and the ExternalSecret is enabled.
              volumeMounts:
                - name: host-sys
                  mountPath: /host-sys
                  readOnly: true
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  memory: 128Mi
          volumes:
            - name: host-sys
              hostPath:
                path: /sys
                type: Directory
