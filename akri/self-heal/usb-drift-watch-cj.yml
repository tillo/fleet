apiVersion: batch/v1
kind: CronJob
metadata:
  name: usb-drift-watch
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 180
      template:
        spec:
          serviceAccountName: akri-self-heal
          restartPolicy: Never
          nodeSelector:
            kubernetes.io/hostname: qui
          tolerations:
            - operator: Exists
          containers:
            - name: watch
              image: alpine/k8s:1.34.3
              env:
                # vid:pid|key|action|arg1|arg2
                # action=zha_reload, arg1=ha_config_entry_id
                # action=restart_pod, arg1=namespace, arg2=label-selector
                - name: WATCH_LIST
                  value: |
                    10c4:ea60|zbt-1|zha_reload|01JH0J6RRTCW09CTP9XQZC7945
                    0403:6001|chrony-gps|restart_pod|ntppool|app=chrony
              envFrom:
                - secretRef:
                    name: akri-self-heal-ha-token
                    optional: true
                - secretRef:
                    name: akri-self-heal-pushover
                    optional: true
              command: [/bin/sh, -c]
              args:
                - |
                  set -eu

                  STATE_CM=usb-drift-state
                  HA_URL=http://home-assistant.home-assistant.svc.cluster.local:8123

                  set_baseline() {
                    kubectl -n akri patch cm "$STATE_CM" --type=merge \
                      -p "{\"data\":{\"$1\":\"$2\"}}" 2>/dev/null \
                      || kubectl -n akri create cm "$STATE_CM" --from-literal="$1=$2" \
                           --dry-run=client -o yaml | kubectl apply -f -
                  }

                  notify() {
                    [ -z "${PUSHOVER_TOKEN:-}" ] || [ -z "${PUSHOVER_USER:-}" ] && return 0
                    curl -s --data-urlencode "token=$PUSHOVER_TOKEN" \
                          --data-urlencode "user=$PUSHOVER_USER" \
                          --data-urlencode "title=$1" \
                          --data-urlencode "message=$2" \
                          https://api.pushover.net/1/messages.json >/dev/null || true
                  }

                  echo "$WATCH_LIST" | while IFS='|' read -r VIDPID KEY ATYPE A1 A2; do
                    [ -z "$VIDPID" ] && continue
                    VID="${VIDPID%:*}"
                    PID="${VIDPID#*:}"

                    DEV=""
                    for d in /host-sys/bus/usb/devices/*; do
                      [ -f "$d/idVendor" ] && [ -f "$d/idProduct" ] || continue
                      if [ "$(cat $d/idVendor)" = "$VID" ] && [ "$(cat $d/idProduct)" = "$PID" ]; then
                        DEV="$d"; break
                      fi
                    done

                    if [ -z "$DEV" ]; then
                      echo "[$KEY] device $VIDPID not found on host"; continue
                    fi

                    CURRENT="bus=$(cat $DEV/busnum) dev=$(cat $DEV/devnum)"
                    LAST=$(kubectl -n akri get cm "$STATE_CM" -o jsonpath="{.data.$KEY}" 2>/dev/null || true)

                    if [ -z "$LAST" ]; then
                      echo "[$KEY] first run, recording baseline: $CURRENT"
                      set_baseline "$KEY" "$CURRENT"
                      continue
                    fi

                    if [ "$CURRENT" = "$LAST" ]; then
                      echo "[$KEY] no drift: $CURRENT"; continue
                    fi

                    echo "[$KEY] DRIFT: was='$LAST' now='$CURRENT'"
                    set_baseline "$KEY" "$CURRENT"

                    ACTION_DESC=""
                    case "$ATYPE" in
                      zha_reload)
                        ENTRY_ID="$A1"
                        if [ -n "${HOMEASSISTANT_API_TOKEN:-}" ]; then
                          echo "[$KEY] reloading HA config entry $ENTRY_ID"
                          code=$(curl -sk -o /tmp/r -w "%{http_code}" \
                            -X POST -H "Authorization: Bearer $HOMEASSISTANT_API_TOKEN" \
                            -H "Content-Type: application/json" \
                            "$HA_URL/api/services/homeassistant/reload_config_entry" \
                            -d "{\"entry_id\":\"$ENTRY_ID\"}")
                          if [ "$code" = "200" ]; then
                            ACTION_DESC="reloaded HA config entry"
                          else
                            echo "[$KEY] reload failed (HTTP $code), restarting HA pod"
                            kubectl -n home-assistant delete pod -l app=home-assistant --wait=false
                            ACTION_DESC="restarted HA pod (reload HTTP $code)"
                          fi
                        else
                          echo "[$KEY] no HA token, restarting HA pod"
                          kubectl -n home-assistant delete pod -l app=home-assistant --wait=false
                          ACTION_DESC="restarted HA pod (no API token)"
                        fi
                        ;;
                      restart_pod)
                        NS="$A1"; SEL="$A2"
                        echo "[$KEY] restarting pods in $NS with selector $SEL"
                        kubectl -n "$NS" delete pod -l "$SEL" --wait=false
                        ACTION_DESC="restarted pods $NS:$SEL"
                        ;;
                      *)
                        echo "[$KEY] unknown action: $ATYPE"; continue
                        ;;
                    esac

                    notify "akri self-heal: $KEY USB drift" \
                      "USB device $KEY ($VIDPID) re-enumerated: was='$LAST' now='$CURRENT'. $ACTION_DESC."
                  done
              volumeMounts:
                - name: host-sys
                  mountPath: /host-sys
                  readOnly: true
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  memory: 128Mi
          volumes:
            - name: host-sys
              hostPath:
                path: /sys
                type: Directory
