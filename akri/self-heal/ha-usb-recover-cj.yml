apiVersion: batch/v1
kind: CronJob
metadata:
  name: ha-usb-recover
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 600
      template:
        spec:
          serviceAccountName: akri-self-heal
          restartPolicy: Never
          containers:
            - name: recover
              image: alpine/k8s:1.34.3
              command: [/bin/sh, -c]
              args:
                - |
                  set -eu

                  POD=$(kubectl -n home-assistant get pods -l app=home-assistant -o json \
                    | jq -r '
                        .items[]
                        | select(.status.phase == "Pending")
                        | select((now - (.metadata.creationTimestamp | fromdateiso8601)) > 120)
                        | .metadata.name' | head -1)

                  if [ -z "$POD" ]; then
                    echo "no stuck HA pod"; exit 0
                  fi

                  if ! kubectl -n home-assistant get events \
                        --field-selector involvedObject.name="$POD" -o json \
                        | jq -e '.items[] | select(.reason=="Failed") | select(.message | contains("lstat /dev/bus/usb"))' >/dev/null; then
                    echo "$POD pending but not USB-drift, skipping"; exit 0
                  fi

                  NODE=$(kubectl -n home-assistant get pod "$POD" -o jsonpath='{.spec.nodeName}')
                  : "${NODE:=qui}"
                  echo "recovering USB drift: pod=$POD node=$NODE"

                  kubectl -n akri get akrii -o json \
                    | jq -r --arg n "$NODE" '
                        .items[]
                        | select(.metadata.name | startswith("akri-home-assistant-"))
                        | select(.spec.nodes | index($n))
                        | .metadata.name' \
                    | while read -r i; do
                        echo "  delete instance $i"
                        kubectl -n akri delete akrii "$i" --wait=false
                      done

                  AGENT=$(kubectl -n akri get pods -l name=akri-agent -o json \
                    | jq -r --arg n "$NODE" '.items[] | select(.spec.nodeName == $n) | .metadata.name' | head -1)
                  if [ -n "$AGENT" ]; then
                    echo "  restart agent $AGENT"
                    kubectl -n akri delete pod "$AGENT" --wait=false
                  fi

                  echo "  wait for fresh akri-home-assistant instances on $NODE"
                  for i in $(seq 1 18); do
                    sleep 5
                    cnt=$(kubectl -n akri get akrii -o json \
                      | jq --arg n "$NODE" '[.items[]
                          | select(.metadata.name | startswith("akri-home-assistant-"))
                          | select(.spec.nodes | index($n))] | length')
                    if [ "$cnt" -gt 0 ]; then
                      echo "  $cnt instance(s) registered after ${i}*5s"
                      break
                    fi
                  done

                  echo "  wait 30s for kubelet allocatable refresh"
                  sleep 30

                  echo "  delete stuck pod $POD"
                  kubectl -n home-assistant delete pod "$POD" --wait=false

                  # TODO: Pushover notification once /mdapi/akri-self-heal/pushover-{token,user}
                  # are populated in Akeyless and the ExternalSecret is enabled.
                  # if [ -f /etc/pushover/token ] && [ -f /etc/pushover/user ]; then
                  #   curl -s --data-urlencode "token=$(cat /etc/pushover/token)" \
                  #         --data-urlencode "user=$(cat /etc/pushover/user)" \
                  #         --data-urlencode "title=akri self-heal" \
                  #         --data-urlencode "message=Recovered HA USB drift: $POD on $NODE" \
                  #         https://api.pushover.net/1/messages.json >/dev/null || true
                  # fi

                  echo "recovery complete"
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  memory: 128Mi
