## kube-prometheus-stack values for mdapi-prod
##
## Design constraints:
## - Coexist cleanly with a future Rancher Monitoring or Harvester Monitoring
##   install (which would land in cattle-monitoring-system). We scope our
##   operator's instance management to our own namespace so two operators
##   never fight over the same Prometheus/Alertmanager CRD instances.
## - CRDs are managed by the separate mdapi-prod-monitoring-crds bundle so
##   neither stack tries to install/upgrade them through the chart.
## - Detailed node + cluster-component metrics stay in Harvester (per user
##   preference); this stack focuses on app-level signals.

## ====== Chart-wide ======

# CRDs come from the dedicated monitoring-crds bundle.
crds:
  enabled: false

# Cleaner resource names: monitoring-prometheus, monitoring-alertmanager, etc.
fullnameOverride: monitoring
nameOverride: monitoring

## ====== Prometheus Operator ======

prometheusOperator:
  # Scope CRD-instance management to our namespace only. If Rancher Monitoring
  # is later installed in cattle-monitoring-system, its operator manages those
  # instances; ours stays out.
  prometheusInstanceNamespaces: ["monitoring"]
  alertmanagerInstanceNamespaces: ["monitoring"]
  thanosRulerInstanceNamespaces: ["monitoring"]
  resources:
    requests:
      cpu: 30m
      memory: 96Mi

## ====== Default rules ======
## We disable platform-level rule groups (Harvester/Rancher monitor those).
## App-level + workload-level rules are kept; per-app rules will be added in
## subsequent commits as PrometheusRule files.

defaultRules:
  create: true
  rules:
    etcd: false
    kubeApiserverAvailability: false
    kubeApiserverBurnrate: false
    kubeApiserverHistogram: false
    kubeApiserverSlos: false
    kubeControllerManager: false
    kubeProxy: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
    network: false
    node: false
    nodeNetwork: false
    nodeExporterAlerting: false
    nodeExporterRecording: false
    # Kept — these are about workload health, not platform internals.
    alertmanager: true
    general: true
    k8sContainerCpuUsageSecondsTotal: true
    k8sContainerMemoryCache: true
    k8sContainerMemoryRss: true
    k8sContainerMemorySwap: true
    k8sContainerResource: true
    k8sContainerMemoryWorkingSetBytes: true
    k8sPodOwner: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeStateMetrics: true
    prometheus: true
    prometheusOperator: true
    windows: false

## ====== Cluster component scrapes ======
## Disabled — Harvester/Rancher own these signals when their stack is on.
## We re-enable kubelet because pod CPU/mem signals are needed for our
## workload-level alerts.

kubeApiServer: { enabled: false }
kubelet: { enabled: true }
kubeControllerManager: { enabled: false }
kubeScheduler: { enabled: false }
kubeProxy: { enabled: false }
kubeEtcd: { enabled: false }
coreDns: { enabled: false }
kubeDns: { enabled: false }

## ====== Bundled exporters ======

nodeExporter:
  enabled: true   # our own DaemonSet — independent of Harvester's

kube-state-metrics:
  enabled: true

## ====== Prometheus instance ======

prometheus:
  prometheusSpec:
    externalLabels:
      cluster: mdapi-prod
    retention: 30d
    retentionSize: "18GB"
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1500Mi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 25Gi
    # Allow scanning ServiceMonitor / PodMonitor / Probe / PrometheusRule in any
    # namespace; the chart's defaults already filter them by `release=monitoring`
    # label so we won't accidentally scrape unrelated CRDs.
    serviceMonitorNamespaceSelector: {}
    podMonitorNamespaceSelector: {}
    ruleNamespaceSelector: {}
    probeNamespaceSelector: {}

## ====== Alertmanager ======
## Receivers (Pushover, statuspage adapter) get added in a later step.
## For now, route everything to a /dev/null receiver so the chart installs
## cleanly without firing notifications.

alertmanager:
  alertmanagerSpec:
    retention: 240h
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
  config:
    route:
      receiver: "null"
      group_by: ["alertname"]
    receivers:
      - name: "null"

## ====== Grafana ======
## Admin password is auto-generated by the chart on first install (stored in
## Secret monitoring-grafana). Ingress + Keycloak OIDC come in a later commit.

grafana:
  enabled: true
  persistence:
    enabled: true
    storageClassName: longhorn
    size: 5Gi
  resources:
    requests:
      cpu: 30m
      memory: 96Mi
  ingress:
    enabled: false
  # Disable the auto-mounted dashboards we won't use — keep the namespace tidy
  defaultDashboardsTimezone: Europe/Zurich
