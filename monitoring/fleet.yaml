defaultNamespace: monitoring
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
dependsOn:
  # CRDs must be installed before the operator starts watching them
  - name: mdapi-prod-monitoring-crds
  # cert-manager + external-secrets are pre-reqs we'll need once we add ingress + akeyless ESs
  - name: mdapi-prod-cert-manager
  - name: mdapi-prod-external-secrets
helm:
  maxHistory: 25
  releaseName: monitoring
  repo: https://prometheus-community.github.io/helm-charts
  chart: kube-prometheus-stack
  version: "84.5.0"
  valuesFiles:
    - values.yml
