# Baseline request defaults (2026-07-04 N-1 program).
#
# 144 running pods had ZERO cpu requests (BestEffort QoS) — invisible to the
# scheduler and first against the wall on eviction, including things that
# matter. A defaultRequest-only LimitRange stamps a tiny request on any
# container that declares none, flipping it to Burstable. Applies ONLY to
# pods created after this lands (natural churn) — no restarts are forced.
# NOTE: deliberately NO 'default' (limit) key — a default limit would
# suddenly constrain containers that rely on being unlimited.
apiVersion: v1
kind: LimitRange
metadata:
  name: baseline-requests
  namespace: oauth2-proxy
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 25m
        memory: 64Mi
