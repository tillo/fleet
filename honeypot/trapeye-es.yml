apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: trapeye-env-secret
spec:
  refreshInterval: 1m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: trapeye-env-secret
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/dev/trapeye/trapeye-env-secret/INGESTION_URL
      secretKey: INGESTION_URL
    - remoteRef:
        key: /mdapi/dev/trapeye/trapeye-env-secret/ENTITY_UUID
      secretKey: ENTITY_UUID
    - remoteRef:
        key: /mdapi/dev/trapeye/trapeye-env-secret/ENTITY_TOKEN
      secretKey: ENTITY_TOKEN
    - remoteRef:
        key: /mdapi/dev/trapeye/trapeye-env-secret/TRAPEYE_UUID
      secretKey: TRAPEYE_UUID
