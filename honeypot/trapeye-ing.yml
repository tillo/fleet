apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trapeye
  namespace: honeypot
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: Honeypot
    flame.pawelmalak/url: https://shop.dev.mdapi.ch
    flame.pawelmalak/category: Security
    flame.pawelmalak/icon: spider-web
    flame.pawelmalak/order: '10'
spec:
  ingressClassName: nginx
  rules:
    - host: shop.dev.mdapi.ch
      http:
        paths:
          - backend:
              service:
                name: trapeye-clusterip
                port:
                  number: 80
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - shop.dev.mdapi.ch
      secretName: trapeye-cert
