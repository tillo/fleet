defaultNamespace: honeypot
namespace: honeypot
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
helm:
  maxHistory: 25
# VPA (mode=Auto) writes resources.requests/limits onto running pods.
# Strip the resources block from both sides before diff so Fleet stops
# flagging the bundle as Modified. Covers all trapeye workloads.
diff:
  comparePatches:
  - apiVersion: apps/v1
    kind: DaemonSet
    name: trapeye-daemonset
    namespace: honeypot
    operations:
    - {"op": "remove", "path": "/spec/template/spec/containers/0/resources"}
  - apiVersion: apps/v1
    kind: Deployment
    name: trapeye-nodeport
    namespace: honeypot
    operations:
    - {"op": "remove", "path": "/spec/template/spec/containers/0/resources"}
  - apiVersion: apps/v1
    kind: Deployment
    name: trapeye-clusterip
    namespace: honeypot
    operations:
    - {"op": "remove", "path": "/spec/template/spec/containers/0/resources"}
  - apiVersion: apps/v1
    kind: Deployment
    name: trapeye-loadbalancer
    namespace: honeypot
    operations:
    - {"op": "remove", "path": "/spec/template/spec/containers/0/resources"}

# Fleet imageScan: trapeye publishes no floating tag, so Fleet scans ghcr
# for newer 1.x releases and commits the tag into the trapeye manifests,
# where every image line carries the `# {"$imagescan": "trapeye"}` marker.
# Keel was removed from the trapeye workloads to avoid two image owners.
imageScans:
- image: ghcr.io/anantis-security/trapeye
  policy:
    semver:
      range: ">=1.3.0 <2.0.0"
  tagName: trapeye
