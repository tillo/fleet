apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wg-prod
spec:
  refreshInterval: 1m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: wg-prod
    creationPolicy: Owner
  data:
    - remoteRef:
        key: /mdapi/prod/vpn/wg-private-key
      secretKey: private-key
    - remoteRef:
        key: /mdapi/prod/vpn/wg-psk-test
      secretKey: psk-test
