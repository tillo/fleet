apiVersion: v1
kind: Service
metadata:
  name: wg-prod
  namespace: vpn
spec:
  type: NodePort
  selector:
    app: wg-prod
  ports:
    - protocol: UDP
      port: 51820
      targetPort: 51820
      nodePort: 31820
---
apiVersion: v1
kind: Service
metadata:
  name: wg-prod-proxy
  namespace: vpn
spec:
  type: ClusterIP
  clusterIP: 10.53.99.99
  selector:
    app: wg-prod
  ports:
    - protocol: TCP
      port: 443
      targetPort: 443
