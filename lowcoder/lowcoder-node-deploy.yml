# Lowcoder Node service — JS execution / data-source query runner. Pinned image,
# Renovate Lane-B (kept in lockstep with api + frontend at the same tag).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lowcoder-node-service
  namespace: lowcoder
spec:
  selector:
    matchLabels:
      app: lowcoder-node-service
  replicas: 1
  template:
    metadata:
      labels:
        app: lowcoder-node-service
    spec:
      containers:
        - name: node-service
          image: lowcoderorg/lowcoder-ce-node-service:2.7.6
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6060
          env:
            # Node auto-caps the V8 old-space heap to ~half the container limit;
            # the JS plugin load OOMs at the 512Mi default, so give it a real heap.
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1024"
          envFrom:
            - configMapRef:
                name: lowcoder-config
            - secretRef:
                name: lowcoder-secret
          readinessProbe:
            tcpSocket: { port: 6060 }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1536Mi
---
apiVersion: v1
kind: Service
metadata:
  name: lowcoder-node-service
  namespace: lowcoder
spec:
  selector:
    app: lowcoder-node-service
  ports:
    - name: http
      port: 6060
      targetPort: 6060
  type: ClusterIP
