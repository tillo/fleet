apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lowcoder
  namespace: lowcoder
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    # NOTE: Lowcoder's app-builder sends rich JSON/query payloads that CRS may
    # false-positive on. Starting with the engine On per convention; tune via
    # SecRuleRemoveById after watching modsec logs if the builder trips a rule.
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecAuditEngine RelevantOnly
      SecAuditLogRelevantStatus "^(?:5|4(?!04))"
      SecAuditLogParts ABIJDEFHZ
      SecAuditLogType Serial
      SecAuditLogFormat JSON
      SecAuditLog /dev/stdout
      SecDebugLog /tmp/modsec_debug.log
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
      SecRuleRemoveById 911100
spec:
  ingressClassName: nginx
  rules:
    - host: start.mdapi.ch
      http:
        paths:
          - backend:
              service:
                name: lowcoder-frontend
                port:
                  number: 80
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - start.mdapi.ch
      secretName: start-mdapi-ch-tls
