# Non-secret Lowcoder env (all three services load the same env, per the upstream
# multi-image compose). Secrets (mongo URL w/ password, encryption, superuser) come
# from the lowcoder-secret ExternalSecret. SSO is the user path; email auth stays on
# only as superuser break-glass, with signup disabled.
apiVersion: v1
kind: ConfigMap
metadata:
  name: lowcoder-config
  namespace: lowcoder
data:
  TZ: Europe/Zurich
  LOWCODER_PUBLIC_URL: "https://start.mdapi.ch/"
  LOWCODER_WORKSPACE_MODE: "ENTERPRISE"
  LOWCODER_CREATE_WORKSPACE_ON_SIGNUP: "false"
  LOWCODER_EMAIL_SIGNUP_ENABLED: "false"
  LOWCODER_EMAIL_AUTH_ENABLED: "true"
  LOWCODER_MARKETPLACE_PRIVATE_MODE: "true"
  LOWCODER_CORS_DOMAINS: "https://start.mdapi.ch"
  LOWCODER_MAX_DEVELOPERS: "5"
  LOWCODER_MAX_MEMBERS_PER_ORG: "1000"
  LOWCODER_MAX_GROUPS_PER_ORG: "100"
  LOWCODER_REDIS_URL: "redis://lowcoder-redis:6379"
  LOWCODER_NODE_SERVICE_URL: "http://lowcoder-node-service:6060"
  LOWCODER_API_SERVICE_URL: "http://lowcoder-api-service:8080"
