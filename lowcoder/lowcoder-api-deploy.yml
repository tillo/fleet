# Lowcoder API service (Java/Spring) — the backend + system logic. Pinned image,
# Renovate Lane-B (bumped together with node + frontend). Loads config + secrets
# via envFrom.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lowcoder-api-service
  namespace: lowcoder
spec:
  selector:
    matchLabels:
      app: lowcoder-api-service
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: lowcoder-api-service
    spec:
      containers:
        - name: api-service
          image: lowcoderorg/lowcoder-ce-api-service:2.7.6
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: lowcoder-config
            - secretRef:
                name: lowcoder-secret
          readinessProbe:
            httpGet:
              path: /api/status/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/status/health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: lowcoder-api-service
  namespace: lowcoder
spec:
  selector:
    app: lowcoder-api-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
