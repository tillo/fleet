# Redis (Valkey) — cache + session/rate-limit store for Lowcoder. Cache-only, so
# no PVC (a restart just forces re-login). Floating tag + Keel (Lane-A), no auth
# (namespace-internal ClusterIP only).
apiVersion: v1
kind: Service
metadata:
  name: lowcoder-redis
  namespace: lowcoder
spec:
  selector:
    app: lowcoder-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lowcoder-redis
  namespace: lowcoder
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 24h"
spec:
  selector:
    matchLabels:
      app: lowcoder-redis
  replicas: 1
  template:
    metadata:
      labels:
        app: lowcoder-redis
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:8
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
          args: ["--save", "", "--appendonly", "no"]
          readinessProbe:
            tcpSocket: { port: 6379 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 256Mi
