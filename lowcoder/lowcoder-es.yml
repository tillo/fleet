# App secrets from Akeyless, templated into the exact LOWCODER_* env var names so
# the Deployments can `envFrom: secretRef`. The Mongo connection URL is assembled
# here (password never appears in git). Random values are provisioned in Akeyless
# under /mdapi/lowcoder/app/* and /mdapi/lowcoder/mongo/password.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: lowcoder-secret
  namespace: lowcoder
spec:
  refreshInterval: 1m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: lowcoder-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        LOWCODER_MONGODB_URL: "mongodb://lowcoder:{{ .mongoPassword }}@lowcoder-mongo:27017/lowcoder?authSource=admin"
        LOWCODER_DB_ENCRYPTION_PASSWORD: "{{ .encPassword }}"
        LOWCODER_DB_ENCRYPTION_SALT: "{{ .encSalt }}"
        LOWCODER_API_KEY_SECRET: "{{ .apiKeySecret }}"
        LOWCODER_NODE_SERVICE_SECRET: "{{ .nodeSecret }}"
        LOWCODER_NODE_SERVICE_SECRET_SALT: "{{ .nodeSalt }}"
        LOWCODER_SUPERUSER_USERNAME: "tillo@tillo.ch"
        LOWCODER_SUPERUSER_PASSWORD: "{{ .superPassword }}"
  data:
    - secretKey: mongoPassword
      remoteRef: { key: /mdapi/lowcoder/mongo/password }
    - secretKey: encPassword
      remoteRef: { key: /mdapi/lowcoder/app/db-encryption-password }
    - secretKey: encSalt
      remoteRef: { key: /mdapi/lowcoder/app/db-encryption-salt }
    - secretKey: apiKeySecret
      remoteRef: { key: /mdapi/lowcoder/app/api-key-secret }
    - secretKey: nodeSecret
      remoteRef: { key: /mdapi/lowcoder/app/node-service-secret }
    - secretKey: nodeSalt
      remoteRef: { key: /mdapi/lowcoder/app/node-service-secret-salt }
    - secretKey: superPassword
      remoteRef: { key: /mdapi/lowcoder/app/superuser-password }
