defaultNamespace: lowcoder
namespace: lowcoder
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
dependsOn:
  - name: mdapi-prod-cert-manager
helm:
  maxHistory: 25

# VPA (mode=Auto) writes resources onto running pods. Strip resources from
# both sides before diff so Fleet stops flagging these as Modified.
diff:
  comparePatches:
  - apiVersion: apps/v1
    kind: Deployment
    name: lowcoder-api-service
    namespace: lowcoder
    operations: [{"op": "remove", "path": "/spec/template/spec/containers/0/resources"}]
  - apiVersion: apps/v1
    kind: Deployment
    name: lowcoder-node-service
    namespace: lowcoder
    operations: [{"op": "remove", "path": "/spec/template/spec/containers/0/resources"}]
  - apiVersion: apps/v1
    kind: Deployment
    name: lowcoder-frontend
    namespace: lowcoder
    operations: [{"op": "remove", "path": "/spec/template/spec/containers/0/resources"}]
  - apiVersion: apps/v1
    kind: Deployment
    name: lowcoder-mongo
    namespace: lowcoder
    operations: [{"op": "remove", "path": "/spec/template/spec/containers/0/resources"}]
  - apiVersion: apps/v1
    kind: Deployment
    name: lowcoder-redis
    namespace: lowcoder
    operations: [{"op": "remove", "path": "/spec/template/spec/containers/0/resources"}]
