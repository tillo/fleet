apiVersion: v1
kind: ConfigMap
metadata:
  name: technitium-dashboard
  labels:
    grafana_dashboard: "1"
data:
  technitium.json: |
    {
      "schemaVersion": 36,
      "version": 1,
      "uid": "technitium-overview",
      "title": "Technitium DNS — Overview",
      "tags": ["technitium", "dns", "mdapi"],
      "timezone": "browser",
      "editable": true,
      "time": {"from": "now-6h", "to": "now"},
      "refresh": "30s",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {"text": "Prometheus", "value": "Prometheus"},
            "hide": 0
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Primary status",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 0, "y": 0, "w": 3, "h": 4},
          "targets": [{"expr": "technitium_dns_status{server=\"primary\"} == bool 0", "refId": "A"}],
          "fieldConfig": {"defaults": {"mappings": [{"type": "value", "options": {"0": {"text": "DOWN", "color": "red"}, "1": {"text": "UP", "color": "green"}}}], "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Secondary status",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 3, "y": 0, "w": 3, "h": 4},
          "targets": [{"expr": "technitium_dns_status{server=\"secondary\"} == bool 0", "refId": "A"}],
          "fieldConfig": {"defaults": {"mappings": [{"type": "value", "options": {"0": {"text": "DOWN", "color": "red"}, "1": {"text": "UP", "color": "green"}}}], "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Zones (primary)",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 6, "y": 0, "w": 3, "h": 4},
          "targets": [{"expr": "technitium_dns_zone_count{server=\"primary\"}", "refId": "A"}]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Zones (secondary)",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 9, "y": 0, "w": 3, "h": 4},
          "targets": [{"expr": "technitium_dns_zone_count{server=\"secondary\"}", "refId": "A"}]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Clients (last hour, primary)",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 12, "y": 0, "w": 3, "h": 4},
          "targets": [{"expr": "technitium_dns_client_count{server=\"primary\"}", "refId": "A"}]
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Clients (last hour, secondary)",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 15, "y": 0, "w": 3, "h": 4},
          "targets": [{"expr": "technitium_dns_client_count{server=\"secondary\"}", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "orange", "value": null}, {"color": "green", "value": 1}]}}}
        },
        {
          "id": 7,
          "type": "stat",
          "title": "NOTIFY refused (5m)",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 18, "y": 0, "w": 3, "h": 4},
          "targets": [{"expr": "technitium_notify_refused_log_5m", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}}
        },
        {
          "id": 8,
          "type": "stat",
          "title": "Health probe age",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 21, "y": 0, "w": 3, "h": 4},
          "targets": [{"expr": "time() - technitium_health_last_run_timestamp_seconds", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "s", "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 600}, {"color": "red", "value": 900}]}}}
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Query rate by protocol (last-hour rolling count)",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 0, "y": 4, "w": 12, "h": 8},
          "targets": [
            {"expr": "technitium_dns_query_protocol_count{server=\"primary\"}", "legendFormat": "primary {{protocol}}", "refId": "A"},
            {"expr": "technitium_dns_query_protocol_count{server=\"secondary\"}", "legendFormat": "secondary {{protocol}}", "refId": "B"}
          ],
          "fieldConfig": {"defaults": {"custom": {"drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "stacking": {"mode": "none"}}}}
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Request results (last-hour rolling count)",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 12, "y": 4, "w": 12, "h": 8},
          "targets": [
            {"expr": "technitium_dns_request_result_count{server=\"primary\"}", "legendFormat": "{{result}}", "refId": "A"}
          ],
          "fieldConfig": {"defaults": {"custom": {"drawStyle": "line", "lineWidth": 2, "fillOpacity": 30, "stacking": {"mode": "normal"}}, "color": {"mode": "palette-classic"}}}
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Resolution source (auth / recursive / cached / blocked / dropped)",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 0, "y": 12, "w": 12, "h": 8},
          "targets": [
            {"expr": "technitium_dns_resolve_mode_count{server=\"primary\"}", "legendFormat": "{{result}}", "refId": "A"}
          ],
          "fieldConfig": {"defaults": {"custom": {"drawStyle": "line", "lineWidth": 2, "fillOpacity": 30, "stacking": {"mode": "normal"}}, "color": {"mode": "palette-classic"}}}
        },
        {
          "id": 13,
          "type": "barchart",
          "title": "Record types served (last hour, primary)",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 12, "y": 12, "w": 12, "h": 8},
          "targets": [
            {"expr": "sort_desc(technitium_dns_record_type_count{server=\"primary\"})", "legendFormat": "{{record_type}}", "refId": "A", "instant": true}
          ],
          "fieldConfig": {"defaults": {"custom": {"orientation": "horizontal"}}}
        },
        {
          "id": 20,
          "type": "timeseries",
          "title": "Cached entries",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 0, "y": 20, "w": 8, "h": 6},
          "targets": [
            {"expr": "technitium_dns_cached_entry_count", "legendFormat": "{{server}}", "refId": "A"}
          ]
        },
        {
          "id": 21,
          "type": "timeseries",
          "title": "Zone count delta (primary − secondary)",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 8, "y": 20, "w": 8, "h": 6},
          "targets": [
            {"expr": "technitium_dns_zone_count{server=\"primary\"} - on() technitium_dns_zone_count{server=\"secondary\"}", "legendFormat": "delta", "refId": "A"}
          ],
          "fieldConfig": {"defaults": {"custom": {"drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "spanNulls": true}, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 2}, {"color": "red", "value": 3}]}}}
        },
        {
          "id": 22,
          "type": "stat",
          "title": "Last backup age",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 16, "y": 20, "w": 4, "h": 3},
          "targets": [{"expr": "time() - technitium_backup_last_run_timestamp_seconds", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "s", "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 86400}, {"color": "red", "value": 172800}]}}}
        },
        {
          "id": 23,
          "type": "stat",
          "title": "Last backup size",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 20, "y": 20, "w": 4, "h": 3},
          "targets": [{"expr": "technitium_backup_size_bytes", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "bytes"}}
        },
        {
          "id": 24,
          "type": "stat",
          "title": "Last backup success",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 16, "y": 23, "w": 4, "h": 3},
          "targets": [{"expr": "technitium_backup_last_run_success", "refId": "A"}],
          "fieldConfig": {"defaults": {"mappings": [{"type": "value", "options": {"0": {"text": "FAILED", "color": "red"}, "1": {"text": "OK", "color": "green"}}}], "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}}
        },
        {
          "id": 25,
          "type": "stat",
          "title": "ServFail (last 5m logs)",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 20, "y": 23, "w": 4, "h": 3},
          "targets": [{"expr": "technitium_servfail_log_5m", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 1}, {"color": "red", "value": 5}]}}}
        }
      ]
    }
