polling:
  defaultSchedule: "@every 4h"
helmProvider:
  version: "v3"
mail:
  enabled: false
secret:
  name: keel-mail
notificationLevel: info
# Lane B (Renovate-managed): the chart pins keelhq/keel to its appVersion. We no
# longer override to :latest (Keel can't self-update) — the keel CHART version is
# pinned in fleet.yml and bumped by Renovate, which carries the new image with it.
# IfNotPresent: the pinned image is boot-safe.
#
# TEMPORARY image override (infra-health restart:keel/keel, user-approved 2026-07-15):
# 0.20.0 (chart v1.0.5 appVersion) dies with a silent exit-2 ~40s after every
# 4-hourly digest-poll wave. Upstream fixed builds (0.21.x) exist only on GHCR —
# Docker Hub stops at 0.20.x — and no chart release carries them yet. This pin is
# invisible to Renovate (values file, not fleet.yml); REMOVE it when a chart
# > v1.0.5 ships with appVersion >= 0.21.1 (Renovate will surface that bump).
image:
  repository: ghcr.io/keel-hq/keel
  tag: "0.21.1"
  pullPolicy: IfNotPresent
resources:
  limits:
    cpu: 2000m
    memory: 1Gi
  requests:
    cpu: 600m
    memory: 1Gi
