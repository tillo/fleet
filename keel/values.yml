polling:
  defaultSchedule: "@every 4h"
helmProvider:
  version: "v3"
mail:
  enabled: false
secret:
  name: keel-mail
notificationLevel: info
# Lane B (Renovate-managed): the chart pins keelhq/keel to its appVersion. We no
# longer override to :latest (Keel can't self-update) — the keel CHART version is
# pinned in fleet.yml and bumped by Renovate, which carries the new image with it.
# IfNotPresent: the pinned image is boot-safe.
image:
  pullPolicy: IfNotPresent
resources:
  limits:
    cpu: 2000m
    memory: 1Gi
  requests:
    cpu: 600m
    memory: 1Gi
