polling:
  defaultSchedule: "@every 4h"
helmProvider:
  version: "v3"
mail:
  enabled: false
secret:
  name: keel-mail
notificationLevel: info
# Chart pins the image to keelhq/keel:0.20.0; track :latest so Keel can
# auto-update itself like every other deployment we run.
image:
  tag: latest
  pullPolicy: Always
resources:
  limits:
    cpu: 2000m
    memory: 1Gi
  requests:
    cpu: 600m
    memory: 1Gi
