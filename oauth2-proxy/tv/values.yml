config:
  provider: keycloak-oidc
  cookieName: mdapi-tv
  existingSecret: oauth2-proxy-tv-credentials 
  configFile: |-
    provider="keycloak-oidc"
    provider_display_name="MDAPI"
    proxy_prefix="/tv/oauth2"
    redirect_url="https://auth.mdapi.ch/tv/oauth2/callback"
    oidc_issuer_url="https://idp.mdapi.ch/realms/tilloch"
    skip_provider_button=true
    cookie_domains=["mdapi.ch"]
    whitelist_domains=[".mdapi.ch"]
    email_domains=["*"]
    allowed_roles=["mdapi-tv"]
sessionStorage:
  type: redis
  redis:
    clientType: sentinel
    sentinel:
      masterName: mymaster
      connectionUrls:
        - redis://oauth2-proxy-tv-redis-ha:26379
redis-ha:
  enabled: true
  persistentVolume:
    enabled: false
  image:
    pullPolicy: Always
ingress:
  enabled: true
  path: /tv
  hosts:
    - auth.mdapi.ch
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: Whoami (tv)
    flame.pawelmalak/url: https://auth.mdapi.ch/tv/oauth2/userinfo
    flame.pawelmalak/category: Identity
    flame.pawelmalak/icon: account-question
    flame.pawelmalak/order: '30'
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecDebugLog /tmp/modsec_debug.log
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
      SecRule REQUEST_URI "@rx ^/tv/oauth2/(?:start|auth)" \
        "id:1000,\
        phase:1,\
        pass,\
        t:none,\
        nolog,\
        ctl:ruleRemoveById=949110"
  tls:
    - secretName: auth-cert
      hosts:
        - auth.mdapi.ch
image:
  registry: quay.io
  repository: oauth2-proxy/oauth2-proxy
  tag: v7.15.2
  pullPolicy: Always
keelImageRepository: quay.io/oauth2-proxy/oauth2-proxy
keel:
  policy: minor
  trigger: poll
  pollSchedule: "@every 4h"
  images:
    - repository: keelImageRepository
      tag: image.tag
    