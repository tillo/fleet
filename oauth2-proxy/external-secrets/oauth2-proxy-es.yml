apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-admin-credentials
spec:
  refreshInterval: 1m

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: oauth2-proxy-admin-credentials
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/oauth2-proxy/oauth2-proxy-admin-credentials/cookie-secret
      secretKey: cookie-secret
    - remoteRef:
        key: /mdapi/oauth2-proxy/oauth2-proxy-admin-credentials/client-secret
      secretKey: client-secret
    - remoteRef:
        key: /mdapi/oauth2-proxy/oauth2-proxy-admin-credentials/client-id
      secretKey: client-id
    - remoteRef:
        key: /mdapi/oauth2-proxy/oauth2-proxy-admin-credentials/redis-password
      secretKey: redis-password
---
