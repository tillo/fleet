## External Secrets Operator (ESO) sync-health -> early-warning before access is lost.
##
## Dynamic secrets hold a SHORT-LIVED credential that ESO must keep re-minting before it
## expires (e.g. akeyless-pg-bridge/paperless-dynamic-db: the paperless-pg read-only role
## has a 30m TTL, ESO refreshes every 20m). If a refresh stops succeeding, the live
## credential goes stale and the consumer loses DB access at the next expiry. These alerts
## fire while there is still lead time to fix the producer/gateway/WireGuard-bridge path
## (design requirement: never lose access without advance warning).
##
## ESO emits externalsecret_status_condition{name,namespace,condition,status} = 1 for the
## current status. Ready != True therefore shows as {condition="Ready",status="True"} == 0.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-external-secrets
  namespace: monitoring
  labels:
    monitoring-stack: mdapi
spec:
  groups:
  - name: app-external-secrets.dynamic-freshness
    rules:
    - alert: DynamicSecretSyncStale
      ## refreshInterval 20m, TTL 30m -> 12m not-Ready means a re-mint is overdue while
      ## the live credential still has margin before it expires. Warns before access loss.
      expr: |
        externalsecret_status_condition{
          condition="Ready", status="True", namespace="akeyless-pg-bridge"
        } == 0
      for: 12m
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "Dynamic-secret ExternalSecret {{ $labels.namespace }}/{{ $labels.name }} not synced for 12m"
        description: |
          ESO has not refreshed this dynamic-secret ExternalSecret in 12m. The materialized
          credential is short-lived (paperless-pg read-only role, 30m TTL) and will expire,
          costing the consumer DB access. Fix before then.
          Check: kubectl -n {{ $labels.namespace }} describe externalsecret {{ $labels.name }}
                 kubectl -n akeyless-pg-bridge logs deploy/akeyless-pg-bridge -c wireguard
                 wg show wg_csm    # on bpi-r4 (the DMZ<->cluster tunnel)
  - name: app-external-secrets.sync-health
    rules:
    - alert: ExternalSecretNotReady
      ## Any ExternalSecret stuck not-Ready for 30m (covers the static-secret estate too).
      expr: |
        externalsecret_status_condition{condition="Ready", status="True"} == 0
      for: 30m
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "ExternalSecret {{ $labels.namespace }}/{{ $labels.name }} not Ready for 30m"
        description: |
          ESO has not synced this ExternalSecret in 30m -- the k8s Secret it manages is
          drifting from its source in Akeyless.
          Check: kubectl -n {{ $labels.namespace }} describe externalsecret {{ $labels.name }}
