defaultNamespace: monitoring
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
helm:
  maxHistory: 25
  # app-etcd-quorum (and other rules) were originally `kubectl apply`-created
  # (they carry kubectl.kubernetes.io/last-applied-configuration), so the helm
  # release can't adopt them -> bundle reports Modified (exist+missing).
  # takeOwnership lets helm claim the pre-existing PrometheusRules.
  takeOwnership: true
