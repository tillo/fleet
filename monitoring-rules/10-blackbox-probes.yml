## 7 Probe CRDs — one per statuspage component.
##
## Probes MUST carry the `release: rancher-monitoring` label because the
## existing Prometheus's `probeSelector` is `matchLabels: {release: rancher-monitoring}`
## (unlike its other selectors which are `{}`).
##
## Each Probe sets `targetLabels: { component, team }` so the resulting
## probe_success metric carries those labels and our PrometheusRules can
## key on them.

# ====== Mail ======
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: mail-smtp
  namespace: monitoring
  labels:
    release: rancher-monitoring
spec:
  jobName: mail-smtp
  prober:
    url: blackbox.monitoring.svc.cluster.local:9115
  module: smtp_banner
  targets:
    staticConfig:
      static:
        - mail.mdapi.ch:25
      labels:
        component: Mail
        team: mdapi
        probe: smtp
---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: mail-imaps
  namespace: monitoring
  labels:
    release: rancher-monitoring
spec:
  jobName: mail-imaps
  prober:
    url: blackbox.monitoring.svc.cluster.local:9115
  module: imaps_starttls
  targets:
    staticConfig:
      static:
        - mail.mdapi.ch:993
      labels:
        component: Mail
        team: mdapi
        probe: imaps
---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: mail-webmail
  namespace: monitoring
  labels:
    release: rancher-monitoring
spec:
  jobName: mail-webmail
  prober:
    url: blackbox.monitoring.svc.cluster.local:9115
  module: http_any_redirect
  targets:
    staticConfig:
      static:
        - https://webmail.mdapi.ch
      labels:
        component: Mail
        team: mdapi
        probe: webmail

# ====== Identity ======
---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: identity-keycloak
  namespace: monitoring
  labels:
    release: rancher-monitoring
spec:
  jobName: identity-keycloak
  prober:
    url: blackbox.monitoring.svc.cluster.local:9115
  module: http_2xx
  targets:
    staticConfig:
      static:
        ## Keycloak doesn't expose /health/ready on the user-facing
        ## ingress in this version. /realms/master returns the realm
        ## metadata JSON with a 200 when the server is up.
        - https://idp.mdapi.ch/realms/master
      labels:
        component: Identity
        team: mdapi
        probe: keycloak

