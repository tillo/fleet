# ====== DNS ======
---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: dns-public
  namespace: monitoring
  labels:
    release: rancher-monitoring
spec:
  jobName: dns-public
  prober:
    url: blackbox.monitoring.svc.cluster.local:9115
  module: dns_mdapi
  targets:
    staticConfig:
      static:
        ## ns.mdapi.ch (192.168.1.53) is BIND9's authoritative LB. The
        ## A record was fixed in zone 2026-05-18; ns-mdapi-ch-{udp,tcp,
        ## dnssec} probes below give us the full K-integration coverage
        ## (UDP+TCP+DNSSEC-AD+SOA-serial). This dns_mdapi probe stays
        ## for historical compatibility with the dns_authoritative alert.
        - 192.168.1.53:53
      labels:
        component: DNS
        team: mdapi
        probe: dns_authoritative
---
## K-integration (DNS audit 2026-05-17): blackbox probe for
## ns.mdapi.ch covering UDP + TCP + DNSSEC. Catches secondary NS
## desync (puck.nether.net / ns2.afraid.org) and DNSSEC chain break
## from outside the cluster.
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: ns-mdapi-ch-udp
  namespace: monitoring
  labels:
    release: rancher-monitoring
spec:
  jobName: dns-ns-mdapi
  prober:
    url: blackbox.monitoring.svc.cluster.local:9115
  module: dns_ns_mdapi_udp
  targets:
    staticConfig:
      static:
        - ns.mdapi.ch:53
      labels:
        component: DNS
        team: mdapi
        probe: ns_mdapi_ch_udp
---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: ns-mdapi-ch-tcp
  namespace: monitoring
  labels:
    release: rancher-monitoring
spec:
  jobName: dns-ns-mdapi
  prober:
    url: blackbox.monitoring.svc.cluster.local:9115
  module: dns_ns_mdapi_tcp
  targets:
    staticConfig:
      static:
        - ns.mdapi.ch:53
      labels:
        component: DNS
        team: mdapi
        probe: ns_mdapi_ch_tcp
---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: ns-mdapi-ch-dnssec
  namespace: monitoring
  labels:
    release: rancher-monitoring
spec:
  jobName: dns-ns-mdapi
  prober:
    url: blackbox.monitoring.svc.cluster.local:9115
  module: dns_ns_mdapi_dnssec
  targets:
    staticConfig:
      static:
        - ns.mdapi.ch:53
      labels:
        component: DNS
        team: mdapi
        probe: ns_mdapi_ch_dnssec
---
## External-internet view: arbitrary recursive resolvers must be able
## to resolve mdapi.ch A. Verifies the full delegation chain (registrar
## → public NS → authoritative response) is reachable from outside.
## Two independent resolvers so a single Cloudflare/Google outage
## doesn't false-fire — alert only fires if both consecutive probes
## fail.
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: dns-external-cloudflare
  namespace: monitoring
  labels:
    release: rancher-monitoring
spec:
  jobName: dns-external
  prober:
    url: blackbox.monitoring.svc.cluster.local:9115
  module: dns_mdapi
  targets:
    staticConfig:
      static:
        - 1.1.1.1:53
      labels:
        component: DNS
        team: mdapi
        probe: dns_external_cloudflare
---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: dns-external-google
  namespace: monitoring
  labels:
    release: rancher-monitoring
spec:
  jobName: dns-external
  prober:
    url: blackbox.monitoring.svc.cluster.local:9115
  module: dns_mdapi
  targets:
    staticConfig:
      static:
        - 8.8.8.8:53
      labels:
        component: DNS
        team: mdapi
        probe: dns_external_google

# ====== Technitium ======
## Three probes against the home.tillo.ch zone:
## * vip — the LoadBalancer ExternalIP 192.168.1.54 as clients see it
## * primary-pod / secondary-pod — direct ClusterIP probes that catch the
##   externalTrafficPolicy=Local routing skew (secondary gets no client
##   traffic via the VIP until kube-vip moves it; per-pod probes ensure
##   both replicas actually answer).
---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: dns-technitium-vip
  namespace: monitoring
  labels:
    release: rancher-monitoring
spec:
  jobName: dns-technitium
  prober:
    url: blackbox.monitoring.svc.cluster.local:9115
  module: dns_home_tillo
  targets:
    staticConfig:
      static:
        - 192.168.1.54:53
      labels:
        component: DNS
        team: mdapi
        probe: technitium_vip
---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: dns-technitium-primary-pod
  namespace: monitoring
  labels:
    release: rancher-monitoring
spec:
  jobName: dns-technitium
  prober:
    url: blackbox.monitoring.svc.cluster.local:9115
  module: dns_home_tillo
  targets:
    staticConfig:
      static:
        - technitium-primary.technitium.svc.cluster.local:53
      labels:
        component: DNS
        team: mdapi
        probe: technitium_primary_pod
---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: dns-technitium-secondary-pod
  namespace: monitoring
  labels:
    release: rancher-monitoring
spec:
  jobName: dns-technitium
  prober:
    url: blackbox.monitoring.svc.cluster.local:9115
  module: dns_home_tillo
  targets:
    staticConfig:
      static:
        - technitium-secondary.technitium.svc.cluster.local:53
      labels:
        component: DNS
        team: mdapi
        probe: technitium_secondary_pod
