## Single-member MongoDB replica-set health, fed by the Windmill heal
## f/heal/horizon_mongo_rs_heal (runs every 5 min; Pushgateway job of the
## same name; targets horizon + stream since 2026-07-13). The heal detects
## a node parked as REPLICA_SET_GHOST after a pod reschedule (self-detection
## races Service endpoint programming) and force-reconfigs it back to
## PRIMARY after a 4-min dwell.
##
## Severity per the alert policy: info while the heal is auto-solving,
## warning only when demonstrably stuck (min_over_time, not a long for:).
## Recovery runbook: memory horizon_mongo_single_member_rs_ghost_* — manual
## fix is mongosh rs.reconfig(rs.conf(), {force:true}) in the mongo pod.

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-mongo-rs
  namespace: monitoring
  labels:
    monitoring-stack: mdapi
spec:
  groups:
  - name: app-mongo-rs.ghost
    rules:
    - alert: MongoRsGhost
      ## Auto-solving: the heal force-reconfigs after its 4-min dwell, so a
      ## ghost normally clears within ~10 min. Info = badge only.
      expr: mongo_rs_ghost{job="horizon_mongo_rs_heal"} > 0
      for: 0m
      labels:
        severity: info
        component: Platform
        team: mdapi
      annotations:
        summary: "{{ $labels.target }} mongodb RS parked GHOST — heal dwell/reconfig in progress"
        description: |
          Single-member replica set for {{ $labels.target }} has no writable
          primary (REPLICA_SET_GHOST after a pod reschedule). The self-heal
          force-reconfigs it after a 4-minute dwell; escalates to
          MongoRsGhostStuck if still ghost after 15 minutes.

    - alert: MongoRsGhostStuck
      ## 15 min of CONTINUOUS ghost = the heal has had >= 2 chances past the
      ## dwell and the node is still parked — manual intervention needed.
      expr: min_over_time(mongo_rs_ghost{job="horizon_mongo_rs_heal"}[15m]) > 0
      for: 0m
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "{{ $labels.target }} mongodb RS ghost for 15m+ — self-heal is NOT recovering it"
        description: |
          The forced-reconfig self-heal has not restored a primary for
          {{ $labels.target }} in over 15 minutes. Check the heal's job logs
          (f/heal/horizon_mongo_rs_heal) and the mongo pod; manual recovery:
          mongosh in-pod, rs.reconfig(rs.conf(), {force:true}).

    - alert: MongoRsHealStale
      ## The heal runs every 5 min; 20 min without a fresh timestamp means
      ## the schedule died or the script is failing before its push.
      expr: time() - mongo_rs_heal_last_run_timestamp_seconds{job="horizon_mongo_rs_heal"} > 1200
      for: 10m
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "mongo RS heal has not reported in {{ $value | humanizeDuration }}"
        description: |
          f/heal/horizon_mongo_rs_heal (every 5 min) has not pushed its
          last-run timestamp in over 20 minutes — the GHOST safety net is
          down. Check the Windmill schedule and recent job errors.
