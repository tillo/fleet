## Watchdog rules for the monitoring/alerting/logging plane itself.
##
## If Cribl dies, log-based alerts go silent.
## If fluentd dies, Cribl receives nothing, log-based alerts go silent.
## If the statuspage adapter dies, Alertmanager webhooks 5xx and
##   statuspage components don't update.
## If the Alertmanager AC matcher strategy gets reverted by a chart
##   upgrade, no team=mdapi alerts route anywhere.
##
## All rides the existing Pushover path so a problem in *one* signal
## class doesn't silently mask all the others.

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: meta-monitoring-stack
  namespace: monitoring
  labels:
    monitoring-stack: mdapi
spec:
  groups:
  - name: meta-monitoring.workload
    rules:
    - alert: MonitoringComponentDown
      expr: |
        max by (namespace, deployment) (
          ( kube_deployment_spec_replicas{
              namespace=~"cribl|monitoring|cattle-logging-system",
              deployment=~"logstream-leader|statuspage-adapter|rancher-logging|blackbox|monitoring-grafana|pushgateway|prometheus-adapter|kube-state-metrics"
            }
            - kube_deployment_status_replicas_available{
              namespace=~"cribl|monitoring|cattle-logging-system",
              deployment=~"logstream-leader|statuspage-adapter|rancher-logging|blackbox|monitoring-grafana|pushgateway|prometheus-adapter|kube-state-metrics"
            }
          ) > 0
        )
      for: 5m
      labels:
        severity: critical
        component: Platform
        team: mdapi
      annotations:
        summary: "monitoring stack: {{ $labels.namespace }}/{{ $labels.deployment }} down ({{ $value }} replicas unavailable)"
        description: |
          A component of the monitoring/alerting/logging plane is down.
          Other alerts in the affected signal class may be silently failing.

    - alert: MonitoringStatefulSetDown
      expr: |
        kube_statefulset_status_replicas_ready{
          namespace=~"cribl|monitoring|cattle-logging-system",
          statefulset=~"rancher-logging-root-fluentd"
        } < kube_statefulset_status_replicas{
          namespace=~"cribl|monitoring|cattle-logging-system",
          statefulset=~"rancher-logging-root-fluentd"
        }
      for: 5m
      labels:
        severity: critical
        component: Platform
        team: mdapi
      annotations:
        summary: "monitoring stack: {{ $labels.namespace }}/{{ $labels.statefulset }} ready < desired"
        description: |
          A monitoring/alerting StatefulSet is not at full strength.
          Same risk as MonitoringComponentDown — silent gap in alerting.

    - alert: FluentBitDaemonSetDegraded
      expr: |
        kube_daemonset_status_number_unavailable{
          namespace="cattle-logging-system", daemonset=~"rancher-logging-root-fluentbit.*"
        } > 0
      for: 5m
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "fluent-bit DS has {{ $value }} unavailable replicas"
        description: |
          One or more nodes are not shipping pod logs to Cribl.
          Log-based alerts from those nodes' workloads are blind.

    - alert: PushgatewayMissingScripts
      ## When Pushgateway has been up for a day but nothing is pushing yet,
      ## the staleness backstop in app-batch-jobs only fires after >24h.
      ## This is an info-level reminder that no batch jobs are reporting.
      expr: |
        absent(
          {__name__=~".+_last_run_timestamp_seconds", job!=""}
        ) and on() (time() - kube_pod_start_time{namespace="monitoring", pod=~"pushgateway-.*"}) > 86400
      labels:
        severity: info
        component: Platform
        team: mdapi
      annotations:
        summary: "pushgateway has no jobs pushing"
        description: "Pushgateway is up but no batch jobs are publishing *_last_run_timestamp_seconds. Either nothing's been migrated yet, or every script has stopped running."

  - name: meta-monitoring.statuspage-adapter
    rules:
    - alert: StatuspageAdapterUnhealthy
      ## Synthetic probe checks /healthz on the adapter Service. If down,
      ## AM webhooks 5xx → statuspage components stop updating.
      expr: probe_success{instance="http://statuspage-adapter.monitoring.svc.cluster.local:8080/healthz"} == 0
      for: 3m
      labels:
        severity: critical
        component: Platform
        team: mdapi
      annotations:
        summary: "statuspage adapter /healthz failing"
        description: "Alertmanager webhooks to the adapter will 5xx; public statuspage components won't reflect actual outages."

  - name: meta-monitoring.embedded-retired
    rules:
    - alert: EmbeddedMonitoringResurrected
      ## The bundled rancher-monitoring SERVER stack (Prometheus / Alertmanager
      ## / Grafana / prometheus-adapter) was intentionally retired 2026-06-24 in
      ## favour of VictoriaMetrics — disabled via the rancher-monitoring-config
      ## HelmChartConfig (`enabled: false`). If any of these workloads is running
      ## again, a Harvester upgrade or a manual change re-rendered the chart and
      ## overrode the Fleet disable: VM is now double-scraped and the dead-
      ## datasource confusion is back. Re-assert the HelmChartConfig (Fleet
      ## should self-heal within a reconcile; investigate if it doesn't).
      ## `for: 30m` rides out the transient re-render during a Harvester upgrade.
      expr: |
        kube_statefulset_replicas{
          namespace="cattle-monitoring-system",
          statefulset=~"prometheus-rancher-monitoring-prometheus|alertmanager-rancher-monitoring-alertmanager"
        } > 0
        or
        kube_deployment_spec_replicas{
          namespace="cattle-monitoring-system",
          deployment=~"rancher-monitoring-grafana|rancher-monitoring-prometheus-adapter"
        } > 0
      for: 30m
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "embedded rancher-monitoring resurrected: {{ $labels.statefulset }}{{ $labels.deployment }}"
        description: |
          A retired embedded rancher-monitoring server component is running
          again (VictoriaMetrics is meant to be the sole source). Most likely a
          Harvester upgrade re-rendered the chart. Verify rancher-monitoring-config's
          HelmChartConfig still carries the `enabled: false` flags and that Fleet
          has reconciled it; then confirm the embedded Prometheus/AM/Grafana/adapter
          are gone again.
