apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-files
  namespace: monitoring
spec:
  groups:
  - name: app-files.workload
    rules:
    - alert: FilesDeploymentUnavailable
      expr: |
        ( kube_deployment_spec_replicas{
            namespace=~"owncloud|spider3|tv|paperless|mirror",
            deployment=~"owncloud|spider3|sftpgo|paperless|mirror"
          }
          - kube_deployment_status_replicas_available{
            namespace=~"owncloud|spider3|tv|paperless|mirror",
            deployment=~"owncloud|spider3|sftpgo|paperless|mirror"
          }
        ) > 0
      for: 5m
      labels:
        severity: critical
        component: Files & Documents
        team: mdapi
      annotations:
        summary: "{{ $labels.namespace }}/{{ $labels.deployment }}: {{ $value }} replicas unavailable"
        description: |
          File-storage component is degraded. Affected services:
            ownCloud   -> cloud.mdapi.ch
            SFTPGo     -> *.files.mdapi.ch
            Paperless  -> documents.mdapi.ch (DMS)
            Mirror     -> mirror.mdapi.ch (Debian/Ubuntu mirror)

    - alert: FilesPodCrashLooping
      expr: |
        max by (namespace, pod, container) (
          rate(kube_pod_container_status_restarts_total{
            namespace=~"owncloud|spider3|tv|paperless|mirror",
            pod=~"owncloud-.*|spider3-.*|sftpgo-.*|paperless-.*|mirror-.*"
          }[15m]) * 60
        ) > 0.5
      for: 10m
      labels:
        severity: warning
        component: Files & Documents
        team: mdapi
      annotations:
        summary: "{{ $labels.namespace }}/{{ $labels.pod }} container {{ $labels.container }} restarting"

    - alert: FilesPVCNearlyFull
      expr: |
        kubelet_volume_stats_used_bytes{namespace=~"owncloud|spider3|tv|paperless|mirror"}
          / kubelet_volume_stats_capacity_bytes{namespace=~"owncloud|spider3|tv|paperless|mirror"}
          > 0.85
      for: 10m
      labels:
        severity: warning
        component: Files & Documents
        team: mdapi
      annotations:
        summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full"
        description: "Plan space addition or cleanup before it fills."
