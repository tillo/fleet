apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-files
  namespace: monitoring
spec:
  groups:
  - name: app-files.workload
    rules:
    - alert: FilesDeploymentUnavailable
      expr: |
        ( kube_deployment_spec_replicas{
            namespace=~"owncloud|spider3|tv",
            deployment=~"owncloud|spider3|sftpgo"
          }
          - kube_deployment_status_replicas_available{
            namespace=~"owncloud|spider3|tv",
            deployment=~"owncloud|spider3|sftpgo"
          }
        ) > 0
      for: 5m
      labels:
        severity: critical
        component: Files & Documents
        team: mdapi
      annotations:
        summary: "{{ $labels.namespace }}/{{ $labels.deployment }}: {{ $value }} replicas unavailable"
        description: |
          File-storage component is degraded. cloud.mdapi.ch (ownCloud) and/or
          *.files.mdapi.ch (SFTPGo) will be unreachable.

    - alert: FilesPodCrashLooping
      expr: |
        max by (namespace, pod, container) (
          rate(kube_pod_container_status_restarts_total{
            namespace=~"owncloud|spider3|tv", pod=~"owncloud-.*|spider3-.*|sftpgo-.*"
          }[15m]) * 60
        ) > 0.5
      for: 10m
      labels:
        severity: warning
        component: Files & Documents
        team: mdapi
      annotations:
        summary: "{{ $labels.namespace }}/{{ $labels.pod }} container {{ $labels.container }} restarting"

    - alert: FilesPVCNearlyFull
      expr: |
        kubelet_volume_stats_used_bytes{namespace=~"owncloud|spider3|tv"}
          / kubelet_volume_stats_capacity_bytes{namespace=~"owncloud|spider3|tv"}
          > 0.85
      for: 10m
      labels:
        severity: warning
        component: Files & Documents
        team: mdapi
      annotations:
        summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full"
        description: "Plan space addition or cleanup before it fills."
