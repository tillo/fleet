## Early detection for the node-level storage-stall family (5 events:
## qua 06-30, qua 07-02, qui 07-04, qui 07-12, quo 07-17/18).
##
## In every event the proven diagnosis shortcut was the same: many Longhorn
## engines stuck in state `starting`, all on ONE node, while the rest of the
## cluster looked healthy. Until now that signature only surfaced ~1h later
## as generic website/mail-down collateral (~35 alertnames in the 07-17 quo
## cascade). This rule names the fault class directly while the manager on
## the affected node is still alive to report it.
##
## `longhorn_engine_state` is a per-engine state-set (one series per state,
## value 1 = current state) with a `node` label = the node the engine runs
## on. Healthy steady state: everything `running`; transient `starting`
## during attach normally lasts seconds. Three or more engines stuck
## `starting` on the same node for 10 continuous minutes has never been
## observed outside a wedge.
##
## Known limitation: if the node freezes hard enough that longhorn-manager
## stops scraping, these series go stale (~5m) and the alert un-fires —
## this is an EARLY detector for the window where userspace still works
## and iSCSI I/O is already dead, not a substitute for node-down alerting.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-longhorn-engine-stall
  namespace: monitoring
  labels:
    monitoring-stack: mdapi
spec:
  groups:
  - name: app-longhorn-engine-stall.node
    rules:
    - alert: LonghornEngineStallOneNode
      expr: sum by (node) (longhorn_engine_state{state="starting"} == 1) >= 3
      for: 10m
      labels:
        severity: warning
        component: Storage
        team: mdapi
      annotations:
        summary: "{{ $value }} Longhorn engines stuck 'starting' on {{ $labels.node }} — storage-stall signature"
        description: |
          {{ $value }} Longhorn engines have been stuck in state `starting` on
          node {{ $labels.node }} for >=10 min. This is the signature of the
          node-level storage-stall family (iSCSI kernel deadlock / IO
          saturation wedge — 5 events 2026-06-30..07-18). Runbook:
          memory/quo_iscsi_kernel_deadlock_umount_dead_lun_2026_07_18.md.
          Quick triage:
            kubectl --context=mdapi-prod -n longhorn-system get engine \
              -o json | jq -r '.items[]|select(.status.currentState=="starting")|"\(.metadata.name) \(.spec.nodeID)"'
            ssh rancher@{{ $labels.node }} 'ps axo stat,comm | grep ^D; iscsiadm -m session'
          If iscsid is D-state and sessions hang: do NOT wait for graceful
          shutdown — it hangs on the dead LUN. Drain what still moves, then
          iLO ForceRestart the node (proven recovery 07-18). Longhorn +
          mongo-RS cleanup steps are in the runbook memory file.
