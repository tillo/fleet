## Catch silent CPU throttling.
##
## Background: the 2026-06-05 seerr-slowness investigation revealed both
## seerr (1500m hardcap) and sonarr (1c hardcap) were being CFS-throttled
## ~13-27% of scheduler periods despite low average CPU usage. The
## throttling was invisible at the deployment level (status said Ready,
## VPA target was below the limit, top showed single-digit CPU) but the
## user experienced sustained latency on SSR renders. cAdvisor's
## container_cpu_cfs_throttled_periods_total exposes it directly.
##
## Threshold: 5% sustained over 15 minutes. Anything less is noisy bursts.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-cpu-throttling
  namespace: monitoring
  labels:
    monitoring-stack: mdapi
spec:
  groups:
  - name: app-cpu-throttling.cfs
    rules:
    - alert: ContainerCpuThrottling
      ## Scope: anything we can actually fix. We exclude only pods owned by
      ## the Harvester operator (and the Harvester-installed addons living
      ## under kube-system/cattle-*), since those revert on every Harvester
      ## upgrade and have no Fleet override path. Everything else --
      ## including Rancher Monitoring, Rancher Logging, RKE2 CoreDNS,
      ## Longhorn, CNPG -- IS tunable (via HelmChartConfig, chart values
      ## override, or Longhorn's own settings), so the throttle signal is
      ## genuinely actionable and should NOT be silenced.
      ##
      ## Pod-name exclusions cover the Harvester components that live in
      ## non-harvester-system namespaces (harvester-whereabouts in
      ## kube-system, harvester-default-event-tailer in cattle-logging-
      ## system, kube-vip / cloud-controller-manager in kube-system, etc.).
      ##
      ## Per-workload opt-out: workloads that are CPU-capped on purpose and
      ## burst to their lid by design (transcoders, scanners, software-decode
      ## NVRs) carry the pod-template label
      ##   monitoring.mdapi.ch/cpu-throttle-exempt: "true"
      ## and are subtracted by the trailing `unless ... kube_pod_labels{...}`.
      ## This is per-pod, not per-namespace, so e.g. tdarr in tv/ is exempt
      ## while seerr/sonarr in the same namespace still alert. The label is
      ## surfaced into kube_pod_labels via the KSM metricLabelsAllowlist set
      ## in rancher-monitoring-config/. A missing/typo'd label fails safe
      ## (the pod simply keeps alerting).
      ## 2026-07-13: rate window [5m]→[30m] + for 15m→1h. This is a
      ## chronic-condition alert (tune/remove a CPU limit), yet with the
      ## 5m window the ratio oscillated around the 5% threshold and
      ## produced 217 firing episodes in 13 days (~2 Pushover messages
      ## each). A limit that needs tuning is throttled for HOURS — a 30m
      ## average sustained for 1h loses nothing actionable.
      expr: |
        sum by (namespace, pod, container) (
          rate(container_cpu_cfs_throttled_periods_total{
            container!="",container!="POD",
            namespace!~"harvester-system|cattle-fleet-system|cattle-provisioning-capi-system",
            pod!~"harvester-.*|virt-.*|kube-vip-.*|cloud-controller-manager-.*"
          }[30m])
        )
        /
        sum by (namespace, pod, container) (
          rate(container_cpu_cfs_periods_total{
            container!="",container!="POD",
            namespace!~"harvester-system|cattle-fleet-system|cattle-provisioning-capi-system",
            pod!~"harvester-.*|virt-.*|kube-vip-.*|cloud-controller-manager-.*"
          }[30m])
        ) > 0.05
        unless on (namespace, pod)
        kube_pod_labels{label_monitoring_mdapi_ch_cpu_throttle_exempt="true"}
      for: 1h
      labels:
        severity: warning
        component: Platform
        team: mdapi
        ## Internal tune-signal: firing means "adjust/remove a CPU limit",
        ## never a user-visible outage — the adapter skips it so it cannot
        ## degrade the public Platform component (it did, via webtunnel
        ## 07-12..14 and prowlarr 07-15..18).
        statuspage: exclude
      annotations:
        summary: "{{ $labels.namespace }}/{{ $labels.pod }}:{{ $labels.container }} CPU-throttled {{ $value | humanizePercentage }}"
        description: |
          Container {{ $labels.namespace }}/{{ $labels.pod }}:{{ $labels.container }} has been CFS-throttled at {{ $value | humanizePercentage }} of scheduler periods for >15 minutes.
          Either the CPU limit is too low for the workload's burst profile, or remove the limit entirely. Inspect with:
            kubectl --context=mdapi-prod -n {{ $labels.namespace }} exec {{ $labels.pod }} -- cat /sys/fs/cgroup/cpu.stat
          and the VPA recommendation (if any):
            kubectl --context=mdapi-prod -n {{ $labels.namespace }} describe vpa {{ $labels.container }}
