## ClusterOutput → Cribl LogStream Leader's HTTP source on port 8080.
## Cribl pipeline drops the log body after pattern match (see step 6).
##
## NOTE: Cribl side must have an HTTP/REST source listening on :8080
## before this Output starts succeeding. If logs aren't arriving, check:
##   kubectl -n cattle-logging-system logs deployment/mdapi-fluentd | grep cribl

apiVersion: logging.banzaicloud.io/v1beta1
kind: ClusterOutput
metadata:
  name: cribl
  namespace: cattle-logging-system
spec:
  http:
    endpoint: http://logstream-leader-internal.cribl.svc.cluster.local:8080
    content_type: application/json
    json_array: true
    ## Buffer locally for up to 10s then flush; on Cribl outage chunks
    ## get retried up to retry_max_times with exponential backoff.
    ## flush_mode: interval is required for flush_interval to take effect
    ## (default 'lazy' uses timekey, which holds chunks for 10+ minutes).
    buffer:
      type: memory
      flush_mode: interval
      flush_interval: 10s
      ## flush_thread_count: parallelize HTTP POSTs to Cribl so chunk
      ## drain rate keeps up with the new combined volume
      ## (root pod logs + rke2-journald-aggregator + kube-audit forward).
      flush_thread_count: 4
      retry_type: exponential_backoff
      retry_max_times: 5
      retry_max_interval: 30s
      chunk_limit_size: 2m
      ## Buffer raised 32m → 512m: chart 108.x migration added rke2
      ## journald + kube-audit sources, the previous 32 MiB filled in
      ## seconds, fluentd hit BufferOverflowError and started dropping
      ## chunks. fluentd's parent memory limit is 2 GiB so 512 MiB of
      ## in-memory output buffer is comfortable.
      total_limit_size: 512m
      overflow_action: drop_oldest_chunk
