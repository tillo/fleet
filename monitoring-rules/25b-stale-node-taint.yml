## Stale node-taint detector (added after the 2026-06-06 outage).
##
## A Ready node must NOT carry `node.kubernetes.io/out-of-service` or
## `kubevirt.io/drain` taints — those are applied during a drain / forced
## detach and MUST be removed once the node returns. A leftover taint silently
## evicts the Longhorn instance-manager + workloads from that node: this is
## exactly what knocked out qui's storage engine (only 1/3 engines up -> 90
## faulted volumes) during the incident. The faulted/degraded volume alerts
## (19-longhorn-robustness.yml) catch the *symptom*; this catches the *cause*.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cluster-stale-node-taint
  namespace: monitoring
  labels:
    monitoring-stack: mdapi
spec:
  groups:
  - name: cluster-stale-node-taint.workload
    rules:
    - alert: StaleNodeTaint
      expr: |
        (kube_node_spec_taint{key=~"node.kubernetes.io/out-of-service|kubevirt.io/drain"} == 1)
        and on(node)
        (kube_node_status_condition{condition="Ready",status="true"} == 1)
      for: 10m
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "Stale taint {{ $labels.key }} on Ready node {{ $labels.node }}"
        description: |
          Node {{ $labels.node }} is Ready but still carries the {{ $labels.key }}
          ({{ $labels.effect }}) taint. These are applied during drain / out-of-service
          and should be removed when the node recovers; left in place they evict the
          Longhorn instance-manager and workloads from the node. Remove with:
          `kubectl taint nodes {{ $labels.node }} {{ $labels.key }}-`
