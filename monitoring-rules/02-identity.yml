apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-identity
  namespace: monitoring
spec:
  groups:
  - name: app-identity.workload
    rules:
    - alert: IdentityKeycloakUnavailable
      expr: |
        max by (namespace, deployment) (
          ( kube_deployment_spec_replicas{
              namespace=~"keycloak|envuassu", deployment="keycloak"
            }
            - kube_deployment_status_replicas_available{
              namespace=~"keycloak|envuassu", deployment="keycloak"
            }
          ) > 0
        )
      for: 3m
      labels:
        severity: critical
        component: Identity
        team: mdapi
      annotations:
        summary: "{{ $labels.namespace }}/keycloak: {{ $value }} replicas unavailable"
        description: |
          Keycloak (SSO) is down or degraded. ALL apps gated by oauth2-proxy/OIDC
          will start failing logins. Check: kubectl -n {{ $labels.namespace }} logs deployment/keycloak

    - alert: IdentityKeycloakCrashLooping
      expr: |
        max by (namespace, pod) (
          rate(kube_pod_container_status_restarts_total{
            namespace=~"keycloak|envuassu", pod=~"keycloak-.*"
          }[15m]) * 60
        ) > 0.5
      for: 10m
      labels:
        severity: warning
        component: Identity
        team: mdapi
      annotations:
        summary: "{{ $labels.namespace }}/{{ $labels.pod }} keycloak restarting frequently"

    - alert: IdentityOpenLDAPUnavailable
      ## Keycloak federates against openldap for primary user storage; if
      ## openldap is down, Keycloak token-issue still works for cached
      ## users but new logins and group lookups break.
      expr: |
        max by (namespace, deployment) (
          ( kube_deployment_spec_replicas{
              namespace="openldap", deployment=~"openldap|lam"
            }
            - kube_deployment_status_replicas_available{
              namespace="openldap", deployment=~"openldap|lam"
            }
          ) > 0
        )
      for: 5m
      labels:
        severity: critical
        component: Identity
        team: mdapi
      annotations:
        summary: "openldap/{{ $labels.deployment }} unavailable"
        description: |
          {{ $labels.deployment }} in openldap ns is down. Keycloak's user
          federation lookups will fail; new SSO logins won't be able to
          resolve users. `lam` is the web UI for openldap admin only —
          openldap itself is the load-bearing one.

    - alert: IdentityOpenLDAPCrashLooping
      expr: |
        max by (namespace, pod) (
          rate(kube_pod_container_status_restarts_total{
            namespace="openldap", pod=~"openldap-.*|lam-.*"
          }[15m]) * 60
        ) > 0.5
      for: 10m
      labels:
        severity: warning
        component: Identity
        team: mdapi
      annotations:
        summary: "openldap/{{ $labels.pod }} restarting frequently"
