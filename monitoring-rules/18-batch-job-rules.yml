## Alerts driven by metrics published to Pushgateway by Windmill
## scripts. Each batch job pushes a `<job>_last_run_timestamp_seconds`
## heartbeat plus signal-specific gauges; Prometheus alerts on staleness
## and on the signal gauges. This replaces the per-script Pushover calls.

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-batch-jobs
  namespace: monitoring
spec:
  groups:
  - name: batch-jobs.staleness
    rules:
    - alert: BatchJobNotPushing
      ## Generic staleness backstop — any *_last_run_timestamp_seconds
      ## series older than 36h triggers (covers all daily-cron scripts).
      ## job label is preserved so the alert names which script.
      expr: |
        (time() - max by (job) ({__name__=~".+_last_run_timestamp_seconds", job!="pushgateway"})) > 36 * 3600
      for: 30m
      labels:
        severity: warning
        component: General
        team: mdapi
      annotations:
        summary: "batch job {{ $labels.job }} hasn't pushed in {{ $value | humanizeDuration }}"
        description: |
          Pushgateway has not received a heartbeat from {{ $labels.job }}
          in over 36h. The script may be failing, disabled, or its
          schedule may have been removed.

  - name: batch-jobs.rancher-backup
    rules:
    - alert: RancherBackupErrored
      expr: rancher_backup_in_error == 1
      for: 10m
      labels:
        severity: critical
        component: General
        team: mdapi
      annotations:
        summary: "Rancher backup {{ $labels.backup }} is in error state"
        description: "Most recent reconcile of Rancher Backup CR {{ $labels.backup }} reported an error condition. Check `kubectl get backup {{ $labels.backup }} -o yaml`."

    - alert: RancherBackupStale
      expr: rancher_backup_last_snapshot_age_seconds > 26 * 3600
      for: 30m
      labels:
        severity: warning
        component: General
        team: mdapi
      annotations:
        summary: "Rancher backup {{ $labels.backup }} last snapshot {{ $value | humanizeDuration }} ago"
        description: "Backup is configured for daily snapshots; last successful snapshot is older than 26h."

    - alert: RancherBackupNeverSnapshotted
      expr: rancher_backup_last_snapshot_age_seconds == -1
      for: 1h
      labels:
        severity: warning
        component: General
        team: mdapi
      annotations:
        summary: "Rancher backup {{ $labels.backup }} has no snapshot"
        description: "Backup CR exists but no snapshot has ever been recorded. Check schedule and storage location."
