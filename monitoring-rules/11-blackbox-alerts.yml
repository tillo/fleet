## PrometheusRule fed by blackbox probes.
##
## probe_success is 1 (probe ok) or 0 (probe failing). We alert when it's
## been 0 for several minutes — short enough to catch real outages, long
## enough to ride out single-poll transient failures (15s scrape interval
## by default).

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-blackbox
  namespace: monitoring
  labels:
    monitoring-stack: mdapi
spec:
  groups:
  - name: app-blackbox.synthetic
    rules:
    - alert: SyntheticProbeFailing
      ## 2026-07-13 flap fix: was `probe_success == 0 for: 5m`. During
      ## recovery a SINGLE successful 15s scrape resolved the alert, the
      ## next failure window re-fired it — 140 firing episodes in 13 days,
      ## each = 2 priority-1 Pushover messages. avg_over_time gives
      ## hysteresis on BOTH edges: fires after ~1m hard failure + for:,
      ## resolves only once the success rate over the last 5m is back
      ## above 80%.
      ## dns_external_google is a REFERENCE probe (is the internet broken,
      ## not us) — split into the info-tier rule below.
      ##
      ## 2026-07-23 blip fix (infra-health, user-approved 06:14Z): for:
      ## 4m -> 8m on everything EXCEPT Mail. Three unattributable sub-6-min
      ## self-resolved blips in a week (07-16, 07-19, 07-21) each fired
      ## critical for 1-2min; ≈9m detection rides those out. Known trade:
      ## a real-but-short outage (07-23 pushgateway OOM, ~5min) no longer
      ## pages. Mail is priority 1 and keeps the 4m rule below.
      expr: avg_over_time(probe_success{component!="", component!="Mail", team="mdapi", probe!="dns_external_google"}[5m]) < 0.8
      for: 8m
      labels:
        severity: critical
        team: mdapi
        # component label is inherited from the Probe target, no need to set
      annotations:
        summary: "{{ $labels.component }}: probe {{ if $labels.probe }}{{ $labels.probe }}{{ else }}{{ $labels.instance }}{{ end }} failing"
        description: |
          Blackbox probe `{{ $labels.instance }}` (module: {{ $labels.module }})
          has had <80% success over the last 5m for >8m.
          Component {{ $labels.component }} on statuspage will go to major_outage.
          Investigate from a workstation:
            curl -v {{ $labels.instance }}    (for HTTP probes)
            dig @{{ reReplaceAll ":53" "" $labels.instance }} mdapi.ch  (for DNS)

    - alert: SyntheticProbeFailing
      ## Mail split (2026-07-23): mail is priority 1 — keeps the original
      ## 4m (≈5m detection). Same alertname on purpose: routing, statuspage
      ## mapping and the SlowResponse inhibition all key on alertname, and
      ## each probe_success series matches exactly one of the two rules.
      expr: avg_over_time(probe_success{component="Mail", team="mdapi"}[5m]) < 0.8
      for: 4m
      labels:
        severity: critical
        team: mdapi
      annotations:
        summary: "{{ $labels.component }}: probe {{ if $labels.probe }}{{ $labels.probe }}{{ else }}{{ $labels.instance }}{{ end }} failing"
        description: |
          Blackbox probe `{{ $labels.instance }}` (module: {{ $labels.module }})
          has had <80% success over the last 5m for >4m.
          Component {{ $labels.component }} on statuspage will go to major_outage.
          Investigate from a workstation:
            curl -v {{ $labels.instance }}    (for HTTP probes)
            dig @{{ reReplaceAll ":53" "" $labels.instance }} mdapi.ch  (for DNS)

    - alert: SyntheticReferenceProbeFailing
      ## External reference targets (currently Google public DNS). Failure
      ## means the upstream internet path is unhealthy — nothing of ours to
      ## fix, so info tier (badge only), never a priority-1 page. 6 critical
      ## episodes in the 13d window before 2026-07-13 were pure noise.
      expr: avg_over_time(probe_success{probe="dns_external_google"}[10m]) < 0.2
      for: 5m
      labels:
        severity: info
        team: mdapi
        ## Overrides the probe target's inherited DNS component: a failing
        ## external reference means the internet path is sick, not our DNS.
        component: Internet
      annotations:
        summary: "{{ $labels.component }}: external reference probe {{ $labels.probe }} failing (upstream, not ours)"
        description: |
          Reference probe `{{ $labels.instance }}` is failing — the upstream
          internet path is degraded. Cross-check BpiR4/WAN alerts before
          suspecting any mdapi component.

    - alert: SyntheticProbeSlowResponse
      expr: probe_duration_seconds{component!="", team="mdapi"} > 5
      for: 10m
      labels:
        severity: warning
        team: mdapi
      annotations:
        summary: "{{ $labels.component }}: probe {{ if $labels.probe }}{{ $labels.probe }}{{ else }}{{ $labels.instance }}{{ end }} slow ({{ $value }}s)"
        description: |
          Probe is succeeding but response time >5s for >10m. Performance degradation
          incoming. Statuspage component {{ $labels.component }} → degraded_performance.

    - alert: SyntheticProbeTLSExpiringSoon
      expr: |
        probe_ssl_earliest_cert_expiry{component!="", team="mdapi"} - time() < 14 * 24 * 3600
      for: 30m
      labels:
        severity: warning
        team: mdapi
      annotations:
        summary: "{{ $labels.component }}: TLS cert for {{ $labels.instance }} expires in {{ $value | humanizeDuration }}"
        description: |
          cert-manager renews before 30d remaining; if this fires, automation has stalled.
          Check: kubectl get certificate -A | grep -v True
