## HA recorder write-freshness. The recorder write loop can wedge while HA
## core stays up and serving (2026-06-06/07: silent ~32h stall, pod 2/2, no
## errors in logs). HA's own hass_* metrics CANNOT detect this -- they reflect
## the in-memory state machine, which keeps advancing during a stall. This
## watches a DB-side CNPG custom metric: seconds since the last row was written
## to the recorder `states` table. min() across instances = the freshest value
## (the primary; a lagging replica only reads larger).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-home-recorder
  namespace: monitoring
  labels:
    monitoring-stack: mdapi
spec:
  groups:
  - name: app-home-recorder.freshness
    rules:
    - alert: HomeAssistantRecorderStalled
      expr: |
        min(cnpg_ha_recorder_last_write_age_seconds{namespace="home-assistant"}) > 900
      for: 5m
      labels:
        severity: critical
        component: Smart Home
        team: mdapi
      annotations:
        summary: "HA recorder not writing for {{ $value | printf \"%.0f\" }}s"
        description: |
          No new rows in the recorder `states` table for >15m while the DB is
          reachable. The recorder write loop has likely wedged -- HA core may
          still be serving normally, so no other alert fires. History, logbook
          and statistics are silently not being recorded.
          Fix: restart HA Core (`homeassistant.restart` service, or
          `kubectl -n home-assistant rollout restart deploy/home-assistant`) to
          re-init the recorder. Ref: 2026-06-06/07 ~32h silent stall.

    ## Companion: the metric itself going absent means the recorder Postgres
    ## exporter / custom query broke or the DB is down (the StalledSilently
    ## alert can't fire on a metric that isn't there).
    - alert: HomeAssistantRecorderMetricMissing
      expr: |
        absent(cnpg_ha_recorder_last_write_age_seconds{namespace="home-assistant"})
      for: 15m
      labels:
        severity: warning
        component: Smart Home
        team: mdapi
      annotations:
        summary: "HA recorder freshness metric missing"
        description: |
          cnpg_ha_recorder_last_write_age_seconds absent for 15m. The
          ha-recorder-pg exporter/custom query may be broken, or the CNPG
          cluster is down. Check `kubectl -n home-assistant get cluster.postgresql.cnpg.io ha-recorder-pg`.

  - name: app-home-recorder.backup
    rules:
    ## Base backups to the salt/pepper Garage bucket flap (pod churn mid-backup,
    ## or 504s from CompleteMultipartUpload colliding with the 04:00 offsite
    ## job) and the cluster's LastBackupSucceeded condition went silent. WAL is
    ## streamed continuously, so a single failed daily is WAL-recoverable -- the
    ## real risk is base backups going *stale*, which leaves a longer WAL replay
    ## as the only path. Warn (not critical) once no base backup has landed in
    ## the object store for >26h (daily cadence + ~90min runtime + buffer).
    - alert: HomeAssistantRecorderBackupStale
      ## max() across instances: only the primary reads the barman object-store
      ## catalog, so replicas report this metric as 0. Without the aggregation
      ## the replica's 0-series satisfies the threshold and false-fires. max()
      ## takes the freshest available-backup timestamp, which is the real signal.
      expr: |
        time() - max(cnpg_collector_last_available_backup_timestamp{namespace="home-assistant"}) > 93600
      for: 1h
      labels:
        severity: warning
        component: Smart Home
        team: mdapi
      annotations:
        summary: "HA recorder base backup stale ({{ $value | humanizeDuration }} old)"
        description: |
          No successful ha-recorder-pg base backup has landed in
          s3://homeassistant-pg-backup for >26h. Continuous WAL archiving still
          protects PITR, but the base-backup anchor is aging. Check recent
          backups: `kubectl -n home-assistant get backups.postgresql.cnpg.io`
          and the cluster's LastBackupSucceeded condition. Common causes:
          504 Gateway Timeout from Garage during CompleteMultipartUpload
          (offsite-job contention), or instance-manager restart mid-backup.

    ## Companion: if the catalog metric goes absent, the alert above can't fire.
    - alert: HomeAssistantRecorderBackupMetricMissing
      expr: |
        absent(cnpg_collector_last_available_backup_timestamp{namespace="home-assistant"})
      for: 1h
      labels:
        severity: warning
        component: Smart Home
        team: mdapi
      annotations:
        summary: "HA recorder backup-catalog metric missing"
        description: |
          cnpg_collector_last_available_backup_timestamp absent for 1h. The CNPG
          collector or its barman cloud catalog read may be broken, masking
          backup staleness. Check the ha-recorder-pg instance metrics endpoint.
