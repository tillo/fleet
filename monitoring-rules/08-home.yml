## Home-assistant + companions: home-assistant itself, appdaemon
## (Python automations), esphome (device firmware), frigate (camera
## NVR), eclipse-mosquitto (MQTT broker). All single-replica, RWO
## storage, so deployment-unavailable is the only meaningful signal.
## If MQTT is down, HA loses Zigbee/Z-Wave bridges; if HA is down,
## the BPI-R4 storm/ONU/T2 self-heal automations stop reacting.

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-home
  namespace: monitoring
spec:
  groups:
  - name: app-home.workload
    rules:
    - alert: HomeAssistantUnavailable
      expr: |
        max by (namespace, deployment) (
          ( kube_deployment_spec_replicas{
              namespace="home-assistant", deployment="home-assistant"
            }
            - kube_deployment_status_replicas_available{
              namespace="home-assistant", deployment="home-assistant"
            }
          ) > 0
        )
      for: 5m
      labels:
        severity: critical
        component: Home
        team: mdapi
      annotations:
        summary: "home-assistant down"
        description: |
          Home Assistant is unavailable. Router/ONU/T2 self-heal automations
          stop reacting; Zigbee/MQTT integrations stop publishing state.

    - alert: HomeStackPodCrashLooping
      expr: |
        max by (namespace, pod) (
          rate(kube_pod_container_status_restarts_total{
            namespace=~"home-assistant|appdaemon|esphome|frigate|mqtt"
          }[15m]) * 60
        ) > 0.5
      for: 10m
      labels:
        severity: warning
        component: Home
        team: mdapi
      annotations:
        summary: "{{ $labels.namespace }}/{{ $labels.pod }} crash-looping"
        description: "Container restart rate > 0.5/min for 10m. Check `kubectl -n {{ $labels.namespace }} logs {{ $labels.pod }} --previous`."

    - alert: MqttBrokerUnavailable
      expr: |
        max by (namespace) (
          ( kube_deployment_spec_replicas{
              namespace="mqtt", deployment="eclipse-mosquitto"
            }
            - kube_deployment_status_replicas_available{
              namespace="mqtt", deployment="eclipse-mosquitto"
            }
          ) > 0
        )
      for: 3m
      labels:
        severity: warning
        component: Home
        team: mdapi
      annotations:
        summary: "MQTT broker eclipse-mosquitto unavailable"
        description: |
          Without MQTT, HA loses devices that publish via MQTT (Zigbee2MQTT
          bridge, esphome devices). Check pod logs and broker config.

    - alert: FrigateUnavailable
      expr: |
        max by (namespace) (
          ( kube_deployment_spec_replicas{
              namespace="frigate", deployment="frigate"
            }
            - kube_deployment_status_replicas_available{
              namespace="frigate", deployment="frigate"
            }
          ) > 0
        )
      for: 5m
      labels:
        severity: warning
        component: Home
        team: mdapi
      annotations:
        summary: "frigate camera NVR down"
        description: "No recording / detection while down. Check GPU/coral, PVC space."

    - alert: AppDaemonUnavailable
      expr: |
        max by (namespace) (
          ( kube_deployment_spec_replicas{
              namespace="appdaemon", deployment="appdaemon"
            }
            - kube_deployment_status_replicas_available{
              namespace="appdaemon", deployment="appdaemon"
            }
          ) > 0
        )
      for: 10m
      labels:
        severity: warning
        component: Home
        team: mdapi
      annotations:
        summary: "appdaemon down"
        description: "Python automations on top of HA stopped. HA-builtin automations continue working."

    - alert: EsphomeUnavailable
      expr: |
        max by (namespace) (
          ( kube_deployment_spec_replicas{
              namespace="esphome", deployment="esphome"
            }
            - kube_deployment_status_replicas_available{
              namespace="esphome", deployment="esphome"
            }
          ) > 0
        )
      for: 15m
      labels:
        severity: info
        component: Home
        team: mdapi
      annotations:
        summary: "esphome dashboard down"
        description: "Device firmware editor unavailable. Devices keep running; this only blocks OTA updates."

    ## Frigate / Nest camera silently offline — ffmpeg dies, the RTSP/WebRTC
    ## stream stalls, or the upstream Nest device is unreachable. HA's
    ## Frigate/Nest integration drops hass_entity_available for the camera.
    ## Excludes camera.pwhtillo_guest (static QR-code "camera" — local file
    ## sensor, never has a producer feeding it).
    - alert: FrigateCameraOffline
      expr: |
        max by (entity, friendly_name) (
          hass_entity_available{
            domain="camera",
            entity!~"camera\\.(pwhtillo_guest|.*_qr|.*_static)"
          } == 0
        )
      for: 15m
      labels:
        severity: warning
        component: Home
        team: mdapi
      annotations:
        summary: "Camera offline: {{ $labels.friendly_name }}"
        description: |
          Camera entity {{ $labels.entity }} has been unavailable for 15m.
          For Frigate cams: check go2rtc producers (`/api/streams?src=<name>`)
          and ffmpeg logs. For Nest cams: a Google SDM 500 on the device
          usually means the Nest cam itself is offline — check Google Home app.

    ## HA backup integration tracks last successful + last failed timestamps.
    ## binary_sensor.auto_backup_backup_status: 0 healthy, 1 last attempt failed.
    ## sensor.auto_backup_monitored_backups < expected count → retention regression.
    - alert: HomeAssistantBackupFailed
      expr: |
        hass_binary_sensor_state{entity="binary_sensor.auto_backup_backup_status"} == 1
      for: 30m
      labels:
        severity: warning
        component: Home
        team: mdapi
      annotations:
        summary: "HA Auto Backup last attempt failed"
        description: |
          binary_sensor.auto_backup_backup_status reports failure for >30m.
          Check sensor.auto_backup_last_failure for the error and verify
          the rclone-backups-s3 sidecar push to Garage.

    ## Same signal projected through the monitored-count: if HA suddenly
    ## drops below 15 monitored backups, retention/rotation went wrong.
    - alert: HomeAssistantBackupCountLow
      expr: |
        hass_sensor_state{entity="sensor.auto_backup_monitored_backups"} < 15
      for: 1h
      labels:
        severity: info
        component: Home
        team: mdapi
      annotations:
        summary: "HA Auto Backup monitored count {{ $value }} (<15)"
        description: |
          Expected ~20 daily/weekly/monthly retained backups. Current count
          is unusually low — verify auto_backup add-on is purging correctly.

    ## Battery-powered devices (Zigbee/Z-Wave/BLE). Project current discharge
    ## rate forward 48h and warn if the device will hit 0% — earlier signal
    ## than the bare 20% threshold.
    - alert: BatteryLowPredictive
      expr: |
        predict_linear(hass_sensor_battery_percent[7d], 48 * 3600) < 0
        and hass_sensor_battery_percent < 40
      for: 1h
      labels:
        severity: info
        component: Home
        team: mdapi
      annotations:
        summary: "{{ $labels.friendly_name }} battery will deplete in <48h"
        description: |
          7d linear projection puts {{ $labels.entity }} below 0% within
          48h (current {{ $value | printf "%.0f" }}%). Replace battery now.

    ## Cross-namespace heartbeat: BPI-R4 router pushes sensor.bpi_r4_heartbeat
    ## every minute (epoch seconds). >5 min stale = router lost network to HA,
    ## or health-snapshot.sh died. Last-resort canary for the homelab uplink
    ## that doesn't depend on the cluster-side Pushgateway path.
    - alert: BpiR4HeartbeatStale
      expr: |
        time() - max(hass_sensor_state{entity="sensor.bpi_r4_heartbeat"}) > 300
      for: 3m
      labels:
        severity: warning
        component: Router
        team: mdapi
      annotations:
        summary: "BPI-R4 sensor heartbeat stale (>5min)"
        description: |
          The BPI-R4 router has not pushed sensor.bpi_r4_heartbeat to HA
          in >5 min. Either the router is unreachable, the script
          health-snapshot.sh died, or HA stopped accepting writes.

    ## Catch integration regressions hiding in HA's baseline of unavailable
    ## entities. A large block of "dead" entities is normal here (devices
    ## that are pending, seasonal, or not always on), so we alert on jumps
    ## per domain rather than absolute counts. >10 newly-unavailable entities
    ## in a single domain over 1h almost always means an integration/hub/
    ## bridge dropped off, not a few stragglers powering down.
    - alert: HomeAssistantUnavailableEntitiesSpike
      expr: |
        (count by (domain) (hass_entity_available == 0))
        - (count by (domain) ((hass_entity_available offset 1h) == 0))
        > 10
      for: 30m
      labels:
        severity: warning
        component: Home
        team: mdapi
      annotations:
        summary: "HA domain '{{ $labels.domain }}' lost {{ $value }} entities in 1h"
        description: |
          {{ $value }} more entities in domain '{{ $labels.domain }}' became
          unavailable compared to 1h ago. Probable causes: integration token
          expired, hub/bridge offline, network segment down. Use the HA
          Developer Tools → States filter `state:unavailable domain:{{ $labels.domain }}`
          to identify the cluster of dropped entities.

    ## Garage cluster degradation — fewer ok nodes than total. Each Garage
    ## instance is single-node so any degradation is fatal for backup writes.
    - alert: GarageClusterDegraded
      expr: |
        max by (namespace) (cluster_storage_nodes - cluster_storage_nodes_ok) > 0
      for: 5m
      labels:
        severity: warning
        component: Storage
        team: mdapi
      annotations:
        summary: "Garage {{ $labels.namespace }} cluster degraded"
        description: |
          {{ $value }} Garage node(s) reporting not-ok in {{ $labels.namespace }}.
          Backup writes will fail. Check pod status and disk health.
