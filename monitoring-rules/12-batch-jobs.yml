## Rules for metrics published by Windmill batch scripts via Pushgateway.
##
## Convention for any pushed batch job:
##   1. PUT to http://pushgateway.monitoring.svc.cluster.local:9091/metrics/job/<name>
##   2. Always include `<name>_last_run_timestamp_seconds` (epoch seconds)
##   3. Optionally include `<name>_last_run_success` (1=ok, 0=failed)
##   4. Optionally include any business-specific gauges; add per-script
##      rules in their own group below.

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-batch-jobs
  namespace: monitoring
  labels:
    monitoring-stack: mdapi
spec:
  groups:
  - name: app-batch-jobs.staleness
    rules:
    ## Single per-job staleness rule, replacing the previous two-tier
    ## BatchJobStale + BatchJobStaleWeekly which relied on a hand-edited
    ## regex of weekly job names. The Windmill probe
    ## `f/probe/schedule_cadence_map` publishes
    ## `windmill_schedule_interval_seconds` per job (basename of script
    ## path) every day; this rule joins on `job` and triggers when the
    ## last-run timestamp is older than 2× that interval.
    ##
    ## 2× gives one missed run of grace before alerting:
    ##   - daily jobs (interval 86400): stale at 48h
    ##   - weekly jobs (interval 604800): stale at 14d
    ##   - monthly jobs (interval 2678400): stale at 62d
    ##   - 5-min probes (interval 300): stale at 10min
    ## Adding a new scheduled probe needs no change here.
    - alert: BatchJobStale
      expr: |
        (
          time() - max by (job) (
            {__name__=~".+_last_run_timestamp_seconds", job!=""}
          )
        )
        >
        on (job) group_left() (
          max by (job) (windmill_schedule_interval_seconds) * 2
        )
      for: 30m
      labels:
        severity: warning
        team: mdapi
        component: Platform
      annotations:
        summary: "Batch job {{ $labels.job }} hasn't pushed metrics in {{ $value | humanizeDuration }}"
        description: |
          A scheduled job has stopped pushing its `*_last_run_timestamp_seconds`
          for more than 2× its scheduled interval (one missed run of grace).
          Threshold is read live from `windmill_schedule_interval_seconds`,
          which f/probe/schedule_cadence_map publishes daily from the
          Windmill schedule list.

          Either the job is broken, its schedule was disabled, or its
          basename(script_path) doesn't match the pushgateway job label.

          Check Windmill (https://windmill.mdapi.ch) or the cron source.

    - alert: BatchJobLastRunFailed
      ## Convention: scripts also push <name>_last_run_success gauge.
      expr: |
        max by (job) (
          {__name__=~".+_last_run_success", job!=""}
        ) == 0
      for: 10m
      labels:
        severity: warning
        team: mdapi
        component: Platform
      annotations:
        summary: "Batch job {{ $labels.job }} reported a failed last run"
        description: "The script's `*_last_run_success` gauge is 0. Check its logs in Windmill."

  - name: app-batch-jobs.rancher-backup
    rules:
    - alert: RancherBackupErrored
      expr: rancher_backup_in_error == 1
      for: 10m
      labels:
        severity: critical
        component: Backups
        team: mdapi
      annotations:
        summary: "Rancher backup {{ $labels.backup }} is in error state"
        description: "Most recent reconcile of Rancher Backup CR {{ $labels.backup }} reported an error condition. Check `kubectl get backup {{ $labels.backup }} -o yaml`."

    - alert: RancherBackupStale
      expr: rancher_backup_last_snapshot_age_seconds > 26 * 3600
      for: 30m
      labels:
        severity: warning
        component: Backups
        team: mdapi
      annotations:
        summary: "Rancher backup {{ $labels.backup }} last snapshot {{ $value | humanizeDuration }} ago"
        description: "Backup is configured for daily snapshots; last successful snapshot is older than 26h."

    - alert: RancherBackupNeverSnapshotted
      expr: rancher_backup_last_snapshot_age_seconds == -1
      for: 1h
      labels:
        severity: warning
        component: Backups
        team: mdapi
      annotations:
        summary: "Rancher backup {{ $labels.backup }} has no snapshot"
        description: "Backup CR exists but no snapshot has ever been recorded. Check schedule and storage location."

  - name: app-batch-jobs.config-backup
    rules:
    - alert: ConfigBackupTargetFailed
      expr: config_backup_target_success == 0
      for: 10m
      labels:
        severity: warning
        component: Backups
        team: mdapi
      annotations:
        summary: "Config backup of {{ $labels.target }} failed"
        description: "The daily config_backup job could not capture or upload config for {{ $labels.target }}. Check Windmill run logs."

  - name: app-batch-jobs.garage-offsite-backup
    rules:
    - alert: GarageOffsiteBackupFailing
      ## The job pushes success=0 when any (bucket × destination) pair
      ## fails. 30h dampening so a single missed nightly doesn't alert
      ## but two consecutive nights do.
      expr: garage_offsite_backup_success == 0
      for: 30h
      labels:
        severity: warning
        component: Backups
        team: mdapi
      annotations:
        summary: "Garage offsite backup: {{ with query \"garage_offsite_backup_pairs_failed\" }}{{ . | first | value }}{{ end }} of {{ with query \"garage_offsite_backup_pairs_ok + garage_offsite_backup_pairs_failed\" }}{{ . | first | value }}{{ end }} pairs failing for >30h"
        description: |
          One or more bucket -> destination pairs are failing on the nightly
          f/config_backup/garage_offsite_backup job (Windmill). Inspect the
          latest run for the failed-pair list and root cause; the typical
          culprit is harvester-backup -> b2 hitting the per-rclone timeout.

    - alert: GarageOffsiteBackupStale
      ## Catches the case where the script itself doesn't reach the
      ## Pushgateway push at all (e.g. worker OOMKilled mid-loop, or
      ## subprocess.TimeoutExpired propagating before the never-raise
      ## helper landed). Without this, the success/pairs gauges look
      ## fine because Pushgateway holds the last value forever.
      ## Nightly schedule is 02:00 UTC; 30h covers any single missed run
      ## plus normal clock drift without flapping.
      expr: time() - garage_offsite_backup_last_run_timestamp_seconds > 30 * 3600
      for: 1h
      labels:
        severity: warning
        component: Backups
        team: mdapi
      annotations:
        summary: "Garage offsite backup hasn't pushed metrics in >30h"
        description: |
          The garage_offsite_backup_last_run_timestamp_seconds gauge is older
          than 30 hours. Either the Windmill job is no longer being scheduled,
          or it's aborting before the Pushgateway PUT (worker OOM, unhandled
          exception, network failure to pushgateway). The Pushgateway holds
          stale gauges indefinitely, so the success/pairs gauges may LIE about
          recent state — trust this alert, not them.

  - name: app-batch-jobs.rackspace-spend
    rules:
    - alert: RackspaceSpendOverCap
      expr: rackspace_spot_proj_p50_usd_month > 100
      for: 30m
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "Rackspace Spot p50 projection ${{ $value | printf \"%.0f\" }}/mo exceeds $100"
        description: "Projected monthly cost at p50 prices exceeds the cap. Review pool sizes and bids."

  - name: app-batch-jobs.storage-health
    rules:
    - alert: StoragePoolUnhealthy
      expr: storage_pool_healthy == 0
      for: 5m
      labels:
        severity: critical
        component: Backups
        team: mdapi
      annotations:
        summary: "TrueNAS pool {{ $labels.nas }}/{{ $labels.pool }} is unhealthy"
        description: "ZFS pool {{ $labels.pool }} on {{ $labels.nas }} reports !healthy or status != ONLINE. Run midclt call pool.query on the host."

    - alert: StoragePoolNearFull
      expr: storage_pool_used_pct > 85
      for: 1h
      labels:
        severity: warning
        component: Backups
        team: mdapi
      annotations:
        summary: "TrueNAS pool {{ $labels.nas }}/{{ $labels.pool }} is {{ $value | printf \"%.0f\" }}% full"
        description: "ZFS pool capacity threshold reached. Prune snapshots or add disks."

    - alert: SynologyArrayDegraded
      expr: storage_synology_array_healthy == 0
      for: 5m
      labels:
        severity: critical
        component: Backups
        team: mdapi
      annotations:
        summary: "Synology {{ $labels.nas }}/{{ $labels.array }} mdraid degraded"
        description: "Linux mdraid array reports a missing/failed disk. Check /proc/mdstat on {{ $labels.nas }}."

    - alert: SynologyVolumeNearFull
      expr: storage_synology_volume_used_pct > 85
      for: 1h
      labels:
        severity: warning
        component: Backups
        team: mdapi
      annotations:
        summary: "Synology {{ $labels.nas }}{{ $labels.mount }} is {{ $value }}% full"
        description: "Synology data volume capacity threshold reached."

  - name: app-batch-jobs.bpir4
    rules:
    - alert: Bpir4WanDown
      expr: bpir4_wan_up == 0
      for: 5m
      labels:
        severity: critical
        component: Internet
        team: mdapi
      annotations:
        summary: "BPI-R4 WAN is down"
        description: "PPPoE WAN reports no IP. HA storm/PON automations may already be acting; this is the slow-cron-side confirmation."
    - alert: Bpir4OverlayNearFull
      expr: bpir4_overlay_used_pct > 80
      for: 1h
      labels:
        severity: warning
        component: Internet
        team: mdapi
      annotations:
        summary: "BPI-R4 /overlay is {{ $value }}% full"
        description: "Router overlay filesystem near full — config writes may fail."
    - alert: Bpir4LoadHigh
      expr: bpir4_load_1m > 2
      for: 1h
      labels:
        severity: warning
        component: Internet
        team: mdapi
      annotations:
        summary: "BPI-R4 load1 is {{ $value }}"
        description: "Sustained load on the router. Check page-pool / SFP storm sensors."
    - alert: Bpir4KernelErrors
      expr: bpir4_kernel_errors_count > 0
      for: 1h
      labels:
        severity: warning
        component: Internet
        team: mdapi
      annotations:
        summary: "BPI-R4 has {{ $value }} kernel error(s) in logread"
        description: "Recent logread output contains kernel error/oom/panic/oops lines. Inspect via boot-reason.sh / pstore."

  - name: app-batch-jobs.gitlab-backups
    rules:
    - alert: GitlabBackupStale
      expr: gitlab_backup_age_days > 1.1
      for: 30m
      labels:
        severity: warning
        component: Backups
        team: mdapi
      annotations:
        summary: "GitLab backup is {{ $value }}d old"
        description: "Newest object in gitlab-backups bucket is older than the 2-day threshold."
    - alert: GitlabRunnerPodNotReady
      expr: gitlab_runner_pod_ready < gitlab_runner_pod_desired
      for: 15m
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "GitLab runner pod {{ $value }} of desired ready"
        description: "Runner deployment in bootstrap ns not at full strength."
    - alert: GitlabGroupRunnersOffline
      expr: gitlab_group_runners_offline > 0
      for: 30m
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "{{ $value }} GitLab group runner(s) offline"
        description: "One or more group runners are not online. Check the runner host."

  - name: app-batch-jobs.cve-scan
    rules:
    - alert: NamespaceWithCriticalCves
      ## Aggregated from per-image to per-namespace on 2026-05-14: with
      ## ~50 :latest upstream images flagged, the per-image variant was
      ## producing 50+ info entries in the AM UI for the same generic
      ## "an upstream image has CVEs" condition. The data is still
      ## queryable per-image via `pod_image_cve_count{severity="critical"}`;
      ## this rule just collapses the alert surface.
      ##
      ## 2026-07-10: restricted to fix_state="fixed" — criticals with an
      ## upstream package fix released. Unfixed criticals (wont-fix /
      ## not-fixed / unknown) are excluded: nothing to act on. They stay
      ## queryable via fix_state="unfixed"; wont-fix suppressions for our
      ## own images flow through the grype curator MRs, upstream-image
      ## suppressions via fleet/security/grype-cluster-ignore.yaml.
      ##
      ## Joins the scan output (image-keyed) with kube_pod_container_info
      ## (namespace+image keyed) so we can group_left a namespace onto
      ## each vulnerable image. Result: one alert per namespace, value =
      ## count of distinct images with fixable critical CVEs in that
      ## namespace.
      expr: |
        count by (namespace) (
          group by (namespace, image) (
            kube_pod_container_info
            * on (image) group_left()
            (pod_image_cve_count{severity="critical",fix_state="fixed"} > 0)
          )
        )
      for: 30m
      labels:
        severity: info
        component: Platform
        team: mdapi
      annotations:
        summary: "{{ $labels.namespace }}: {{ $value }} image(s) with fixable critical CVE(s)"
        description: |
          Most recent grype scan flagged {{ $value }} image(s) in
          namespace `{{ $labels.namespace }}` with at least one CRITICAL
          CVE whose fix is already released upstream (fix_state="fixed").

          Drill in:
            pod_image_cve_count{severity="critical",fix_state="fixed"} > 0
          and join with kube_pod_container_info on `image` to see which
          pods are affected. Mitigations: bump the pinned version
          (Renovate usually has the MR), refresh :latest via Keel/rebuild,
          or for our own images bump the base image. Unfixed criticals
          are intentionally excluded (fix_state="unfixed" to inspect).

  - name: app-batch-jobs.cluster-waste
    rules:
    - alert: ClusterPendingPodsTooLong
      expr: cluster_pending_pods_count > 0
      for: 1h
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "{{ $value }} pod(s) Pending > 60min"
        description: "User workloads stuck in Pending. Check scheduler events / resource pressure / PVC bind."
    - alert: ClusterUnknownNodeAutoDeleted
      ## info: the heal already removed the ghost node when this fires —
      ## record of automation acting, not a pending problem. A node that
      ## fails to re-join surfaces through the etcd-quorum / node alerts.
      expr: cluster_unknown_nodes_deleted_this_run > 0
      labels:
        severity: info
        component: Platform
        team: mdapi
      annotations:
        summary: "Auto-deleted {{ $value }} Unknown-state node(s)"
        description: "resource_waste.py removed nodes stuck in NotReady > 15min. New nodes should re-join automatically."
    - alert: ClusterReleasedPVsOrphaned
      ## A PVC was deleted but its PV stayed Released because
      ## reclaimPolicy=Retain — the PV (and, for Longhorn, the backing
      ## volume) keeps consuming disk. 1h `for:` rides out normal PVC churn.
      expr: cluster_released_pvs_count > 0
      for: 1h
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "{{ $value }} PV(s) orphaned in Released state"
        description: |
          PersistentVolume(s) left in Released phase — the bound PVC was
          deleted but reclaimPolicy=Retain kept the PV, and for Longhorn the
          backing volume too, which keeps consuming disk. See the
          f/heal/resource_waste Windmill run log for the PV names.
          Clean up: `kubectl delete pv <name>` and, for Longhorn,
          `kubectl -n longhorn-system delete volumes.longhorn.io <name>`.

  - name: app-batch-jobs.image-builder-health
    rules:
    - alert: GitlabImageBuilderSilent
      ## Each non-archived mdapi/* image-builder is on a 4-hourly schedule
      ## (6 pipelines / 24h). The detection script pushes the per-project
      ## count daily; this fires when a project drops below 4 — late enough
      ## that one missed run doesn't alert, early enough that two missed
      ## runs do.
      ## `unless schedule_recent`: a schedule created < 26h ago can't have
      ## put 4 runs in the window yet — that recovery/warm-up phase fires
      ## as the info tier below instead (mdapi/portal, 2026-07-08: fix
      ## deployed at 22:00 but the warning kept firing ~20h more).
      expr: gitlab_image_builder_pipelines_24h{job="gitlab_image_builder_health"} < 4 unless on(project) gitlab_image_builder_schedule_recent{job="gitlab_image_builder_health"} == 1
      for: 30h
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "GitLab project mdapi/{{ $labels.project }} only ran {{ $value }} pipelines in last 24h"
        description: |
          A 4-hourly image-builder schedule appears to have stopped firing.
          Check https://gitlab.mdapi.ch/mdapi/{{ $labels.project }}/-/pipeline_schedules
    - alert: GitlabImageBuilderSilent
      ## Same low count but the active 4h schedule is < 26h old — it hasn't
      ## had time to fire 4 times. Warming up, self-solving; once the
      ## schedule ages past 26h the recent flag drops and, if the count is
      ## still < 4 (scheduled pipelines failing/not firing), the warning
      ## tier above takes over automatically.
      expr: gitlab_image_builder_pipelines_24h{job="gitlab_image_builder_health"} < 4 and on(project) gitlab_image_builder_schedule_recent{job="gitlab_image_builder_health"} == 1
      for: 30m
      labels:
        severity: info
        component: Platform
        team: mdapi
      annotations:
        summary: "GitLab project mdapi/{{ $labels.project }} at {{ $value }} pipelines/24h — schedule freshly created, warming up"
        description: |
          The project's 4-hourly schedule was created less than 26h ago, so
          the 24h pipeline window can't contain 4 runs yet. No action needed;
          escalates to warning if the count is still low after the schedule
          matures.
          (full detection logic in Windmill: f/probe/gitlab_image_builder_health).

    - alert: GitlabImageBuilderNoSchedule
      ## A non-archived mdapi/* project with Dockerfile+.gitlab-ci.yml but
      ## NO active 4-hourly pipeline schedule. Day-one signal for a newly
      ## created builder repo: push activity during initial development
      ## keeps pipelines_24h >= 4, masking the missing schedule from
      ## GitlabImageBuilderSilent until development stops (mdapi/portal,
      ## created 2026-06-30, only surfaced as "silent" on 07-06).
      expr: gitlab_image_builder_projects_no_schedule{job="gitlab_image_builder_health"} > 0
      for: 30m
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "{{ $value }} GitLab image-builder project(s) have no 4-hourly schedule"
        description: |
          The offending project list is the `no_schedule` field in the latest
          Windmill run result of f/probe/gitlab_image_builder_health. Fix by
          creating a pipeline schedule on the project: canonical description
          'Every 4h at minute X hour-base Y', a cron minute/hour-base slot not
          used by any other project (the probe log prints the full cron map),
          ref=main, active. Or add the project to the probe's EXCLUDE set if
          4-hourly rebuilds are genuinely not wanted.

    - alert: GitlabImageBuilderScheduleCollision
      ## Two image-builders sharing the same cron minute = unnecessary runner
      ## contention. The detection script publishes the count of colliding
      ## cron strings; >0 means at least one minute slot is over-subscribed.
      expr: gitlab_image_builder_schedule_collisions{job="gitlab_image_builder_health"} > 0
      for: 30m
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "{{ $value }} GitLab image-builder schedule(s) collide on the same cron minute"
        description: |
          Two or more mdapi/* projects use the same `<M> <H> * * *` schedule.
          Inspect the latest Windmill run of f/probe/gitlab_image_builder_health
          for the `schedule_collisions` field listing the offenders.

    - alert: GitlabImageBuilderDescriptionDrift
      ## A pipeline schedule's human-readable description has drifted from
      ## its cron (e.g. cron moved to minute 25 but description still says
      ## "minute 0"). The probe pushes the canonical-template comparison
      ## per project; this aggregates and waits 1 day before alerting --
      ## a same-day fix shouldn't trip it.
      expr: gitlab_image_builder_description_drift_total{job="gitlab_image_builder_health"} > 0
      for: 24h
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "{{ $value }} GitLab image-builder schedule(s) have stale descriptions"
        description: |
          One or more mdapi/* pipeline schedules have descriptions that no
          longer match their cron expression. The canonical template is
          'Every 4h at minute X hour-base Y'. Inspect the latest Windmill
          run of f/probe/gitlab_image_builder_health for the full
          drift list (project, current desc, expected desc).

    - alert: GitlabCIBulkFailure
      ## When a single root cause cascades to many CI pipelines (e.g. the
      ## 2026-05-23 'secret-scan untagged -> stuck_or_timeout_failure' that
      ## broke 25 unrelated mdapi/* projects), surface it as ONE alert keyed
      ## on (job_name, failure_reason) instead of N look-alike per-project
      ## warnings. Routed to General -> Pushover only; deliberately NOT
      ## component=GitLab to avoid the statuspage-degrade trap (CI failures
      ## don't always mean the GitLab service is degraded).
      expr: gitlab_ci_failures_grouped{job="gitlab_ci_failure_groupby"} >= 5
      for: 30m
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "GitLab CI: {{ $value }} mdapi/* projects failing at {{ $labels.job_name }} / {{ $labels.failure_reason }}"
        description: |
          A single root cause is cascading across multiple mdapi/* projects:
          {{ $value }} projects failed in the last 24h at the same job
          ({{ $labels.job_name }}) for the same reason ({{ $labels.failure_reason }}).
          Inspect the latest Windmill run of f/probe/gitlab_ci_failure_groupby
          for the full project list + a sample pipeline URL.

  - name: app-batch-jobs.waf-audit
    rules:
    - alert: WafCarveoutRegression
      ## A WAF rule that was carved out by a Fleet ingress
      ## modsecurity-snippet (921250/932160 on idp OIDC, 934110 on oauth2,
      ## 942290 on Graph API) registered a 403 in the last 24h.  Either
      ## the carveout regex no longer covers a new path variant, the
      ## Fleet ingress drifted, or a novel attack matches the same rule
      ## outside the carveout scope.  All three are worth a look.
      expr: waf_carveout_blocks{job="waf_novelty_audit"} > 0
      for: 0m
      labels:
        severity: warning
        component: Platform
        subsystem: waf
        team: mdapi
      annotations:
        summary: "WAF carveout-protected rule {{ $labels.rule }} fired {{ $value }}x in 24h"
        description: |
          Run `/waf-audit` and check the live Ingress annotation against
          the relevant fleet file (e.g. ~/fleet/keycloak/keycloak-ing.yml
          for rules 921250/932160). Steady-state count is 0.

    - alert: WafNoveltyDetected
      ## Novelty surfaced by f/probe/waf_novelty_audit: a new
      ## (host, matched_rules) combination, a new host in the WAF
      ## top-20, or >=10x deviation on an existing combination.  Most
      ## days this is zero; when it fires, a human needs to classify
      ## the rows.
      expr: waf_novelty_signals{job="waf_novelty_audit"} > 0
      for: 0m
      labels:
        severity: info
        component: Platform
        subsystem: waf
        team: mdapi
      annotations:
        summary: "WAF novelty audit surfaced {{ $value }} new signal(s)"
        description: |
          Run `/waf-audit` to classify each row as scanner / attack /
          false positive. The novelty list is in the latest Windmill
          run output of f/probe/waf_novelty_audit.

    - alert: WafNoveltyAuditStale
      ## The cron is scheduled daily 06:00 UTC; 25h with no fresh
      ## timestamp means the run silently failed or the schedule was
      ## disabled.
      expr: time() - waf_audit_last_run_timestamp_seconds{job="waf_novelty_audit"} > 90000
      for: 30m
      labels:
        severity: warning
        component: Platform
        subsystem: waf
        team: mdapi
      annotations:
        summary: "WAF novelty audit has not run in {{ $value | humanizeDuration }}"
        description: |
          Check the Windmill schedule f/probe/waf_novelty_audit
          and the last job status.

  - name: app-batch-jobs.upgrade
    rules:
    - alert: ComponentUpgradeAvailable
      ## info-only — surfaces upgrade availability so it appears as an
      ## AM-tracked alert (firing + resolved) rather than a one-shot
      ## Monday-morning Pushover that needs manual triage.
      expr: component_upgrade_available == 1
      for: 30m
      labels:
        severity: info
        component: Platform
        team: mdapi
      annotations:
        summary: "{{ $labels.component }} upgrade available"
        description: "{{ $labels.component }} has a newer same-minor release. Plan an upgrade window."

  - name: app-batch-jobs.host-updates
    rules:
    - alert: HostUpdateAvailable
      expr: host_update_available == 1
      for: 30m
      labels:
        severity: info
        component: Platform
        team: mdapi
      annotations:
        summary: "{{ $labels.host }} ({{ $labels.kind }}) has updates available"
        description: "Schedule an update window for {{ $labels.host }}."

  - name: app-batch-jobs.longhorn-labels
    rules:
    - alert: LonghornLabelEnforcerPatched
      ## Fires when a run actually patched labels — signals that a new
      ## PVC appeared without the recurring-job labels. Tells you the
      ## platform default is missing on a newly created workload.
      expr: longhorn_label_enforcer_pvcs_patched > 0
      labels:
        severity: info
        component: Backups
        team: mdapi
      annotations:
        summary: "Longhorn label enforcer patched {{ $value }} PVC(s)"
        description: "New PVC(s) appeared without the standard recurring-job labels. The enforcer added them; consider where the default should live (Helm chart? Operator?)."
    - alert: LonghornLabelEnforcerErrors
      expr: longhorn_label_enforcer_pvcs_errors > 0
      for: 10m
      labels:
        severity: warning
        component: Backups
        team: mdapi
      annotations:
        summary: "Longhorn label enforcer had {{ $value }} error(s)"
        description: "Enforcer failed to patch labels on one or more PVCs. Check the Windmill run."

  - name: app-batch-jobs.infra-health
    rules:
    - alert: FleetBundlesNotReady
      ## Since 2026-07-03 the gauge is split per fleet cluster (daily_infra_health
      ## emits cluster="mdapi"|"local"|...) so breakage on one cluster can't hide
      ## new breakage on another. One alert fires per cluster.
      ## (The c-rackspacetest2 exclusion was removed 2026-07-06 when that cluster
      ## was decommissioned — it was only there to mute its terminal phantom
      ## bundle state.)
      expr: fleet_bundle_deployments_not_ready > 0
      for: 30m
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "{{ $value }} Fleet BundleDeployment(s) not Ready on {{ $labels.cluster }}"
        description: "Check via `kubectl --context mdapi-rancher get bundledeployments -A | grep -v Ready`."
    - alert: CertExpiringSoon
      ## Warning only when cert-manager has NO future renewalTime (or the
      ## scheduled renewal has passed and the cert still hasn't rotated) —
      ## i.e. nothing is going to fix this by itself. Until the probe pushes
      ## cert_renewal_scheduled (deployed 2026-07-09), `unless` matches
      ## nothing and this behaves like the old unconditional rule.
      expr: cert_expiry_days < 30 unless on(namespace, cert) cert_renewal_scheduled == 1
      for: 1h
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "Cert {{ $labels.namespace }}/{{ $labels.cert }} expires in {{ $value }}d"
        description: "cert-manager Certificate close to expiry with no future renewalTime; investigate renewal."
    - alert: CertExpiringSoon
      ## Same window but a future renewalTime exists — rotation is planned.
      ## 47d horizon-private certs (aruba-apin*) renew ~16d before expiry, so
      ## they spend ~14d of every cycle inside the 30d window. FYI only.
      expr: cert_expiry_days < 30 and on(namespace, cert) cert_renewal_scheduled == 1
      for: 1h
      labels:
        severity: info
        component: Platform
        team: mdapi
      annotations:
        summary: "Cert {{ $labels.namespace }}/{{ $labels.cert }} expires in {{ $value }}d (renewal scheduled)"
        description: "cert-manager has a future renewalTime for this Certificate; rotation is planned. Escalates to warning automatically if the scheduled renewal passes without rotation."
    - alert: LonghornBackupStale
      # 40d (was 70d): the recurring `default` group backs up monthly (1st of
      # month), so a healthy volume maxes ~31-35d before its next run. 70d only
      # caught volumes that had already missed TWO cycles — when the May/June
      # partial runs left ~37 volumes a full cycle behind, none of them alerted.
      # 40d catches a single missed monthly cycle while leaving margin for a
      # run that starts a few days late. (Weekly-group volumes are far tighter
      # in practice; a per-group threshold needs the group label on the metric.)
      expr: longhorn_backup_age_days > 40
      for: 1h
      labels:
        severity: warning
        component: Backups
        team: mdapi
      annotations:
        summary: "Longhorn backup {{ $labels.namespace }}/{{ $labels.pvc }} is {{ $value }}d old"
        description: "PVC backup older than the 40d staleness threshold (monthly policy)."
    - alert: LonghornBackupMissing
      expr: longhorn_backup_age_days == -1
      for: 1d
      labels:
        severity: warning
        component: Backups
        team: mdapi
      annotations:
        summary: "Longhorn backup {{ $labels.namespace }}/{{ $labels.pvc }} never recorded"
        description: "BackupVolume exists but lastBackupAt is empty. Check Longhorn recurring jobs."
    - alert: LonghornVolumeUnhealthy
      expr: longhorn_volume_unhealthy == 1
      for: 15m
      labels:
        severity: critical
        component: Backups
        team: mdapi
      annotations:
        summary: "Longhorn volume {{ $labels.namespace }}/{{ $labels.pvc }} unhealthy"
        description: "Robustness != healthy or state in (faulted, error)."
    - alert: NodeDiskHigh
      expr: node_disk_used_pct > 80
      for: 1h
      labels:
        severity: warning
        component: Backups
        team: mdapi
      annotations:
        summary: "{{ $labels.node }}:{{ $labels.mount }} is {{ $value }}% full"
        description: "Node filesystem usage > 80%. Investigate growth source."

  - name: app-batch-jobs.schedule-integrity
    ## Gauges pushed by f/probe/schedule_integrity_check every hour
    ## (cron 0 42 * * * * Europe/Zurich). The script holds an embedded
    ## REQUIRED_SCHEDULES manifest; drift surfaces as schedule_integrity_*
    ## gauges per offending schedule path.
    ##
    ## Built after the 2026-05-29 incident where `wmill sync push`
    ## archived gitlab_ci_failure_groupby_schedule + waf_novelty_audit_schedule
    ## silently — only discovered ~30h later via stale-data alerts firing on
    ## the upstream metrics. See memory:
    ## feedback-wmill-sync-push-deletes-orphans.
    ##
    ## Staleness of THIS check itself is already covered by the generic
    ## BatchJobStale rule above (job=schedule_integrity_check joins with
    ## windmill_schedule_interval_seconds).
    rules:
    - alert: WindmillRequiredScheduleMissing
      expr: schedule_integrity_missing > 0
      for: 10m
      labels:
        severity: critical
        component: Platform
        team: mdapi
      annotations:
        summary: "Windmill required schedule {{ $labels.path }} is missing"
        description: |
          The schedule_integrity_check (f/probe/schedule_integrity_check)
          asserts {{ $labels.path }} is required. It is absent from the
          Windmill workspace — the classic `wmill sync push` orphan-archive
          pattern.

          Restore via Windmill UI or `mcp__windmill__createSchedule` using the
          definition embedded in the script's REQUIRED_SCHEDULES list. Also
          ensure `.schedule.yaml` exists locally under ~/windmill/ so the
          next sync push does not re-orphan it.

    - alert: WindmillRequiredScheduleDisabled
      expr: schedule_integrity_disabled > 0
      for: 1h
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "Windmill required schedule {{ $labels.path }} is disabled"
        description: |
          The schedule exists but enabled=false. Either intentionally paused
          (in which case remove from REQUIRED_SCHEDULES) or accidentally
          toggled off in the UI.

    - alert: WindmillRequiredScheduleDrifted
      expr: schedule_integrity_drifted > 0
      for: 30m
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "Windmill required schedule {{ $labels.path }} drifted: {{ $labels.reason }}"
        description: |
          The schedule exists and is enabled, but its script_path / cron /
          timezone no longer matches the embedded manifest. Either the
          manifest is stale (intentional change — update REQUIRED_SCHEDULES
          and redeploy) or someone edited the wrong field via the UI.

  - name: app-batch-jobs.chassis-health
    ## Gauges pushed by f/probe/chassis_health every 15 min. Reads
    ## ipmitool chassis status + sel info + sdr elist over SSH on the 5
    ## bare-metal hosts (qui/quo/qua HPE + salt/pepper IBM TrueNAS).
    ##
    ## Component=Platform on purpose: per the statuspage adapter map, the
    ## Platform component now explicitly covers physical server hardware
    ## (chassis health, IPMI sensors). See memory:
    ## ipmi_sel_clearing_bmc_reset_operational_pattern_2026_05_28.
    rules:
    - alert: ChassisFault
      expr: chassis_fault == 1
      for: 10m
      labels:
        severity: critical
        component: Platform
        team: mdapi
      annotations:
        summary: "chassis fault asserted on {{ $labels.host }} ({{ $labels.type }})"
        description: |
          ipmitool chassis status reports {{ $labels.type }} fault asserted on
          {{ $labels.host }}. Investigate immediately — drive/cooling/power
          faults are real hardware events. Note: HPE qui/quo/qua Sys. Health
          LED is permanently amber from non-HP-authenticated drive; that
          cosmetic state does NOT trigger this alert.
    - alert: ChassisSelNearFull
      expr: chassis_sel_pct >= 80
      for: 30m
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "{{ $labels.host }} IPMI SEL is {{ $value }}% full"
        description: |
          The IPMI System Event Log on {{ $labels.host }} is filling up. On
          IBM IMM-class boards (salt/pepper), the SEL is capped at 512
          entries and stops accepting new events at 100% — masking future
          hardware faults. Clear with sudo ipmitool sel clear.
    - alert: ChassisSdrAnomaly
      expr: chassis_sdr_not_ok > 0
      for: 30m
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "{{ $labels.host }} has {{ $value }} non-OK SDR sensor(s)"
        description: |
          ipmitool sdr elist reports at least one sensor whose state is not
          "ok" or "ns/Disabled" on {{ $labels.host }}. Run `sudo ipmitool sdr
          elist | grep -Ev '\| ok '` on the host to identify the sensor and
          its current reading.
    - alert: ChassisHostUnreachable
      expr: chassis_unreachable == 1
      for: 30m
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "chassis_health cannot reach {{ $labels.host }}"
        description: |
          SSH or ipmitool failed for {{ $labels.host }} for over 30m. Could be
          host down, BMC wedged, SSH key drift, or sudo permission change.
          Cross-check with node Ready and blackbox probes before assuming
          hardware fault.
    - alert: ChassisHealthStale
      expr: time() - chassis_health_last_run_timestamp_seconds > 3600
      for: 15m
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "f/probe/chassis_health has not run in over an hour"
        description: |
          The Windmill chassis_health job (every 15m) has not pushed metrics
          for more than an hour. Check Windmill schedule and worker pods.

  - name: app-batch-jobs.cert-discovery
    ## f/probe/k8s_cert_discovery (hourly, 0 23 * * * * UTC) enumerates
    ## every kubernetes.io/tls secret across local/prod/test (via the Rancher
    ## proxy) and feeds each cert into Horizon's `kubernetes` discovery campaign
    ## (POST /api/v1/discovery/feed; 201=new cert, 204=already known — both are
    ## success, so steady-state errors=0). Complements the netscan network
    ## CronJob (which sees served endpoints, not in-cluster Secrets).
    ##
    ## Staleness is already covered by the generic BatchJobStale rule above:
    ## the pushed `k8s_cert_discovery_last_run_timestamp_seconds` (job label
    ## `k8s_cert_discovery`, = basename of the script path) joins
    ## `windmill_schedule_interval_seconds` (published daily by
    ## schedule_cadence_map) and fires at 2× the interval (hourly → ~2h).
    rules:
    - alert: K8sCertDiscoveryFeedErrors
      ## >0 only when feeds get non-2xx / exceptions (auth broken, cert
      ## unparseable, or Horizon unreachable). 2h `for:` = two consecutive
      ## hourly runs must fail, so a single transient run self-clears (the
      ## next run overwrites the gauge to 0) without alerting.
      expr: k8s_cert_discovery_errors{job="k8s_cert_discovery"} > 0
      for: 2h
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "k8s cert discovery: {{ $value }} cert(s) failed to feed into Horizon"
        description: |
          The hourly f/probe/k8s_cert_discovery job got non-2xx responses
          (or exceptions) feeding certs into Horizon's `kubernetes` discovery
          campaign for >2h (two runs). 201/204 are both success, so this is a
          real fault — Horizon down/unreachable from the worker, the
          horizon-discovery key rotated, or unparseable certs. Check the latest
          run log at https://windmill.mdapi.ch (it prints the first 15 failing
          cluster/namespace/secret + HTTP status).

  - name: app-batch-jobs.horizon-license
    ## f/probe/horizon_license_usage (hourly) publishes the total Horizon
    ## certificate count vs the clm.<N> license cap (decoded live from the
    ## horizon-license secret). The discovery jobs (netscan + k8s_cert_discovery)
    ## keep growing the count, so warn BEFORE the cap blocks issuance/import.
    ## Staleness is covered by the generic BatchJobStale rule (job label
    ## horizon_license_usage = script basename).
    rules:
    - alert: HorizonCertCountApproachingLicense
      expr: horizon_license_certificate_used_ratio{job="horizon_license_usage"} > 0.8
      for: 1h
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "Horizon CLM license {{ $value | humanizePercentage }} used"
        description: |
          Horizon holds {{ with query "horizon_certificate_count{job='horizon_license_usage'}" }}{{ . | first | value }}{{ end }} of {{ with query "horizon_license_certificate_limit{job='horizon_license_usage'}" }}{{ . | first | value }}{{ end }} licensed CLM certificates (>80%).
          The discovery jobs (netscan, k8s_cert_discovery) keep adding certs; at
          100% Horizon refuses new issuance/import. Raise the license (clm.N) or
          prune discovered certs. Source: f/probe/horizon_license_usage.
    - alert: HorizonCertCountNearLicenseLimit
      expr: horizon_license_certificate_used_ratio{job="horizon_license_usage"} > 0.95
      for: 30m
      labels:
        severity: critical
        component: Platform
        team: mdapi
      annotations:
        summary: "Horizon CLM license {{ $value | humanizePercentage }} used — near cap"
        description: |
          Horizon is within 5% of its CLM certificate cap
          ({{ with query "horizon_certificate_count{job='horizon_license_usage'}" }}{{ . | first | value }}{{ end }}/{{ with query "horizon_license_certificate_limit{job='horizon_license_usage'}" }}{{ . | first | value }}{{ end }}).
          Issuance/import is blocked at 100% — install a larger license (clm.N) or
          prune certificates now.

  - name: app-batch-jobs.stream-license
    ## f/probe/stream_license_usage (hourly) publishes Stream's total X509
    ## certificate count vs the stream-ca.<N> license cap (decoded live from the
    ## stream-license secret). Mirrors the Horizon CLM alert. Staleness covered by
    ## the generic BatchJobStale rule (job label stream_license_usage).
    rules:
    - alert: StreamCertCountApproachingLicense
      expr: stream_license_certificate_used_ratio{job="stream_license_usage"} > 0.8
      for: 1h
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "Stream CA license {{ $value | humanizePercentage }} used"
        description: |
          Stream holds {{ with query "stream_certificate_count{job='stream_license_usage'}" }}{{ . | first | value }}{{ end }} of {{ with query "stream_license_certificate_limit{job='stream_license_usage'}" }}{{ . | first | value }}{{ end }} licensed certificates (stream-ca, >80%).
          At 100% the CAs refuse new issuance. Raise the Stream license (stream-ca.N)
          or revoke/prune certs. Source: f/probe/stream_license_usage.
    - alert: StreamCertCountNearLicenseLimit
      expr: stream_license_certificate_used_ratio{job="stream_license_usage"} > 0.95
      for: 30m
      labels:
        severity: critical
        component: Platform
        team: mdapi
      annotations:
        summary: "Stream CA license {{ $value | humanizePercentage }} used — near cap"
        description: |
          Stream is within 5% of its stream-ca certificate cap
          ({{ with query "stream_certificate_count{job='stream_license_usage'}" }}{{ . | first | value }}{{ end }}/{{ with query "stream_license_certificate_limit{job='stream_license_usage'}" }}{{ . | first | value }}{{ end }}).
          CA issuance is blocked at 100% — install a larger Stream license now.

  - name: app-batch-jobs.image-policy
    rules:
    ## Source: f/probe/image_policy_lint (Windmill, daily 05:20 Zurich) —
    ## the 2-lane pull-policy convention from the 2026-06-06 postmortem (A2).
    ## Lane A = floating tag + Always + keel annotation (apps).
    ## Lane B = pinned tag + IfNotPresent, Renovate-driven (bootstrap-critical).
    ## The lint job group is fully replaced on every push, so a fixed violation
    ## clears the alert on the next daily run.
    - alert: ImagePolicyFail
      expr: max(image_policy_fail_total) > 0
      for: 2h
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "{{ $value }} image-policy FAIL violation(s) — bootstrap-critical off Lane B or un-updatable image"
        description: |
          The image-policy lint found FAIL-class violations: a bootstrap-critical
          workload off Lane B (pinned+IfNotPresent), or floating+IfNotPresent
          (can never update). This is the cold-bootstrap deadlock class from the
          2026-06-06 postmortem.
          Targets: {{ range query "image_policy_violation{severity='fail'} == 1" }}{{ .Labels.target }} ({{ .Labels.image }}); {{ end }}
          Fix the fleet manifest per lane, or update the lint's CRITICAL/ALLOW sets.

    - alert: ImagePolicyWarn
      ## 50h = two daily lint runs must confirm, so a short-lived experiment or
      ## a workload deployed minutes before the lint doesn't page.
      expr: max(image_policy_warn_total) > 0
      for: 50h
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "{{ $value }} image-policy WARN violation(s) for >2 days — workload with no updater driving it"
        description: |
          WARN-class lint violations persisting across daily runs: floating+Always
          with NO keel annotation (nothing updates it — how the akeyless-pg-bridge
          wireguard sat unnoticed), pinned+Always (boot-fragile), or unclassified.
          Targets: {{ range query "image_policy_violation{severity='warn'} == 1" }}{{ .Labels.target }} ({{ .Labels.image }}); {{ end }}
          Put each on a lane: add keel.sh annotations (Lane A) or pin + IfNotPresent
          under Renovate (Lane B).

    - alert: KeelUpdatesSilent
      ## keel_updates_7d comes from f/probe/keel_update_log (weekly Mon
      ## 07:55). Several keel-managed images rebuild at least weekly
      ## (linuxserver), so 3+ weeks of zero audit events across the whole fleet
      ## means keel itself is likely broken (registry polling, auth, approvals
      ## stuck) even though every workload annotation looks correct. The second
      ## clause gates on >=20 days of metric history so a freshly-created gauge
      ## can't fire this prematurely.
      expr: |
        max_over_time(keel_updates_7d[22d]) == 0
        and (time() - min_over_time(keel_update_log_last_run_timestamp_seconds[22d])) > 20 * 86400
      for: 6h
      labels:
        severity: warning
        component: Platform
        team: mdapi
      annotations:
        summary: "Keel has performed zero updates for 3+ weeks — updater likely dead"
        description: |
          No Keel audit events for three consecutive weekly reports. Lane-A
          workloads (floating+Always+keel) silently stop updating when keel is
          broken; the image-policy lint cannot see this (annotations still look
          right). Check the keel pod logs, registry reachability (lscr.io,
          docker.io), and any stuck approvals.
