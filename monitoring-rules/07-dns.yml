apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-dns
  namespace: monitoring
spec:
  groups:
  - name: app-dns.workload
    rules:
    - alert: TechnitiumUnavailable
      expr: |
        ( kube_deployment_spec_replicas{
            namespace="technitium", deployment="technitium"
          }
          - kube_deployment_status_replicas_available{
            namespace="technitium", deployment="technitium"
          }
        ) > 0
      for: 3m
      labels:
        severity: critical
        component: DNS
        team: mdapi
      annotations:
        summary: "technitium/technitium: {{ $value }} replicas unavailable"
        description: |
          DNS server is down. dns.mdapi.ch will not resolve. Recursive DNS
          fallback applies for cluster-internal queries via coredns, but
          public/external resolution from clients pointed at dns.mdapi.ch
          breaks immediately.

    - alert: TechnitiumPodCrashLooping
      expr: |
        max by (namespace, pod, container) (
          rate(kube_pod_container_status_restarts_total{
            namespace="technitium", pod=~"technitium-.*"
          }[15m]) * 60
        ) > 0.5
      for: 10m
      labels:
        severity: warning
        component: DNS
        team: mdapi
      annotations:
        summary: "{{ $labels.namespace }}/{{ $labels.pod }} restarting frequently"

    - alert: TechnitiumNotifyRefused
      expr: technitium_notify_refused_log_5m > 0
      for: 10m
      labels:
        severity: warning
        component: DNS
        team: mdapi
      annotations:
        summary: "Technitium primary→secondary NOTIFY refused ({{ $value }} in last 5m)"
        description: |
          Primary's DNS NOTIFY is being refused by the secondary. Zone changes
          (incl. DHCP-driven A/PTR updates) will only propagate on SOA refresh
          (15min), causing stale records on the secondary.
          Check secondary's notifyAllowedNetworks setting (must include pod CIDR).

    - alert: TechnitiumNotifyFailedZones
      expr: technitium_notify_failed_zones{instance="primary"} > 0
      for: 15m
      labels:
        severity: warning
        component: DNS
        team: mdapi
      annotations:
        summary: "Technitium primary has {{ $value }} zones with NOTIFY failures"
        description: |
          Zones flagged notifyFailed=true on primary. Replication to secondary
          may be lagging up to SOA refresh interval.

    - alert: TechnitiumZoneCountMismatch
      expr: |
        abs(
          technitium_zone_count{instance="primary"}
          - on() technitium_zone_count{instance="secondary"}
        ) > 1
      for: 30m
      labels:
        severity: warning
        component: DNS
        team: mdapi
      annotations:
        summary: "Technitium primary/secondary zone count differs by {{ $value }}"
        description: |
          Number of zones on primary vs secondary diverged for >30m. Check
          secondary's AXFR pull from primary and notifyAllowedNetworks ACL.

    - alert: TechnitiumZoneListDrift
      ## Catches the case TechnitiumZoneCountMismatch misses: same total but
      ## different sets (one zone dropped on a side, another added) — e.g.
      ## the 77.168.192.in-addr.arpa reverse-zone drift surfaced in the
      ## 2026-05-17 DNS audit. Source: Windmill technitium_zone_diff,
      ## scheduled 03:15 Zurich nightly.
      expr: (technitium_zone_diff_primary_only + technitium_zone_diff_secondary_only) > 0
      for: 30m
      labels:
        severity: warning
        component: DNS
        team: mdapi
      annotations:
        summary: "Technitium zone-list drift: {{ $value }} zones differ between pods"
        description: |
          Primary and secondary disagree on which zones exist. Run the
          technitium_zone_diff Windmill script to see which side has what;
          most likely fix is adding the missing zone as Secondary on the
          pod that lacks it (or Catalog Zone if you have appetite for the
          structural fix).

    - alert: TechnitiumZoneDiffStale
      expr: time() - technitium_zone_diff_last_run_timestamp_seconds > 172800
      for: 1h
      labels:
        severity: warning
        component: DNS
        team: mdapi
      annotations:
        summary: "Technitium zone-diff probe stale ({{ $value | humanizeDuration }})"
        description: |
          Windmill technitium_zone_diff hasn't successfully pushed in >48h.
          The zone-list drift alert is silently broken until this resolves.

    - alert: DNSSECRRSIGNearExpiry
      ## Earliest DNSKEY RRSIG signature expiry per signed zone. Source:
      ## Windmill dnssec_rrsig_expiry, scheduled 06:30 Zurich daily.
      ## 9 owned signed zones tracked (5 in-house BIND9 + 4 Infomaniak).
      expr: dnssec_rrsig_expiry_seconds < 7 * 24 * 3600 and dnssec_rrsig_expiry_seconds >= 0
      for: 1h
      labels:
        severity: warning
        component: DNS
        team: mdapi
      annotations:
        summary: "DNSSEC RRSIG for {{ $labels.zone }} expires in {{ $value | humanizeDuration }}"
        description: |
          The earliest DNSKEY RRSIG for {{ $labels.zone }} will expire in
          less than 7 days. Roll the signing key (in-house: BIND9 inline
          re-sign; Infomaniak: automatic but re-validate after).

    - alert: DNSSECRRSIGExpired
      expr: dnssec_rrsig_expiry_seconds < 0
      for: 10m
      labels:
        severity: critical
        component: DNS
        team: mdapi
      annotations:
        summary: "DNSSEC RRSIG for {{ $labels.zone }} has expired"
        description: |
          Resolvers doing DNSSEC validation will return SERVFAIL for
          {{ $labels.zone }}. Re-sign the zone immediately.

    - alert: DNSSECRRSIGLookupFailing
      expr: dnssec_rrsig_lookup_ok == 0
      for: 1h
      labels:
        severity: warning
        component: DNS
        team: mdapi
      annotations:
        summary: "DNSSEC DNSKEY lookup failing for {{ $labels.zone }}"
        description: |
          dig DNSKEY against 9.9.9.9 returned no RRSIG for {{ $labels.zone }}
          for >1h. Either DNSSEC was disabled at the zone, the zone is
          unreachable, or 9.9.9.9 is blocking the query.

    - alert: DNSSECRRSIGExpiryProbeStale
      expr: time() - dnssec_rrsig_last_run_timestamp_seconds > 172800
      for: 1h
      labels:
        severity: warning
        component: DNS
        team: mdapi
      annotations:
        summary: "DNSSEC RRSIG expiry probe stale ({{ $value | humanizeDuration }})"
        description: |
          Windmill dnssec_rrsig_expiry hasn't successfully pushed in >48h.
          The expiry alerts are silently broken until this resolves.

    - alert: TechnitiumHealthProbeStale
      expr: time() - technitium_health_last_run_timestamp_seconds > 900
      for: 5m
      labels:
        severity: warning
        component: DNS
        team: mdapi
      annotations:
        summary: "Technitium health probe stale ({{ $value | humanizeDuration }})"
        description: |
          Windmill technitium_health probe hasn't pushed in >15m. Either the
          probe is failing or Pushgateway is down. Other Technitium alerts
          using these metrics will be silently broken until this resolves.

    - alert: TechnitiumBackupStale
      expr: time() - technitium_backup_last_run_timestamp_seconds > 172800
      for: 1h
      labels:
        severity: warning
        component: DNS
        team: mdapi
      annotations:
        summary: "Technitium backup older than 2 days"
        description: |
          Daily zone-backup probe hasn't successfully run in >48h. Garage
          unreachable, credentials wrong, or the Windmill schedule disabled.

    - alert: TechnitiumBackupFailed
      expr: technitium_backup_last_run_success == 0
      for: 30m
      labels:
        severity: warning
        component: DNS
        team: mdapi
      annotations:
        summary: "Last Technitium backup run failed"
        description: |
          technitium_zone_backup completed but reported failure. Check Windmill
          job output for the upload error (Garage creds, bucket, network).

    - alert: TechnitiumVipDnsDown
      expr: probe_success{probe="technitium_vip"} == 0
      for: 2m
      labels:
        severity: critical
        component: DNS
        team: mdapi
      annotations:
        summary: "Technitium LoadBalancer VIP (192.168.1.54) not resolving"
        description: |
          Blackbox DNS probe against the technitium-dns LB VIP failed for >2m.
          Clients pointed at 192.168.1.54 (BPI-R4 conditional forward,
          DHCP-assigned resolvers) are not getting answers.

    - alert: TechnitiumPrimaryPodDnsDown
      expr: probe_success{probe="technitium_primary_pod"} == 0
      for: 2m
      labels:
        severity: critical
        component: DNS
        team: mdapi
      annotations:
        summary: "Technitium primary pod not answering DNS"
        description: |
          Blackbox DNS probe against technitium-primary service failed for >2m.
          The authoritative pod for home.tillo.ch is unresponsive.

    - alert: TechnitiumSecondaryPodDnsDown
      expr: probe_success{probe="technitium_secondary_pod"} == 0
      for: 10m
      labels:
        severity: warning
        component: DNS
        team: mdapi
      annotations:
        summary: "Technitium secondary pod not answering DNS"
        description: |
          Blackbox DNS probe against technitium-secondary service failed for
          >10m. Failover replica unavailable — primary is a SPOF until the
          secondary recovers. Lower severity because clients currently route
          to primary only (externalTrafficPolicy=Local).

    - alert: TechnitiumServFailHigh
      ## Exporter publishes the rolling last-hour SERVFAIL count; alert when
      ## the upstream-resolver error rate breaches our normal background.
      ## Baseline observed is single-digit/hour, so >30/h is anomalous.
      expr: technitium_dns_request_result_count{server="primary", result="server_failure"} > 30
      for: 15m
      labels:
        severity: warning
        component: DNS
        team: mdapi
      annotations:
        summary: "Technitium primary: {{ $value }} SERVFAILs in the last hour"
        description: |
          Upstream forwarder (NextDNS UDP failover) is returning SERVFAIL at
          a higher-than-normal rate. Check forwarder reachability and the
          recursive resolver path. Drill in via OpenObserve stream
          technitium_queries with rcode='ServerFailure' for the affected
          qnames/clients.

    - alert: TechnitiumQueryLogLagging
      ## Pushgateway metric pushed by Windmill technitium_query_log_to_o2.
      ## Steady-state lag should track the schedule interval (60s); >5min
      ## means the cursor is stuck or OpenObserve ingest is failing.
      expr: technitium_query_log_lag_seconds > 300
      for: 5m
      labels:
        severity: warning
        component: DNS
        team: mdapi
      annotations:
        summary: "Technitium → OpenObserve ingest lag {{ $value | humanizeDuration }}"
        description: |
          The Windmill technitium_query_log_to_o2 job is reporting a
          steady-state lag >5min. Either Technitium /api/logs/query is slow,
          OpenObserve _json ingest is failing, or the cursor is stuck.
          Look at the job's recent runs in Windmill and tail the OpenObserve
          ingester logs.

    - alert: TechnitiumQueryLogStale
      expr: time() - technitium_query_log_last_run_timestamp_seconds > 600
      for: 5m
      labels:
        severity: warning
        component: DNS
        team: mdapi
      annotations:
        summary: "Technitium query-log probe hasn't pushed in >10min"
        description: |
          Windmill technitium_query_log_to_o2 stopped pushing to Pushgateway.
          Either the schedule was disabled, the worker is stuck, or
          Pushgateway is unreachable. Other Technitium query-log alerts will
          be silently broken until this resolves.

    - alert: TechnitiumDhcpNoEndpoints
      ## technitium-dhcp Service has selector app=technitium-primary, so its
      ## endpoint set is empty whenever the primary pod is not Ready. The
      ## existing TechnitiumPrimaryPodDnsDown catches DNS on port 53 but the
      ## DHCP service on UDP/67 has no blackbox equivalent. Use the kube-state
      ## endpoint metric to detect zero ready DHCP backends.
      expr: |
        sum by (namespace, service) (
          kube_endpoint_address{
            namespace="technitium", endpoint="technitium-dhcp", ready="true"
          }
        ) < 1
      for: 3m
      labels:
        severity: critical
        component: DNS
        team: mdapi
      annotations:
        summary: "Technitium DHCP service has no ready endpoints (LAN leases stop renewing)"
        description: |
          The LoadBalancer 192.168.1.55 on UDP/67 will silently drop client
          packets — DHCPDISCOVER/REQUEST get no answer, existing leases keep
          working until expiry, then clients lose addresses.
          Single-active by design (Technitium has no DHCP failover protocol).
          Manual cutover: see fleet/technitium/DHCP-FAILOVER-RUNBOOK.md.

  ## ─────────────────────────────────────────────────────────────────────
  ## Adjacent DNS-stack components beyond Technitium. Each is independent
  ## but a failure of any one degrades a DNS-related user surface:
  ##   nameserver  -> ns.mdapi.ch (BIND9, public auth zone)
  ##   external-dns -> RFC2136 sync into Technitium (new Ingresses + ACME)
  ##   opennic     -> public OpenNIC tier-2 resolver
  ##   unbound     -> split-horizon view (internal-vs-public resolution)
  ## ─────────────────────────────────────────────────────────────────────

  - name: app-dns.stack
    rules:
    - alert: NameserverBindUnavailable
      expr: |
        ( kube_deployment_spec_replicas{
            namespace="nameserver", deployment="nameserver"
          }
          - kube_deployment_status_replicas_available{
            namespace="nameserver", deployment="nameserver"
          }
        ) > 0
      for: 3m
      labels:
        severity: critical
        component: DNS
        team: mdapi
      annotations:
        summary: "nameserver/nameserver (ns.mdapi.ch BIND9): {{ $value }} replicas unavailable"
        description: |
          Authoritative BIND9 for the public mdapi.ch zone is down. External
          resolvers will get SERVFAIL once their cache expires. Inbound
          mail/web/etc. for *.mdapi.ch breaks. The dns-public blackbox probe
          (ns.mdapi.ch:53 UDP/TCP/DNSSEC) will already be reporting
          probe_success=0 — this alert names the pod-side cause.

    - alert: ExternalDnsUnavailable
      expr: |
        ( kube_deployment_spec_replicas{
            namespace="external-dns", deployment="external-dns"
          }
          - kube_deployment_status_replicas_available{
            namespace="external-dns", deployment="external-dns"
          }
        ) > 0
      for: 15m
      labels:
        severity: warning
        component: DNS
        team: mdapi
      annotations:
        summary: "external-dns: {{ $value }} replicas unavailable for >15m"
        description: |
          external-dns is the RFC2136 bridge that pushes Ingress/Service
          hostnames into Technitium. While it is down, new ingress hostnames
          (and any DNS-01 ACME challenges depending on freshly-published
          TXT records) stop working. Existing records continue to resolve.

    - alert: OpennicTier2Down
      expr: |
        ( kube_deployment_spec_replicas{
            namespace="opennic", deployment="opennic-tier2"
          }
          - kube_deployment_status_replicas_available{
            namespace="opennic", deployment="opennic-tier2"
          }
        ) > 0
      for: 3m
      labels:
        severity: warning
        component: DNS
        team: mdapi
      annotations:
        summary: "opennic/opennic-tier2: {{ $value }} replicas unavailable"
        description: |
          Public OpenNIC tier-2 resolver is down. End-users on the open
          internet querying our advertised tier-2 IP for OpenNIC TLDs
          (.geek, .libre, etc.) will fail over to other tier-2 operators.
          Severity warning (not critical) because (a) we are one of many
          tier-2 operators by design and (b) failover is automatic for
          clients with multiple resolvers.

    - alert: UnboundSplitHorizonDown
      expr: |
        ( kube_deployment_spec_replicas{
            namespace="split-horizon", deployment="unbound"
          }
          - kube_deployment_status_replicas_available{
            namespace="split-horizon", deployment="unbound"
          }
        ) > 0
      for: 3m
      labels:
        severity: warning
        component: DNS
        team: mdapi
      annotations:
        summary: "split-horizon/unbound: {{ $value }} replicas unavailable"
        description: |
          Unbound split-horizon resolver is degraded. With 2 replicas
          desired (anti-affinity), a single-pod outage is tolerable;
          this alert fires when both go down or one is unrecoverable.
          Internal vs external split-view resolution will fall through
          to the next resolver (Technitium primary) which serves the
          internal view to everyone — typically benign but worth noting.
