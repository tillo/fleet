## Longhorn volume robustness alert.
##
## `longhorn_volume_robustness` is exposed by longhorn-manager with
## these enum values:
##   0 = unknown    (detached / no replicas / just created — IGNORE)
##   1 = healthy
##   2 = degraded   (one replica failed; volume still serves I/O)
##   3 = faulted    (all replicas down; volume unusable)
##
## Catches the state BEFORE I/O errors surface in pod logs. The
## existing relay-side PodIOError detector only fires when a workload
## actually tries to read/write and fails — degraded volumes with
## quiescent workloads (overnight, etc.) go unalerted there.

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-longhorn-robustness
  namespace: monitoring
spec:
  groups:
  - name: app-longhorn-robustness.workload
    rules:
    - alert: LonghornVolumeDegraded
      expr: longhorn_volume_robustness == 2
      for: 15m
      labels:
        severity: warning
        component: General
        team: mdapi
      annotations:
        summary: "Longhorn volume {{ $labels.pvc_namespace }}/{{ $labels.pvc }} degraded"
        description: |
          Volume {{ $labels.volume }} (PVC {{ $labels.pvc_namespace }}/{{ $labels.pvc }}) is
          attached but running with fewer replicas than configured. Auto-recovery is
          usually fine; if it persists > 15m the rebuild has stalled. Check
          `kubectl -n longhorn-system get volume {{ $labels.volume }} -o yaml`.

    - alert: LonghornVolumeFaulted
      expr: longhorn_volume_robustness == 3
      for: 2m
      labels:
        severity: critical
        component: General
        team: mdapi
      annotations:
        summary: "Longhorn volume {{ $labels.pvc_namespace }}/{{ $labels.pvc }} FAULTED"
        description: |
          All replicas down on volume {{ $labels.volume }}. Workloads using PVC
          {{ $labels.pvc_namespace }}/{{ $labels.pvc }} will get I/O errors. Check
          longhorn-system events and node disk state. Restore from backup if
          replicas can't be recovered.

    - alert: LonghornRebuildStuck
      ## A WO (write-only) replica's `progress%` is reported by the
      ## f/infra_health/longhorn_rebuild_stuck Windmill probe every 5 min.
      ## If the gauge sits unchanged for ≥15 min while still 0 < progress < 100,
      ## the rebuild stalled. Longhorn does NOT auto-recover stalled WO
      ## rebuilds on its own — the manual fix is to delete the replica so
      ## auto-balance reschedules.
      ##
      ## The probe **also auto-unstucks** the replica after 30 min of no
      ## progress (one deletion per probe run, cap=1). So if you see this
      ## alert it means either (a) the stall started <30 min ago and the
      ## probe hasn't kicked in yet, or (b) the auto-delete failed for
      ## some reason (likely Rancher API/permissions). If the alert
      ## persists past 35 min, check Windmill run logs for the probe.
      ##
      ## changes(...[15m]) == 0 means no observed change in last 15 min.
      ## Combined with `for: 5m` we get an effective 20-min stall window.
      expr: |
        changes(longhorn_replica_rebuild_progress[15m]) == 0
          and longhorn_replica_rebuild_progress > 0
          and longhorn_replica_rebuild_progress < 100
      for: 5m
      labels:
        severity: warning
        component: General
        team: mdapi
      annotations:
        summary: "Longhorn rebuild stalled: {{ $labels.volume }} (replica {{ $labels.replica }}) at {{ $value }}%"
        description: |
          The rebuild of replica {{ $labels.replica }} on volume {{ $labels.volume }}
          has been at {{ $value }}% with no change for ≥15 min. The
          f/infra_health/longhorn_rebuild_stuck probe will auto-delete the replica
          after 30 min total stall (one per run). If you want to act sooner:
            kubectl --context=mdapi-prod -n longhorn-system delete replica {{ $labels.replica }}
          Auto-balance (best-effort) will re-schedule on a healthier node.
