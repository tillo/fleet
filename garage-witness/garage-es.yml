apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garage-tokens
  namespace: garage-witness
spec:
  refreshInterval: 5m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: garage-tokens
    creationPolicy: Owner
  data:
  - remoteRef: { key: /mdapi/transit/garage-rpc-secret }
    secretKey: GARAGE_RPC_SECRET
  - remoteRef: { key: /mdapi/transit/garage-admin-token }
    secretKey: GARAGE_ADMIN_TOKEN
  - remoteRef: { key: /mdapi/transit/garage-admin-token }
    secretKey: GARAGE_METRICS_TOKEN
