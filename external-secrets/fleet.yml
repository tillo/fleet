defaultNamespace: external-secrets
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
helm:
  maxHistory: 25
  releaseName: external-secrets
  # Upstream moved the index.yaml to https://external-secrets.io/index.yaml;
  # the old charts.* subdomain now 302-redirects, which fleet's helm fetcher
  # occasionally times out on (stalls the whole gitrepo reconcile).
  # Chart .tgz files themselves live on GitHub Releases — only the index
  # location changed.
  repo: https://external-secrets.io
  chart: external-secrets
  version: 2.6.0  # Renovate-managed (renovate.json)
  valuesFiles:
    - values.yml
