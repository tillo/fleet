apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: akeyless
spec:
  refreshInterval: 1m

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: akeyless
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /pepper/external-secrets/akeyless/accessId
      secretKey: accessId
    - remoteRef:
        key: /pepper/external-secrets/akeyless/accessType
      secretKey: accessType
    - remoteRef:
        key: /pepper/external-secrets/akeyless/accessTypeParam
      secretKey: accessTypeParam
