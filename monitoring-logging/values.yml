## rancher-logging values — minimal operator install only.
## Logging / Flow / Output CRDs are defined in their own files (logging-cr.yml etc.)
## so they're versioned alongside the rest of the bundle.

## Don't reinstall CRDs (rancher-logging-crd chart already manages them).
crds:
  enabled: false

## Operator pod resources
## limit raised 256Mi -> 512Mi: 256Mi OOMKilled the operator during initial
## CRD cache sync before it ever reached steady state (exit 137, CrashLoopBackOff).
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 512Mi

## Don't install the bundled Logging resource — we create our own.
disablePspGeneration: true

## fluent-bit (DaemonSet — runs on every node)
## Previous chart defaults (100m / 50Mi req, 200m / 100Mi limit) were tight:
## actual steady-state memory is 55–68 MiB across the 3 nodes, leaving almost
## no headroom for log bursts (ingress-nginx tracebacks, crash-looping pods).
## New limit gives ~4× the peak observed.
fluentbit:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

## fluentd (StatefulSet — single aggregator)
## Previous defaults (500m / 100Mi req, 1000m / 400Mi limit) had actual
## steady-state at 272 MiB — already at 68% of the limit. A burst would OOM
## and drop the in-memory buffer.
## bufferStorageVolume: persistent disk buffer so a fluentd restart (image
## update, node drain, OOM) doesn't lose whatever was in flight. 10 Gi on
## the standard 2-replica Longhorn class is sized for several hours of
## downstream (Cribl / am-relay / OpenObserve) unreachability.
fluentd:
  resources:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      cpu: 1500m
      memory: 768Mi
  disablePvc: false
  bufferStorageVolume:
    pvc:
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
        storageClassName: harvester-longhorn-2replicas
