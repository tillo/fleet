## Harvester Addon CR for rancher-logging.
##
## Owned by Fleet so the customizations in `valuesContent` survive Harvester
## upgrades (which otherwise re-seed this CR with stock defaults).
##
## When upgrading Harvester to a new minor (e.g. 1.8 → 1.9):
##   1. Read the new defaults from a freshly-installed cluster of the target
##      version: `kubectl get addon -n cattle-logging-system rancher-logging -o yaml`
##   2. Bump spec.version to the chart version Harvester ships
##   3. Bump the eventTailer image tag to match the Harvester minor
##   4. Merge in any new top-level keys Harvester added under valuesContent
##      (do NOT lose our fluentbit/fluentd resource overrides)
##   5. Commit + push; Fleet reconciles; addon-controller does helm upgrade
##
## Diff against Harvester 1.8.0 stock defaults — KEEP THESE INTACT:
##   * fluentbit.resources                 (bumped from 200m/200Mi limits)
##   * fluentd.resources                   (bumped from 1000m/800Mi limits)
##   * disablePspGeneration: true          (cluster has no PSP)
##   * crds.enabled: false                 (rancher-logging-crd handles them)
##
## NOT enabling fluentd.bufferStorageVolume here: chart 107.x had a known
## bug where it ignored fluentd.disablePvc:false from values but still passed
## bufferStorageVolume through, producing an invalid StatefulSet. The chart
## 108.x may have the same issue. We'll test it as a separate follow-up
## commit after this migration lands cleanly.

apiVersion: harvesterhci.io/v1beta1
kind: Addon
metadata:
  name: rancher-logging
  namespace: cattle-logging-system
spec:
  enabled: true
  repo: http://harvester-cluster-repo.cattle-system.svc/charts
  chart: rancher-logging
  version: "108.0.2+up4.10.0-rancher.18"
  valuesContent: |
    ## ── Harvester defaults (kept verbatim) ───────────────────────────────

    systemdLogPath: /var/log/journal

    additionalLoggingSources:
      rke2:
        enabled: true
      kubeAudit:
        enabled: true
        auditFilename: "audit.log"
        pathPrefix: "/var/lib/rancher/rke2/server/logs/"
        loggingRef: "harvester-kube-audit-log-ref"
        fluentbit:
          logTag: kube-audit
          tolerations:
            - key: node-role.kubernetes.io/controlplane
              value: "true"
              effect: NoSchedule
            - key: node-role.kubernetes.io/etcd
              value: "true"
              effect: NoExecute

    eventTailer:
      name: harvester-default
      namespace: cattle-logging-system
      controlNamespace: cattle-logging-system
      workloadOverrides:
        containers:
          - image: rancher/harvester-eventrouter:v1.8.0
            name: event-tailer
            resources:
              limits:
                cpu: 100m
                memory: 100Mi
              requests:
                cpu: 20m
                memory: 20Mi

    ## ── Our overrides on top of the defaults ──────────────────────────────

    ## Don't reinstall CRDs (rancher-logging-crd chart already manages them).
    crds:
      enabled: false

    ## Cluster has no PodSecurityPolicy.
    disablePspGeneration: true

    ## Operator pod (the logging-operator controller).
    ## 256Mi OOMKilled during initial CRD cache sync on first install
    ## (exit 137, CrashLoopBackOff); 512Mi is the smallest safe ceiling.
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi

    ## fluent-bit (DaemonSet — one per node).
    ## Harvester ships 200m / 200Mi limits; observed steady-state memory was
    ## 55–68 MiB across 3 nodes, leaving almost no headroom for log bursts.
    fluentbit:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 300m
          memory: 256Mi

    ## fluentd (StatefulSet — single aggregator).
    ## Harvester ships 1000m / 800Mi limits; observed steady-state was 272 MiB
    ## with chart 107.x (pod logs only). Bumped much higher for chart 108.x
    ## because of the new sources Harvester defaults add (rke2 journald + the
    ## separate kube-audit fluentd's chunks all flow through this aggregator,
    ## OOMKilled at 768Mi within minutes — exit 137, BufferOverflowError).
    fluentd:
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 2000m
          memory: 2Gi
