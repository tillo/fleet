## LoadBalancer for the split-horizon resolver. Holds the LAN DNS VIP
## 192.168.1.1 via the dedicated single-address MetalLB pool in
## metallb-pools/split-horizon.yml. LAN clients are handed this address
## directly by DHCP; DMZ / ad-LAN clients reach it through the BPI-R4
## dnsmasq forwarder.
##
## externalTrafficPolicy: Cluster -- the MetalLB L2 announcement stays on
## one node and forwards to any Ready unbound pod cluster-wide, so a
## Deployment rollout never has to move the VIP (no ARP churn). The
## kube-proxy SNAT source still lands inside unbound's internal-subnet
## access-control, so dropping the real client IP costs nothing here.
apiVersion: v1
kind: Service
metadata:
  name: unbound
  namespace: split-horizon
spec:
  type: LoadBalancer
  loadBalancerClass: metallb
  loadBalancerIP: 192.168.1.1
  externalTrafficPolicy: Cluster
  selector:
    app: unbound
  ports:
  - name: dns-udp
    port: 53
    targetPort: 53
    protocol: UDP
  - name: dns-tcp
    port: 53
    targetPort: 53
    protocol: TCP
