apiVersion: v1
kind: ConfigMap
metadata:
  name: unbound-config
  namespace: split-horizon
data:
  unbound.conf: |
    # Managed by Fleet -- fleet/split-horizon/
    # In-cluster split-horizon resolver. Answers the override set below
    # locally; forwards everything else to Technitium (192.168.1.54).
    #
    # The mdapi.ch ingress records (-> 192.168.1.191) are NO LONGER listed
    # here: they are generated from k8s Ingress objects by external-dns
    # (fleet/external-dns-mdapi) into the `unbound-generated` ConfigMap and
    # pulled in via `include:` below. This file now holds only the STATIC
    # exceptions + non-mdapi.ch overrides + forward zones.
    server:
        verbosity: 1
        interface: 0.0.0.0
        interface: ::0
        port: 53
        do-ip4: yes
        do-ip6: yes
        do-udp: yes
        do-tcp: yes
        num-threads: 2
        so-reuseport: yes
        edns-buffer-size: 1232
        # container runtime: no setuid, no chroot, log to stderr
        username: ""
        chroot: ""
        directory: "/etc/unbound"
        use-syslog: no
        logfile: ""
        pidfile: ""
        hide-identity: yes
        hide-version: yes
        prefetch: yes
        cache-min-ttl: 0
        cache-max-ttl: 86400
        msg-cache-size: 64m
        rrset-cache-size: 128m
        # internal clients only (lan/dmz/adlan + cluster + internal v6)
        access-control: 127.0.0.0/8 allow
        access-control: 192.168.0.0/16 allow
        access-control: 10.0.0.0/8 allow
        access-control: 2a0d:d05:401::/48 allow
        access-control: fdfd:dce5:df64::/48 allow
        access-control: 0.0.0.0/0 refuse
        access-control: ::/0 refuse
        # No local DNSSEC validation -- Technitium is the validating
        # recursive resolver upstream. Enable here later if desired.

        # Unblock Unbound's built-in AS112 local-zones for RFC1918 (+ ULA v6)
        # reverse space. local-zones are evaluated BEFORE forward-zones, so the
        # default `local-zone: "168.192.in-addr.arpa." static` answers every LAN
        # PTR query with NXDOMAIN *locally* and the 168.192.in-addr.arpa.
        # forward-zone below never fires. This silently broke reverse DNS for
        # all LAN hosts while the forward zones kept working (hence non-obvious).
        # (2026-06-22)
        unblock-lan-zones: yes

        # ---- split-horizon overrides ----
        # transparent: listed names answered locally; all other names
        # in these zones fall through to the forward-zone below.
        local-zone: "coders.ch." transparent
        local-zone: "coiffuredreams.ch." transparent
        local-zone: "dellambrogio.ch." transparent
        local-zone: "dellambrogio.com." transparent
        local-zone: "dellambrogio.net." transparent
        local-zone: "dellambrogio.org." transparent
        local-zone: "envuassu.ch." transparent
        local-zone: "ivodellambrogio.ch." transparent
        local-zone: "lithia.eu." transparent
        local-zone: "mdapi.ch." transparent
        local-zone: "plex.direct." transparent
        local-zone: "spider3.ch." transparent
        local-zone: "textopolis.net." transparent
        local-zone: "tillo.ch." transparent

        # ---- mdapi.ch ingress records: AUTO-GENERATED (external-dns) ----
        # Every mdapi.ch name fronting the in-cluster nginx ingress VIP
        # (192.168.1.191) is generated from its k8s Ingress by external-dns
        # (fleet/external-dns-mdapi) into the `unbound-generated` ConfigMap and
        # included here. Add/remove an Ingress and the record follows
        # automatically; Stakater Reloader then rolls unbound. DO NOT hand-add
        # mdapi.ch ingress records here -- put the host on the Ingress instead.
        include: "/etc/unbound/generated.conf"

        # ---- STATIC mdapi.ch exceptions (NOT ingress-backed / not .191) ----
        # Deliberately kept out of external-dns. plex + ftth are covered by
        # external-dns --exclude-domains (they resolve elsewhere); dev/fio-tools/
        # ingress have no Ingress object; tails is windmill-pushed single-service.
        local-data: "plex.mdapi.ch. 300 IN A 192.168.1.46"
        local-data: "ftth.mdapi.ch. 300 IN A 192.168.1.254"
        local-data: "dev.mdapi.ch. 300 IN A 192.168.1.191"
        local-data: "fio-tools.mdapi.ch. 300 IN A 192.168.1.191"
        local-data: "ingress.mdapi.ch. 300 IN A 192.168.1.191"
        # ---- EXCLUSIONS: do NOT add split-horizon overrides for these ----
        # mirror.mdapi.ch is a SHARED public name fronting multiple ports on
        # DIFFERENT LBs via bpi-r4 hairpin (HTTP/HTTPS -> mirror .49; NTS-KE 4460
        # + NTP 123 -> chrony .58; ...). A single internal A record pins it to one
        # box and silently breaks every other port -- it killed NTS (2026-06-16,
        # jauderho couldn't reach :4460). Leave it resolving to the public A/AAAA
        # on-LAN too so hairpin NAT routes per-port. This is also why external-dns
        # excludes mirror.mdapi.ch (--exclude-domains) -- an Ingress for it must
        # NOT mint an internal A record. Apply the same rule to any future
        # multi-service public FQDN. (Static list hand-maintained -- joe + git.)
        # tails.mdapi.ch is single-service (the mirror box) so its override stays:
        local-data: "tails.mdapi.ch. 300 IN A 192.168.1.49"

        # ---- STATIC non-mdapi.ch overrides (out of external-dns scope) ----
        # external-dns is scoped to mdapi.ch (--domain-filter); these other
        # public zones are hand-maintained here. Most front the same .191 ingress.
        local-data: "www.tillo.ch. 300 IN A 192.168.1.191"
        local-data: "autoconfig.tillo.ch. 300 IN A 192.168.1.191"
        local-data: "webmail.tillo.ch. 300 IN A 192.168.1.191"
        local-data: "santillo.tillo.ch. 300 IN A 192.168.1.5"
        local-data: "vpn.tillo.ch. 300 IN A 10.7.50.1"
        local-data: "www.coiffuredreams.ch. 300 IN A 192.168.1.191"
        local-data: "autoconfig.coiffuredreams.ch. 300 IN A 192.168.1.191"
        local-data: "webmail.coiffuredreams.ch. 300 IN A 192.168.1.191"
        local-data: "autoconfig.coders.ch. 300 IN A 192.168.1.191"
        local-data: "webmail.coders.ch. 300 IN A 192.168.1.191"
        local-data: "www.dellambrogio.ch. 300 IN A 192.168.1.191"
        local-data: "www.dellambrogio.com. 300 IN A 192.168.1.191"
        local-data: "www.dellambrogio.net. 300 IN A 192.168.1.191"
        local-data: "www.dellambrogio.org. 300 IN A 192.168.1.191"
        local-data: "autoconfig.dellambrogio.ch. 300 IN A 192.168.1.191"
        local-data: "webmail.dellambrogio.ch. 300 IN A 192.168.1.191"
        local-data: "www.ivodellambrogio.ch. 300 IN A 192.168.1.191"
        local-data: "autoconfig.lithia.eu. 300 IN A 192.168.1.191"
        local-data: "webmail.lithia.eu. 300 IN A 192.168.1.191"
        local-data: "www.textopolis.net. 300 IN A 192.168.1.191"
        local-data: "autoconfig.textopolis.net. 300 IN A 192.168.1.191"
        local-data: "webmail.textopolis.net. 300 IN A 192.168.1.191"
        local-data: "suivi.envuassu.ch. 300 IN A 192.168.1.191"
        local-data: "login.envuassu.ch. 300 IN A 192.168.1.191"
        local-data: "cloud.envuassu.ch. 300 IN A 192.168.1.40"
        local-data: "dev.spider3.ch. 300 IN A 192.168.1.191"
        local-data: "www.spider3.ch. 300 IN A 192.168.1.191"
        local-data: "31-3-128-62.5d0cc67044f0410fbaeefaf0a98c49de.plex.direct. 300 IN A 192.168.1.46"

    # Internal authoritative zones go to Technitium (192.168.1.54) only:
    #   home.tillo.ch.            -- LAN DHCP-generated records
    #   168.192.in-addr.arpa.     -- LAN reverse for every 192.168.0.0/16 subnet
    # No fallback for these -- NextDNS does not know these zones, and a
    # SERVFAIL is the correct behaviour if Technitium is down.
    forward-zone:
        name: "home.tillo.ch."
        forward-addr: 192.168.1.54
    forward-zone:
        name: "168.192.in-addr.arpa."
        forward-addr: 192.168.1.54
    # Default recursion: Technitium first (DoT to NextDNS+Quad9, profile
    # tagging via the technitium- client hostname, query graphs + cache
    # visibility in the Technitium UI). NextDNS listed as failover so the
    # LAN keeps resolving externals if the Technitium LB goes blackhole
    # again -- Unbound picks the forwarder by RTT and falls over to the
    # next on timeout/SERVFAIL.
    forward-zone:
        name: "."
        forward-addr: 192.168.1.54
        forward-addr: 45.90.28.16
        forward-addr: 45.90.30.16
