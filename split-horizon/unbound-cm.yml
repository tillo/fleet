    # Everything not overridden above -> Technitium (192.168.1.54):
    # authoritative for home.tillo.ch and the LAN reverse zones, and the
    # resolver for every other name -- mdapi.ch included, which resolves
    # to its public records (Technitium holds no internal mdapi.ch zone).
    forward-zone:
        name: "."
        forward-addr: 192.168.1.54
