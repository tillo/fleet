defaultNamespace: rook-ceph
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
# The operator bundle must be Active (CRDs registered) before the CephCluster CR
# applies. dependsOn references the OTHER bundle's name. Fleet derives bundle names
# from the GitRepo name + path. Verified 2026-06-14: GitRepo "mdapi-prod" (branch
# main, clusterGroup prod) names bundles "mdapi-prod-<dir>".
dependsOn:
  - name: mdapi-prod-rook-ceph
helm:
  maxHistory: 25
  releaseName: rook-ceph-cluster
  repo: https://charts.rook.io/release
  chart: rook-ceph-cluster
  # Lane B: keep the cluster chart pinned to the SAME minor as the operator.
  version: v1.20.0
  valuesFiles:
    - values.yml
# The Rook operator/CRD defaults many CephCluster /spec fields that aren't in the
# rendered manifest, which Fleet reports as drift (Modified). These are benign
# defaults (live config is correct) — ignore them in the diff (metallb pattern,
# observed 2026-06-14). Device list (/spec/storage/nodes) is intentionally NOT
# ignored so real disk changes still surface.
diff:
  comparePatches:
    - apiVersion: ceph.rook.io/v1
      kind: CephCluster
      namespace: rook-ceph
      name: rook-ceph
      # IMPORTANT: comparePatches normalize the LIVE object too, and a JSON-patch
      # `remove` of a key ABSENT from live fails ("Unable to remove nonexistent
      # key"), which spams the Fleet agent + can void the obj's normalization.
      # So ONLY list ops whose target key is actually present in the live CephCluster.
      # Rook omitempty-strips most spec defaults from live, so a `remove` for them
      # is a no-op-that-errors — list ONLY fields the operator actually persists.
      # Verified present in live 2026-06-16: cleanupPolicy, healthCheck,
      # network.connections.compression, network.connections.encryption.
      # Dropped (absent from live -> errored, no-op): cephVersion.allowUnsupported,
      # crashCollector.disable, dashboard.ssl, mgr/mon.allowMultiplePerNode,
      # storage.useAllNodes, continueUpgradeAfterChecksEvenIfNotHealthy,
      # skipUpgradeChecks, removeOSDsIfOutAndSafeToRemove, upgradeOSDRequiresHealthyPGs.
      # (allowUnsupported is the only one the chart renders, so it remains one
      # benign cosmetic Modified field — no comparePatch form suppresses it.)
      operations:
        - {op: remove, path: /spec/cleanupPolicy}
        - {op: remove, path: /spec/healthCheck}
        - {op: remove, path: /spec/network/connections/compression}
        - {op: remove, path: /spec/network/connections/encryption}
