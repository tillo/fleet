defaultNamespace: rook-ceph
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
# The operator bundle must be Active (CRDs registered) before the CephCluster CR
# applies. dependsOn references the OTHER bundle's name. Fleet derives bundle names
# from the GitRepo name + path. Verified 2026-06-14: GitRepo "mdapi-prod" (branch
# main, clusterGroup prod) names bundles "mdapi-prod-<dir>".
dependsOn:
  - name: mdapi-prod-rook-ceph
helm:
  maxHistory: 25
  releaseName: rook-ceph-cluster
  repo: https://charts.rook.io/release
  chart: rook-ceph-cluster
  # Lane B: keep the cluster chart pinned to the SAME minor as the operator.
  version: v1.20.0
  valuesFiles:
    - values.yml
# diff.comparePatches: Ceph/Rook mutate status, finalizers and default many spec
# fields, which can show as Fleet drift. Add comparePatches REACTIVELY once the
# bundle reports Modified (mirror the metallb/ pattern) — do not pre-invent paths.
