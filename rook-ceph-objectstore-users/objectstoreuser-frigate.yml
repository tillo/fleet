## RGW S3 identity for Frigate camera recordings, migrating off the in-cluster
## bootstrap Garage (being decommissioned). Created out-of-band via kubectl on
## 2026-06-22, then declared here so Fleet/Helm adopts it in place (takeOwnership)
## without rotating the keys Akeyless already holds. Rook writes keys to secret
## rook-ceph-object-user-ceph-objectstore-frigate; mirrored to Akeyless
## /mdapi/frigate/garage-s3/{access_key,secret_key} for the rclone sidecar ES.
apiVersion: ceph.rook.io/v1
kind: CephObjectStoreUser
metadata:
  name: frigate
  namespace: rook-ceph
spec:
  store: ceph-objectstore
  displayName: Frigate camera recordings
