defaultNamespace: rook-ceph
helm:
  maxHistory: 25
# Raw CephObjectStoreUser manifests for apps moving off in-cluster Garage to RGW.
# The rook-ceph-cluster chart (v1.20.0) has no cephObjectStoreUsers key, so users
# are declared here. Keys are mirrored to Akeyless (/mdapi/<app>/rgw/*) and the
# app's S3 connection secret is built from those. (openobserve's user is still
# kubectl-only — adopting it here needs care to avoid rotating its in-use keys.)
