## RGW S3 identity for GitLab (registry + consolidated object_store), migrating
## off the in-cluster bootstrap Garage. Rook writes keys to secret
## rook-ceph-object-user-ceph-objectstore-gitlab; mirrored to Akeyless
## /mdapi/gitlab/rgw/{access-key,secret-key}.
apiVersion: ceph.rook.io/v1
kind: CephObjectStoreUser
metadata:
  name: gitlab
  namespace: rook-ceph
spec:
  store: ceph-objectstore
  displayName: GitLab object storage (registry + consolidated object_store)
