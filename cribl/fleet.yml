defaultNamespace: cribl
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
helm:
  maxHistory: 25
  releaseName: logstream-leader
  repo: https://criblio.github.io/helm-charts/
  chart: logstream-leader
  version: 4.18.2  # Renovate-managed (renovate.json)
  valuesFiles:
    - values.yml
# Post-render the chart with kustomize to add Keel annotations to the leader
# Deployment's METADATA - the logstream-leader chart only exposes podAnnotations
# (pod template), which Keel does not read, so Keel never watched the workload.
# Same helm+kustomize pattern as envuassu/nextcloud; verified locally with
# `helm template | kubectl kustomize` before committing.
kustomize:
  dir: kustomize
