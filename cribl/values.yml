config:
  scName: harvester-longhorn-2replicas
persistence:
  size: 50Gi
service:
  ports:
    - name: api
      port: 9000
      protocol: TCP
      external: true
    - name: leadercomm
      port: 4200
      protocol: TCP
      external: false
    - name: httpraw
      port: 8080
      protocol: TCP
      external: true
ingress:
  enable: true
  host: cribl.mdapi.ch
  prefix: /
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: Cribl
    flame.pawelmalak/url: https://cribl.mdapi.ch/
    flame.pawelmalak/category: Ops
    flame.pawelmalak/icon: filter-variant
    flame.pawelmalak/order: '30'
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecDebugLog /tmp/modsec_debug.log
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
      # Cribl REST API uses PATCH/PUT/DELETE on routes, pipelines, users.
      # Place the override AFTER the Include so it executes later in phase 1
      # than the CRS crs-setup.conf id:900200 (which would otherwise reset
      # NOTE: never put an apostrophe in a comment inside this snippet — the
      # outer modsecurity_rules directive is single-quoted, and the apostrophe
      # closes the string at the nginx parser layer (comments are stripped
      # later). Found 2026-05-11 after a 4h ingress-nginx reload outage.
      # tx.allowed_methods back to the GET/HEAD/POST/OPTIONS default before
      # rule 911100 reads it). Uses id:9001 to avoid the 900200 collision —
      # same pattern as spider3/sftpgo ingresses.
      SecAction "id:9001,phase:1,nolog,pass,t:none,setvar:tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE"
  tls:
    - secretName: cribl-cert
      hosts:
        - cribl.mdapi.ch
    