config:
  scName: harvester-longhorn-2replicas
persistence:
  size: 50Gi
service:
  ports:
    - name: api
      port: 9000
      protocol: TCP
      external: true
    - name: leadercomm
      port: 4200
      protocol: TCP
      external: false
    - name: httpraw
      port: 8080
      protocol: TCP
      external: true
ingress:
  enable: true
  host: cribl.mdapi.ch
  prefix: /
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: Cribl
    flame.pawelmalak/url: https://cribl.mdapi.ch/
    flame.pawelmalak/category: System
    flame.pawelmalak/icon: nfc-tap
    flame.pawelmalak/order: '101'
  tls:
    - secretName: cribl-cert
      hosts:
        - cribl.mdapi.ch
    