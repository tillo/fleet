config:
  scName: harvester-longhorn-2replicas
persistence:
  size: 50Gi
service:
  ports:
    - name: api
      port: 9000
      protocol: TCP
      external: true
    - name: leadercomm
      port: 4200
      protocol: TCP
      external: false
    - name: httpraw
      port: 8080
      protocol: TCP
      external: true
ingress:
  enable: true
  host: cribl.mdapi.ch
  prefix: /
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: Cribl
    flame.pawelmalak/url: https://cribl.mdapi.ch/
    flame.pawelmalak/category: Ops
    flame.pawelmalak/icon: filter-variant
    flame.pawelmalak/order: '30'
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecDebugLog /tmp/modsec_debug.log
      # Cribl REST API uses PATCH/PUT/DELETE on routes, pipelines, users, etc.
      # CRS rule 911100 (Method Enforcement) reads tx.allowed_methods at phase 1,
      # so the override MUST come before the Include or it has no effect.
      SecAction "id:900200,phase:1,pass,nolog,setvar:tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE"
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
  tls:
    - secretName: cribl-cert
      hosts:
        - cribl.mdapi.ch
    