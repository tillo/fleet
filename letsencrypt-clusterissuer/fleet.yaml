## letsencrypt-clusterissuer — THE letsencrypt-prod ClusterIssuer.
##
## Replaces 42 identical-except-for-zones per-namespace Issuers (2026-07-06
## consolidation, see ~/fleet-monitoring-study/PROPOSAL.md P2). Separate
## bundle because cert-manager/ is an external-chart bundle (raw manifests
## beside it are ignored by Fleet) — same pattern as monitoring-pushgateway-issuer.
##
## The TSIG secret must live in cert-manager's cluster-resource-namespace
## (= the cert-manager namespace) for ClusterIssuer solvers; hence the ES here.
defaultNamespace: cert-manager
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
dependsOn:
  - name: mdapi-prod-cert-manager
  - name: mdapi-prod-external-secrets-akeyless
helm:
  maxHistory: 25
