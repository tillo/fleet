apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tillo
  namespace: tillo
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: LinkedIn
    flame.pawelmalak/url: https://www.linkedin.com/in/martinodellambrogio/
    flame.pawelmalak/category: Personal
    flame.pawelmalak/icon: linkedin
    flame.pawelmalak/order: '10'
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecDebugLog /tmp/modsec_debug.log
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
    nginx.ingress.kubernetes.io/permanent-redirect: https://www.linkedin.com/in/martinodellambrogio/
spec:
  ingressClassName: nginx
  rules:
    - host: tillo.ch
      http:
        paths:
          - backend:
              service:
                name: nonexistent
                port:
                  name: none
            path: /
            pathType: Prefix
    - host: www.tillo.ch
      http:
        paths:
          - backend:
              service:
                name: nonexistent
                port:
                  name: none
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - tillo.ch
      - www.tillo.ch
      secretName: tillo-cert
