## ExternalSecret pulling shared Pushover credentials from akeyless.
## The AlertmanagerConfig references this secret by name+key.
##
## creationPolicy: Merge so the Secret survives when this ES is deleted
## (next commit moves it to fleet/monitoring-vmalertmanager-config/);
## Owner would delete the Secret on ES removal and produce a brief
## delivery gap on vmalertmanager-mdapi.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pushover
  namespace: monitoring
spec:
  refreshInterval: 1m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: pushover
    creationPolicy: Merge
  data:
    - remoteRef:
        key: /mdapi/pushover/api-token
      secretKey: api-token
    - remoteRef:
        key: /mdapi/pushover/user-key
      secretKey: user-key
