## ExternalSecret pulling shared Pushover credentials from akeyless.
## The AlertmanagerConfig references this secret by name+key.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pushover
  namespace: monitoring
spec:
  refreshInterval: 1m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: pushover
    creationPolicy: Owner
  data:
    - remoteRef:
        key: /mdapi/pushover/api-token
      secretKey: api-token
    - remoteRef:
        key: /mdapi/pushover/user-key
      secretKey: user-key
