## Bundled `rancher-monitoring-alertmanager` keeps evaluating every alert
## bundled Prometheus emits — including the `team=mdapi` ones our custom
## PrometheusRule CRs produce. Those alerts hit the chart-default
## Pushover receiver and would deliver duplicates alongside
## vmalertmanager-mdapi (the real path post-Phase-4).
##
## This AC sits at the AC-merge layer with a single team=mdapi route to
## a no-op receiver. With `alertmanagerConfigMatcherStrategy=None`
## (patched by hand on the Alertmanager CR), the route operates at the
## top level and catches the alert before it falls through to the
## chart-default receiver. Result: bundled AM silently drops every
## team=mdapi alert; only vmalertmanager-mdapi delivers them.
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: mdapi-blackhole
  namespace: monitoring
spec:
  route:
    receiver: mdapi-dropped
    matchers:
    - name: team
      value: mdapi
      matchType: "="
  receivers:
  - name: mdapi-dropped
