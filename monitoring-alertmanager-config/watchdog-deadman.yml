## Dead-man's switch: route the always-firing rancher-monitoring `Watchdog`
## alert to a healthchecks.io HEAD ping. healthchecks.io fires its own
## (independent) email/Pushover alert if the heartbeat is missing for
## the configured grace period — catching the case where Alertmanager
## or Prometheus itself is broken (and so can't tell us).
##
## SETUP:
##   1. Sign up at healthchecks.io (free, 20 checks)
##   2. Create a check: schedule "every 5 minutes", grace "5 minutes"
##   3. Get its ping URL: https://hc-ping.com/<uuid>
##   4. Save it to akeyless: akeyless create-secret \
##        --name /mdapi/pushover/healthchecks-watchdog-url --value 'https://hc-ping.com/<uuid>'
##      (kept under /mdapi/pushover/ because that folder is in the
##       ESO access-id's path ACL; /mdapi/healthchecks/ is not.)
##   5. The ExternalSecret below pulls it into the cluster

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: healthchecks-watchdog
  namespace: monitoring
spec:
  refreshInterval: 1m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: healthchecks-watchdog
    creationPolicy: Owner
  data:
    - remoteRef:
        key: /mdapi/pushover/healthchecks-watchdog-url
      secretKey: url
---
## AC route: when Watchdog fires (it always does — Prometheus emits it
## constantly), forward to healthchecks.io. Repeat every 4m so even with
## one missed cycle the heartbeat still arrives well within hc.io's grace.
##
## NOTE: this AC will fail to load until /mdapi/healthchecks/watchdog-url
## exists in akeyless. The webhook URL is read from a separate Secret
## key referenced via the `urlSecret` field.

apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: watchdog-deadman
  namespace: monitoring
spec:
  route:
    receiver: healthchecks-watchdog
    matchers:
    - name: alertname
      value: Watchdog
      matchType: "="
    groupWait: 0s
    groupInterval: 4m
    repeatInterval: 4m
  receivers:
  - name: healthchecks-watchdog
    webhookConfigs:
    - urlSecret:
        name: healthchecks-watchdog
        key: url
      sendResolved: false
      maxAlerts: 1
