apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: mdapi-team
  namespace: monitoring
spec:
  route:
    ## Parent route is a TRUE no-op — alerts that don't match any child
    ## route fall through here and get dropped. Without this, InfoInhibitor
    ## (severity=none, no team=mdapi label) was inheriting the parent
    ## receiver and pinging Pushover.
    receiver: black-hole
    groupBy: [component, alertname]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    routes:
    ## 1) Our own alerts (team=mdapi) — full statuspage + Pushover path
    - receiver: statuspage-and-pushover
      matchers:
      - name: team
        value: mdapi
        matchType: "="

    ## 2) Chart-bundled alerts that DON'T carry team=mdapi (so wouldn't
    ## match #1) but ARE real signals worth knowing about. Routes to
    ## Pushover only (skip statuspage — these aren't user-visible
    ## components). Suppresses the always-firing infrastructure of
    ## Watchdog/InfoInhibitor and the very noisy CPUThrottlingHigh
    ## (which fires on perfectly healthy bursty workloads).
    - receiver: pushover-bundled
      matchers:
      - name: severity
        value: warning|critical
        matchType: "=~"
      - name: alertname
        value: Watchdog|InfoInhibitor|CPUThrottlingHigh|KubeCPUOvercommit
        matchType: "!~"
      - name: team
        value: mdapi
        matchType: "!="
      groupBy: [alertname, severity]
      groupWait: 1m
      groupInterval: 10m
      repeatInterval: 12h

  receivers:
  ## Drop everything that doesn't match a child route (Watchdog,
  ## InfoInhibitor, info-severity from any unrelated chart).
  - name: black-hole

  - name: statuspage-and-pushover
    webhookConfigs:
    - url: http://statuspage-adapter.monitoring.svc.cluster.local:8080/webhook
      sendResolved: true
      maxAlerts: 0   # 0 = no limit; statuspage adapter handles batches
    pushoverConfigs:
    - userKey:
        name: pushover
        key: user-key
      token:
        name: pushover
        key: api-token
      sendResolved: true
      priority: |-
        {{- if eq .CommonLabels.severity "critical" -}}1
        {{- else -}}0
        {{- end -}}
      title: |-
        [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.component }}: {{ .CommonLabels.alertname }}
      message: |-
        {{ range .Alerts -}}
        {{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} {{ .Annotations.summary }}
        {{ end }}
        {{ if .CommonAnnotations.description -}}
        ---
        {{ .CommonAnnotations.description }}
        {{- end }}

  - name: pushover-bundled
    ## Lighter-weight receiver for chart-bundled alerts: no statuspage
    ## update (these don't map to user-visible components) and a
    ## different title prefix so they're visually distinct from the
    ## team=mdapi alerts.
    pushoverConfigs:
    - userKey:
        name: pushover
        key: user-key
      token:
        name: pushover
        key: api-token
      sendResolved: true
      priority: |-
        {{- if eq .CommonLabels.severity "critical" -}}1
        {{- else -}}0
        {{- end -}}
      title: |-
        [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] k8s: {{ .CommonLabels.alertname }}
      message: |-
        {{ range .Alerts -}}
        {{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} {{ .Annotations.summary }}
        {{ end }}
        {{ if .CommonAnnotations.description -}}
        ---
        {{ .CommonAnnotations.description }}
        {{- end }}
