defaultNamespace: reloader
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
helm:
  maxHistory: 25
  releaseName: reloader
  repo: https://stakater.github.io/stakater-charts
  chart: reloader
  # Intentionally no `version:` -- Fleet tracks the repo's latest chart
  # and applies any new release on the next GitRepo poll cycle.
  valuesFiles:
    - values.yml
