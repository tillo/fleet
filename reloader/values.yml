## stakater/Reloader — watches ConfigMaps/Secrets and rolls the workloads
## that reference them when their content changes.
##
## Opt-in: only workloads carrying `reloader.stakater.com/auto: "true"` are
## reconciled (autoReloadAll stays false — the chart default). The annotation
## is added per workload in its own bundle.
##
## NB: when Reloader triggers a rollout it patches the live workload, so
## Fleet will briefly show that bundle as "Modified". Fleet correctDrift is
## off, so it only reports — it does not fight Reloader.

reloader:
  deployment:
    resources:
      requests:
        cpu: 10m
        memory: 48Mi
      limits:
        memory: 128Mi
