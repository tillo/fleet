replicaCount: 1
deploymentType: Deployment

# TODO(image-policy): pin akeyless/base tag (chart default is :latest) once the
# image-policy program covers this namespace.

akeylessUserAuth:
  adminAccessId: p-azw6mrarrx4sam
  # secret akeyless-gw-secret, key: admin-access-key (delivered by ESO)
  adminAccessKeyExistingSecret: akeyless-gw-secret
  clusterName: incluster-gw
  initialClusterDisplayName: incluster-gw
  # fragment-independent DFC key -> usable by this gateway without a customer fragment
  configProtectionKeyName: /mdapi/keys/incluster-gw-config
  restrictAccessToAdminAccount: true

# Control plane = the CipherTrust-fronted Akeyless API (CSM).
env:
  - name: AKEYLESS_URL
    value: "https://cm.mdapi.ch/akeyless-api/v2"

# Not exposed externally; ESO reaches it in-cluster on :8081 (REST API v2).
service:
  type: ClusterIP

persistence:
  enabled: false

HPA:
  enabled: false
