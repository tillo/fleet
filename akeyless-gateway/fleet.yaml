# Second Akeyless Gateway, deployed IN-CLUSTER so its dynamic-secret producers can
# reach ClusterIP-only databases (e.g. paperless-pg-rw) that the external CipherTrust
# gateway cannot. Auth: api_key (access-id p-azw6mrarrx4sam, key from akeyless-gw-secret).
# Config protected by the fragment-independent DFC key /mdapi/keys/incluster-gw-config.
defaultNamespace: akeyless-gateway
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
helm:
  maxHistory: 25
  releaseName: akeyless-gateway
  repo: https://akeylesslabs.github.io/helm-charts
  chart: akeyless-api-gateway
  version: 1.62.14
  valuesFiles:
    - values.yml
