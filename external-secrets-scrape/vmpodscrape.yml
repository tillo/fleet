# Scrape the External Secrets Operator controller metrics (:8080 /metrics, named port
# "metrics") into VictoriaMetrics, so the ESO sync-health early-warning rules
# (monitoring-rules/28-external-secrets.yml) actually have data. ESO exposes the metrics
# but the chart ships no Service/scrape, so this VMPodScrape wires it directly.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMPodScrape
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: external-secrets
  podMetricsEndpoints:
    - port: metrics
