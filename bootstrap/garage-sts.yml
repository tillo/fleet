apiVersion: v1
kind: Service
metadata:
  name: garage-headless
  namespace: bootstrap
spec:
  clusterIP: None
  selector:
    app: garage
  ports:
  - { name: rpc, port: 3901 }
  - { name: s3, port: 3900 }
  - { name: web, port: 3902 }
  - { name: admin, port: 3903 }
---
apiVersion: v1
kind: Service
metadata:
  name: garage
  namespace: bootstrap
spec:
  selector:
    app: garage
  ports:
  - { name: s3, port: 3900, targetPort: 3900 }
  - { name: web, port: 3902, targetPort: 3902 }
  - { name: admin, port: 3903, targetPort: 3903 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: garage
  namespace: bootstrap
spec:
  serviceName: garage-headless
  replicas: 1
  selector:
    matchLabels:
      app: garage
  template:
    metadata:
      labels:
        app: garage
    spec:
      containers:
      - name: garage
        image: dxflrs/garage:v2.3.0
        env:
        - name: GARAGE_CONFIG_FILE
          value: /etc/garage/garage.toml
        # rpc_secret, admin_token, metrics_token come from the env file
        # populated by the secret mount. Garage reads them via `${VAR}` syntax
        # in garage.toml — but we keep them as env so they don't end up in
        # the config map.
        envFrom:
        - secretRef:
            name: garage-tokens
        ports:
        - { name: rpc, containerPort: 3901 }
        - { name: s3, containerPort: 3900 }
        - { name: web, containerPort: 3902 }
        - { name: admin, containerPort: 3903 }
        readinessProbe:
          httpGet: { path: /health, port: 3903 }
          periodSeconds: 5
        livenessProbe:
          httpGet: { path: /health, port: 3903 }
          periodSeconds: 30
          failureThreshold: 5
        volumeMounts:
        - { name: meta, mountPath: /var/lib/garage/meta }
        - { name: data, mountPath: /var/lib/garage/data }
        - { name: config, mountPath: /etc/garage/garage.toml, subPath: garage.toml }
        resources:
          requests: { cpu: 250m, memory: 512Mi }
          limits:   { cpu: "2",  memory: 4Gi }
      volumes:
      - name: config
        configMap:
          name: garage-config
  volumeClaimTemplates:
  - metadata:
      name: meta
    spec:
      accessModes: [ReadWriteOnce]
      storageClassName: harvester-longhorn-2replicas
      resources: { requests: { storage: 5Gi } }
  - metadata:
      name: data
    spec:
      accessModes: [ReadWriteOnce]
      storageClassName: harvester-longhorn-2replicas
      resources: { requests: { storage: 200Gi } }
