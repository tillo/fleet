apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garage-tokens
  namespace: bootstrap
spec:
  refreshInterval: 5m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: garage-tokens
    creationPolicy: Owner
  data:
  - remoteRef: { key: /mdapi/bootstrap/garage/rpc-secret }
    secretKey: GARAGE_RPC_SECRET
  - remoteRef: { key: /mdapi/bootstrap/garage/admin-token }
    secretKey: GARAGE_ADMIN_TOKEN
  - remoteRef: { key: /mdapi/bootstrap/garage/metrics-token }
    secretKey: GARAGE_METRICS_TOKEN
---
# S3 access credentials for GitLab — created via `garage key new` and stored
# back into akeyless during pre-flight bootstrap. GitLab's
# gitlab-object-storage-secret will be patched at cutover to point at these.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garage-gitlab-s3-creds
  namespace: bootstrap
spec:
  refreshInterval: 5m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: garage-gitlab-s3-creds
    creationPolicy: Owner
  data:
  - remoteRef: { key: /mdapi/bootstrap/garage/gitlab-access-key }
    secretKey: access_key
  - remoteRef: { key: /mdapi/bootstrap/garage/gitlab-secret-key }
    secretKey: secret_key
