apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: valkey-password
  namespace: bootstrap
spec:
  refreshInterval: 5m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: valkey-password
    creationPolicy: Owner
  data:
  - remoteRef: { key: /mdapi/bootstrap/valkey/password }
    secretKey: password
