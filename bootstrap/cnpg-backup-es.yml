apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-pg-backup-s3
  namespace: bootstrap
spec:
  refreshInterval: 5m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: gitlab-pg-backup-s3
    creationPolicy: Owner
  data:
  - remoteRef: { key: /mdapi/bootstrap/cnpg/garage-backup-access-key }
    secretKey: ACCESS_KEY_ID
  - remoteRef: { key: /mdapi/bootstrap/cnpg/garage-backup-secret-key }
    secretKey: ACCESS_SECRET_KEY
