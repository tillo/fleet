## Prometheus ServiceMonitor for the bootstrap-namespace Garage instance.
## The admin port (3903) serves /metrics behind a Bearer token (GARAGE_METRICS_TOKEN
## env var loaded into the Garage container from the garage-tokens secret).
## Feeds the Backup-landscape Grafana dashboard + GarageClusterDegraded alert.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: garage
  namespace: bootstrap
  labels:
    app: garage
spec:
  selector:
    matchLabels:
      app: garage
  namespaceSelector:
    matchNames:
      - bootstrap
  endpoints:
    - port: admin
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      authorization:
        type: Bearer
        credentials:
          name: garage-tokens
          key: GARAGE_METRICS_TOKEN
