apiVersion: apps/v1
kind: Deployment
metadata:
  name: diun
  namespace: diun
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
spec:
  selector:
    matchLabels:
      app: diun
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: diun
    spec:
      serviceAccountName: diun
      containers:
      - name: diun
        image: crazymax/diun:latest
        args:
        - "serve"
        env:
        - name: TZ
          value: Europe/Zurich
        - name: LOG_LEVEL
          value: "info"
        - name: LOG_JSON
          value: "false"
        - name: DIUN_WATCH_WORKERS
          value: "20"
        - name: DIUN_WATCH_SCHEDULE
          value: "45 */6 * * *"
        - name: DIUN_WATCH_JITTER
          value: "30s"
        - name: DIUN_PROVIDERS_KUBERNETES
          value: "true"
        - name: DIUN_PROVIDERS_KUBERNETES_WATCHBYDEFAULT
          value: "true"
        volumeMounts:
        - name: diun-data
          mountPath: /data
      volumes:
      - name: diun-data
        persistentVolumeClaim:
          claimName: diun-data
