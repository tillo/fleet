apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: diun-pushover
spec:
  refreshInterval: 1m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: diun-pushover
    creationPolicy: Owner
    template:
      data:
        DIUN_NOTIF_PUSHOVER_TOKEN: "{{ .token }}"
        DIUN_NOTIF_PUSHOVER_RECIPIENT: "{{ .recipient }}"
        DIUN_REGOPTS_0_NAME: "registry.mdapi.ch"
        DIUN_REGOPTS_0_SELECTOR: "image"
        DIUN_REGOPTS_0_USERNAME: "{{ .regUsername }}"
        DIUN_REGOPTS_0_PASSWORD: "{{ .regPassword }}"

  data:
    - remoteRef:
        key: /mdapi/certspotter/certspotter-env-secret/CS_PUSHOVER_TOKEN
      secretKey: token
    - remoteRef:
        key: /mdapi/certspotter/certspotter-env-secret/CS_PUSHOVER_USER
      secretKey: recipient
    - remoteRef:
        key: /mdapi/diun/registry-read-username
      secretKey: regUsername
    - remoteRef:
        key: /mdapi/diun/registry-read-password
      secretKey: regPassword
