# Shared: namespaced ACME issuer (DNS-01 via BIND), tsig, and the Caddy token-gate config.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: letsencrypt-prod
  namespace: evertrust-mcp
spec:
  acme:
    email: tillo@tillo.ch
    privateKeySecretRef:
      name: letsencrypt-prod
    server: https://acme-v02.api.letsencrypt.org/directory
    solvers:
      - dns01:
          rfc2136:
            nameserver: 31.3.128.59:53
            tsigKeyName: mdapi
            tsigAlgorithm: HMACSHA256
            tsigSecretSecretRef:
              name: tsig-secret
              key: tsig-secret-key
        selector:
          dnsZones:
            - 'mdapi.ch'
      - http01:
          ingress:
            class: nginx
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tsig-secret
spec:
  refreshInterval: 1m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: tsig-secret
    creationPolicy: Owner
  data:
    - remoteRef:
        key: /mdapi/evertrust-mcp/tsig-secret-key
      secretKey: tsig-secret-key
---
# Caddy token gate (shared config; AUTH_TOKEN injected per-deployment via env).
# Mirrors the k8s-mcp pattern: gate on ?token=, rewrite Host/Origin to localhost
# (MCP servers validate Origin), strip Sec-Fetch-* , proxy to the local bridge.
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-caddy
data:
  Caddyfile: |
    {
      admin off
      auto_https off
    }
    :8080 {
      @authed query token={$AUTH_TOKEN}
      handle @authed {
        reverse_proxy localhost:9090 {
          header_up Host "localhost"
          header_up Origin "http://localhost"
          header_up -Sec-Fetch-Site
          header_up -Sec-Fetch-Mode
          header_up -Sec-Fetch-Dest
        }
      }
      respond "Unauthorized" 401
    }
