apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: textopolis
  namespace: textopolis
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
spec:
  ingressClassName: nginx
  rules:
    - host: textopolis.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: textopolis
                port:
                  number: 80
    - host: www.textopolis.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: textopolis
                port:
                  number: 80
  tls:
    - hosts:
        - textopolis.ch
        - www.textopolis.ch
      secretName: textopolis-cert
