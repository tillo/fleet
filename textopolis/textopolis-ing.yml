apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: textopolis
  namespace: textopolis
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: Textopolis
    flame.pawelmalak/url: https://textopolis.net
    flame.pawelmalak/category: Web Hosting
    flame.pawelmalak/icon: web
    flame.pawelmalak/order: '50'
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecAuditEngine RelevantOnly
      SecAuditLogRelevantStatus "^(?:5|4(?!04))"
      SecAuditLogParts ABIJDEFHZ
      SecAuditLogType Serial
      SecAuditLogFormat JSON
      SecAuditLog /dev/stdout
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
spec:
  ingressClassName: nginx
  rules:
    - host: textopolis.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: textopolis
                port:
                  number: 80
    - host: www.textopolis.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: textopolis
                port:
                  number: 80
  tls:
    - hosts:
        - textopolis.net
        - www.textopolis.net
      secretName: textopolis-cert
