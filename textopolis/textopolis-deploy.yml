apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    keel.sh/match-tag: 'true'
    keel.sh/policy: force
    keel.sh/pollSchedule: "@every 5m"
    keel.sh/trigger: poll
  name: textopolis
  namespace: textopolis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: textopolis
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: textopolis
    spec:
      containers:
      - env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: DB_PASSWORD
              name: db-secret
        envFrom:
        - configMapRef:
            name: db-config
        - secretRef:
            name: wp-salts
        image: registry.mdapi.ch/mdapi/textopolis:latest
        name: textopolis
        ports:
        - containerPort: 80
        resources:
          limits:
            memory: 384Mi
          requests:
            cpu: 50m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /wp-login.php
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - mountPath: /var/www/html/wp-content/uploads
          name: uploads
        - mountPath: /etc/msmtprc
          name: msmtp-config
          readOnly: true
          subPath: msmtprc
      imagePullSecrets:
      - name: mdapi-registry
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: uploads
      - configMap:
          name: msmtp-config
        name: msmtp-config
---
apiVersion: v1
kind: Service
metadata:
  name: textopolis
  namespace: textopolis
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: textopolis
