# Operator scope: cluster-wide (lets us create Cluster CRs in any ns).
config:
  clusterWide: true

monitoring:
  # Skip the bundled ServiceMonitor — prometheus-operator will pick CNPG up
  # if we enable it later.
  podMonitorEnabled: false
  grafanaDashboard:
    create: false

# CNPG operator itself is small and idempotent — one replica is fine for our
# scale; add a second only if we add more Clusters than just gitlab-pg.
replicaCount: 1
