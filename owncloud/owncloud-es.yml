apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: owncloud-env-secret
spec:
  refreshInterval: 1m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: owncloud-env-secret
    creationPolicy: Owner
  data:
    - remoteRef:
        key: /mdapi/owncloud/owncloud-env-secret/OWNCLOUD_DB_PASSWORD
      secretKey: OWNCLOUD_DB_PASSWORD
    - remoteRef:
        key: /mdapi/owncloud/owncloud-env-secret/OWNCLOUD_ADMIN_PASSWORD
      secretKey: OWNCLOUD_ADMIN_PASSWORD
