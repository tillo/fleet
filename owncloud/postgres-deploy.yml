apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  annotations:
    keel.sh/policy: minor
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 4h"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      # Pod-level k8s admission defaults written explicitly so Fleet
      # drift detection doesn't flag the bundle Modified after admission
      # fills them in on the live state.
      restartPolicy: Always
      dnsPolicy: ClusterFirst
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30
      securityContext: {}
      containers:
        - name: postgres
          image: mirror.gcr.io/postgres:17
          imagePullPolicy: Always
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          env:
            - name: TZ
              value: Europe/Zurich
            - name: POSTGRES_USER
              value: owncloud
            - name: POSTGRES_DB
              value: owncloud
          envFrom:
            - secretRef:
                name: postgres-env-secret
          ports:
            - containerPort: 5432
              protocol: TCP
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: wants_an_empty_folder
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
