apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: owncloud
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: OwnCloud
    flame.pawelmalak/url: https://cloud.mdapi.ch
    flame.pawelmalak/category: Storage
    flame.pawelmalak/icon: cloud
    flame.pawelmalak/order: '30'
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecAuditEngine RelevantOnly
      SecAuditLogRelevantStatus "^(?:5|4(?!04))"
      SecAuditLogParts ABIJDEFHZ
      SecAuditLogType Serial
      SecAuditLogFormat JSON
      SecAuditLog /dev/stdout
      SecAction "id:900200,phase:1,nolog,pass,t:none,setvar:tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE PROPFIND PROPPATCH MKCOL COPY MOVE LOCK UNLOCK REPORT"
      # Carveouts MUST precede the Include: phase:1 rules run in declaration
      # order, so a ctl placed after the Include fires too late.
      # Note: we use ctl:ruleRemoveByTag=OWASP_CRS rather than ctl:ruleEngine=Off
      # or ctl:ruleRemoveById=NNN here. In libmodsecurity-nginx v3, a phase-1
      # ctl set before the CRS Include does not reliably propagate to phase-2
      # rules loaded inside that Include; ruleRemoveByTag is processed at rule
      # registration time and works regardless of phase. See CRS CHANGES.md
      # (replace uses of ctl:ruleEngine=Off with ctl:ruleRemoveByTag=OWASP_CRS).
      # WebDAV file-sync paths carry arbitrary user file names and bytes, so
      # CRS request inspection there yields only false positives (LFI/XSS/SQLi
      # rules tripping on file names and contents). Remove all CRS rules for
      # those paths; the web UI, OAuth2 and every other path on this host
      # stay fully WAF-protected.
      SecRule REQUEST_URI "@rx ^/(public\.php/webdav|remote\.php/(dav|webdav))/" \
        "id:1001,phase:1,pass,nolog,ctl:ruleRemoveByTag=OWASP_CRS"
      # 934110 (SSRF: metadata URL in param) flags the RFC 8252 loopback
      # redirect_uri of native OAuth2 clients. The oauth2 app endpoint is a
      # narrowly-scoped, server-implemented path where CRS request inspection
      # has produced only false positives in practice; remove the full CRS
      # ruleset for this path (same propagation reason as id:1001).
      SecRule REQUEST_URI "@beginsWith /index.php/apps/oauth2/" \
        "id:1008,phase:1,pass,nolog,ctl:ruleRemoveByTag=OWASP_CRS"
      # 942290 (NoSQL/Mongo injection) flags the OData $expand query
      # parameter name used by the OwnCloud Graph API. Same propagation
      # reason as id:1001; remove the full CRS ruleset on /graph/.
      SecRule REQUEST_URI "@beginsWith /graph/" \
        "id:1009,phase:1,pass,nolog,ctl:ruleRemoveByTag=OWASP_CRS"
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
    nginx.ingress.kubernetes.io/server-snippet: |
      location = /.well-known/caldav  { return 301 https://cloud.mdapi.ch/remote.php/dav/; }
      location = /.well-known/carddav { return 301 https://cloud.mdapi.ch/remote.php/dav/; }
    nginx.ingress.kubernetes.io/proxy-body-size: "10g"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: cloud.mdapi.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: owncloud
                port:
                  number: 8080
  tls:
    - hosts:
        - cloud.mdapi.ch
      secretName: owncloud-cert
