apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: owncloud
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: OwnCloud
    flame.pawelmalak/url: https://cloud.mdapi.ch
    flame.pawelmalak/category: Storage
    flame.pawelmalak/icon: cloud
    flame.pawelmalak/order: '30'
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecAuditEngine RelevantOnly
      SecAuditLogRelevantStatus "^(?:5|4(?!04))"
      SecAuditLogParts ABIJDEFHZ
      SecAuditLogType Serial
      SecAuditLogFormat JSON
      SecAuditLog /dev/stdout
      SecAction "id:900200,phase:1,nolog,pass,t:none,setvar:tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE PROPFIND PROPPATCH MKCOL COPY MOVE LOCK UNLOCK REPORT"
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
      # File uploads to OwnCloud carry arbitrary Content-Type (e.g.
      # application/vnd.openxmlformats-officedocument.* for Office files,
      # image/jpeg, application/pdf) that aren't in the CRS default
      # tx.allowed_request_content_type whitelist. Scope-disable 920420
      # (and 920430, the protocol-version-not-allowed cousin that also
      # fires on some upload clients) on the WebDAV upload endpoints only.
      SecRule REQUEST_URI "@rx ^/(public\.php/webdav|remote\.php/(dav/files|webdav))/" \
        "id:1001,phase:1,pass,nolog,ctl:ruleRemoveById=920420,ctl:ruleRemoveById=920430"
    nginx.ingress.kubernetes.io/server-snippet: |
      location = /.well-known/caldav  { return 301 https://cloud.mdapi.ch/remote.php/dav/; }
      location = /.well-known/carddav { return 301 https://cloud.mdapi.ch/remote.php/dav/; }
    nginx.ingress.kubernetes.io/proxy-body-size: "10g"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: cloud.mdapi.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: owncloud
                port:
                  number: 8080
  tls:
    - hosts:
        - cloud.mdapi.ch
      secretName: owncloud-cert
