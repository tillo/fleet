apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: owncloud
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: OwnCloud
    flame.pawelmalak/url: https://cloud.mdapi.ch
    flame.pawelmalak/category: Storage
    flame.pawelmalak/icon: cloud
    flame.pawelmalak/order: '30'
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecAction "id:900200,phase:1,nolog,pass,t:none,setvar:tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE PROPFIND PROPPATCH MKCOL COPY MOVE LOCK UNLOCK REPORT"
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
      SecRule REQUEST_URI "@rx ^/remote\.php/(dav|webdav)/" \
        "id:1001,phase:1,pass,nolog,ctl:ruleRemoveByTag=attack-rce"
    nginx.ingress.kubernetes.io/server-snippet: |
      location = /.well-known/caldav  { return 301 https://cloud.mdapi.ch/remote.php/dav/; }
      location = /.well-known/carddav { return 301 https://cloud.mdapi.ch/remote.php/dav/; }
    nginx.ingress.kubernetes.io/proxy-body-size: "10g"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: cloud.mdapi.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: owncloud
                port:
                  number: 8080
  tls:
    - hosts:
        - cloud.mdapi.ch
      secretName: owncloud-cert
