## VolSync backup of owncloud-data-ceph (Ceph RBD, ~172 GiB user files).
## copyMethod Snapshot -> crash-consistent CSI snapshot via the ceph-block
## VolumeSnapshotClass, then restic to the external Garage ceph-backup bucket
## (off-site replicated to B2/SFTP by garage_offsite_backup). Daily 02:30 UTC,
## finishing well before the 04:00 offsite sync. Retain 7 daily / 4 weekly /
## 3 monthly; prune weekly. owncloud's Postgres lives on Longhorn and is
## covered by the Longhorn recurring backups, so only the file data is here.
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: owncloud-data-ceph
spec:
  sourcePVC: owncloud-data-ceph
  # PAUSED 2026-06-17: config verified end-to-end (data flowed, 0 errors), but the
  # off-site Garage (salt/pepper TrueNAS) write path is hard-capped at ~2-4 MiB/s
  # (single & 4x-parallel both ~2-4 MiB/s; GET is ~21 MiB/s), so the first full
  # ~172 GiB seed would take ~24h. Flip to false to seed off-hours; daily
  # incrementals afterwards are tiny so the cap is a non-issue. Throughput fix
  # tracked separately (off-site Garage write path).
  paused: true
  trigger:
    schedule: "30 2 * * *"
  restic:
    repository: volsync-ceph-backup-restic
    copyMethod: Snapshot
    volumeSnapshotClassName: ceph-block
    cacheCapacity: 8Gi
    # restic cache (index) on fast Longhorn/fio, not the P420i Ceph tier we back up.
    cacheStorageClassName: harvester-longhorn-1replica
    pruneIntervalDays: 7
    retain:
      daily: 7
      weekly: 4
      monthly: 3
