apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ivodellambrogio
  namespace: ivodellambrogio
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: Ivo Dell'Ambrogio
    flame.pawelmalak/url: https://ivodellambrogio.ch
    flame.pawelmalak/category: Web Hosting
    flame.pawelmalak/icon: web
    flame.pawelmalak/order: '30'
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
spec:
  ingressClassName: nginx
  rules:
    - host: ivodellambrogio.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ivodellambrogio
                port:
                  number: 80
    - host: www.ivodellambrogio.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ivodellambrogio
                port:
                  number: 80
  tls:
    - hosts:
        - ivodellambrogio.ch
        - www.ivodellambrogio.ch
      secretName: ivodellambrogio-cert
