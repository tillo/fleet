## monitoring-logging-flows — the mdapi logging-pipeline routing CRs
## (ClusterFlow / ClusterOutput for rancher-logging's fluentd).
##
## Separate bundle BY DESIGN, twice over:
##  - not in monitoring-logging: that bundle owns the Harvester Addon CR with
##    forced drift-correction and must stay minimal across Harvester upgrades;
##  - not in monitoring-rules (was there until 2026-07-06): that bundle is
##    PrometheusRule-territory (see its _README.md).
##
## takeOwnership: the CRs pre-exist (orphaned from the monitoring-rules helm
## release via helm.sh/resource-policy: keep) and are adopted here.
defaultNamespace: cattle-logging-system
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
helm:
  maxHistory: 25
  takeOwnership: true
