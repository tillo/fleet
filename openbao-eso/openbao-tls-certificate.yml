## OpenBao server TLS certificate (P1.5 stage 1) — issued by CA01 via the
## Horizon ClusterIssuer `horizon-private`. Stage 1 only materializes the
## secret; the listener flip to TLS (stage 2) consumes it.
## Consumers verify against the CA01 root in the trust-manager ConfigMap
## `mdapi-trust-bundle` (distributed to every namespace); the served chain
## is leaf+issuing per the estate full-chain rule.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openbao-tls
  namespace: openbao
spec:
  commonName: openbao.openbao.svc
  dnsNames:
    - openbao.openbao.svc
    - openbao.openbao.svc.cluster.local
    - openbao.openbao
    - openbao
    - openbao-0.openbao-internal
    - openbao-internal.openbao.svc
  issuerRef:
    group: horizon.evertrust.io
    kind: ClusterIssuer
    name: horizon-private
  secretName: openbao-tls
