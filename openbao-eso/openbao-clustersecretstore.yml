apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao              # STANDBY store (Option B). Akeyless `cm-akeyless` stays primary.
spec:
  provider:
    vault:
      server: "http://openbao.openbao.svc:8200"   # P1: in-cluster http (internal-CA TLS = P1.5)
      path: "mdapi"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso"
          serviceAccountRef:
            name: openbao-eso
            namespace: external-secrets
