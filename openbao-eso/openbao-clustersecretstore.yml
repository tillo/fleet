apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao              # STANDBY store (Option B). Akeyless `cm-akeyless` stays primary.
spec:
  provider:
    vault:
      server: "https://openbao.openbao.svc:8200"  # P1.5: CA01 TLS (cert openbao-tls via horizon-private)
      caProvider:
        type: ConfigMap
        name: mdapi-trust-bundle   # trust-manager bundle: Mozilla roots + MDAPI Root CA
        key: ca-bundle.crt
        namespace: openbao
      path: "mdapi"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso"
          serviceAccountRef:
            name: openbao-eso
            namespace: external-secrets
