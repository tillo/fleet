# Cluster-side glue for the OpenBao secrets standby (Akeyless failover, Option B):
# the ESO `openbao` ClusterSecretStore + its auth ServiceAccounts.
# NOTE: OpenBao-side config (KV v2 mount `mdapi`, kubernetes auth method, policies
# eso-read/admin, roles eso/admin) is still IMPERATIVE in raft from P1 — P2 will
# make it reproducible via a bootstrap Job. If OpenBao is rebuilt from scratch,
# re-run that config before this store validates.
defaultNamespace: openbao
