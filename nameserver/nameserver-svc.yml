apiVersion: v1
kind: Service
metadata:
  name: nameserver-dns
  namespace: nameserver
  annotations:
    purelb.io/service-group: default
spec:
  selector:
    app: nameserver
  ports:
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: 53
    - name: dns-udp
      port: 53
      protocol: UDP
      targetPort: 53
  type: LoadBalancer
  loadBalancerIP: 192.168.1.53
