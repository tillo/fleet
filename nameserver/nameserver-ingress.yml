apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nameserver
  namespace: nameserver
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: DNS Admin
    flame.pawelmalak/url: https://nsadmin.mdapi.ch
    flame.pawelmalak/category: Network
    flame.pawelmalak/icon: dns
    flame.pawelmalak/order: '30'
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - nsadmin.mdapi.ch
      secretName: nameserver-tls
  rules:
    - host: nsadmin.mdapi.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nameserver-webmin
                port:
                  number: 10000
