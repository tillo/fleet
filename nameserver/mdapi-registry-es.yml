apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mdapi-registry
  namespace: nameserver
spec:
  refreshInterval: 1m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: mdapi-registry
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: '{{ .encodedUserPass | toString }}'
  data:
    - remoteRef:
        key: /mdapi/nameserver/mdapi-registry
      secretKey: encodedUserPass
