apiVersion: apps/v1
kind: Deployment
metadata:
  name: nameserver
  namespace: nameserver
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  selector:
    matchLabels:
      app: nameserver
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: nameserver
    spec:
      imagePullSecrets:
        - name: mdapi-registry
      initContainers:
        - name: fix-permissions
          image: busybox
          command: ["sh", "-c", "chown -R 100:101 /var/lib/bind"]
          volumeMounts:
            - name: zones
              mountPath: /var/lib/bind
      containers:
        - name: nameserver
          image: registry.mdapi.ch/mdapi/nameserver:9.20.21-mdapi.201
          ## Default Always means every pod restart waits on a fresh pull
          ## against registry.mdapi.ch → gitlab.mdapi.ch JWT auth. On
          ## 2026-05-18 a Valkey/Longhorn outage made GitLab JWT return
          ## 502, blocking the registry pull, and the resulting nameserver
          ## restart took BIND9 (and therefore in-cluster DNS) down with
          ## it. IfNotPresent breaks that dependency loop — the cached
          ## image on each node is enough to restart the pod when GitLab
          ## is unavailable. Lane B (2026-06-12): the tag is now PINNED (was
          ## :latest) and keel removed; Renovate bumps the pinned X.Y.Z-mdapi.N
          ## tag via MR, so updates land through GitOps rather than a live pull.
          imagePullPolicy: IfNotPresent
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: webmin
              containerPort: 10000
              protocol: TCP
          volumeMounts:
            - name: zones
              mountPath: /var/lib/bind
            - name: named-conf
              mountPath: /etc/bind/named.conf
              subPath: named.conf
            - name: tsig-key
              mountPath: /etc/bind/tsig.key
              subPath: named-key
            - name: webmin-secret
              mountPath: /run/secrets/webmin
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 768Mi
          livenessProbe:
            exec:
              command:
                - /usr/bin/dig
                - "@127.0.0.1"
                - "-p"
                - "53"
                - "tillo.ch"
                - "SOA"
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 53
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: zones
          persistentVolumeClaim:
            claimName: nameserver-zones
        - name: named-conf
          configMap:
            name: named-conf
        - name: tsig-key
          secret:
            secretName: tsig-secret
            defaultMode: 0444
        - name: webmin-secret
          secret:
            secretName: webmin-secret
            defaultMode: 0444
