apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: webmin-secret
  namespace: nameserver
spec:
  refreshInterval: 1m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: webmin-secret
    creationPolicy: Owner
  data:
    - remoteRef:
        key: /mdapi/nameserver/webmin-password
      secretKey: password
