defaultNamespace: keycloak
namespace: keycloak
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
helm:
  maxHistory: 25
# Two sources of expected drift between fleet manifest and live state:
#   1. VPA (mode=Auto) writes resources.requests/limits onto running
#      pods after start.
#   2. Keel (`keel.sh/policy: minor|force`) auto-bumps the image tag
#      on its poll cadence.
# Strip both fields from the diff so Fleet stops flagging Modified.
diff:
  comparePatches:
  - apiVersion: apps/v1
    kind: Deployment
    name: postgres
    namespace: keycloak
    operations:
    - {"op": "remove", "path": "/spec/template/spec/containers/0/resources"}
    - {"op": "remove", "path": "/spec/template/spec/containers/0/image"}
  - apiVersion: apps/v1
    kind: Deployment
    name: keycloak
    namespace: keycloak
    operations:
    - {"op": "remove", "path": "/spec/template/spec/containers/0/resources"}
    - {"op": "remove", "path": "/spec/template/spec/containers/0/image"}
