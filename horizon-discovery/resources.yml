# Horizon network discovery: a node-pinned, hostNetwork CronJob that runs
# `horizon-cli netscan` over the node's connected subnets (LAN 192.168.1.0/24)
# and feeds the `network` discovery campaign in Horizon.
#
# Why this shape:
#  - horizon-cli ships only as a Nexus binary (no upstream image) -> we bake it into
#    our own image (registry.mdapi.ch/mdapi/horizon-cli); the pod just runs it.
#  - netscan has no target flags; it scans the host's directly-connected subnets,
#    so hostNetwork:true + nodeName pins it to a LAN-attached node to see 192.168.1.x.
#  - dnsPolicy ClusterFirstWithHostNet so it resolves horizon.*.svc and the LAN.
#  - auth = dedicated `horizon-discovery` Horizon identity (role discovery:*); the
#    `network` campaign's feed authz is `authenticated`, which this identity satisfies.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: horizon-discovery
  namespace: horizon-discovery
automountServiceAccountToken: false
---
# Creds: Horizon discovery identity (feed API). The horizon-cli binary is now baked into
# the image, so the kyos Nexus creds are no longer present in the pod.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: horizon-discovery-creds
  namespace: horizon-discovery
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: horizon-discovery-creds
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        ENDPOINT: "http://horizon.horizon.svc.cluster.local:9000"
        APIID: "horizon-discovery"
        APIKEY: "{{ .apikey }}"
  data:
    - secretKey: apikey
      remoteRef:
        key: /mdapi/horizon/discovery/password
---
# Pull secret for the private horizon-cli image (GitLab registry), via a group
# read_registry deploy token stored in Akeyless.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-registry
  namespace: horizon-discovery
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: gitlab-registry
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"registry.mdapi.ch":{"username":"{{ .user }}","password":"{{ .token }}","auth":"{{ printf "%s:%s" .user .token | b64enc }}"}}}
  data:
    - secretKey: user
      remoteRef:
        key: /mdapi/gitlab/registry-pull-token/username
    - secretKey: token
      remoteRef:
        key: /mdapi/gitlab/registry-pull-token/token
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: horizon-netscan
  namespace: horizon-discovery
spec:
  schedule: "30 */6 * * *"          # every 6h at :30 (00:30/06:30/12:30/18:30) — was daily; a single
                                    # transient failure now self-heals within 6h, not 24h.
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 3600
      template:
        spec:
          serviceAccountName: horizon-discovery
          imagePullSecrets:
            - name: gitlab-registry
          automountServiceAccountToken: false
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          nodeName: qui                # LAN-attached node (192.168.1.190)
          restartPolicy: Never
          containers:
            - name: netscan
              # Purpose-built image baking the horizon-cli static binary (registry.mdapi.ch/mdapi/horizon-cli);
              # ENTRYPOINT is horizon-cli, so args are just its subcommand. No runtime apk/RPM fetch, no kyos creds
              # in the pod. The binary reads ENDPOINT/APIID/APIKEY from the env (no config file needed).
              image: registry.mdapi.ch/mdapi/horizon-cli:latest
              imagePullPolicy: Always
              args: ["netscan", "--campaign=network"]
              envFrom:
                - secretRef:
                    name: horizon-discovery-creds
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
