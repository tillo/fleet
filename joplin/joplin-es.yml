apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: joplin-env-secret
spec:
  refreshInterval: 1m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: joplin-env-secret
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/joplin/joplin-postgres-credentials/password
      secretKey: POSTGRES_PASSWORD
