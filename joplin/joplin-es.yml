apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: joplin-env-secret
spec:
  refreshInterval: 1m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: joplin-env-secret
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/joplin/postgres-env-secret/POSTGRES_PASSWORD
      secretKey: POSTGRES_PASSWORD
    # LDAP bind password (reuse the shared admin bind; same key the mailserver uses).
    - remoteRef:
        key: /mdapi/mail/docker-mailserver-env-secret/LDAP_BIND_PW
      secretKey: LDAP_1_BIND_PW
