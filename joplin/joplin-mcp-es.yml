apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: joplin-mcp-env-secret
spec:
  refreshInterval: 1m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: joplin-mcp-env-secret
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/joplin/joplin-mcp-env-secret/JOPLIN_SERVER_EMAIL
      secretKey: JOPLIN_SERVER_EMAIL
    - remoteRef:
        key: /mdapi/joplin/joplin-mcp-env-secret/JOPLIN_SERVER_PASSWORD
      secretKey: JOPLIN_SERVER_PASSWORD
    - remoteRef:
        key: /mdapi/joplin/joplin-mcp-env-secret/MCP_BEARER_TOKEN
      secretKey: MCP_BEARER_TOKEN
