apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: joplin-mcp
  namespace: joplin
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: Joplin MCP
    flame.pawelmalak/url: https://notes-mcp.mdapi.ch
    flame.pawelmalak/category: Collaboration
    flame.pawelmalak/icon: connection
    flame.pawelmalak/order: '50'
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecAuditEngine RelevantOnly
      SecAuditLogRelevantStatus "^(?:5|4(?!04))"
      SecAuditLogParts ABIJDEFHZ
      SecAuditLogType Serial
      SecAuditLogFormat JSON
      SecAuditLog /dev/stdout
      SecDebugLog /tmp/modsec_debug.log
      # MCP JSON-RPC endpoint receives arbitrary technical content (notes, code,
      # log excerpts, command history) that routinely trips CRS body checks.
      # Endpoint is bearer-token authenticated; auth is the protection layer.
      # First trigger: 921110 false-matched the phrase "apply_patch returned http/2"
      # inside a note body (2026-05-31).
      SecRule REQUEST_URI "@beginsWith /mcp" \
        "id:1001,phase:1,pass,nolog,ctl:ruleRemoveByTag=OWASP_CRS"
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
    # SSE requires disabling proxy buffering
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: notes-mcp.mdapi.ch
      http:
        paths:
          - backend:
              service:
                name: joplin-mcp
                port:
                  number: 8080
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - notes-mcp.mdapi.ch
      secretName: joplin-mcp-cert
