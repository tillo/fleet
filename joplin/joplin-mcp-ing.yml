apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: joplin-mcp
  namespace: joplin
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: Joplin MCP
    flame.pawelmalak/url: https://notes-mcp.mdapi.ch
    flame.pawelmalak/category: Collaboration
    flame.pawelmalak/icon: connection
    flame.pawelmalak/order: '50'
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecAuditLogType Serial
      SecAuditLogFormat JSON
      SecAuditLog /dev/stdout
      SecDebugLog /tmp/modsec_debug.log
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
    # SSE requires disabling proxy buffering
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: notes-mcp.mdapi.ch
      http:
        paths:
          - backend:
              service:
                name: joplin-mcp
                port:
                  number: 8080
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - notes-mcp.mdapi.ch
      secretName: joplin-mcp-cert
