auth:
  database: joplin
  username: joplin
  existingSecret: joplin-postgres-credentials
  secretKeys:
    adminPasswordKey: postgres-password
    userPasswordKey: password

primary:
  persistence:
    storageClass: harvester-longhorn-2replicas
    size: 5Gi
  extraEnvVars:
  - name: TZ
    value: Europe/Zurich

extraDeploy:
- apiVersion: external-secrets.io/v1
  kind: ExternalSecret
  metadata:
    name: joplin-postgres-credentials
  spec:
    refreshInterval: 1m0s

    secretStoreRef:
      kind: ClusterSecretStore
      name: cm-akeyless

    target:
      name: joplin-postgres-credentials
      creationPolicy: Owner

    data:
      - remoteRef:
          key: /mdapi/joplin/joplin-postgres-credentials/postgres-password
        secretKey: postgres-password
      - remoteRef:
          key: /mdapi/joplin/joplin-postgres-credentials/password
        secretKey: password

keel:
  policy: minor
  trigger: poll
  pollSchedule: "@every 4h"
  images:
    - repository: image.repository
      tag: image.tag
