apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: squid-ldap
spec:
  refreshInterval: 1m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: squid-ldap
    creationPolicy: Owner
  data:
    - remoteRef:
        key: /mdapi/openldap/openldap-env-secret/ADMIN_PASS
      secretKey: ADMIN_PASS
