apiVersion: v1
kind: Service
metadata:
  name: znc
  namespace: znc
spec:
  selector:
    app: znc
  ports:
    - name: znc
      port: 443
      protocol: TCP
      targetPort: 443
    - name: ident
      port: 113
      protocol: TCP
      targetPort: 113
  type: LoadBalancer
  loadBalancerIP: 192.168.1.51
