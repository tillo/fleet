postgresql:
  persistence:
    enabled: true
    storageClass: "harvester-longhorn-2replicas"
    size: 5Gi

windmill:
  baseDomain: windmill.mdapi.ch
  baseProtocol: https
  # windmill-extra (LSP/Multiplayer/Debugger) tag defaults to the chart's
  # appVersion (currently 1.725.0), but the windmill-extra image repo on ghcr
  # lags the main windmill image by ~one release — 1.725.0 does not exist for
  # extra (latest published is 1.724.0), so the rollout was stuck in
  # ImagePullBackOff. Pin extra to the latest tag that actually exists. REMOVE
  # this pin (or bump it) once ghcr.io/windmill-labs/windmill-extra:1.725.0
  # publishes, so extra tracks the app version again.
  windmillExtra:
    tag: "1.724.0"
  # Override the chart's default workerGroups list to bump the default
  # group's memory limit from 2Gi → 4Gi. Required since the
  # scrypted_data_backup script streams a ~50 MiB tarball + base64
  # buffers, peaking ~250 MiB; under load the shared worker pod can
  # easily exceed 2Gi across concurrent jobs. Helm lists don't merge
  # so we must re-declare all 3 chart-default groups verbatim.
  workerGroups:
    - name: default
      replicas: 3
      mode: worker
      controller: Deployment
      privileged: true
      podSecurityContext:
        runAsNonRoot: false
        runAsUser: 0
      terminationGracePeriodSeconds: 604800
      resources:
        limits:
          memory: 4Gi
    - name: native
      replicas: 1
      mode: worker
      controller: Deployment
      privileged: false
      podSecurityContext:
        runAsNonRoot: false
        runAsUser: 0
      extraEnv:
        - name: NATIVE_MODE
          value: "true"
        - name: SLEEP_QUEUE
          value: "200"
      resources:
        limits:
          memory: 2Gi
    - name: gpu
      replicas: 0
      mode: worker
      controller: Deployment
      privileged: true
      podSecurityContext:
        runAsNonRoot: false
        runAsUser: 0
      resources:
        limits:
          memory: 2Gi
ingress:
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/session-cookie-name: "route"
    flame.pawelmalak/type: app
    flame.pawelmalak/name: Windmill
    flame.pawelmalak/url: https://windmill.mdapi.ch/
    flame.pawelmalak/category: Ops
    flame.pawelmalak/icon: sitemap
    flame.pawelmalak/order: '20'
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecAuditEngine RelevantOnly
      SecAuditLogRelevantStatus "^(?:5|4(?!04))"
      SecAuditLogParts ABIJDEFHZ
      SecAuditLogType Serial
      SecAuditLogFormat JSON
      SecAuditLog /dev/stdout
      SecRule REQUEST_URI "@beginsWith /api/w/mdapi/workspaces/tarball" "id:1001,phase:1,pass,nolog,ctl:ruleEngine=DetectionOnly"
      # Windmill REST API uses DELETE on variables/scripts/flows/schedules
      # and PATCH on most resources. Declare id:900200 BEFORE Include so
      # ModSec keeps OUR allowed_methods list (first-wins on duplicate
      # IDs) and the CRS crs-setup.conf id:900200 is dropped. Rule
      # 911100 then sees the expanded list at phase:1 and does not add
      # 5 to anomaly_score for DELETE/PATCH/PUT.
      # No apostrophes in this block: the outer modsecurity_rules is
      # single-quoted and the apostrophe closes the string at the nginx
      # parser layer (2026-05-11 outage).
      SecAction "id:900200,phase:1,nolog,pass,t:none,setvar:tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE"
      # The wmill node SDK (workspace tarball backup, resource downloads)
      # sets Content-Type: application/octet-stream on GET requests. CRS
      # rule 920420 fires on that MIME type by default. Extend the
      # allowed list in phase:1 before the Include so 920420 stops
      # firing on legitimate authenticated API traffic. Same pattern as
      # joplin/joplin-ing.yml cf3e8c3.
      SecAction "id:900201,phase:1,nolog,pass,t:none,setvar:tx.allowed_request_content_type=|application/x-www-form-urlencoded| |multipart/form-data| |text/xml| |application/xml| |application/soap+xml| |application/json| |application/reports+json| |application/csp-report| |application/octet-stream|"
      # Windmill resource paths (scripts/flows/apps) are user-named and can
      # legitimately end in a CRS restricted-file token, e.g.
      # f/gitlab/upgrade_bump_dockerfile -> 930130 matches "dockerfile" in
      # restricted-files.data and blocks the authenticated API call. Drop
      # 930130 only on the authenticated workspace API surface; root-level
      # scanner probes (/.env, /.git/config) are not under /api/w/ and stay
      # blocked. Two-line continuation is required or the ctl silently no-ops.
      SecRule REQUEST_URI "@beginsWith /api/w/mdapi/" \
        "id:1002,phase:1,pass,nolog,ctl:ruleRemoveById=930130"
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
  tls:
    - secretName: windmill-cert
      hosts:
        - windmill.mdapi.ch
    