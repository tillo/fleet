defaultNamespace: spider3
namespace: spider3
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
dependsOn:
  - name: mdapi-prod-cert-manager
  - name: mdapi-prod-external-secrets
helm:
  maxHistory: 25

# VPA (mode=Auto) writes resources.requests/limits onto running pods.
# Strip the resources block from both sides before diff so Fleet stops
# flagging the bundle as Modified.
diff:
  comparePatches:
  - apiVersion: apps/v1
    kind: Deployment
    name: spider3
    namespace: spider3
    operations:
    # VPA (Auto) writes resources onto ALL three containers, not just [0];
    # covering only container 0 left sftpgo[1]/sftpgo-auth[2] flapping the
    # bundle Modified. The manifest defines a resources block for each, so
    # these removes never void the patch.
    - {"op": "remove", "path": "/spec/template/spec/containers/0/resources"}
    - {"op": "remove", "path": "/spec/template/spec/containers/1/resources"}
    - {"op": "remove", "path": "/spec/template/spec/containers/2/resources"}
