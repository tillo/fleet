apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-secret
spec:
  refreshInterval: 1m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: db-secret
    creationPolicy: Owner
  data:
    - remoteRef:
        key: /mdapi/spider3/db-password
      secretKey: DB_PASSWORD
    - remoteRef:
        key: /mdapi/spider3/mariadb-root-password
      secretKey: MARIADB_ROOT_PASSWORD
