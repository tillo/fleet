defaultNamespace: paperless
namespace: paperless
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
dependsOn:
  - name: mdapi-prod-cert-manager
helm:
  maxHistory: 25

# VPA (mode=Auto) writes resources.requests/limits onto running pods
# after start — strip resources from the diff so Fleet does not flag
# the bundle Modified. paperless Deployment containers: 0 paperless,
# 1 tika, 2 gotenberg, 3 consume-puller.
#
# The paperless-ngx image tag is bumped by the fleet-image-sync Windmill
# job: it scans ghcr for newer 2.x releases and commits the bump into
# paperless-deploy.yml, so git stays the single source of truth and a
# Fleet re-apply can never downgrade the code below the DB migration
# level. paperless-ngx has no major-track floating tag (:latest crosses
# into 3.x), so it cannot use the floating-tag + Keel pattern. Keel is
# intentionally not used on this Deployment.
diff:
  comparePatches:
  - apiVersion: apps/v1
    kind: Deployment
    name: paperless
    namespace: paperless
    operations:
    - {"op": "remove", "path": "/spec/template/spec/containers/0/resources"}
    - {"op": "remove", "path": "/spec/template/spec/containers/1/resources"}
    - {"op": "remove", "path": "/spec/template/spec/containers/2/resources"}
    - {"op": "remove", "path": "/spec/template/spec/containers/3/resources"}
  - apiVersion: apps/v1
    kind: Deployment
    name: paperless-valkey
    namespace: paperless
    operations:
    - {"op": "remove", "path": "/spec/template/spec/containers/0/resources"}
