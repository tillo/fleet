## paperless-ngx main app + Tika + Gotenberg sidecars.
##
## Single Deployment, single replica, Recreate strategy:
##   - paperless-ngx serves both web + Celery worker in-process when
##     PAPERLESS_TASK_WORKERS>0 is set (no separate worker Deployment).
##   - Tika and Gotenberg run as sidecars so paperless reaches them
##     via 127.0.0.1 (no extra Services).
##   - Data lives on /usr/src/paperless/data + /media + /export + /consume
##     all backed by the single 100Gi Longhorn PVC.
##
## Auth = Keycloak OIDC via django-allauth (the paperless-ngx 2.18 image
## does not bundle python-ldap, so direct LDAP bind isn't an option).
## Keycloak realm `tilloch` at idp.mdapi.ch is itself LDAP-federated,
## so users sign in with their existing LDAP credentials via the "MDAPI"
## button on the login page. Local `tillo` admin login stays enabled.
## First successful login auto-creates the Django user (SOCIAL_AUTO_SIGNUP).
## Joint document visibility is set up post-login via paperless's group
## `DMS` + default View+Change permissions on both users.
##
## Mail = IMAP poll of documents@mdapi.ch (LDAP-managed mailbox,
## also created 2026-05-19). Rule routing handled via the UI after
## first login.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless
  namespace: paperless
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 4h"
spec:
  selector:
    matchLabels:
      app: paperless
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: paperless
    spec:
      ## Kubernetes injects env vars for every Service in the namespace by
      ## default (PAPERLESS_PORT=tcp://10.53.x.y:8000, etc.). paperless-ngx
      ## uses PAPERLESS_PORT as its OWN listening-port config, so the
      ## injected value gets parsed as "is not a valid integer" and the
      ## granian web server refuses to start. Disable Service-env injection
      ## for this pod — it doesn't need them.
      enableServiceLinks: false
      containers:
        ## Image tag is bumped by the fleet-image-sync Windmill job: it
        ## scans ghcr for newer 2.x releases and commits the bump onto the
        ## line below, so git stays the single source of truth and a Fleet
        ## re-apply can never downgrade below the DB migration level. (A
        ## 2.18 downgrade on 2026-05-20 broke tag creation: code behind the
        ## treenode schema.) Keel is intentionally not used here.
        - name: paperless
          image: ghcr.io/paperless-ngx/paperless-ngx:2.20.15
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            # ---- Core ----
            - name: PAPERLESS_URL
              value: "https://documents.mdapi.ch"
            - name: PAPERLESS_TIME_ZONE
              value: "Europe/Zurich"
            - name: PAPERLESS_OCR_LANGUAGES
              value: "fra ita deu eng"
            - name: PAPERLESS_OCR_LANGUAGE
              value: "fra+ita+deu+eng"
            ## Auto-detect and correct page rotation during OCR. Some PDFs
            ## embed a 270° page-rotation hint while the raw image is stored
            ## sideways - tesseract reads the un-rotated image and produces
            ## garbage. OCRmyPDF's --rotate-pages probes each page with
            ## tesseract's OSD and rotates as needed before the OCR pass.
            ## Threshold 12 (default) is the confidence above which the
            ## rotation is applied; below that the page is left alone.
            - name: PAPERLESS_OCR_ROTATE_PAGES
              value: "true"
            - name: PAPERLESS_OCR_ROTATE_PAGES_THRESHOLD
              value: "12"
            - name: PAPERLESS_TASK_WORKERS
              value: "2"
            - name: PAPERLESS_WEBSERVER_WORKERS
              value: "2"
            - name: PAPERLESS_THREADS_PER_WORKER
              value: "1"
            # ---- Mail polling cadence ----
            ## Poll the documents@mdapi.ch IMAP inbox every 5 min (default is
            ## 10) — matches the consume-puller's OwnCloud poll interval. The
            ## mail account + rule themselves are DB config, managed in the UI.
            - name: PAPERLESS_EMAIL_TASK_CRON
              value: "*/5 * * * *"
            # ---- Database (CNPG) ----
            - name: PAPERLESS_DBHOST
              value: "paperless-pg-rw"
            - name: PAPERLESS_DBPORT
              value: "5432"
            - name: PAPERLESS_DBNAME
              value: "paperless"
            - name: PAPERLESS_DBUSER
              value: "paperless"
            # ---- Redis (Valkey) ----
            - name: PAPERLESS_REDIS
              value: "redis://paperless-valkey:6379"
            # ---- Tika + Gotenberg sidecars ----
            - name: PAPERLESS_TIKA_ENABLED
              value: "1"
            - name: PAPERLESS_TIKA_ENDPOINT
              value: "http://127.0.0.1:9998"
            - name: PAPERLESS_TIKA_GOTENBERG_ENDPOINT
              value: "http://127.0.0.1:3000"
            # ---- OIDC (django-allauth + Keycloak realm tilloch) ----
            ## PAPERLESS_SOCIALACCOUNT_PROVIDERS comes from the rendered
            ## paperless-oidc-secret (full JSON with the Akeyless secret
            ## substituted in at sync time). See paperless-es.yml.
            - name: PAPERLESS_APPS
              value: "allauth.socialaccount.providers.openid_connect"
            - name: PAPERLESS_SOCIAL_AUTO_SIGNUP
              value: "True"
            # ---- Consume / filename layout ----
            ## Recursive walk of /consume + each subdirectory becomes a tag
            ## on the ingested documents. Used for the first-wave bootstrap
            ## from OwnCloud (cloud.mdapi.ch /Paperless-Consume) where each
            ## Tier-1 topic folder maps 1:1 to a paperless tag.
            - name: PAPERLESS_CONSUMER_RECURSIVE
              value: "true"
            - name: PAPERLESS_CONSUMER_SUBDIRS_AS_TAGS
              value: "true"
            - name: PAPERLESS_CONSUMER_ENABLE_BARCODES
              value: "true"
            - name: PAPERLESS_CONSUMER_ENABLE_ASN_BARCODE
              value: "true"
            - name: PAPERLESS_FILENAME_FORMAT
              value: "{{ created_year }}/{{ correspondent }}/{{ title }}"
            # ---- Secrets ----
          envFrom:
            - secretRef:
                name: paperless-env-secret
            - secretRef:
                name: paperless-oidc-secret
          volumeMounts:
            - name: data
              mountPath: /usr/src/paperless/data
              subPath: data
            - name: data
              mountPath: /usr/src/paperless/media
              subPath: media
            - name: data
              mountPath: /usr/src/paperless/export
              subPath: export
            - name: data
              mountPath: /usr/src/paperless/consume
              subPath: consume
          resources:
            requests:
              cpu: 200m
              memory: 2Gi
            limits:
              cpu: 4
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30

        - name: tika
          image: apache/tika:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9998
          resources:
            requests: {cpu: 50m, memory: 256Mi}
            limits:   {cpu: 2,   memory: 1Gi}

        - name: gotenberg
          image: gotenberg/gotenberg:8
          imagePullPolicy: IfNotPresent
          ## Gotenberg disables --chromium-disable-javascript by default;
          ## paperless needs PDF render only, no JS execution required.
          command: ["gotenberg"]
          args:
            - "--chromium-disable-javascript=true"
            - "--chromium-allow-list=file:///tmp/.*"
          ports:
            - containerPort: 3000
          resources:
            requests: {cpu: 50m, memory: 128Mi}
            limits:   {cpu: 2,   memory: 1Gi}

        ## consume-puller: every 5 min, rclone-move files from the OwnCloud
        ## share /Paperless-Consume (owned by the `documents` LDAP service
        ## account, R+W-shared with mdellambrogio) into paperless's local
        ## /consume directory. Files vanish from OwnCloud once moved, so the
        ## source folder is a true drop-zone (no double-consume on next poll).
        ## Subdir structure is preserved so paperless's SUBDIRS_AS_TAGS
        ## auto-tags each ingested doc with its parent folder name.
        ##
        ## The OwnCloud user-name path component is the LDAP entryUUID
        ## (d1a8901f-...) because OwnCloud's `ldapUserName=samaccountname`
        ## mapping has no samaccountname attribute on this entry and falls
        ## back to the UUID. The display name "Documents Mailbox" is still
        ## what shows up in shares.
        ##
        ## rclone's WebDAV password env var must be in obscured form. We
        ## store the pre-obscured value in Akeyless at
        ## /mdapi/paperless/imap-password-rclone-obscured and pull it
        ## straight into RCLONE_CONFIG_OWNCLOUD_PASS via secretKeyRef —
        ## doing the obscure at container startup proved fragile (export
        ## in a sh -c "..." script did not reach the rclone subprocess
        ## reliably). See paperless-es.yml for the password-rotation note.
        - name: consume-puller
          image: rclone/rclone:latest
          imagePullPolicy: Always
          ## Run as paperless's uid/gid (1000) — NOT root. rclone creates the
          ## /consume subdirectories as it mirrors the OwnCloud folder tree;
          ## if it runs as root those dirs are root:root 0755 and paperless's
          ## uid-1000 celery worker cannot delete the source file after
          ## consuming it ([Errno 13] → infinite re-OCR loop). uid 1000 owns
          ## the /consume volume root, so rclone writes fine and every dir it
          ## creates stays deletable by the worker.
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          command: ["sh", "-c"]
          args:
            - |
              echo "[$(date -Iseconds)] consume-puller started"
              while true; do
                rclone move \
                  --no-traverse --transfers 4 --checkers 8 \
                  --retries 3 --low-level-retries 5 \
                  --delete-empty-src-dirs \
                  --stats 0 \
                  owncloud:Paperless-Consume/ /consume/ \
                  2>&1 | grep -vE '^$|^0 B / 0 B' || true
                sleep 300
              done
          env:
            - name: RCLONE_CONFIG_OWNCLOUD_TYPE
              value: "webdav"
            - name: RCLONE_CONFIG_OWNCLOUD_URL
              value: "https://cloud.mdapi.ch/remote.php/dav/files/d1a8901f-7a33-46f1-a985-02e450a7a35a/"
            - name: RCLONE_CONFIG_OWNCLOUD_VENDOR
              value: "owncloud"
            - name: RCLONE_CONFIG_OWNCLOUD_USER
              value: "documents"
            - name: RCLONE_CONFIG_OWNCLOUD_PASS
              valueFrom:
                secretKeyRef:
                  name: paperless-env-secret
                  key: RCLONE_CONFIG_OWNCLOUD_PASS
          volumeMounts:
            - name: data
              mountPath: /consume
              subPath: consume
          ## rclone-move bursts hard during the 5-min poll window; the 1c
          ## lid was throttling 17% of CFS periods. 2c gives the transfer
          ## loop enough headroom to finish before the next poll wakes.
          resources:
            requests: {cpu: 25m, memory: 64Mi}
            limits:   {cpu: 2,   memory: 256Mi}

        ## archive-extractor: watches /consume for archives the consume-puller
        ## drops in and extracts them in place so paperless can ingest the
        ## contents (paperless-ngx has no native archive support). Handles
        ## .zip and .tar(.gz/.bz2/.xz) via the Python stdlib, and .7z via
        ## py7zr (pip-installed at startup; python:3.12-slim is glibc so the
        ## C-extension wheels install with no build toolchain). RAR is NOT
        ## supported — it needs a proprietary non-stdlib binary.
        ## Charset-aware for zip: entries without the UTF-8 flag are recovered
        ## from cp437 and re-decoded (utf-8 → cp850 → cp1252) so DOS/Windows
        ## codepage filenames don't ingest as mojibake. Runs as uid 1000 so
        ## everything it creates stays deletable by the worker (same reason
        ## as consume-puller above). Each archive is extracted into a folder
        ## named after it, then deleted; nested archives extract next pass.
        - name: archive-extractor
          image: python:3-slim
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          env:
            - name: HOME
              value: /tmp
          command: ["sh", "-c"]
          args:
            - |
              pip install --user --quiet --disable-pip-version-check py7zr 2>&1 \
                || echo "[archive-extractor] py7zr install failed - .7z disabled this run"
              cat > /tmp/extract.py <<'PYEOF'
              import zipfile, tarfile, os, time, shutil
              try:
                  import py7zr
                  HAVE_7Z = True
              except Exception:
                  HAVE_7Z = False
              CONSUME, SETTLE, POLL = "/consume", 30, 60
              def zname(zi):
                  if zi.flag_bits & 0x800:
                      return zi.filename
                  raw = zi.filename.encode("cp437")
                  for enc in ("utf-8", "cp850", "cp1252"):
                      try: return raw.decode(enc)
                      except UnicodeDecodeError: continue
                  return zi.filename
              def safe(base, name):
                  t = os.path.normpath(os.path.join(base, name.lstrip("/")))
                  if t != base and not t.startswith(base + os.sep):
                      raise ValueError("unsafe path %r" % name)
                  return t
              def do_zip(path, dest):
                  with zipfile.ZipFile(path) as zf:
                      if zf.testzip() is not None:
                          raise zipfile.BadZipFile("CRC failed")
                      for zi in zf.infolist():
                          if zi.is_dir(): continue
                          t = safe(dest, zname(zi))
                          os.makedirs(os.path.dirname(t), exist_ok=True)
                          with zf.open(zi) as s, open(t, "wb") as o:
                              shutil.copyfileobj(s, o)
              def do_tar(path, dest):
                  with tarfile.open(path) as tf:
                      for m in tf.getmembers():
                          if not m.isfile(): continue
                          t = safe(dest, m.name)
                          os.makedirs(os.path.dirname(t), exist_ok=True)
                          with tf.extractfile(m) as s, open(t, "wb") as o:
                              shutil.copyfileobj(s, o)
              def do_7z(path, dest):
                  os.makedirs(dest, exist_ok=True)
                  with py7zr.SevenZipFile(path, "r") as z:
                      z.extractall(path=dest)
              def normalize(dest):
                  ## py7zr's extractall can reproduce a 000 file mode from the
                  ## archive — paperless (uid 1000) must be able to READ the
                  ## file to consume it. Force sane modes on everything.
                  for r, ds, fs in os.walk(dest):
                      for x in ds:
                          try: os.chmod(os.path.join(r, x), 0o755)
                          except OSError: pass
                      for x in fs:
                          try: os.chmod(os.path.join(r, x), 0o644)
                          except OSError: pass
              print("[archive-extractor] started (7z %s)" % ("on" if HAVE_7Z else "off"), flush=True)
              while True:
                  try:
                      for root, _, files in os.walk(CONSUME):
                          for f in files:
                              lo = f.lower()
                              if lo.endswith(".zip"): fn = do_zip
                              elif lo.endswith((".tar",".tar.gz",".tgz",".tar.bz2",".tar.xz")): fn = do_tar
                              elif lo.endswith(".7z") and HAVE_7Z: fn = do_7z
                              else: continue
                              p = os.path.join(root, f)
                              try:
                                  if time.time() - os.path.getmtime(p) < SETTLE: continue
                              except OSError: continue
                              try:
                                  dest = os.path.splitext(p)[0]
                                  fn(p, dest)
                                  normalize(dest)
                                  os.remove(p)
                                  print("[archive-extractor] extracted: " + p, flush=True)
                              except Exception as e:
                                  print("[archive-extractor] FAILED %s: %r" % (p, e), flush=True)
                  except Exception as e:
                      print("[archive-extractor] loop error: %r" % e, flush=True)
                  time.sleep(POLL)
              PYEOF
              exec python3 -u /tmp/extract.py
          volumeMounts:
            - name: data
              mountPath: /consume
              subPath: consume
          resources:
            requests: {cpu: 10m,  memory: 64Mi}
            limits:   {cpu: 500m, memory: 256Mi}

        ## library-pusher: every 5 min, rclone-sync the paperless archive tree
        ## (OCR'd searchable PDFs) into the OwnCloud `documents` user folder
        ## /Paperless-Library. Shares 153/154 expose that folder read-only to
        ## mdellambrogio (Tillo) and elisadellambrogio (Elisa), so they can
        ## browse the {year}/{correspondent}/{title} document tree from
        ## OwnCloud without granting any Paperless access.
        ##
        ## Direction is one-way: Paperless is source of truth, OwnCloud copy
        ## mirrors deletions too. The read-only share keeps consumers from
        ## modifying files only to have them reverted on the next sync.
        ##
        ## Mount is `media/documents` (subPath) at /library read-only so the
        ## sidecar can't accidentally write back into the archive. Same rclone
        ## env block as consume-puller (same OwnCloud creds via secretKeyRef).
        - name: library-pusher
          image: rclone/rclone:latest
          imagePullPolicy: Always
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          command: ["sh", "-c"]
          args:
            - |
              echo "[$(date -Iseconds)] library-pusher started"
              while true; do
                rclone sync \
                  --transfers 4 --checkers 8 \
                  --retries 3 --low-level-retries 5 \
                  --stats 0 \
                  /library/archive/ owncloud:Paperless-Library/ \
                  2>&1 | grep -vE '^$|^0 B / 0 B' || true
                sleep 300
              done
          env:
            - name: RCLONE_CONFIG_OWNCLOUD_TYPE
              value: "webdav"
            - name: RCLONE_CONFIG_OWNCLOUD_URL
              value: "https://cloud.mdapi.ch/remote.php/dav/files/d1a8901f-7a33-46f1-a985-02e450a7a35a/"
            - name: RCLONE_CONFIG_OWNCLOUD_VENDOR
              value: "owncloud"
            - name: RCLONE_CONFIG_OWNCLOUD_USER
              value: "documents"
            - name: RCLONE_CONFIG_OWNCLOUD_PASS
              valueFrom:
                secretKeyRef:
                  name: paperless-env-secret
                  key: RCLONE_CONFIG_OWNCLOUD_PASS
          volumeMounts:
            - name: data
              mountPath: /library
              subPath: media/documents
              readOnly: true
          resources:
            requests: {cpu: 25m, memory: 64Mi}
            limits:   {cpu: 1,   memory: 256Mi}

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paperless-data
