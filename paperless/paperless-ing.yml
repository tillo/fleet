apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: paperless
  namespace: paperless
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "200m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      ## Paperless uploads multipart PDFs/images via /api/documents/post_document/
      ## which trips CRS 920420 (Request content type is not allowed by policy)
      ## the same way OwnCloud WebDAV did. Disable that rule for the upload
      ## endpoint. Carveout MUST come before the CRS Include - see
      ## fleet/owncloud/owncloud-ing.yml and docs modsec.md.
      ## NOTE: do NOT put apostrophes (or backslash-newline continuations) in
      ## this entire snippet, including comments. nginx-ingress wraps the
      ## whole thing in a single-quoted modsecurity_rules block, so any
      ## apostrophe inside terminates the quoted string at parse time and
      ## ALL cluster ingress reloads fail until fixed.
      SecRuleEngine On
      SecAuditEngine RelevantOnly
      SecAuditLogRelevantStatus "^(?:5|4(?!04))"
      SecAuditLogParts ABIJDEFHZ
      SecAuditLogType Serial
      SecAuditLogFormat JSON
      SecAuditLog /dev/stdout
      SecRule REQUEST_URI "@beginsWith /api/documents/post_document" "id:1001,phase:1,pass,nolog,ctl:ruleRemoveById=920420,ctl:ruleRemoveById=920430"
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
    flame.pawelmalak/type: app
    flame.pawelmalak/name: Documents
    flame.pawelmalak/url: https://documents.mdapi.ch
    flame.pawelmalak/category: Collaboration
    flame.pawelmalak/icon: file-document-multiple
    flame.pawelmalak/order: '60'
spec:
  ingressClassName: nginx
  rules:
    - host: documents.mdapi.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: paperless
                port:
                  number: 8000
  tls:
    - hosts:
        - documents.mdapi.ch
      secretName: paperless-cert
