# You can override the included template(s) by including variable overrides
# SAST customization: https://docs.gitlab.com/ee/user/application_security/sast/#customizing-the-sast-settings
# Secret Detection customization: https://docs.gitlab.com/ee/user/application_security/secret_detection/pipeline/#customization
# Dependency Scanning customization: https://docs.gitlab.com/ee/user/application_security/dependency_scanning/#customizing-the-dependency-scanning-settings
# Container Scanning customization: https://docs.gitlab.com/ee/user/application_security/container_scanning/#customizing-the-container-scanning-settings
# Note that environment variables can be set in several places
# See https://docs.gitlab.com/ee/ci/variables/#cicd-variable-precedence
stages:
- lint
- build
- test
- deploy
- review
- dast
- staging
- canary
- production
- incremental rollout 10%
- incremental rollout 25%
- incremental rollout 50%
- incremental rollout 100%
- performance
- cleanup
fleet-lint:
  stage: lint
  image: python:3.13-alpine
  before_script:
  - pip install --quiet --no-cache-dir pyyaml
  script:
  - python3 lint.py
sast:
  stage: test
include:
  - project: mdapi/ci-templates
    file: /secret-scan.yml
    ref: main
- template: Auto-DevOps.gitlab-ci.yml
secret-scan:
  extends: .secret-scan

# Renovate — Lane-B image bumps (config in renovate.json). Runs ONLY on a pipeline
# schedule or a manual web run, never on normal pushes/MRs. Opens MRs (automerge
# OFF). Token from the masked RENOVATE_TOKEN CI variable (Akeyless source of truth:
# /mdapi/renovate/gitlab-token). Part of the 2026-06 image-policy work.
renovate:
  stage: lint
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  image:
    name: ghcr.io/renovatebot/renovate:latest
    entrypoint: [""]
  tags:
    - mdapi
  variables:
    RENOVATE_PLATFORM: gitlab
    RENOVATE_ENDPOINT: https://gitlab.mdapi.ch/api/v4
    RENOVATE_AUTODISCOVER: "false"
    RENOVATE_REPOSITORIES: $CI_PROJECT_PATH
    RENOVATE_GIT_AUTHOR: "Renovate Bot <renovate@mdapi.ch>"
    RENOVATE_HOST_RULES: '[{"matchHost":"registry.mdapi.ch","hostType":"docker","username":"renovate-bot","password":"$RENOVATE_TOKEN"}]'
    LOG_LEVEL: info
  script:
    - renovate
