                    "tlsVerify": true,
                    "content": [
                      { "prefix": "library/alpine", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "library/busybox", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "library/python", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "prom/alertmanager", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "prom/prometheus", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "victoriametrics/operator", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "victoriametrics/vmagent", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "victoriametrics/vmalert", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "victoriametrics/victoria-metrics", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "library/caddy", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "library/debian", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
