                      { "prefix": "k8snetworkplumbingwg/whereabouts", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "ldapaccountmanager/lam", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "nextcloud-releases/**", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "paperless-ngx/paperless-ngx", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "project-zot/zot-linux-amd64", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "seerr-team/seerr", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "stakater/reloader", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "windmill-labs/windmill", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } }
                    ]
                  },
                  {
                    "urls": ["https://docker.io"],
                    "onDemand": true,
