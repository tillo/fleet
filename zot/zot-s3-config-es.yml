## ExternalSecret templating the full zot config.json + sync credentials
## file. Two keys produced in the target Secret:
##   - config.json     -> mounted at /etc/zot/config.json
##   - sync-creds.json -> mounted at /etc/zot/sync-creds.json
##
## Source secrets in Akeyless under /mdapi/zot/:
##   - garage-s3-{access-key, secret-key, bucket, endpoint}
##   - gitlab-sync-{username, token}  (group-level read_registry deploy token)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zot-s3-config
spec:
  refreshInterval: 1m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: zot-s3-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        ## ─────────────────────────────────────────────────────────────
        ## sync-creds.json: per-upstream-registry credentials, keyed by
        ## the registry URL Zot uses (just host, no scheme). Anonymous
        ## registries (ghcr.io / docker.io / lscr.io / quay.io) are
        ## omitted — Zot falls back to anonymous pulls.
        ## ─────────────────────────────────────────────────────────────
        sync-creds.json: |
          {
            "registry.mdapi.ch": {
              "username": "{{ .gitlabUser }}",
              "password": "{{ .gitlabToken }}"
            }
          }
        ## ─────────────────────────────────────────────────────────────
        ## config.json
        ## storage: S3 (Garage external) + emptyDir cache + GC, no dedupe
        ##   (dedupe needs a shared metadata DB which we don't run)
        ## extensions.sync: on-demand pull-through + periodic refresh per
        ##   registry. Tag regex filters: latest/stable/main/master + any
        ##   semver-ish tag (v1, v1.2, 1.2.3, 1.2.3-suffix). Prevents
        ##   accidentally mirroring 1000+ tags from things like nginx.
        ## http.readTimeout/writeTimeout: zot's CLI defaults both to 60s
        ##   when unset (pkg/cli/server/root.go), and Go's timeouts cover
        ##   the WHOLE request/response body — any blob layer taking >60s
        ##   to transfer is killed mid-stream ("i/o timeout", client 502).
        ##   The 423 MiB horizon-ciphertrust layer reproducibly died at
        ##   exactly 1m0s (2026-07-10), on ingress AND direct paths.
        ## ─────────────────────────────────────────────────────────────
        config.json: |
          {
            "storage": {
              "rootDirectory": "/var/lib/registry",
              "dedupe": false,
              "gc": true,
              "gcDelay": "1h",
              "gcInterval": "24h",
              "storageDriver": {
                "name": "s3",
                "bucket": "{{ .bucket }}",
                "region": "garage",
                "regionendpoint": "{{ .endpoint }}",
                "accesskey": "{{ .accesskey }}",
                "secretkey": "{{ .secretkey }}",
                "secure": true,
                "skipverify": false,
                "forcepathstyle": true
              }
            },
            "http": {
              "address": "0.0.0.0",
              "port": "5000",
              "readTimeout": "30m",
              "writeTimeout": "30m",
              "auth": {
                "htpasswd": {
                  "path": "/etc/zot/htpasswd"
                }
              }
            },
            "log": {
              "level": "info"
            },
            "extensions": {
              "sync": {
                "enable": true,
                "credentialsFile": "/etc/zot/sync-creds.json",
                "downloadDir": "/var/lib/registry/_sync",
                "registries": [
                  {
                    "urls": ["https://registry.mdapi.ch"],
                    "onDemand": true,
                    "pollInterval": "6h",
                    "tlsVerify": true,
                    "content": [
                      { "prefix": "mdapi/**", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } }
                    ]
                  },
                  {
                    "urls": ["https://ghcr.io"],
                    "onDemand": true,
                    "pollInterval": "24h",
                    "tlsVerify": true,
                    "content": [
                      { "prefix": "anantis-security/trapeye", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "autobrr/autobrr", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "blakeblackshear/frigate", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "brioche-works/technitium-dns-prometheus-exporter", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "cloudnative-pg/cloudnative-pg", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "cloudnative-pg/postgresql", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "democratic-csi/csi-grpc-proxy", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "democratic-csi/democratic-csi", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "external-secrets/external-secrets", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "flaresolverr/flaresolverr", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "haveagitgat/tdarr", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
                      { "prefix": "home-assistant/home-assistant", "tags": { "regex": "^(latest|stable|main|master|v?\\d+(\\.\\d+){0,3}(-[a-zA-Z0-9.-]+)?)$" } },
