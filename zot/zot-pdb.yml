## minAvailable=1 prevents Kubernetes (drain, autoscaler, etc.) from taking
## both Zot replicas down simultaneously. With pod anti-affinity already
## scheduling them on different nodes, this guarantees Zot remains
## reachable during normal cluster maintenance.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: zot
  namespace: zot
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: zot
