apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zot-auth
spec:
  refreshInterval: 1m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: zot-auth
    creationPolicy: Owner
  data:
    - remoteRef:
        key: /mdapi/zot/zot-auth/htpasswd
      secretKey: htpasswd
