apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zot
  namespace: zot
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: Zot
    flame.pawelmalak/url: https://zot.mdapi.ch
    flame.pawelmalak/category: Ops
    flame.pawelmalak/icon: package-variant-closed
    flame.pawelmalak/order: '40'
    # required — nginx 1m default breaks image layer pushes
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  ingressClassName: nginx
  rules:
    - host: zot.mdapi.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zot
                port:
                  number: 5000
  tls:
    - hosts:
        - zot.mdapi.ch
      secretName: zot-cert
