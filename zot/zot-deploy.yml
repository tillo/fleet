apiVersion: apps/v1
kind: Deployment
metadata:
  name: zot
  namespace: zot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zot
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: zot
    spec:
      containers:
        - name: zot
          image: ghcr.io/project-zot/zot-linux-amd64:latest
          args: ["serve", "/etc/zot/config.json"]
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: 25m
              memory: 1325Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
            - name: config
              mountPath: /etc/zot/config.json
              subPath: config.json
            - name: auth
              mountPath: /etc/zot/htpasswd
              subPath: htpasswd
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: zot-data
        - name: config
          configMap:
            name: zot-config
        - name: auth
          secret:
            secretName: zot-auth
