defaultNamespace: envuassu
namespace: envuassu
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
helm:
  maxHistory: 25
  releaseName: nextcloud-aio
  repo: https://nextcloud.github.io/all-in-one/
  chart: nextcloud-aio-helm-chart
  valuesFiles:
    - values.yaml
kustomize:
  dir: kustomize
 

# VPA (mode=Auto) writes resources.requests/limits onto running pods.
# Strip the resources block from both sides before diff so Fleet stops
# flagging the bundle as Modified.
diff:
  comparePatches:
  - apiVersion: apps/v1
    kind: Deployment
    name: nextcloud-aio-apache
    namespace: envuassu
    operations:
    - {"op": "remove", "path": "/spec/template/spec/containers/0/resources"}
  - apiVersion: apps/v1
    kind: Deployment
    name: nextcloud-aio-database
    namespace: envuassu
    operations:
    - {"op": "remove", "path": "/spec/template/spec/containers/0/resources"}
  - apiVersion: apps/v1
    kind: Deployment
    name: nextcloud-aio-fulltextsearch
    namespace: envuassu
    operations:
    - {"op": "remove", "path": "/spec/template/spec/containers/0/resources"}
  - apiVersion: apps/v1
    kind: Deployment
    name: nextcloud-aio-imaginary
    namespace: envuassu
    operations:
    - {"op": "remove", "path": "/spec/template/spec/containers/0/resources"}
  - apiVersion: apps/v1
    kind: Deployment
    name: nextcloud-aio-nextcloud
    namespace: envuassu
    operations:
    - {"op": "remove", "path": "/spec/template/spec/containers/0/resources"}
  - apiVersion: apps/v1
    kind: Deployment
    name: nextcloud-aio-notify-push
    namespace: envuassu
    operations:
    - {"op": "remove", "path": "/spec/template/spec/containers/0/resources"}
  - apiVersion: apps/v1
    kind: Deployment
    name: nextcloud-aio-onlyoffice
    namespace: envuassu
    operations:
    - {"op": "remove", "path": "/spec/template/spec/containers/0/resources"}
  - apiVersion: apps/v1
    kind: Deployment
    name: nextcloud-aio-redis
    namespace: envuassu
    operations:
    - {"op": "remove", "path": "/spec/template/spec/containers/0/resources"}
  - apiVersion: apps/v1
    kind: Deployment
    name: nextcloud-aio-talk
    namespace: envuassu
    operations:
    - {"op": "remove", "path": "/spec/template/spec/containers/0/resources"}
