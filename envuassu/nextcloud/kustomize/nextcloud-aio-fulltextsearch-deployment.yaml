apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud-aio-fulltextsearch
  namespace: envuassu
spec:
  template:
    spec:
      containers:
        - name: nextcloud-aio-fulltextsearch
          env:
            - name: FULLTEXTSEARCH_PASSWORD
              $patch: delete
          envFrom:
            - secretRef:
                name: nextcloud-aio-env-secret
