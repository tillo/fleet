## fulltextsearch is scaled to 0 because the upstream
## ghcr.io/nextcloud-releases/aio-fulltextsearch image is compiled for
## x86-64-v3 (AVX2/BMI1/BMI2/FMA/F16C) — the Ivy Bridge-EP Xeon nodes
## in this cluster are x86-64-v2, so the container starts then aborts:
##   "The current machine does not support all of the following CPU
##    features ... AVX, AVX2, BMI1, BMI2, FMA, F16C."
## Plus the matching FULLTEXTSEARCH_ENABLED=no in values.yaml tells
## Nextcloud's bootstrap not to wire the search backend. The chart
## still ships the Deployment unconditionally, so we scale to 0 to
## silence the crashloop.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud-aio-fulltextsearch
  namespace: envuassu
spec:
  replicas: 0
