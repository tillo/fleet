apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud-aio-apache
  namespace: envuassu
spec:
  # Recreate (not RollingUpdate) so a new pod is never scheduled before the old
  # one terminates and detaches the RWX volume — prevents transient cross-node
  # mount of pvc nextcloud-aio-nextcloud, which wedges Longhorn (engine
  # migration unsupported here, see envuassu/nextcloud/kustomize sibling
  # patches on -nextcloud and -notify-push for the same reason).
  strategy:
    type: Recreate
    rollingUpdate: null
  template:
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: io.kompose.service
                operator: In
                values:
                - nextcloud-aio-nextcloud
            topologyKey: "kubernetes.io/hostname"
