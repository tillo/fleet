apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud-aio-apache
  namespace: envuassu
spec:
  template:
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - nextcloud-aio-nextcloud
            topologyKey: "kubernetes.io/hostname"
