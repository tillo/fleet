apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud-aio-talk
  namespace: envuassu
spec:
  template:
    spec:
      containers:
        - name: nextcloud-aio-talk
          env:
            - name: INTERNAL_SECRET
              $patch: delete
            - name: SIGNALING_SECRET
              $patch: delete
            - name: TURN_SECRET
              $patch: delete
          envFrom:
            - secretRef:
                name: nextcloud-aio-env-secret
