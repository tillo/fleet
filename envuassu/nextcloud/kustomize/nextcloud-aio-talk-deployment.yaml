apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud-aio-talk
  namespace: envuassu
spec:
  template:
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: io.kompose.service
                operator: In
                values:
                - nextcloud-aio-nextcloud
            topologyKey: kubernetes.io/hostname
      containers:
        - name: nextcloud-aio-talk
          imagePullPolicy: IfNotPresent
          env:
            - name: INTERNAL_SECRET
              $patch: delete
            - name: SIGNALING_SECRET
              $patch: delete
            - name: TURN_SECRET
              $patch: delete
          envFrom:
            - secretRef:
                name: nextcloud-aio-env-secret
