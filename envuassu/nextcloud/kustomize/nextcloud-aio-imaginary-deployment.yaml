apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud-aio-imaginary
  namespace: envuassu
spec:
  template:
    spec:
      containers:
        - name: nextcloud-aio-imaginary
          imagePullPolicy: IfNotPresent
          env:
            - name: IMAGINARY_SECRET
              $patch: delete
          envFrom:
            - secretRef:
                name: nextcloud-aio-env-secret
