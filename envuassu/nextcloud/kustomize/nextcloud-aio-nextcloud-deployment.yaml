apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud-aio-nextcloud
  namespace: envuassu
spec:
  # See sibling -apache patch for rationale (Recreate avoids cross-node RWX
  # window during rollouts of the shared pvc nextcloud-aio-nextcloud).
  strategy:
    type: Recreate
    rollingUpdate: null
  template:
    spec:
      containers:
        - name: nextcloud-aio-nextcloud
          env:
            - name: ADMIN_PASSWORD
              $patch: delete
            - name: FULLTEXTSEARCH_PASSWORD
              $patch: delete
            - name: IMAGINARY_SECRET
              $patch: delete
            - name: ONLYOFFICE_SECRET
              $patch: delete
            - name: POSTGRES_PASSWORD
              $patch: delete
            - name: REDIS_HOST_PASSWORD
              $patch: delete
            - name: SIGNALING_SECRET
              $patch: delete
            - name: TURN_SECRET
              $patch: delete
          envFrom:
            - secretRef:
                name: nextcloud-aio-env-secret
