# TSIG key "mdapi" for the BIND nameserver (31.3.128.59), used by the
# letsencrypt-prod Issuer's rfc2136 DNS-01 solver. Same Akeyless source as the
# tsig-secret in bootstrap/appdaemon/etc.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tsig-secret
spec:
  refreshInterval: 1m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: tsig-secret
    creationPolicy: Owner
  data:
    - remoteRef:
        key: /mdapi/zot/tsig-secret/tsig-secret-key
      secretKey: tsig-secret-key
