ingress:
  enabled: true
  hosts:
    - host: suivi.envuassu.ch
      paths:
        - path: /
          pathType: ImplementationSpecific
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecDebugLog /tmp/modsec_debug.log
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
  tls:
    - secretName: suivi-cert
      hosts:
        - suivi.envuassu.ch
zammadConfig:
  initJob:
    randomName: false
    #ttlSecondsAfterFinished: 2147483647
  railsserver:
    startupProbe:
      failureThreshold: 40  # 40 * 4s = 160s max startup time (up from 80s) to survive slow DB warm-up

postgresql:
  primary:
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi
    extendedConfiguration: |
      effective_cache_size = 256MB
      work_mem = 8MB

elasticsearch:
  master:
    # Single-node cluster: set number_of_replicas=0 on all indices via postStart hook
    # This keeps the cluster green instead of yellow (no replica shards to assign)
    lifecycleHooks:
      postStart:
        exec:
          command:
            - /bin/bash
            - -c
            - |
              until curl -sf http://localhost:9200/_cluster/health; do sleep 3; done
              curl -sf -X PUT "http://localhost:9200/_index_template/no-replicas" \
                -H 'Content-Type: application/json' \
                -d '{"index_patterns":["*"],"priority":1,"template":{"settings":{"number_of_replicas":0}}}'
              curl -sf -X PUT "http://localhost:9200/*/_settings" \
                -H 'Content-Type: application/json' \
                -d '{"index":{"number_of_replicas":0}}'
