ingress:
  enabled: true
  hosts:
    - host: suivi.envuassu.ch
      paths:
        - path: /
          pathType: ImplementationSpecific
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
  tls:
    - secretName: suivi-cert
      hosts:
        - suivi.envuassu.ch
zammadConfig:
  initJob:
    randomName: false
