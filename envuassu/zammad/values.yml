ingress:
  enabled: true
  hosts:
    - host: suivi.envuassu.ch
      paths:
        - path: /
          pathType: ImplementationSpecific
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: Support
    flame.pawelmalak/url: https://suivi.envuassu.ch
    flame.pawelmalak/category: Envuassu
    flame.pawelmalak/icon: headset
    flame.pawelmalak/order: '30'
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecAuditEngine RelevantOnly
      SecAuditLogRelevantStatus "^(?:5|4(?!04))"
      SecAuditLogParts ABIJDEFHZ
      SecAuditLogType Serial
      SecAuditLogFormat JSON
      SecAuditLog /dev/stdout
      SecDebugLog /tmp/modsec_debug.log
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
  tls:
    - secretName: suivi-cert
      hosts:
        - suivi.envuassu.ch
zammadConfig:
  initJob:
    randomName: false
    #ttlSecondsAfterFinished: 2147483647
  railsserver:
    startupProbe:
      failureThreshold: 40  # 40 * 4s = 160s max startup time (up from 80s) to survive slow DB warm-up

postgresql:
  # bitnamilegacy froze 2025-08-28; pin to the latest available within the major
  # to claw back recent CVE patches without a 17→x major-version migration.
  image:
    tag: 17.6.0-debian-12-r4
  metrics:
    image:
      tag: 0.17.1-debian-12-r16
  primary:
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi
    extendedConfiguration: |
      effective_cache_size = 256MB
      work_mem = 8MB

elasticsearch:
  # Same legacy freeze; bump only the sysctl init image — main ES image is
  # stuck at 8.18.0 (no newer 8.x in legacy; 9.x is a major).
  sysctlImage:
    tag: 12-debian-12-r51
  master:
    # 2026-06-14: ES 8.18 JVM is slow to answer on :9200, esp. under cluster
    # load. The default liveness (initialDelay 180s, failureThreshold 5 -> kill
    # at ~230s) liveness-killed it during a reconcile-under-heavy-load, cascading
    # into a zammad outage. Widen the startup grace so a slow start can't trigger
    # a liveness-kill (now ~300 + 10*10 = 400s before liveness engages).
    livenessProbe:
      initialDelaySeconds: 300
      failureThreshold: 10

# Note: Elasticsearch runs in single-node mode and will show YELLOW status due to unassigned
# replica shards. This is expected and harmless. To turn it GREEN, run once after ES is up:
#   kubectl exec -n envuassu zammad-elasticsearch-master-0 -- curl -s -X PUT \
#     "http://localhost:9200/*/_settings" -H 'Content-Type: application/json' \
#     -d '{"index":{"number_of_replicas":0}}'
