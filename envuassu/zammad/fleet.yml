defaultNamespace: envuassu
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
helm:
  maxHistory: 25
  releaseName: zammad
  repo: https://zammad.github.io/zammad-helm
  chart: zammad
  version: 16.4.3  # Renovate-managed (renovate.json)
  valuesFiles:
    - values.yml
diff:
  comparePatches:
  - apiVersion: batch/v1
    kind: Job
    namespace: envuassu
    name: zammad-init
    operations:
    - {"op":"ignore"}
  # The zammad-redis subchart renders updateStrategy.rollingUpdate.
  # maxUnavailable, but the MaxUnavailableStatefulSet feature gate is off
  # on this cluster so the apiserver drops the field -> permanent drift.
  - apiVersion: apps/v1
    kind: StatefulSet
    namespace: envuassu
    name: zammad-redis
    jsonPointers:
    - "/spec/updateStrategy/rollingUpdate/maxUnavailable"
