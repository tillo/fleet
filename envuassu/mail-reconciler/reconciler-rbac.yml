apiVersion: v1
kind: ServiceAccount
metadata:
  name: mail-reconciler
  namespace: envuassu
---
# Least privilege: read pods (find the nextcloud pod) + exec into it. Nothing else.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mail-reconciler
  namespace: envuassu
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mail-reconciler
  namespace: envuassu
subjects:
  - kind: ServiceAccount
    name: mail-reconciler
    namespace: envuassu
roleRef:
  kind: Role
  name: mail-reconciler
  apiGroup: rbac.authorization.k8s.io
