# Shared-mailbox passwords for the reconciler (contact@ + finance@).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: envuassu-shared-mail
  namespace: envuassu
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: envuassu-shared-mail
    creationPolicy: Owner
  data:
    - remoteRef: { key: /mdapi/envuassu/mail-contact-password }
      secretKey: CONTACT_PW
    - remoteRef: { key: /mdapi/envuassu/mail-finance-password }
      secretKey: FINANCE_PW
