defaultNamespace: envuassu
namespace: envuassu
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
helm:
  maxHistory: 25
# Two sources of expected drift between fleet manifest and live state:
#   1. VPA (mode=Auto) writes resources.requests/limits onto running
#      pods after start.
#   2. Keel (`keel.sh/policy: minor`) auto-bumps the image tag on its
#      poll cadence (postgres:17 → postgres:17.9).
# Strip both fields from the diff so Fleet stops flagging Modified.
diff:
  comparePatches:
  - apiVersion: apps/v1
    kind: Deployment
    name: postgres
    namespace: envuassu
    operations:
    - {"op": "remove", "path": "/spec/template/spec/containers/0/resources"}
    - {"op": "remove", "path": "/spec/template/spec/containers/0/image"}
