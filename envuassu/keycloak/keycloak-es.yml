apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-env-secret
spec:
  refreshInterval: 1m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: keycloak-env-secret
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/envuassu/keycloak/keycloak-env-secret/KC_BOOTSTRAP_ADMIN_PASSWORD
      secretKey: KC_BOOTSTRAP_ADMIN_PASSWORD
    - remoteRef:
        key: /mdapi/envuassu/keycloak/keycloak-env-secret/KC_DB_PASSWORD
      secretKey: KC_DB_PASSWORD
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-env-secret
spec:
  refreshInterval: 1m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: postgres-env-secret
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/envuassu/keycloak/postgres-env-secret/POSTGRES_PASSWORD
      secretKey: POSTGRES_PASSWORD
