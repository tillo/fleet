## VMAlertmanagerConfig for vmalertmanager-mdapi. After Phase 4 cutover
## (vmalert ruleSelector narrowed to monitoring-stack=mdapi + vmAM
## configSelector selecting this CR), the route below is the ONLY path
## team=mdapi alerts take. Bundled Alertmanager will no longer see them.
##
## Format reference: https://docs.victoriametrics.com/operator/api/#vmalertmanagerconfigspec
## Field names follow Go json tags from the VM operator (snake_case),
## matching native alertmanager.yaml — not the camelCase used by
## monitoring.coreos.com/AlertmanagerConfig.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAlertmanagerConfig
metadata:
  name: mdapi-team
  namespace: monitoring
  labels:
    monitoring-stack: mdapi
spec:
  route:
    ## Parent route is a no-op black-hole. Anything not matching a child
    ## route is silently dropped — symmetric with the prior
    ## AlertmanagerConfig design.
    receiver: black-hole
    group_by: [component, alertname]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
    ## Severity-tiered notification to fight alarm fatigue. Same receiver
    ## (statuspage-and-pushover) but the Pushover `priority` template keys
    ## off severity, and repeat_interval is split per route:
    ##   critical -> priority 1 (interrupts), repeat 4h
    ##   warning  -> priority -1 (in-app, NO sound/vibration), repeat 24h
    ##   info/etc -> priority -2 (silent, badge only), repeat 24h
    ## First-match-wins: criticals take the first route; everything else
    ## team=mdapi falls to the catch-all second route. You keep full
    ## visibility in the Pushover app; only criticals buzz.
    ## InfoInhibitor / Watchdog stay exclude-listed defensively (vendor
    ## rules, no mdapi label post-cutover) so a stray label can't page.
    - receiver: statuspage-and-pushover
      matchers:
      - 'team="mdapi"'
      - 'alertname!~"InfoInhibitor|Watchdog"'
      - 'severity="critical"'
      repeat_interval: 4h
    - receiver: statuspage-and-pushover
      matchers:
      - 'team="mdapi"'
      - 'alertname!~"InfoInhibitor|Watchdog"'
      ## 168h/7d (was 24h): chronic conditions (cve/upgrade/cert/backup-missing)
      ## stay firing for days and were re-paged daily — the #1 Pushover-pool
      ## drain (5,251/mo, 2026-06). Weekly re-page is plenty for priority -1
      ## warnings. (Kept in `h` units to match the rest of this file.)
      repeat_interval: 168h
      ## 30m (was parent 5m): a group whose member set churns (e.g. 45
      ## NamespaceWithCriticalCves namespaces flapping through one group
      ## during pod churn) re-notifies at group_interval, not
      ## repeat_interval — 5m turned every flap wave into a message every
      ## 5 minutes (measured 2026-07-13: ~65 msgs/day baseline, 1,685 on
      ## the 06-30 outage day). Criticals keep the parent 5m.
      group_interval: 30m

  inhibit_rules:
  ## When LonghornVolumeDegraded fires for a given (pvc_namespace, pvc),
  ## mute the chart-side LonghornVolumeStatusWarning on the same volume.
  ## Same intent as the prior AC's inhibitRule; kept here so the rule
  ## travels with the route.
  - source_matchers:
    - 'alertname="LonghornVolumeDegraded"'
    target_matchers:
    - 'alertname="LonghornVolumeStatusWarning"'
    equal: [pvc_namespace, pvc]
  ## A probe that is outright failing should not ALSO page for being slow:
  ## during ingress/node incidents both fire per instance and double the
  ## message count (storm audit 2026-07-13).
  - source_matchers:
    - 'alertname="SyntheticProbeFailing"'
    target_matchers:
    - 'alertname="SyntheticProbeSlowResponse"'
    equal: [instance]

  receivers:
  - name: black-hole

  - name: statuspage-and-pushover
    webhook_configs:
    - url: http://statuspage-adapter.monitoring.svc.cluster.local:8080/webhook
      send_resolved: true
      max_alerts: 0
    pushover_configs:
    - user_key:
        name: pushover
        key: user-key
      token:
        name: pushover
        key: api-token
      send_resolved: true
      ## Severity -> Pushover priority. critical interrupts (1); warning is
      ## delivered silently (-1, no sound/vibration); info and anything else
      ## is badge-only (-2). CommonLabels.severity is stable because the
      ## group_by includes alertname (one severity per rule).
      ## RESOLVED messages are always -2 (badge only): before 2026-07-13 a
      ## resolved critical buzzed at priority 1 — every flap episode of a
      ## critical rule produced TWO interrupts. The ✅ line stays visible
      ## in the app; it just never buzzes.
      priority: |-
        {{- if eq .Status "resolved" -}}-2
        {{- else if eq .CommonLabels.severity "critical" -}}1
        {{- else if eq .CommonLabels.severity "warning" -}}-1
        {{- else -}}-2
        {{- end -}}
      title: |-
        [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.component }}: {{ .CommonLabels.alertname }}
      message: |-
        {{ range .Alerts -}}
        {{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} {{ .Annotations.summary }}
        {{ end }}
        {{ if .CommonAnnotations.description -}}
        ---
        {{ .CommonAnnotations.description }}
        {{- end }}
      ## One-tap from notification to the live time-series view.
      url: |-
        {{- $c := .CommonLabels.component -}}
        {{- if or (eq $c "Internet") (eq $c "Time") (eq $c "VPN") (eq $c "DNS") -}}
        https://grafana.mdapi.ch/d/bpi-r4-overview
        {{- else if eq $c "Home" -}}
        https://grafana.mdapi.ch/d/home-assistant-overview
        {{- else -}}
        https://grafana.mdapi.ch
        {{- end -}}
      url_title: 📊 Open Grafana
