# cert-host: a LAN-reachable static file host for delivering certs to
# PULL-ONLY devices that cannot accept a push (e.g. AOS-6 Aruba IAP
# `download-cert <type> http://...`, legacy appliances). A Windmill cert
# job stages a PEM on the shared cert-staging RWX (mounted RW by the
# `certs` worker group, see ../windmill/values.yml), the device pulls it,
# and the job deletes it. Co-located in the `windmill` namespace because a
# PVC is namespace-scoped and the writer (worker) lives here.
defaultNamespace: windmill
