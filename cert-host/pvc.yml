apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cert-staging
  namespace: windmill
  labels:
    app: cert-host
spec:
  # RWX so the cert-host web pod (read-only) and the windmill `certs`
  # worker replicas (read-write) can mount it concurrently — no kubectl
  # exec / pods-exec RBAC needed (least privilege).
  accessModes:
    - ReadWriteMany
  storageClassName: ceph-filesystem
  resources:
    requests:
      storage: 1Gi
