apiVersion: v1
kind: Service
metadata:
  name: cert-host
  namespace: windmill
  labels:
    app: cert-host
  annotations:
    # Reuse the well-known LAN IP previously held by the orphaned
    # monitoring/cert-host Service (deleted as part of this change so the
    # address is free). prod-pool is the MetalLB pool that allocated it.
    metallb.io/address-pool: prod-pool
    metallb.io/loadBalancerIPs: 192.168.1.61
spec:
  type: LoadBalancer
  loadBalancerClass: metallb
  # Local preserves the client source IP so the nginx allowlist works.
  externalTrafficPolicy: Local
  selector:
    app: cert-host
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
