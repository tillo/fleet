defaultNamespace: external-dns
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
helm:
  maxHistory: 25
  releaseName: external-dns
  repo: https://kubernetes-sigs.github.io/external-dns/
  chart: external-dns
  # Intentionally no `version:` -- Fleet tracks the repo's latest chart
  # and applies any new release on the next GitRepo poll cycle.
  valuesFiles:
    - values.yml
