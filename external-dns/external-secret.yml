apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns-tsig
  namespace: external-dns
spec:
  refreshInterval: 1m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: external-dns-tsig
    creationPolicy: Owner
  data:
    - remoteRef:
        key: /mdapi/technitium/external-dns/TSIG_KEY_NAME
      secretKey: TSIG_KEY_NAME
    - remoteRef:
        key: /mdapi/technitium/external-dns/TSIG_KEY_SECRET
      secretKey: TSIG_KEY_SECRET
