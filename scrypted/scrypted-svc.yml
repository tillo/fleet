apiVersion: v1
kind: Service
metadata:
  name: scrypted
  namespace: scrypted
  labels:
    app: scrypted
spec:
  type: ClusterIP
  selector:
    app: scrypted
  ports:
    - name: web-https
      port: 10443
      targetPort: 10443
      protocol: TCP
    - name: web-http
      port: 11080
      targetPort: 11080
      protocol: TCP
    - name: rtsp-rebcast
      port: 11041
      targetPort: 11041
      protocol: TCP
