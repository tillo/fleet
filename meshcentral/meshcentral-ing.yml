apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meshcentral
  namespace: meshcentral
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-keepalive-timeout: "600"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      # Blocking since 2026-07-06 (was DetectionOnly "until agent WS samples
      # accumulate" — none ever did: 50 days, zero agents, while public
      # scanners were only being *detected*; standing WAF rule 3 forbids
      # DetectionOnly on public hosts). The MeshCentral WS endpoints
      # (agent/relay/control/desktoprelay .ashx) carry binary frames and
      # agent-protocol handshakes the CRS is known to false-positive on;
      # the app authenticates those itself, so CRS is bypassed for exactly
      # those paths (esphome WS pattern) and blocks everywhere else.
      SecRuleEngine On
      SecAuditEngine RelevantOnly
      SecAuditLogRelevantStatus "^(?:5|4(?!04))"
      SecAuditLogParts ABIJDEFHZ
      SecAuditLogType Serial
      SecAuditLogFormat JSON
      SecAuditLog /dev/stdout
      SecRule REQUEST_URI "@rx ^/(agent|meshrelay|control|desktoprelay)\.ashx" \
        "id:1001,phase:1,pass,nolog,ctl:ruleRemoveByTag=OWASP_CRS"
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
spec:
  ingressClassName: nginx
  rules:
    - host: help.mdapi.ch
      http:
        paths:
          - backend:
              service:
                name: meshcentral
                port:
                  number: 4430
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - help.mdapi.ch
      secretName: meshcentral-cert
