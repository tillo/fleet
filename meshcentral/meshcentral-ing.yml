apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meshcentral
  namespace: meshcentral
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-keepalive-timeout: "600"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      # MeshCentral pushes binary WebSocket frames on /agent.ashx, /meshrelay.ashx,
      # /control.ashx and /desktoprelay.ashx. OWASP CRS reliably false-positives on
      # these. Start in DetectionOnly to gather logs; tighten after observation.
      SecRuleEngine DetectionOnly
      SecAuditEngine RelevantOnly
      SecAuditLogRelevantStatus "^(?:5|4(?!04))"
      SecAuditLogParts ABIJDEFHZ
      SecAuditLogType Serial
      SecAuditLogFormat JSON
      SecAuditLog /dev/stdout
      SecDebugLog /tmp/modsec_debug.log
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
spec:
  ingressClassName: nginx
  rules:
    - host: help.mdapi.ch
      http:
        paths:
          - backend:
              service:
                name: meshcentral
                port:
                  number: 4430
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - help.mdapi.ch
      secretName: meshcentral-cert
