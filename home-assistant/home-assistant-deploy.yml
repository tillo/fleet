apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  selector:
    matchLabels:
      app: home-assistant
  replicas: 1
  template:
    metadata:
      labels:
        app: home-assistant
    spec:
      containers:
      - name: home-assistant
        image: ghcr.io/home-assistant/home-assistant
        command: ['/bin/sh']
        args:
        - '+x'
        - '-c'
        - >-
          #apk add --no-cache patch
          #&& patch -l -N -t -p 2 -i /config/swisscom-device_tracker-auth.patch /usr/src/homeassistant/homeassistant/components/swisscom/device_tracker.py;
          /init
          || sleep infinity
        ports:
        - containerPort: 8123
        env:
        - name: TZ
          value: Europe/Zurich
        volumeMounts:
        - name: home-assistant-data
          mountPath: /config
        - name: home-assistant-config
          mountPath: /config/configuration.yaml
          subPath: configuration.yaml
        - name: home-assistant-secrets
          mountPath: /config/secrets.yaml
          subPath: secrets.yaml
      volumes:
      - name: home-assistant-data
        persistentVolumeClaim:
          claimName: home-assistant-data
      - name: home-assistant-config
        configMap:
          name: home-assistant-config
      - name: home-assistant-secrets
        secret:
          secretName: home-assistant-secrets

