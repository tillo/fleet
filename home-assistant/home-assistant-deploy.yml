apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  selector:
    matchLabels:
      app: home-assistant
  replicas: 1
  template:
    metadata:
      labels:
        app: home-assistant
    spec:
      containers:
      - name: home-assistant
        image: ghcr.io/home-assistant/home-assistant
        ports:
        - containerPort: 8123
        env:
        - name: TZ
          value: Europe/Zurich
        volumeMounts:
        - name: home-assistant-data
          mountPath: /config
        - name: home-assistant-config
          mountPath: /config/configuration.yaml
          subPath: configuration.yaml
        - name: home-assistant-secrets
          mountPath: /config/secrets.yaml
          subPath: secrets.yaml
      volumes:
      - name: home-assistant-data
        persistentVolumeClaim:
          claimName: home-assistant-data
      - name: home-assistant-config
        configMap:
          name: home-assistant-config
      - name: home-assistant-secrets
        secret:
          secretName: home-assistant-secrets

