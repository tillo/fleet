apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  namespace: home-assistant
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: home-assistant
  replicas: 1
  template:
    metadata:
      labels:
        app: home-assistant
    spec:
      initContainers:
      # One-shot bootstrap (2026-05-14 migration): on first run after the
      # ConfigMap-subPath mount was removed, the PVC has
      # /config/configuration.yaml.bootstrap but no /config/configuration.yaml.
      # Rename it into place. On subsequent restarts this is a no-op.
      - name: bootstrap-configuration
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          set -e
          if [ -f /config/configuration.yaml.bootstrap ] && [ ! -f /config/configuration.yaml ]; then
            mv /config/configuration.yaml.bootstrap /config/configuration.yaml
            echo "bootstrap-configuration: installed configuration.yaml from .bootstrap"
          else
            echo "bootstrap-configuration: nothing to do (target=$( [ -f /config/configuration.yaml ] && echo present || echo absent ), bootstrap=$( [ -f /config/configuration.yaml.bootstrap ] && echo present || echo absent ))"
          fi
        volumeMounts:
        - name: home-assistant-data
          mountPath: /config
      containers:
      - name: home-assistant
        image: ghcr.io/home-assistant/home-assistant:latest
        securityContext:
          privileged: true
        ports:
        - containerPort: 8123
#        command: ['/bin/sh']
#        args:
#        - '+x'
#        - '-c'
#        - >-
#          udevd -d
#          && sleep 20
#          && [ -c "/dev/ttyUSB0" ]
#          && /run/s6/legacy-services/home-assistant/run
#          || apk add --no-cache eudev
#          ; /run/s6/legacy-services/home-assistant/run
#          ; sleep infinity
        env:
        - name: TZ
          value: Europe/Zurich
        envFrom:
        - secretRef:
            name: home-assistant-env-secret
        volumeMounts:
        - name: home-assistant-data
          mountPath: /config
        # configuration.yaml lives on the PVC (home-assistant-data) since
        # 2026-05-14 — see bootstrap-configuration initContainer above and the
        # home-assistant-bootstrap ConfigMap (kept as DR seed, not mounted).
        - name: home-assistant-secrets
          mountPath: /config/secrets.yaml
          subPath: secrets.yaml
        resources:
          limits:
            akri.sh/akri-home-assistant: "1"
          requests:
            akri.sh/akri-home-assistant: "1"
      volumes:
      - name: home-assistant-data
        persistentVolumeClaim:
          claimName: home-assistant-data
      # home-assistant-config volume removed 2026-05-14 (configuration.yaml on PVC).
      # The home-assistant-bootstrap ConfigMap still exists in fleet as a DR seed.
      - name: home-assistant-secrets
        secret:
          secretName: home-assistant-secrets
