apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  selector:
    matchLabels:
      app: home-assistant
  namespaceSelector:
    matchNames:
      - home-assistant
  endpoints:
    - port: http
      path: /api/prometheus
      interval: 30s
      scheme: http
      authorization:
        type: Bearer
        credentials:
          name: home-assistant-env-secret
          key: HOMEASSISTANT_API_TOKEN
