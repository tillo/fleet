apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: home-assistant
  namespace: home-assistant
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: Home Assistant
    flame.pawelmalak/url: https://home.mdapi.ch
    flame.pawelmalak/category: Domotics
    flame.pawelmalak/icon: home-assistant
    flame.pawelmalak/order: '10'
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecAuditLogType Serial
      SecAuditLogFormat JSON
      SecAuditLog /dev/stdout
      SecDebugLog /tmp/modsec_debug.log
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
      SecRule REQUEST_URI "@beginsWith /auth/login_flow" \
        "id:1000,\
        phase:1,\
        pass,\
        t:none,\
        nolog,\
        ctl:ruleRemoveById=949110"
spec:
  ingressClassName: nginx
  rules:
    - host: home.mdapi.ch
      http:
        paths:
          - backend:
              service:
                name: home-assistant
                port:
                  number: 8123
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - home.mdapi.ch
      secretName: home-assistant-cert
