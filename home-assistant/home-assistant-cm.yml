          device_class: energy
        sensor.rack_energy_consumption:
          unit_of_measurement: 'Wh'
          device_class: energy
        sensor.ac_energy_consumption:
          unit_of_measurement: 'Wh'
          device_class: energy
        sensor.dishwasher_energy_consumption:
          unit_of_measurement: 'Wh'
          device_class: energy
    shell_command:
      onu_reboot: >-
        TOKEN=$(curl -sk --max-time 10 -X POST https://192.168.11.1/ubus
        -H 'Content-Type: application/json'
        -d "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"call\",\"params\":[\"00000000000000000000000000000000\",\"session\",\"login\",{\"username\":\"root\",\"password\":\"$ONU_PASSWORD\"}]}"
        | python3 -c "import sys,json; print(json.load(sys.stdin)['result'][1]['ubus_rpc_session'])")
        && curl -sk --max-time 10 -X POST https://192.168.11.1/ubus
        -H 'Content-Type: application/json'
        -d "{\"jsonrpc\":\"2.0\",\"id\":2,\"method\":\"call\",\"params\":[\"$TOKEN\",\"system\",\"reboot\",{}]}"
      bpi_r4_reboot: >-
        ssh -i /config/.ssh/bpi_r4_ed25519
        -o StrictHostKeyChecking=no
        -o UserKnownHostsFile=/dev/null
        -o ConnectTimeout=5
        root@192.168.1.254 reboot
