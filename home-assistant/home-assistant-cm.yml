    # NOTE: schedule write-back is exposed by the AppDaemon listener but no HA
    # input helper is wired here — input_text has a 255-char cap and a real
    # weekly plan JSON exceeds that. Users wanting to push schedule edits from
    # HA should fire an event or use a separate transport; see WRITES.md.
    utility_meter:
      # Wraps the Riemann-integrated heating energy into monthly buckets so
      # the Energy panel can chart "heating last month" / "heating this month".
      # cycle: monthly resets on the 1st at 00:00 local; cycle: daily for the
      # daily-cost sensor that drives the dashboard tile.
      elco_heating_energy_period:
        source: sensor.elco_heating_energy_total
        cycle: monthly
        name: Elco heating energy period
      elco_heating_energy_day:
        source: sensor.elco_heating_energy_total
        cycle: daily
        name: Elco heating energy day
    automation elco:
      # Push alerts on any boiler-side error flip. Each *_error binary_sensor
      # already exists in the integration; without an explicit subscriber the
      # signal would otherwise sit in HA history unseen.
      - id: elco_pushover_on_error_flip
        alias: ELCO push on error flip
        trigger:
          - platform: state
            entity_id:
              - binary_sensor.elco_outside_temperature_error
              - binary_sensor.elco_domestic_hot_water_storage_temperature_error
              - binary_sensor.elco_room_temperature_error
            to: "on"
        action:
          - service: notify.pushover
            data:
              title: "ELCO boiler error"
              message: "{{ trigger.to_state.attributes.friendly_name }} flipped on"
              data:
                priority: 1
      # Heat-pump-on is an anomaly for THISION S (gas boiler) — should always be off.
      - id: elco_pushover_on_heatpump_on
        alias: ELCO push on heatpump_on (anomaly)
        trigger:
          - platform: state
            entity_id: binary_sensor.elco_heatpump_on
            to: "on"
            for: { minutes: 2 }
        action:
          - service: notify.pushover
            data:
              title: "ELCO anomaly: heatpump_on=on"
              message: "Gas boiler should never report heatpump_on; check cloud + firmware"
              data:
                priority: 1
      # Holiday calendar sync — looks at calendar.family for upcoming Vacanze*
      # / Vacation events and sets the AppDaemon-backed helpers.
      # Trigger logic:
      #   - At event start: turn holiday ON and set return date = end date - 1.
      #   - At event end: turn holiday OFF (the AppDaemon listener clears it).
      # Time-pattern guard runs once a day at 04:00 to recompute against the
      # next upcoming event (covers events added between restarts).
      - id: elco_holiday_calendar_sync
        alias: ELCO holiday calendar sync
        mode: queued
        trigger:
          - platform: calendar
            event: start
            entity_id: calendar.family
          - platform: calendar
            event: end
            entity_id: calendar.family
          - platform: time_pattern
            hours: 4
            minutes: 0
        action:
          - choose:
              # Calendar-driven branch: act on any summary that starts with
              # a romance-language vacation prefix or English holiday/vacation.
              # `vacan` covers vacanze, vacanza (it), vacances (fr),
              # vacaciones (es), vacation/vacations (en). Parentheses are
              # critical — without them, `and`/`or` precedence makes any
              # non-calendar trigger with a stray 'vacation' string match.
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ trigger.platform == 'calendar' and
                         (
                           (trigger.calendar_event.summary | lower).startswith('vacan')
                           or (trigger.calendar_event.summary | lower).startswith('holiday')
                         ) }}
                sequence:
                  - choose:
                      - conditions: "{{ trigger.event == 'start' }}"
                        sequence:
                          - service: input_datetime.set_datetime
                            target:
                              entity_id: input_datetime.elco_holiday_until
                            data:
                              # Google all-day events have an exclusive end date.
                              # Return = end_date, stay-until = end_date - 1 day.
                              date: >-
                                {{ (as_datetime(trigger.calendar_event.end) - timedelta(days=1)).strftime('%Y-%m-%d') }}
                          - service: input_boolean.turn_on
                            target:
                              entity_id: input_boolean.elco_holiday_active
                      - conditions: "{{ trigger.event == 'end' }}"
                        sequence:
                          - service: input_boolean.turn_off
                            target:
                              entity_id: input_boolean.elco_holiday_active
            # else: time-pattern tick — nothing to do; full re-sync would require
            # iterating the calendar via REST. Left as a hook for future work.
            default: []
      # Window/door auto-pause CH — scaffolded but empty: no qualifying window
      # contacts currently exist in this HA instance (carnotzet_door is the
      # cellar, wrong zone). Add your bedroom/living-room contacts to the
      # trigger entity_id list and the automation comes alive.
      - id: elco_window_open_auto_pause
        alias: ELCO window-open auto-pause
        trigger: []   # TODO: list binary_sensor.<your_window>* here, device_class: window/opening
        condition:
          - condition: state
            entity_id: input_select.elco_zone_mode_set
            state: Comfort
        action:
          - service: input_select.select_option
            target:
              entity_id: input_select.elco_zone_mode_set
            data:
              option: Reduced
      # Manual "refresh" pipeline: button → force HA to poll calendar.family
      # AND fire event for the template sensor to recompute. The combined hop
      # catches both near-future (covered by HA's poll → state_changed) and
      # far-future (covered by the event-triggered re-run) edits.
      - id: elco_holidays_refresh
        alias: ELCO refresh upcoming holidays
        trigger:
          - platform: state
            entity_id: input_button.elco_holidays_refresh
        action:
          - service: homeassistant.update_entity
            target:
              entity_id: calendar.family
          - event: elco_refresh_holidays
    homeassistant:
      packages:
        energy: !include packages/energy.yaml
      customize:
        sensor.solar_imported_power_kwh:
          device_class: energy
        sensor.solar_exported_power_kwh:
          device_class: energy
        sensor.solar_panel_production_kwh:
