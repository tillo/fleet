apiVersion: v1
kind: ConfigMap
metadata:
  # Cross-namespace target — the Grafana sidecar (cattle-monitoring-system)
  # watches ConfigMaps with label grafana_dashboard=1 in cattle-dashboards.
  name: home-assistant-dashboard
  namespace: cattle-dashboards
  labels:
    grafana_dashboard: "1"
data:
  home-assistant.json: |
    {
      "schemaVersion": 36,
      "version": 1,
      "uid": "home-assistant-overview",
      "title": "Home Assistant — Overview",
      "tags": ["home-assistant", "mdapi"],
      "timezone": "browser",
      "editable": true,
      "time": {"from": "now-24h", "to": "now"},
      "refresh": "30s",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {"text": "Prometheus", "value": "Prometheus"},
            "hide": 0
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Entities scraped",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 0, "y": 0, "w": 4, "h": 4},
          "targets": [{"expr": "count(hass_entity_available)", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Automations enabled",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 4, "y": 0, "w": 4, "h": 4},
          "targets": [{"expr": "count(hass_entity_available{domain=\"automation\"} == 1)", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Persons at home",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 8, "y": 0, "w": 4, "h": 4},
          "targets": [{"expr": "count(hass_person_state == 1)", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "orange", "value": null}, {"color": "green", "value": 1}]}}}
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Lights on",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 12, "y": 0, "w": 4, "h": 4},
          "targets": [{"expr": "count(hass_light_brightness_percent > 0)", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 5}]}}}
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Switches on",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 16, "y": 0, "w": 4, "h": 4},
          "targets": [{"expr": "count(hass_switch_state == 1)", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}}
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Automation triggers (24h)",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 20, "y": 0, "w": 4, "h": 4},
          "targets": [{"expr": "sum(increase(hass_automation_triggered_count_total[24h]))", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}}
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Indoor temperatures (°C)",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 0, "y": 4, "w": 12, "h": 8},
          "targets": [{"expr": "hass_sensor_unit_celsius{friendly_name=~\".*[Tt]emperature.*|.*[Tt]emp.*\"}", "legendFormat": "{{friendly_name}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "celsius", "custom": {"lineWidth": 1, "fillOpacity": 5}}},
          "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["last", "min", "max"]}}
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Humidity (%)",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 12, "y": 4, "w": 12, "h": 8},
          "targets": [{"expr": "hass_sensor_humidity_percent", "legendFormat": "{{friendly_name}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "custom": {"lineWidth": 1, "fillOpacity": 5}}},
          "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["last"]}}
        },
        {
          "id": 20,
          "type": "bargauge",
          "title": "Battery levels (low → high)",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 0, "y": 12, "w": 12, "h": 10},
          "targets": [{"expr": "bottomk(20, hass_sensor_battery_percent)", "legendFormat": "{{friendly_name}}", "refId": "A", "instant": true}],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 20}, {"color": "green", "value": 50}]}}},
          "options": {"orientation": "horizontal", "displayMode": "gradient"}
        },
        {
          "id": 21,
          "type": "timeseries",
          "title": "Power (W) — SolarEdge / Shelly plugs",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 12, "y": 12, "w": 12, "h": 10},
          "targets": [{"expr": "hass_sensor_power_w", "legendFormat": "{{friendly_name}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "watt", "custom": {"lineWidth": 1, "fillOpacity": 5}}},
          "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["last", "max"]}}
        },
        {
          "id": 30,
          "type": "timeseries",
          "title": "Automation trigger rate (per hour)",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 0, "y": 22, "w": 24, "h": 8},
          "targets": [{"expr": "topk(15, rate(hass_automation_triggered_count_total[1h]) * 3600)", "legendFormat": "{{friendly_name}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"lineWidth": 1, "fillOpacity": 3}}},
          "options": {"legend": {"displayMode": "table", "placement": "right", "calcs": ["last", "max"]}}
        },
        {
          "id": 31,
          "type": "stat",
          "title": "Unavailable entities",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 0, "y": 30, "w": 6, "h": 4},
          "targets": [{"expr": "count(hass_entity_available == 0)", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 50}, {"color": "red", "value": 200}]}}}
        },
        {
          "id": 32,
          "type": "stat",
          "title": "State changes /min (last 5m)",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 6, "y": 30, "w": 6, "h": 4},
          "targets": [{"expr": "sum(rate(hass_state_change_total[5m])) * 60", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}}
        },
        {
          "id": 33,
          "type": "piechart",
          "title": "Entities by domain",
          "datasource": {"type": "prometheus", "uid": "$datasource"},
          "gridPos": {"x": 12, "y": 30, "w": 12, "h": 10},
          "targets": [{"expr": "count by (domain) (hass_entity_available)", "legendFormat": "{{domain}}", "refId": "A", "instant": true}],
          "options": {"legend": {"displayMode": "table", "placement": "right", "values": ["value", "percent"]}, "pieType": "donut"}
        }
      ]
    }
