apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garage-ha-backup-s3
spec:
  refreshInterval: 1m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: garage-ha-backup-s3
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        RCLONE_CONFIG_GARAGE_TYPE: "s3"
        RCLONE_CONFIG_GARAGE_PROVIDER: "Other"
        # 2026-06-22: moved off bootstrap/garage (being decommissioned) to the
        # external salt/pepper garage cluster, where off-site backups belong.
        # Bucket home-assistant-backups + key ha-backup-ext (RW) created there;
        # creds in Akeyless /mdapi/home-assistant/garage-s3/{access,secret}_key.
        RCLONE_CONFIG_GARAGE_ENDPOINT: "http://garage.transit.svc.cluster.local:30188"
        RCLONE_CONFIG_GARAGE_REGION: "garage"
        RCLONE_CONFIG_GARAGE_ACCESS_KEY_ID: "{{ .access_key }}"
        RCLONE_CONFIG_GARAGE_SECRET_ACCESS_KEY: "{{ .secret_key }}"
        BUCKET: "home-assistant-backups"

  data:
    - remoteRef:
        key: /mdapi/home-assistant/garage-s3/access_key
      secretKey: access_key
    - remoteRef:
        key: /mdapi/home-assistant/garage-s3/secret_key
      secretKey: secret_key
