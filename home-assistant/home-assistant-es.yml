apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: home-assistant-secrets
spec:
  refreshInterval: 1m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: home-assistant-secrets
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/home-assistant/home-assistant-secrets/secrets.yaml
      secretKey: secrets.yaml
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: home-assistant-env-secret
spec:
  refreshInterval: 1m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: home-assistant-env-secret
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/home-assistant/home-assistant-env-secret/HOMEASSISTANT_API_TOKEN
      secretKey: HOMEASSISTANT_API_TOKEN
