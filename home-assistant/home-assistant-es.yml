apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: home-assistant-secrets
spec:
  refreshInterval: 1m

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: home-assistant-secrets
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/dev/home-assistant/home-assistant-secrets/secrets.yaml
      secretKey: secrets.yaml
