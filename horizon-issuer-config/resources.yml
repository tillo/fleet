# Supporting objects for the horizon-issuer controller (sibling `horizon-issuer`
# bundle holds the chart). Kept separate because that chart has no extraObjects hook.

# Image pull secret for the private registry.evertrust.io controller image.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: evertrust-registry
  namespace: horizon-issuer
spec:
  refreshInterval: 1m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: evertrust-registry
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      mergePolicy: Merge
  data:
    - remoteRef:
        key: /kyos/evertrust/registry/dockerconfigjson
      secretKey: .dockerconfigjson
---
# Auth for the ClusterIssuer -> Horizon. horizon-issuer reads an Opaque secret with
# username + password (mapped to X-API-Id / X-API-Key = password auth on the Horizon
# local IdP). Dedicated, least-privilege service identity `cert-manager-issuer`: a
# Horizon local identity bound to the `cert-manager-issuer` role (permission
# `lifecycle:*` only — certificate enroll/revoke/search, NO configuration/discovery).
# Provisioned imperatively via the Horizon REST API (no MCP create); password in Akeyless.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: horizon-issuer-auth
  namespace: horizon-issuer
spec:
  refreshInterval: 1m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: horizon-issuer-auth
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        username: "cert-manager-issuer"
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: /mdapi/horizon/issuer/password
---
# Cluster-wide issuer: any namespace can request PRIVATE certs from Horizon, routed
# through the `private-tls` WebRA profile -> stream-mdapi connector -> MDAPI Issuing CA 01.
# url uses the in-cluster Horizon API (plain HTTP, no WAF/TLS hop); the Service FQDN is
# already in Horizon's allowedHosts. authSecretName resolves in the controller namespace.
apiVersion: horizon.evertrust.io/v1beta1
kind: ClusterIssuer
metadata:
  name: horizon-private
spec:
  url: http://horizon.horizon.svc.cluster.local:9000
  profile: private-tls
  authSecretName: horizon-issuer-auth
---
# Same issuer, but through the `private-tls-bmc` WebRA profile -> mdapi-tls-bmc template
# (90-day, allows DNS + IP SANs). Used for certs that need an IP SAN (e.g. the Harvester
# VIP :8443 backend), which `private-tls` (DNS-only) can't cover.
apiVersion: horizon.evertrust.io/v1beta1
kind: ClusterIssuer
metadata:
  name: horizon-private-bmc
spec:
  url: http://horizon.horizon.svc.cluster.local:9000
  profile: private-tls-bmc
  authSecretName: horizon-issuer-auth
