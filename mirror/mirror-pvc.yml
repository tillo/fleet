apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mirror-srv
spec:
  storageClassName: harvester-longhorn-2replicas
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1500Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mirror-srv-2
spec:
  storageClassName: harvester-longhorn-2replicas
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1500Gi
