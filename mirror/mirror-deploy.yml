apiVersion: apps/v1
kind: Deployment
metadata:
  name: mirror
  namespace: mirror
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 4h"
spec:
  selector:
    matchLabels:
      app: mirror
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mirror
    spec:
      containers:
      - name: mirror
        image: registry.mdapi.ch/mdapi/mirror:latest
        securityContext:
          privileged: true
        ports:
        - name: http
          containerPort: 80
        - name: https
          containerPort: 443
        - name: rsync
          containerPort: 873
        - name: ftp
          containerPort: 21
        - name: ftpdata000
          containerPort: 40000
        - name: ftpdata001
          containerPort: 40001
        - name: ftpdata002
          containerPort: 40002
        - name: ftpdata003
          containerPort: 40003
        - name: ftpdata004
          containerPort: 40004
        - name: ftpdata005
          containerPort: 40005
        - name: ftpdata006
          containerPort: 40006
        - name: ftpdata007
          containerPort: 40007
        - name: ftpdata008
          containerPort: 40008
        - name: ftpdata009
          containerPort: 40009
        - name: ftpdata010
          containerPort: 40010
        - name: ftpdata011
          containerPort: 40011
        - name: ftpdata012
          containerPort: 40012
        - name: ftpdata013
          containerPort: 40013
        - name: ftpdata014
          containerPort: 40014
        - name: ftpdata015
          containerPort: 40015
        - name: ftpdata016
          containerPort: 40016
        - name: ftpdata017
          containerPort: 40017
        - name: ftpdata018
          containerPort: 40018
        - name: ftpdata019
          containerPort: 40019
        - name: ftpdata020
          containerPort: 40020
        - name: ftpdata021
          containerPort: 40021
        - name: ftpdata022
          containerPort: 40022
        - name: ftpdata023
          containerPort: 40023
        - name: ftpdata024
          containerPort: 40024
        - name: ftpdata025
          containerPort: 40025
        - name: ftpdata026
          containerPort: 40026
        - name: ftpdata027
          containerPort: 40027
        - name: ftpdata028
          containerPort: 40028
        - name: ftpdata029
          containerPort: 40029
        - name: ftpdata030
          containerPort: 40030
        - name: ftpdata031
          containerPort: 40031
        - name: ftpdata032
          containerPort: 40032
        - name: ftpdata033
          containerPort: 40033
        - name: ftpdata034
          containerPort: 40034
        - name: ftpdata035
          containerPort: 40035
        - name: ftpdata036
          containerPort: 40036
        - name: ftpdata037
          containerPort: 40037
        - name: ftpdata038
          containerPort: 40038
        - name: ftpdata039
          containerPort: 40039
        - name: ftpdata040
          containerPort: 40040
        - name: ftpdata041
          containerPort: 40041
        - name: ftpdata042
          containerPort: 40042
        - name: ftpdata043
          containerPort: 40043
        - name: ftpdata044
          containerPort: 40044
        - name: ftpdata045
          containerPort: 40045
        - name: ftpdata046
          containerPort: 40046
        - name: ftpdata047
          containerPort: 40047
        - name: ftpdata048
          containerPort: 40048
        - name: ftpdata049
          containerPort: 40049
        - name: ftpdata050
          containerPort: 40050
        env:
        - name: TZ
          value: Europe/Zurich
        resources:
          requests:
            cpu: 50m
            memory: 700Mi
          limits:
            memory: 1Gi
        volumeMounts:
        - mountPath: /etc/ssl/private
          name: mirror-cert
        - mountPath: /srv
          name: mirror-srv
      volumes:
      - name: mirror-cert
        secret:
          secretName: mirror-cert
      - name: mirror-srv
        persistentVolumeClaim:
          claimName: mirror-srv
      imagePullSecrets:
      - name: mdapi-registry
