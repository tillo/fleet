## Single Ceph RBD volume replacing the mergerfs union of the two Longhorn PVCs
## (mirror-srv 300G + mirror-srv-2 1500G). Mounted at /srv in mirror-ceph; the
## image's mirror-storage.service skips mergerfs when /mnt/disk* is absent.
## RBD is thin-provisioned, so 1Ti only consumes the ~131G of real mirror data
## (blackarch/archstrike/tails/gentoo) from ceph-blockpool (rep=2). Expandable.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mirror-data-ceph
  namespace: mirror
spec:
  storageClassName: ceph-block
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Ti
