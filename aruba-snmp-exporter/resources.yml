# Prometheus snmp_exporter for the Aruba Instant APs (SNMPv3) -> VictoriaMetrics.
# snmp.yml (with the v3 auth/priv passwords) is rendered by ESO from Akeyless so no
# secrets land in git. VMScrapeConfig scrapes the exporter once per AP target.
# Baseline module: sysUpTime + interface oper-status + HC octets (ifName-labelled).
# Aruba-specific OIDs (radio util, client counts) to be added after an SNMP walk.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aruba-snmp-config
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: aruba-snmp-config
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        snmp.yml: |
          auths:
            aruba_v3:
              version: 3
              username: monitoring
              security_level: authPriv
              password: "{{ .authpass }}"
              auth_protocol: SHA
              priv_protocol: AES
              priv_password: "{{ .privpass }}"
          modules:
            aruba:
              walk:
                - 1.3.6.1.2.1.1.3.0
                - 1.3.6.1.2.1.2.2.1.8
                - 1.3.6.1.2.1.31.1.1.1.1
                - 1.3.6.1.2.1.31.1.1.1.6
                - 1.3.6.1.2.1.31.1.1.1.10
                - 1.3.6.1.4.1.14823.2.3.3.1.2.1.1.2
                - 1.3.6.1.4.1.14823.2.3.3.1.2.1.1.8
                - 1.3.6.1.4.1.14823.2.3.3.1.2.1.1.10
                - 1.3.6.1.4.1.14823.2.3.3.1.2.1.1.11
                - 1.3.6.1.4.1.14823.2.3.3.1.2.2.1.5
                - 1.3.6.1.4.1.14823.2.3.3.1.2.2.1.6
                - 1.3.6.1.4.1.14823.2.3.3.1.2.2.1.7
                - 1.3.6.1.4.1.14823.2.3.3.1.2.4.1.5
                - 1.3.6.1.4.1.14823.2.3.3.1.2.4.1.7
              metrics:
                - name: sysUpTime
                  oid: 1.3.6.1.2.1.1.3
                  type: gauge
                - name: ifOperStatus
                  oid: 1.3.6.1.2.1.2.2.1.8
                  type: gauge
                  indexes:
                    - {labelname: ifIndex, type: gauge}
                  lookups:
                    - {labels: [ifIndex], labelname: ifName, oid: 1.3.6.1.2.1.31.1.1.1.1, type: DisplayString}
                - name: ifHCInOctets
                  oid: 1.3.6.1.2.1.31.1.1.1.6
                  type: counter
                  indexes:
                    - {labelname: ifIndex, type: gauge}
                  lookups:
                    - {labels: [ifIndex], labelname: ifName, oid: 1.3.6.1.2.1.31.1.1.1.1, type: DisplayString}
                - name: ifHCOutOctets
                  oid: 1.3.6.1.2.1.31.1.1.1.10
                  type: counter
                  indexes:
                    - {labelname: ifIndex, type: gauge}
                  lookups:
                    - {labels: [ifIndex], labelname: ifName, oid: 1.3.6.1.2.1.31.1.1.1.1, type: DisplayString}
                # --- Aruba WLSR-MIB: per-AP CPU/mem, per-radio util/noise/power, per-client SNR ---
                - name: arubaApCpuUtilization
                  oid: 1.3.6.1.4.1.14823.2.3.3.1.2.1.1.11
                  type: gauge
                  indexes:
                    - {labelname: apMac, type: PhysAddress48}
                  lookups:
                    - {labels: [apMac], labelname: apName, oid: 1.3.6.1.4.1.14823.2.3.3.1.2.1.1.2, type: DisplayString}
                - name: arubaApMemoryFree
                  oid: 1.3.6.1.4.1.14823.2.3.3.1.2.1.1.8
                  type: gauge
                  indexes:
                    - {labelname: apMac, type: PhysAddress48}
                  lookups:
                    - {labels: [apMac], labelname: apName, oid: 1.3.6.1.4.1.14823.2.3.3.1.2.1.1.2, type: DisplayString}
                - name: arubaApMemoryTotal
                  oid: 1.3.6.1.4.1.14823.2.3.3.1.2.1.1.10
                  type: gauge
                  indexes:
                    - {labelname: apMac, type: PhysAddress48}
                  lookups:
                    - {labels: [apMac], labelname: apName, oid: 1.3.6.1.4.1.14823.2.3.3.1.2.1.1.2, type: DisplayString}
                - name: arubaRadioTxPower
                  oid: 1.3.6.1.4.1.14823.2.3.3.1.2.2.1.5
                  type: gauge
                  indexes:
                    - {labelname: apMac, type: PhysAddress48}
                    - {labelname: radioNum, type: gauge}
                  lookups:
                    - {labels: [apMac], labelname: apName, oid: 1.3.6.1.4.1.14823.2.3.3.1.2.1.1.2, type: DisplayString}
                - name: arubaRadioNoiseFloor
                  oid: 1.3.6.1.4.1.14823.2.3.3.1.2.2.1.6
                  type: gauge
                  indexes:
                    - {labelname: apMac, type: PhysAddress48}
                    - {labelname: radioNum, type: gauge}
                  lookups:
                    - {labels: [apMac], labelname: apName, oid: 1.3.6.1.4.1.14823.2.3.3.1.2.1.1.2, type: DisplayString}
                - name: arubaRadioChannelUtilization
                  oid: 1.3.6.1.4.1.14823.2.3.3.1.2.2.1.7
                  type: gauge
                  indexes:
                    - {labelname: apMac, type: PhysAddress48}
                    - {labelname: radioNum, type: gauge}
                  lookups:
                    - {labels: [apMac], labelname: apName, oid: 1.3.6.1.4.1.14823.2.3.3.1.2.1.1.2, type: DisplayString}
                - name: arubaClientSnr
                  oid: 1.3.6.1.4.1.14823.2.3.3.1.2.4.1.7
                  type: gauge
                  indexes:
                    - {labelname: clientMac, type: PhysAddress48}
                  lookups:
                    - {labels: [clientMac], labelname: clientName, oid: 1.3.6.1.4.1.14823.2.3.3.1.2.4.1.5, type: DisplayString}
  data:
    - secretKey: authpass
      remoteRef:
        key: /mdapi/aruba/snmp/auth-pass
    - secretKey: privpass
      remoteRef:
        key: /mdapi/aruba/snmp/priv-pass
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: snmp-exporter
  namespace: monitoring
  labels: {app: snmp-exporter}
spec:
  replicas: 1
  selector:
    matchLabels: {app: snmp-exporter}
  template:
    metadata:
      labels: {app: snmp-exporter}
    spec:
      containers:
        - name: snmp-exporter
          image: prom/snmp-exporter:v0.26.0
          args: ["--config.file=/etc/snmp_exporter/snmp.yml"]
          ports:
            - {name: http, containerPort: 9116}
          volumeMounts:
            - {name: config, mountPath: /etc/snmp_exporter}
          resources:
            requests: {cpu: 20m, memory: 32Mi}
            limits: {cpu: 200m, memory: 128Mi}
      volumes:
        - name: config
          secret:
            secretName: aruba-snmp-config
---
apiVersion: v1
kind: Service
metadata:
  name: snmp-exporter
  namespace: monitoring
  labels: {app: snmp-exporter}
spec:
  selector: {app: snmp-exporter}
  ports:
    - {name: http, port: 9116, targetPort: 9116}
---
# VMStaticScrape (not VMScrapeConfig): the VMAgent selects staticScrapes (staticScrapeSelector:{})
# but has no scrapeConfigSelector, so this is the one that gets discovered without touching the
# shared VMAgent. Scrapes the snmp_exporter once per AP target (snmp multi-target pattern).
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMStaticScrape
metadata:
  name: aruba-snmp
  namespace: monitoring
spec:
  jobName: aruba-snmp
  targetEndpoints:
    - targets: ["192.168.1.211", "192.168.1.212", "192.168.1.217"]
      labels: {job: aruba_snmp}
      path: /snmp
      interval: 60s
      params:
        auth: [aruba_v3]
        module: [aruba]
      relabelConfigs:
        - {sourceLabels: [__address__], targetLabel: __param_target}
        - {sourceLabels: [__param_target], targetLabel: instance}
        - {targetLabel: __address__, replacement: "snmp-exporter.monitoring.svc:9116"}
