apiVersion: v1
kind: ConfigMap
metadata:
  name: openbao-mirror-script
  namespace: openbao
data:
  mirror.py: |
    # Akeyless -> OpenBao mirror. Reads every /mdapi item (api-key auth), writes
    # each to OpenBao KV v2 mdapi/<relpath> {"value": <raw>}. k8s-auth role `mirror`.
    # DYNAMIC_SECRET items are materialized and stored as a point-in-time static
    # snapshot (DR fallback); encryption/classic keys are skipped (no value).
    # Secret VALUES are NEVER printed (only counts + error key names).
    import json, ssl, time, urllib.request, urllib.error
    AK = "https://cm.mdapi.ch/akeyless-api/v2"
    BAO = "http://openbao.openbao.svc:8200"
    akid = open("/creds/access-id").read().strip()
    akkey = open("/creds/access-key").read().strip()
    sa = open("/var/run/secrets/kubernetes.io/serviceaccount/token").read().strip()
    ctx = ssl.create_default_context()

    def post(url, body, tok_hdr=None):
        h = {"Content-Type": "application/json"}
        if tok_hdr:
            h["X-Vault-Token"] = tok_hdr
        data = json.dumps(body).encode()
        # Retry transient network/DNS failures (e.g. EAI_AGAIN resolving
        # cm.mdapi.ch) so a brief blip doesn't fail the whole hourly run.
        # An HTTPError (4xx/5xx) is a real answer and is never retried.
        for attempt in range(5):
            try:
                req = urllib.request.Request(url, data=data, headers=h, method="POST")
                with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
                    b = r.read()
                    return json.loads(b) if b else {}
            except urllib.error.HTTPError:
                raise
            except urllib.error.URLError:
                if attempt == 4:
                    raise
                time.sleep(2 * (attempt + 1))

    aktok = post(f"{AK}/auth", {"access-id": akid, "access-type": "api_key", "access-key": akkey})["token"]
    baotok = post(f"{BAO}/v1/auth/kubernetes/login", {"role": "mirror", "jwt": sa})["auth"]["client_token"]

    def fname(f):
        return f if isinstance(f, str) else (f.get("path") or f.get("folder_name") or f.get("name"))

    def list_items(path):
        items, folders, pag = [], [], ""
        while True:
            body = {"token": aktok, "path": path}
            if pag:
                body["pagination-token"] = pag
            r = post(f"{AK}/list-items", body)
            items += [(it["item_name"], it.get("item_type", "")) for it in (r.get("items") or [])]
            folders += [fname(f) for f in (r.get("folders") or [])]
            pag = r.get("next_page") or ""
            if not pag:
                break
        for f in folders:
            if f:
                items += list_items(f)
        return items

    items = sorted(set(list_items("/mdapi")))
    print(f"akeyless_items={len(items)}", flush=True)
    # Encryption/classic keys carry no fetchable secret value -> skip them.
    KEY_TYPES = {"AES128GCM", "AES256GCM", "AES128SIV", "AES256SIV",
                 "RSA1024", "RSA2048", "RSA3072", "RSA4096",
                 "CLASSIC_KEY", "DFC", "GPG"}
    ok = err = dyn = skipped = 0
    errs = []
    for name, itype in items:
        try:
            rel = name[len("/mdapi/"):] if name.startswith("/mdapi/") else name.lstrip("/")
            if itype in KEY_TYPES:
                skipped += 1
                continue
            if itype == "DYNAMIC_SECRET":
                # Materialize the producer and store a point-in-time STATIC
                # snapshot in OpenBao as a DR fallback. TODO (implement dynamic
                # later): give OpenBao its own DB secrets engine instead.
                v = post(f"{AK}/get-dynamic-secret-value", {"token": aktok, "name": name})
                post(f"{BAO}/v1/mdapi/data/{rel}", {"data": {"value": json.dumps(v)}}, tok_hdr=baotok)
                dyn += 1
                continue
            v = post(f"{AK}/get-secret-value", {"token": aktok, "names": [name]})
            val = v.get(name)
            if val is None:
                err += 1; errs.append(name + ":noval"); continue
            if not isinstance(val, str):
                val = json.dumps(val)
            post(f"{BAO}/v1/mdapi/data/{rel}", {"data": {"value": val}}, tok_hdr=baotok)
            ok += 1
        except Exception as e:
            err += 1; errs.append(f"{name}:{type(e).__name__}")
    print(f"mirrored={ok} dynamic={dyn} skipped_keys={skipped} errors={err}", flush=True)
    for e in errs[:25]:
        print("ERR", e)
    raise SystemExit(1 if err else 0)
