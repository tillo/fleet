# Recurring Akeyless -> OpenBao mirror — keeps the warm STANDBY current (Option B).
# Hourly Job as SA openbao-mirror (OpenBao k8s-auth role `mirror`, write-only on
# mdapi/*). Akeyless read via api-key creds in Secret `akeyless-mirror-creds`
# (imperative runtime secret, NOT in git — copied from external-secrets/akeyless).
# Secret VALUES are never logged (only counts). First full run 2026-06-20: 318/318, 0 err.
defaultNamespace: openbao
