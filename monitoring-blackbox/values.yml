## prometheus-blackbox-exporter values
##
## Synthetic-probe sidecar for the existing rancher-monitoring Prometheus.
## Probes are defined as separate Probe CRDs in probes.yml; this values
## file only configures the prober modules they reference.

fullnameOverride: blackbox

replicas: 1

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 128Mi

## ServiceMonitor — let rancher-monitoring's Prometheus scrape blackbox's own
## metrics (probe_duration etc. for self-health). Default selector ({}) on the
## Prometheus CRD picks this up without label requirements.
serviceMonitor:
  enabled: true
  defaults:
    additionalMetricsRelabels: {}
    labels: {}

## Disable bundled prometheusRule generation; we ship our own in rules.yml
## with consistent severity/component/team labels.
prometheusRule:
  enabled: false

## Modules — only the ones our 7 component probes need.
config:
  modules:
    http_2xx:
      prober: http
      timeout: 10s
      http:
        valid_status_codes: [200, 301, 302]
        method: GET
        follow_redirects: true
        preferred_ip_protocol: ip4

    http_any_redirect:
      ## For services that redirect to login (oauth2-proxy / Keycloak) — any
      ## HTTP response < 500 means the layer is up.
      prober: http
      timeout: 10s
      http:
        valid_status_codes: [200, 301, 302, 401, 403]
        method: GET
        follow_redirects: false
        preferred_ip_protocol: ip4

    tcp_connect:
      prober: tcp
      timeout: 5s
      tcp:
        preferred_ip_protocol: ip4
        ip_protocol_fallback: false

    smtp_banner:
      prober: tcp
      timeout: 10s
      tcp:
        preferred_ip_protocol: ip4
        ip_protocol_fallback: false
        query_response:
          - expect: "^220 "

    imaps_starttls:
      ## IMAPS on port 993 — TLS handshake then capability check
      prober: tcp
      timeout: 10s
      tcp:
        preferred_ip_protocol: ip4
        ip_protocol_fallback: false
        tls: true
        query_response:
          - expect: "^\\* OK"

    dns_mdapi:
      prober: dns
      timeout: 5s
      dns:
        preferred_ip_protocol: ip4
        ip_protocol_fallback: false
        query_name: "mdapi.ch"
        query_type: "A"
        validate_answer_rrs:
          fail_if_not_matches_regexp:
            - ".+"

    dns_home_tillo:
      ## Probes Technitium directly — queries for an A record we control
      ## (technitium-dns.home.tillo.ch) and expects the LB VIP back.
      ## Use against the LB VIP and against each pod service.
      prober: dns
      timeout: 5s
      dns:
        preferred_ip_protocol: ip4
        ip_protocol_fallback: false
        query_name: "technitium-dns.home.tillo.ch"
        query_type: "A"
        validate_answer_rrs:
          fail_if_not_matches_regexp:
            - "192\\.168\\.1\\.54"

    ## ns.mdapi.ch (BIND9 authoritative for mdapi.ch + 12 other owned zones)
    ## modules. UDP path uses the default transport; TCP variant verifies
    ## ns.mdapi.ch's TCP/53 listener (required for large DNSSEC responses);
    ## DNSSEC variant turns on DO bit and the validating resolver's AD bit
    ## so we catch a chain-of-trust break from outside the cluster.
    dns_ns_mdapi_udp:
      prober: dns
      timeout: 5s
      dns:
        preferred_ip_protocol: ip4
        ip_protocol_fallback: false
        transport_protocol: udp
        query_name: "mdapi.ch"
        query_type: "SOA"
        validate_answer_rrs:
          fail_if_not_matches_regexp:
            - "ns\\.mdapi\\.ch\\."

    dns_ns_mdapi_tcp:
      prober: dns
      timeout: 5s
      dns:
        preferred_ip_protocol: ip4
        ip_protocol_fallback: false
        transport_protocol: tcp
        query_name: "mdapi.ch"
        query_type: "SOA"
        validate_answer_rrs:
          fail_if_not_matches_regexp:
            - "ns\\.mdapi\\.ch\\."

    dns_ns_mdapi_dnssec:
      prober: dns
      timeout: 5s
      dns:
        preferred_ip_protocol: ip4
        ip_protocol_fallback: false
        transport_protocol: udp
        query_name: "mdapi.ch"
        query_type: "DNSKEY"
        # Require the DNSKEY RRset itself (validates the signed origin and
        # that the EDNS DO bit yielded a usable answer).
        validate_answer_rrs:
          fail_if_not_matches_regexp:
            - "DNSKEY"
