apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: esphome
  namespace: esphome
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: ESPHome
    flame.pawelmalak/url: https://esphome.mdapi.ch
    flame.pawelmalak/category: Domotics
    flame.pawelmalak/icon: chip
    flame.pawelmalak/order: '30'
    nginx.ingress.kubernetes.io/auth-url: http://oauth2-proxy-admin.oauth2-proxy.svc.cluster.local/admin/oauth2/auth
    nginx.ingress.kubernetes.io/auth-signin: https://auth.mdapi.ch/admin/oauth2/start?rd=https://$host$escaped_request_uri
    nginx.ingress.kubernetes.io/auth-response-headers: Authorization
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecAuditEngine RelevantOnly
      SecAuditLogRelevantStatus "^(?:5|4(?!04))"
      SecAuditLogParts ABIJDEFHZ
      SecAuditLogType Serial
      SecAuditLogFormat JSON
      SecAuditLog /dev/stdout
      SecDebugLog /tmp/modsec_debug.log
      # ESPHome dashboard write/WebSocket endpoints accept arbitrary YAML config,
      # firmware binaries, and assorted JSON over text/html Content-Type. CRS
      # 920420 (disallowed content type) trips on every POST. Endpoints below
      # are the Handler-class-backed write paths from upstream web_server.py
      # make_app(). The dashboard sits behind oauth2-proxy admin auth (see
      # auth-url annotation above), so auth is the protection layer here.
      # First trigger: 920420 on POST /wizard and POST /edit?configuration=
      # secrets.yaml from internal users 2026-06-01.
      SecRule REQUEST_URI "@rx ^/(wizard|edit|upload|compile|run|validate|delete|undo-delete|archive|unarchive|rename|import|ignore-device|update-all|clean|clean-all|clean-mqtt|vscode|ace|secret_keys|logs|events)(\?|/|$)" \
        "id:1001,phase:1,pass,nolog,ctl:ruleRemoveByTag=OWASP_CRS"
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
      # 920420 and 920430 are both phase 1, binding REQUEST_HEADERS:Content-Type
      # and REQUEST_PROTOCOL respectively. The phase-1 ctl above does not catch
      # them (probe verified 2026-06-01: text/html POST /wizard still 403d by
      # 920420 with the ctl in place). Same gotcha pattern as 921110 on
      # notes-mcp - phase-1 rules that bind early-populated variables need
      # config-load-time removal via SecRuleRemoveById. This ingress only
      # serves the esphome dashboard (internal-admin behind oauth2-proxy) so
      # the unconditional removal is in scope.
      SecRuleRemoveById 920420 920430
spec:
  ingressClassName: nginx
  rules:
    - host: esphome.mdapi.ch
      http:
        paths:
          - backend:
              service:
                name: esphome
                port:
                  number: 6052
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - esphome.mdapi.ch
      secretName: esphome-cert
