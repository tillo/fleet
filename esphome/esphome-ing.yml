apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: esphome
  namespace: esphome
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: ESPHome
    flame.pawelmalak/url: https://esphome.mdapi.ch
    flame.pawelmalak/category: Domotics
    flame.pawelmalak/icon: car-esp
    flame.pawelmalak/order: '40'
spec:
  ingressClassName: nginx
  rules:
    - host: esphome.mdapi.ch
      http:
        paths:
          - backend:
              service:
                name: esphome
                port:
                  number: 6052
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - esphome.mdapi.ch
      secretName: esphome-cert
