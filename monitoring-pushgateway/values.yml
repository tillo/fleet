## prometheus-pushgateway values
##
## Receives metrics pushed by short-lived jobs (Windmill scripts, GitLab CI
## tasks, cron jobs) and exposes them for the rancher-monitoring Prometheus
## to scrape. Lives in `monitoring` ns alongside other supplemental
## observability bits.

fullnameOverride: pushgateway

resources:
  requests:
    cpu: 5m
    memory: 16Mi
  limits:
    memory: 64Mi

## Persist pushed metrics across pod restarts (small PVC).
## Without this, every pod restart loses all currently-stored values.
persistentVolume:
  enabled: true
  storageClass: longhorn
  size: 1Gi
  accessModes:
    - ReadWriteOnce

## Tell rancher-monitoring's Prometheus to scrape us.
serviceMonitor:
  enabled: true
  ## Default selector ({}) on the Prometheus CRD picks any SM. No release
  ## label needed.

## Expose Pushgateway to off-cluster pushers (BPI-R4 router, future devices)
## via an internal-only ingress. Hostname is LAN-resolved via BPI-R4 dnsmasq
## (list address '/pushgateway.mdapi.ch/192.168.1.191') so it never leaves
## the home network. Source range whitelist enforces that at the ingress.
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/whitelist-source-range: "192.168.0.0/16,10.0.0.0/8"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - pushgateway.mdapi.ch
  path: /
  pathType: Prefix
  tls:
    - hosts:
        - pushgateway.mdapi.ch
      secretName: pushgateway-mdapi-ch-tls

## NetworkPolicy is intentionally NOT set. The chart's template renders
## a NetworkPolicy whenever `.Values.networkPolicy` is truthy in Go-template
## terms — i.e., a non-empty dict. The chart's default is `{}` which is
## falsy, so leaving the key absent here lets the chart skip NP rendering.
## Setting `networkPolicy.enabled: false` would actually ENABLE the
## template (dict has one key → truthy) and then fail because neither
## `allowAll` nor `customSelectors` is set. Counter-intuitive, hence this note.
