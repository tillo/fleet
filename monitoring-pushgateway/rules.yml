## Meta-rule: alert when a pushed metric is stale.
##
## Convention for pushed metrics:
##   <name>_last_run_timestamp_seconds{job="<script>", instance="<host>"}
##
## If a script that's expected to run every N hours hasn't pushed a fresh
## timestamp within 2N hours, fire BatchJobStale.
##
## Each script being migrated from Windmill should:
##   1. Push its metrics to http://pushgateway.monitoring.svc.cluster.local:9091/metrics/job/<name>
##   2. Always include `<name>_last_run_timestamp_seconds` set to time.time()
##   3. (Optional) Push business-specific gauges; PrometheusRules then alert
##      on those.

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-batch-jobs
  namespace: monitoring
spec:
  groups:
  - name: app-batch-jobs.staleness
    rules:
    - alert: BatchJobStale
      expr: |
        (
          time() - max by (job) (
            {__name__=~".+_last_run_timestamp_seconds", job!=""}
          )
        ) > 86400
      labels:
        severity: warning
        team: mdapi
        component: General
      annotations:
        summary: "Batch job {{ $labels.job }} hasn't pushed metrics in {{ $value | humanizeDuration }}"
        description: |
          A scheduled job has stopped pushing its `*_last_run_timestamp_seconds` metric
          for >24h. Either the job's broken, or its schedule was disabled, or it
          hasn't been migrated to push metrics yet.

          Check Windmill (https://windmill.mdapi.ch) or the responsible cron source.

    ## Catch all "exit code != 0" patterns. Convention: scripts also push
    ## a `<name>_last_run_success` gauge (1=ok, 0=failed). Alert on 0.
    - alert: BatchJobLastRunFailed
      expr: |
        max by (job) (
          {__name__=~".+_last_run_success", job!=""}
        ) == 0
      labels:
        severity: warning
        team: mdapi
        component: General
      annotations:
        summary: "Batch job {{ $labels.job }} reported a failed last run"
        description: |
          The script's `*_last_run_success` gauge is 0. Check its logs in Windmill.
