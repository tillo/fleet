defaultNamespace: monitoring
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
helm:
  maxHistory: 25
  releaseName: pushgateway
  repo: https://prometheus-community.github.io/helm-charts
  chart: prometheus-pushgateway
  # Intentionally no `version:` -- Fleet tracks the repo's latest chart
  # and applies any new release on the next GitRepo poll cycle.
  valuesFiles:
    - values.yml
