apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: tv
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
spec:
  selector:
    matchLabels:
      app: radarr
  replicas: 1
  template:
    metadata:
      labels:
        app: radarr
    spec:
      containers:
      - name: radarr
        image: lscr.io/linuxserver/radarr
        imagePullPolicy: Always
        ports:
        - containerPort: 7878
        env:
        - name: TZ
          value: Europe/Zurich
        - name: PUID
          value: '1000'
        - name: PGID
          value: '1000'
        volumeMounts:
        - name: radarr-config
          mountPath: /config
        - name: tv
          mountPath: /downloads/complete
          subPath: Torrents/Finish
        - name: tv
          mountPath: /downloads/incomplete
          subPath: Torrents/Temp
        - name: tv
          mountPath: /tv
      volumes:
      - name: radarr-config
        persistentVolumeClaim:
          claimName: radarr-config
      - name: tv
        persistentVolumeClaim:
          claimName: tv
