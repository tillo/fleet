## tv-finish-film migrated P420i -> FusionIO (longhorn-iomemory) 2026-06-12.
## Replaces tv-finish-film (harvester-longhorn-2replicas-notmigratable on the
## failing P420i). Data rescued via rsync (~659 GB). RWX (Radarr/Transmission share
## the "Finish/Film" landing zone). Starts rep=1 on fio (re-downloadable media);
## bumped to rep=2 post-cutover.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tv-finish-film-v2
  namespace: tv
  labels:
    recurring-job-group.longhorn.io/default: enabled
    recurring-job.longhorn.io/source: enabled
spec:
  storageClassName: longhorn-iomemory
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1200Gi
