## tv-v3 — fio (iomemory) replacement for tv-v2, to get media off the flaky P420i tier.
## longhorn-iomemory SC = diskSelector iomemory, ext4. Provisions rep=2; volume patched to rep=1
## post-bind (media is re-downloadable; fio is premium tier). RWX so all 8 consumers share it.
## Labels mirror tv-v2 (default+weekly backup groups + source).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tv-v3
  namespace: tv
  labels:
    recurring-job-group.longhorn.io/default: enabled
    recurring-job-group.longhorn.io/weekly: enabled
    recurring-job.longhorn.io/source: enabled
spec:
  storageClassName: longhorn-iomemory
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1536Gi
