apiVersion: v1
kind: Service
metadata:
  name: pms-docker
  namespace: tv
spec:
  type: LoadBalancer
  loadBalancerClass: metallb
  loadBalancerIP: 192.168.1.46
  externalTrafficPolicy: Local
  selector:
    app: pms-docker
  ports:
    - name: http
      port: 32400
      protocol: TCP
      targetPort: 32400
