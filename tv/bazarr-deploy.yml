apiVersion: apps/v1
kind: Deployment
metadata:
  name: bazarr
  namespace: tv
spec:
  selector:
    matchLabels:
      app: bazarr
  replicas: 1
  template:
    metadata:
      labels:
        app: bazarr
    spec:
      containers:
      - name: bazarr
        image: lscr.io/linuxserver/bazarr
        ports:
        - containerPort: 6767
        env:
        - name: TZ
          value: Europe/Zurich
        volumeMounts:
        - name: bazarr-config
          mountPath: /config
        - name: tv
          mountPath: /tv
      volumes:
      - name: bazarr-config
        persistentVolumeClaim:
          claimName: bazarr-config
      - name: tv
        persistentVolumeClaim:
          claimName: tv
