apiVersion: apps/v1
kind: Deployment
metadata:
  name: threadfin
  namespace: tv
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
spec:
  selector:
    matchLabels:
      app: threadfin
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: threadfin
    spec:
      containers:
      - name: threadfin
        image: registry.mdapi.ch/mdapi//threadfin:latest
        ports:
        - containerPort: 34400
        env:
        - name: TZ
          value: Europe/Zurich
        - name: PUID
          value: '1001'
        - name: PGID
          value: '1001'
        volumeMounts:
        - name: threadfin-config
          mountPath: /home/threadfin/conf
      volumes:
      - name: threadfin-config
        persistentVolumeClaim:
          claimName: threadfin-config
      imagePullSecrets:
      - name: mdapi-registry
