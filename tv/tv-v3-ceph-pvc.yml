## tv-v3-ceph — CephFS RWX target for migrating the Plex media library off fio/Longhorn
## to the Ceph bulk tier (P420i). ceph-filesystem SC = CephFS, data rep2/min1 + meta rep3.
## Same 1536Gi size as tv-v3. Online pre-synced from tv-v3, then all 8 consumers repoint
## here at cutover (Plex downtime = pod restart only). No Longhorn backup labels (Ceph tier).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tv-v3-ceph
  namespace: tv
spec:
  storageClassName: ceph-filesystem
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1536Gi
