apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nordlynx-env-secret
spec:
  refreshInterval: 1m

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: nordlynx-env-secret
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/tv/nordlynx/nordlynx-env-secret/PRIVATE_KEY
      secretKey: PRIVATE_KEY
