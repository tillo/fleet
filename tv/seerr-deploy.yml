apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerr
  namespace: tv
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
spec:
  selector:
    matchLabels:
      app: seerr
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: seerr
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
      - name: chown-config
        image: alpine:3.20
        command: [sh, -c, "chown -R 1000:1000 /app/config"]
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: seerr-config
          mountPath: /app/config
      containers:
      - name: seerr
        image: ghcr.io/seerr-team/seerr:latest
        ports:
        - containerPort: 5055
        resources:
          requests:
            cpu: 25m
            memory: 350Mi
          limits:
            cpu: 500m
            memory: 500Mi
        env:
        - name: TZ
          value: Europe/Zurich
        - name: PORT
          value: "5055"
        volumeMounts:
        - name: seerr-config
          mountPath: /app/config
      volumes:
      - name: seerr-config
        persistentVolumeClaim:
          claimName: overseerr-config
