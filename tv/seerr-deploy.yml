apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerr
  namespace: tv
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 4h"
spec:
  selector:
    matchLabels:
      app: seerr
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: seerr
    spec:
      priorityClassName: mdapi-low
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
      - name: chown-config
        image: alpine:latest
        command: [sh, -c, "chown -R 1000:1000 /app/config"]
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: seerr-config
          mountPath: /app/config
      containers:
      - name: seerr
        image: ghcr.io/seerr-team/seerr:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5055
        # Initial seed only -- VPA Auto (vpa-objects/vpa-auto.yaml) rewrites
        # requests/limits per actual usage. Old 500m lid throttled 32% of
        # SSR renders; 1500m was still hitting 13% throttle on bursts. 3c
        # is plenty for the Next.js render path. Memory request matches
        # observed steady-state (~230Mi); 1Gi limit caps any leak.
        resources:
          requests:
            cpu: 25m
            memory: 350Mi
          limits:
            cpu: 3000m
            memory: 1Gi
        env:
        - name: TZ
          value: Europe/Zurich
        - name: PORT
          value: "5055"
        volumeMounts:
        - name: seerr-config
          mountPath: /app/config
      volumes:
      - name: seerr-config
        persistentVolumeClaim:
          claimName: overseerr-config
