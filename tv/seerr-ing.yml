apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seerr
  namespace: tv
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: seerr.mdapi.ch
      http:
        paths:
          - backend:
              service:
                name: seerr
                port:
                  number: 5055
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - seerr.mdapi.ch
      secretName: seerr-cert
