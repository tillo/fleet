apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: overseerr
  namespace: tv
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/configuration-snippet: |
      return 301 https://seerr.mdapi.ch$request_uri;
spec:
  ingressClassName: nginx
  rules:
    - host: overseerr.mdapi.ch
      http:
        paths:
          - backend:
              service:
                name: seerr
                port:
                  number: 5055
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - overseerr.mdapi.ch
      secretName: overseerr-cert
