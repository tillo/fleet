apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bazarr
  namespace: tv
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: Sub
    flame.pawelmalak/url: https://bazarr.mdapi.ch
    flame.pawelmalak/category: TV
    flame.pawelmalak/icon: subtitles
    flame.pawelmalak/order: '350'
    nginx.ingress.kubernetes.io/auth-response-headers: Authorization
    nginx.ingress.kubernetes.io/auth-signin: https://auth.mdapi.ch/tv/oauth2/start?rd=https://$host$escaped_request_uri
    nginx.ingress.kubernetes.io/auth-url: https://auth.mdapi.ch/tv/oauth2/auth
    nginx.ingress.kubernetes.io/proxy-body-size: '16m'
spec:
  ingressClassName: nginx
  rules:
    - host: bazarr.mdapi.ch
      http:
        paths:
          - backend:
              service:
                name: bazarr
                port:
                  number: 6767
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - bazarr.mdapi.ch
      secretName: bazarr-cert
