## PATH B: replacement for the 3.5 TB rep=1 tv PVC.
## Sized 1.5 TiB (current actual data ~995 GB after Film/Serie cleanup) + 500 GB headroom.
## rep=2 closes the single-disk-failure window that hung over tv at rep=1.
## RWX so all consumers (plex, sonarr, radarr, bazarr, tdarr, sftpgo, transmission /watch, …) can share.
## Storage class -notmigratable to match original tv PVC behaviour.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tv-v2
  namespace: tv
  labels:
    recurring-job-group.longhorn.io/default: enabled
    recurring-job-group.longhorn.io/weekly: enabled
    recurring-job.longhorn.io/source: enabled
spec:
  storageClassName: harvester-longhorn-2replicas-notmigratable
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1536Gi
