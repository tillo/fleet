apiVersion: apps/v1
kind: Deployment
metadata:
  name: overseerr
  namespace: tv
spec:
  selector:
    matchLabels:
      app: overseerr
  replicas: 1
  template:
    metadata:
      labels:
        app: overseerr
    spec:
      containers:
      - name: overseerr
        image: sctx/overseerr
        ports:
        - containerPort: 5055
        env:
        - name: TZ
          value: Europe/Zurich
        volumeMounts:
        - name: overseerr-config
          mountPath: /app/config
      volumes:
      - name: overseerr-config
        persistentVolumeClaim:
          claimName: overseerr-config
