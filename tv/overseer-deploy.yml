apiVersion: apps/v1
kind: Deployment
metadata:
  name: overseerr
  namespace: tv
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
spec:
  selector:
    matchLabels:
      app: overseerr
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: overseerr
    spec:
      containers:
      - name: overseerr
        image: sctx/overseerr:latest
        ports:
        - containerPort: 5055
        resources:
          requests:
            cpu: 25m
            memory: 350Mi
          limits:
            cpu: 500m
            memory: 500Mi
        env:
        - name: TZ
          value: Europe/Zurich
        volumeMounts:
        - name: overseerr-config
          mountPath: /app/config
      volumes:
      - name: overseerr-config
        persistentVolumeClaim:
          claimName: overseerr-config
