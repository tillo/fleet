apiVersion: apps/v1
kind: Deployment
metadata:
  name: autobrr
  namespace: tv
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 4h"
spec:
  selector:
    matchLabels:
      app: autobrr
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: autobrr
    spec:
      containers:
      - name: autobrr
        image: ghcr.io/autobrr/autobrr:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 7474
        resources:
          requests:
            cpu: 25m
            memory: 350Mi
          limits:
            cpu: 500m
            memory: 500Mi
        env:
        - name: TZ
          value: Europe/Zurich
        volumeMounts:
        - name: autobrr-config
          mountPath: /config
      volumes:
      - name: autobrr-config
        persistentVolumeClaim:
          claimName: autobrr-config
