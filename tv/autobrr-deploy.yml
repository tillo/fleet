apiVersion: apps/v1
kind: Deployment
metadata:
  name: autobrr
  namespace: tv
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
spec:
  selector:
    matchLabels:
      app: autobrr
  replicas: 1
  template:
    metadata:
      labels:
        app: autobrr
    spec:
      containers:
      - name: autobrr
        image: ghcr.io/autobrr/autobrr:latest
        ports:
        - containerPort: 7474
        env:
        - name: TZ
          value: Europe/Zurich
        volumeMounts:
        - name: autobrr-config
          mountPath: /config
      volumes:
      - name: autobrr-config
        persistentVolumeClaim:
          claimName: autobrr-config
