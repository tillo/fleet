apiVersion: apps/v1
kind: Deployment
metadata:
  name: autobrr
  namespace: tv
spec:
  selector:
    matchLabels:
      app: autobrr
  replicas: 1
  template:
    metadata:
      labels:
        app: autobrr
    spec:
      containers:
      - name: autobrr
        command:
        - sleep
        args:
        - infinity
        image: ghcr.io/autobrr/autobrr
        ports:
        - containerPort: 7474
        env:
        - name: TZ
          value: Europe/Zurich
        volumeMounts:
        - name: autobrr-config
          mountPath: /config
      volumes:
      - name: autobrr-config
        persistentVolumeClaim:
          claimName: autobrr-config
