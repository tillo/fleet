apiVersion: apps/v1
kind: Deployment
metadata:
  name: rsync
  namespace: tv
spec:
  selector:
    matchLabels:
      app: rsync
  replicas: 1
  template:
    metadata:
      labels:
        app: rsync
    spec:
      containers:
      - name: rsync
        image: stefda/rsync
        ports:
        - containerPort: 873
        env:
        - name: TZ
          value: Europe/Zurich
        - name: VOLUME
          value: /mnt/tv
        - name: ALLOW
          value: 192.168.0.0/16 172.16.0.0/12 10.0.0.0/8
        volumeMounts:
        - name: tv
          mountPath: /mnt/tv
      volumes:
      - name: tv
        persistentVolumeClaim:
          claimName: tv
