apiVersion: apps/v1
kind: Deployment
metadata:
  name: rsync
  namespace: tv
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 4h"
spec:
  selector:
    matchLabels:
      app: rsync
  replicas: 1
  template:
    metadata:
      labels:
        app: rsync
    spec:
      containers:
      - name: rsync
        image: registry.mdapi.ch/mdapi/rsync:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 873
        env:
        - name: TZ
          value: Europe/Zurich
        - name: USER
          value: '1000'
        - name: GROUP
          value: '1000'
        - name: VOLUME
          value: /mnt/tv
        - name: ALLOW
          value: 192.168.0.0/16 172.16.0.0/12 10.0.0.0/8
        volumeMounts:
        - name: tv
          mountPath: /mnt/tv
      volumes:
      - name: tv
        persistentVolumeClaim:
          claimName: tv-v3-ceph
      imagePullSecrets:
      - name: mdapi-registry
