apiVersion: apps/v1
kind: Deployment
metadata:
  name: sftpgo
  namespace: tv
  annotations:
    keel.sh/match-tag: 'true'
    keel.sh/policy: minor
    keel.sh/pollSchedule: "@every 4h"
    keel.sh/trigger: poll
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sftpgo
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: sftpgo
    spec:
      initContainers:
      - name: sftpgo-host-keys
        image: alpine:3.20
        command: ["sh", "-c"]
        args:
        - |
          set -e
          apk add --no-cache openssh-keygen >/dev/null 2>&1
          mkdir -p /data/.sftpgo
          [ -f /data/.sftpgo/host_key_ed25519 ] || ssh-keygen -q -t ed25519     -N '' -f /data/.sftpgo/host_key_ed25519
          [ -f /data/.sftpgo/host_key_rsa     ] || ssh-keygen -q -t rsa -b 3072 -N '' -f /data/.sftpgo/host_key_rsa
          chown -R 1000:1000 /data/.sftpgo
          chmod 700 /data/.sftpgo
          chmod 600 /data/.sftpgo/host_key_*
          chmod 644 /data/.sftpgo/host_key_*.pub
        securityContext:
          runAsUser: 0
        volumeMounts:
        - { mountPath: /data, name: tv-data }
      containers:
      - name: sftpgo
        image: drakkan/sftpgo:v2.7-alpine
        args: ["sftpgo", "serve", "--config-file", "/etc/sftpgo/sftpgo.json"]
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
        ports:
        - { containerPort: 2022, name: sftp }
        - { containerPort: 2121, name: ftp }
        - { containerPort: 8080, name: web }
        - { containerPort: 22250, name: pasv0 }
        - { containerPort: 22251, name: pasv1 }
        - { containerPort: 22252, name: pasv2 }
        - { containerPort: 22253, name: pasv3 }
        - { containerPort: 22254, name: pasv4 }
        - { containerPort: 22255, name: pasv5 }
        - { containerPort: 22256, name: pasv6 }
        - { containerPort: 22257, name: pasv7 }
        - { containerPort: 22258, name: pasv8 }
        - { containerPort: 22259, name: pasv9 }
        resources:
          limits:
            memory: 256Mi
          requests:
            cpu: 20m
            memory: 64Mi
        volumeMounts:
        - mountPath: /data
          name: tv-data
        - mountPath: /etc/sftpgo/sftpgo.json
          name: sftpgo-config
          subPath: sftpgo.json
          readOnly: true
      - name: sftpgo-auth
        image: python:3.13-alpine
        command: ["python3", "/app/auth_server.py"]
        env:
        - { name: KC_ISSUER,     value: "https://idp.mdapi.ch/realms/tilloch" }
        - { name: KC_CLIENT_ID,  value: "sftpgo" }
        - name: KC_CLIENT_SECRET
          valueFrom:
            secretKeyRef: { name: sftpgo-keycloak, key: KC_CLIENT_SECRET }
        - { name: REQUIRED_ROLE, value: "mdapi-tv" }
        - { name: HOME_DIR,      value: "/data" }
        - { name: HOME_UID,      value: "1000" }
        - { name: HOME_GID,      value: "1000" }
        resources:
          limits:
            memory: 64Mi
          requests:
            cpu: 5m
            memory: 16Mi
        volumeMounts:
        - mountPath: /app/auth_server.py
          name: sftpgo-config
          subPath: auth_server.py
          readOnly: true
      volumes:
      - name: tv-data
        persistentVolumeClaim:
          claimName: tv
      - name: sftpgo-config
        configMap:
          name: sftpgo-config
