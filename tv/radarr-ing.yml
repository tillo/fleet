apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: radarr
  namespace: tv
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: Film
    flame.pawelmalak/url: https://radarr.mdapi.ch
    flame.pawelmalak/category: TV
    flame.pawelmalak/icon: movie-open
    flame.pawelmalak/order: '30'
    nginx.ingress.kubernetes.io/auth-response-headers: Authorization
    nginx.ingress.kubernetes.io/auth-signin: https://auth.mdapi.ch/tv/oauth2/start?rd=https://$host$escaped_request_uri
    nginx.ingress.kubernetes.io/auth-url: https://auth.mdapi.ch/tv/oauth2/auth
    nginx.ingress.kubernetes.io/proxy-body-size: '32m'
spec:
  ingressClassName: nginx
  rules:
    - host: radarr.mdapi.ch
      http:
        paths:
          - backend:
              service:
                name: radarr
                port:
                  number: 7878
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - radarr.mdapi.ch
      secretName: radarr-cert
