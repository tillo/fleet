# Scheduled clean restart for transmission to pre-empt its memory leak.
#
# transmission 4.1.2 (linuxserver image) leaks steadily: a fresh daemon with
# the full torrent set sits at ~105 MiB, but RSS climbed to ~9-11 GiB over
# ~2-3 days of uptime (2026-06-22) — pure leak, not torrents or cache (cache
# is 4 MB, all piece hashes total 8 MiB). Rather than let it grow into the VPA
# limit and get OOMKilled (an unclean kill that can interrupt mid-write and
# loses the graceful settings.json save), restart it cleanly each night.
#
# A clean SIGTERM restart also re-saves settings.json (preserving peer-limit
# 600/60) and lets VPA re-evaluate the request against the fresh low usage.
# Torrents reconnect within ~2 min; 03:00 UTC (~05:00 CEST / 04:00 CET) is a
# low-demand window. Cadence is tunable: daily keeps peak to ~1 day of leak.
#
# NOTE: schedule is UTC and we deliberately do NOT set spec.timeZone. The
# rancher kube-state-metrics image (appco 2.17.0) ships no tzdata, so a named
# timeZone makes KSM panic in kube_cronjob_next_schedule_time and crashloop,
# taking out ALL kube_* metrics. Bake the offset into the UTC cron instead.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: transmission-restarter
  namespace: tv
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: transmission-restarter
  namespace: tv
rules:
  # `kubectl rollout restart` GETs the deployment then PATCHes it with a
  # restartedAt annotation. Least privilege: only the transmission-pia deploy.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["transmission-pia"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: transmission-restarter
  namespace: tv
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: transmission-restarter
subjects:
  - kind: ServiceAccount
    name: transmission-restarter
    namespace: tv
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: transmission-leak-restart
  namespace: tv
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          serviceAccountName: transmission-restarter
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: kubectl
              image: registry.k8s.io/kubectl:v1.35.2
              command:
                - kubectl
                - rollout
                - restart
                - deployment/transmission-pia
                - -n
                - tv
                - --cache-dir=/tmp/.kube-cache
              env:
                - name: HOME
                  value: /tmp
              resources:
                requests: { cpu: 10m, memory: 32Mi }
                limits: { memory: 128Mi }
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
