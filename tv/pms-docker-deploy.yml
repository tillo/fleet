apiVersion: apps/v1
kind: Deployment
metadata:
  name: pms-docker
  namespace: tv
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 4h"
spec:
  selector:
    matchLabels:
      app: pms-docker
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: pms-docker
    spec:
      containers:
      - name: pms-docker
        image: plexinc/pms-docker:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 32400
        resources:
          requests:
            cpu: 100m
            memory: 4Gi
          limits:
            cpu: 4
            memory: 6Gi
        env:
        - name: TZ
          value: Europe/Zurich
        - name: PLEX_CLAIM
          value: claim-V9R4xvBixsJK6GbbjPkn
        - name: ADVERTISE_IP
          value: http://31.3.128.62:32400/
        volumeMounts:
        - name: pms-docker-config
          mountPath: /config
        - name: pms-docker-transcode
          mountPath: /transcode
        - name: tv
          mountPath: /data
      volumes:
      - name: pms-docker-config
        persistentVolumeClaim:
          claimName: pms-docker-config
      - name: pms-docker-transcode
        persistentVolumeClaim:
          claimName: pms-docker-transcode
      - name: tv
        persistentVolumeClaim:
          claimName: tv-v2
