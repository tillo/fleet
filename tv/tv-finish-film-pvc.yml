## Phase 2 of the tv/tv split: Transmission downloadDir for movies (the
## torrent "Finish" landing zone, read by Radarr to import into /tv/Film).
##
## Sized at 1200 GiB (bumped 2026-06-04 from 700 after live expansion):
##   - 700 GiB was already tight after the Pass-3 migration sweep
##     classified ~22 loose top-level torrents into /Finish/Film.
##   - PVC was expanded in-cluster to 1200 GiB; this manifest catches
##     up to live state (Fleet was flagging Modified).
##   - Headroom now ~700 GB above current usage for future seeding
##     + Tdarr transcode backlog.
##
## Why not larger: qua's FAST SSD where one replica lives only has
## ~395 GB free, and the cluster-wide storage-minimal-available-percentage
## was already dropped to 10 % to fit this bump. Bigger sizes need replica
## relocation onto qua's quassd RAID5 (5.4 TB free) — defer until post
## Phase-C JBOD reconfiguration.
##
## RWX because three consumers touch this path concurrently:
##   - transmission-pia writes (downloadDir + seed reads)
##   - radarr reads (import → /tv/Film)
##   - sonarr (mounts /downloads/complete top-level; doesn't read /Film
##     directly but the mount tree still has to be reachable)
##
## Storage class -notmigratable matches the precedent set by the original
## tv/tv volume — long staleReplicaTimeout (2880 min) avoids rebuild
## storms on transient node blips during Harvester upgrades.

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tv-finish-film
  namespace: tv
  labels:
    recurring-job-group.longhorn.io/default: enabled
    recurring-job.longhorn.io/source: enabled
    # No weekly snapshot — Finish is recoverable from torrents themselves.
spec:
  storageClassName: harvester-longhorn-2replicas-notmigratable
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1200Gi
