## Phase 2 of the tv/tv split: Transmission downloadDir for series (the
## torrent "Finish" landing zone, read by Sonarr to import into /tv/Serie).
##
## Sized at 1000 GiB (bumped 2026-05-30 from 900):
##   - Today /tv/Torrents/Finish/Serie is ~548 GB.
##   - The ~14 loose top-level "series-like" torrents at /tv/Torrents/Finish/
##     (Cassandra, Girls S06, Starfleet Academy, …) get classified here
##     during the migration sweep — another ~140 GB.
##   - +312 GB headroom for in-flight S01-pack downloads + Tdarr backlog.
##
## Same capacity caveat as tv-finish-film: bigger sizes need replica
## relocation off qua's FAST SSD onto quassd; defer until post Phase C.
##
## RWX (same rationale as tv-finish-film).
## Storage class -notmigratable (same rationale as tv-finish-film).

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tv-finish-serie
  namespace: tv
  labels:
    recurring-job-group.longhorn.io/default: enabled
    recurring-job.longhorn.io/source: enabled
spec:
  storageClassName: harvester-longhorn-2replicas-notmigratable
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1000Gi
