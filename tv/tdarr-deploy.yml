apiVersion: apps/v1
kind: Deployment
metadata:
  name: tdarr
  namespace: tv
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
spec:
  selector:
    matchLabels:
      app: tdarr
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: tdarr
    spec:
      containers:
      - name: tdarr
        image: ghcr.io/haveagitgat/tdarr:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8265
        resources:
          requests:
            cpu: 4
            memory: 8Gi
          limits:
            cpu: 8
            memory: 12Gi
        env:
        - name: TZ
          value: Europe/Zurich
        - name: PUID
          value: '1000'
        - name: PGID
          value: '1000'
        - name: serverIP
          value: '0.0.0.0'
        - name: serverPort
          value: '8266'
        - name: webUIPort
          value: '8265'
        - name: internalNode
          value: 'true'
        - name: nodeName
          value: mdapi
        volumeMounts:
        - name: tdarr-server
          mountPath: /app/server
        - name: tdarr-configs
          mountPath: /app/configs
        - name: tdarr-temp
          mountPath: /temp
        - name: tv
          mountPath: /media
      volumes:
      - name: tdarr-server
        persistentVolumeClaim:
          claimName: tdarr-server
      - name: tdarr-configs
        persistentVolumeClaim:
          claimName: tdarr-configs
      - name: tdarr-temp
        persistentVolumeClaim:
          claimName: tdarr-temp
      - name: tv
        persistentVolumeClaim:
          claimName: tv-v2
