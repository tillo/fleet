## tv-finish-film-ceph — CephFS RWX target migrating the films download/library volume
## off fio/Longhorn to the Ceph bulk tier. Consumers: radarr/sonarr/transmission-pia
## (no Plex). Online pre-synced from tv-finish-film-v2, then repoint at cutover.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tv-finish-film-ceph
  namespace: tv
spec:
  storageClassName: ceph-filesystem
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1200Gi
