apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  namespace: tv
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
spec:
  selector:
    matchLabels:
      app: prowlarr
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: prowlarr
    spec:
      containers:
      - name: prowlarr
        image: lscr.io/linuxserver/prowlarr:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9696
        # Initial seed only — VPA Auto (vpa-objects/vpa-auto.yaml)
        # right-sizes per usage. 2 GiB headroom for indexer-fetch
        # bursts; steady state is ~280 MiB.
        resources:
          requests:
            cpu: 25m
            memory: 300Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        env:
        - name: TZ
          value: Europe/Zurich
        volumeMounts:
        - name: prowlarr-config
          mountPath: /config
      volumes:
      - name: prowlarr-config
        persistentVolumeClaim:
          claimName: prowlarr-config
