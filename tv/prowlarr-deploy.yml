apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  namespace: tv
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 4h"
spec:
  selector:
    matchLabels:
      app: prowlarr
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: prowlarr
    spec:
      priorityClassName: mdapi-low
      containers:
      - name: prowlarr
        image: lscr.io/linuxserver/prowlarr:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 9696
        # Initial seed only — VPA Auto (vpa-objects/vpa-auto.yaml)
        # right-sizes per usage. 2 GiB headroom for indexer-fetch
        # bursts; steady state is ~280 MiB.
        # No CPU limit: .NET thread-pool/GC micro-bursts exhausted the
        # CFS quota at ~8% of periods even with a 2-core limit while
        # average usage stayed ~1m (ContainerCpuThrottling, chronic
        # 2026-07-15..18). Memory limit stays.
        resources:
          requests:
            cpu: 25m
            memory: 300Mi
          limits:
            memory: 2Gi
        env:
        - name: TZ
          value: Europe/Zurich
        volumeMounts:
        - name: prowlarr-config
          mountPath: /config
      volumes:
      - name: prowlarr-config
        persistentVolumeClaim:
          claimName: prowlarr-config
