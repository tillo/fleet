# Tabby model config: both models served by the ollama deployment over HTTP,
# so Tabby never spawns its bundled (CUDA-linked, CPU-incompatible)
# llama-server. Mounted at /data/config.toml via subPath.
# FIM template = Qwen2.5-Coder special tokens (matches TabbyML registry entry).
apiVersion: v1
kind: ConfigMap
metadata:
  name: tabby-config
data:
  config.toml: |
    # Ivy Bridge latency tuning: shorter context + shorter completions.
    # ~5-6 tok/s generation means every 32 tokens cost ~6 s.
    [completion]
    max_input_length = 1024
    max_decoding_tokens = 32

    [model.completion.http]
    kind = "ollama/completion"
    model_name = "qwen2.5-coder:1.5b-base"
    api_endpoint = "http://ollama:11434"
    prompt_template = "<|fim_prefix|>{prefix}<|fim_suffix|>{suffix}<|fim_middle|>"

    [model.embedding.http]
    kind = "ollama/embedding"
    model_name = "nomic-embed-text"
    api_endpoint = "http://ollama:11434"
