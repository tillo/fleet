# Model cache only (~2 GiB of re-downloadable GGUF + index data) — 1 replica
# on purpose: losing it just means a re-download on next pod start.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tabby-data
spec:
  storageClassName: harvester-longhorn-1replica
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
