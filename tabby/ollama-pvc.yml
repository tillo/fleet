# Ollama model store (qwen2.5-coder 1.5b-base + nomic-embed-text, ~1.5 GiB,
# re-pullable) — 1 replica on purpose, same rationale as tabby-data.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
spec:
  storageClassName: harvester-longhorn-1replica
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
