# Tabby code-completion trial (LLM assessment 2026-05 Option B).
# CPU-only: nodes are E5-2640 v2 (no AVX2). Tabby's bundled llama-server is
# CUDA-linked (no CPU image exists since ~0.27), so inference is delegated to
# the ollama deployment via /data/config.toml (tabby-cm.yml) — Tabby here is
# only the auth/UI/API/index layer. Expected 5-15 tok/s on Ivy Bridge;
# acceptance: 1-week parity feel vs Copilot. Completion only, no chat model.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tabby
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tabby
  template:
    metadata:
      labels:
        app: tabby
    spec:
      containers:
        - name: tabby
          image: tabbyml/tabby:0.32.0
          imagePullPolicy: IfNotPresent
          args:
            - serve
          env:
            - name: TABBY_DISABLE_USAGE_COLLECTION
              value: "1"
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /data/config.toml
              subPath: config.toml
          startupProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 10
            failureThreshold: 60
          livenessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 30
            failureThreshold: 4
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tabby-data
        - name: config
          configMap:
            name: tabby-config
