apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-agent-token
spec:
  refreshInterval: 1m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: gitlab-agent-token
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/gitlab-agent/token
      secretKey: token
