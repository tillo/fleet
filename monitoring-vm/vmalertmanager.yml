## Dedicated Alertmanager for vmalert. Phase 4: pulls its routes/receivers
## from VMAlertmanagerConfig CRs labeled `monitoring-stack: mdapi`
## (currently `monitoring/mdapi-team`, see fleet/monitoring-vmalertmanager-
## config/). The inline `configRawYaml` is kept as a minimal scaffold that
## the operator merges the selected CRs into — `global.resolve_timeout`
## sticks because it's not surfaced via VMAlertmanagerConfig.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAlertmanager
metadata:
  name: mdapi
  namespace: monitoring
spec:
  ## Pull via the in-cluster Zot cache; see vmsingle.yml for the pattern.
  image:
    repository: zot.mdapi.ch/prom/alertmanager
  imagePullSecrets:
    - name: zot-pull
  replicaCount: 1
  retention: 120h
  ## The alertmanager image runs as uid/gid 65534 (nobody); without an
  ## fsGroup the Longhorn PVC mounts root-owned, so the nflog + silences
  ## maintenance writes fail every 15m ("open /alertmanager/...: permission
  ## denied"). That doesn't block live notifications (the Notify path is
  ## in-memory) but silences and dedup state are lost on every restart.
  ## fsGroup makes the kubelet group-own the data dir to 65534 on mount.
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    fsGroupChangePolicy: OnRootMismatch
  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 2Gi
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 256Mi
  selectAllByDefault: false
  configSelector:
    matchLabels:
      monitoring-stack: mdapi
  configNamespaceSelector: {}
  ## Otherwise the operator prepends `namespace=monitoring` to every
  ## route from selected VMAlertmanagerConfig CRs, and alerts that
  ## describe other namespaces (NamespaceWithCriticalCves on `spider3`,
  ## mail-namespace alerts, …) silently fall through to fallback-null.
  ## Same fix as `alertmanagerConfigMatcherStrategy: None` on bundled AM.
  disableNamespaceMatcher: true
  ## Base config — the operator merges the selected VMAlertmanagerConfig
  ## CRs on top of this. The admission webhook requires the base to be a
  ## valid alertmanager.yaml (with at least one route + receiver), even
  ## when configSelector is set. The fallback null receiver is the
  ## inherited parent route in the merged config; the mdapi-team
  ## VMAlertmanagerConfig's `route:` becomes a child sub-route that
  ## intercepts everything before falling through.
  configRawYaml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: fallback-null
    receivers:
      - name: fallback-null
