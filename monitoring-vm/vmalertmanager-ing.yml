## Public face for vmalertmanager at vmalertmanager.mdapi.ch. Standard
## Alertmanager UI (alerts list, silences, status). Same auth + WAF
## treatment as the rest of the stack — oauth2-proxy-admin gate, so
## silences and route inspection require an authenticated admin.
##
## Backend Service is headless (operator default for StatefulSet),
## which nginx-ingress handles via Endpoints directly — fine.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vmalertmanager
  namespace: monitoring
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: vmalertmanager
    flame.pawelmalak/url: https://vmalertmanager.mdapi.ch
    flame.pawelmalak/category: Monitoring
    flame.pawelmalak/icon: bell-alert
    nginx.ingress.kubernetes.io/auth-response-headers: Authorization
    nginx.ingress.kubernetes.io/auth-signin: https://auth.mdapi.ch/admin/oauth2/start?rd=https://$host$escaped_request_uri
    nginx.ingress.kubernetes.io/auth-url: http://oauth2-proxy-admin.oauth2-proxy.svc.cluster.local/admin/oauth2/auth
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecAuditEngine RelevantOnly
      SecAuditLogRelevantStatus "^(?:5|4(?!04))"
      SecAuditLogParts ABIJDEFHZ
      SecAuditLogType Serial
      SecAuditLogFormat JSON
      SecAuditLog /dev/stdout
      SecDebugLog /tmp/modsec_debug.log
      Include /etc/nginx/owasp-modsecurity-crs/nginx-modsecurity.conf
spec:
  ingressClassName: nginx
  rules:
    - host: vmalertmanager.mdapi.ch
      http:
        paths:
          - backend:
              service:
                name: vmalertmanager-mdapi
                port:
                  number: 9093
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - vmalertmanager.mdapi.ch
      secretName: vmalertmanager-cert
