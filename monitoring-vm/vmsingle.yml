## Single-node VictoriaMetrics instance. Long retention for multi-year energy
## / solar analysis. PVC on Longhorn (3-replica default).
## Operator naming: pod and Service get the prefix `vmsingle-mdapi`.
## The Service exposes :8429 (HTTP API + remoteWrite endpoint).
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMSingle
metadata:
  name: mdapi
  namespace: monitoring
spec:
  ## Pull via the in-cluster Zot cache (zot.mdapi.ch is htpasswd-protected
  ## via the zot-pull dockerconfigjson Secret in this namespace, owned by
  ## fleet bundle `zot-pull-secrets/`). Tag is left to the VM operator's
  ## default so existing version-rollout behaviour is unchanged.
  image:
    repository: zot.mdapi.ch/victoriametrics/victoria-metrics
  imagePullSecrets:
    - name: zot-pull
  retentionPeriod: "3y"
  storage:
    accessModes:
      - ReadWriteOnce
    storageClassName: longhorn
    resources:
      requests:
        storage: 50Gi
  resources:
    requests:
      cpu: 100m
      memory: 2Gi
    limits:
      memory: 4Gi
  extraArgs:
    ## Smooth out series-churn behaviour for the recorder's per-sensor cardinality
    dedup.minScrapeInterval: "30s"
    ## Default 16 is too low when vmalert evaluates ~50 rule groups every 30s
    ## (kube-prometheus-stack rules + our custom rules). 64 keeps things headroom-y
    ## without exploding memory.
    search.maxConcurrentRequests: "64"
