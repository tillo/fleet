apiVersion: apps/v1
kind: Deployment
metadata:
  name: technitium-secondary
  namespace: technitium
  annotations:
    keel.sh/policy: minor
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 4h"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: technitium-secondary
  template:
    metadata:
      labels:
        app: technitium-secondary
        role: dns
    spec:
      # Pod-level k8s admission defaults written explicitly so Fleet
      # drift detection doesn't flag the bundle Modified after admission
      # fills them in on the live state.
      restartPolicy: Always
      dnsPolicy: ClusterFirst
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30
      securityContext: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  role: dns
              topologyKey: kubernetes.io/hostname
      containers:
      - name: technitium
        image: technitium/dns-server:latest
        imagePullPolicy: Always
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        ports:
        - name: dns-tcp
          containerPort: 53
          protocol: TCP
        - name: dns-udp
          containerPort: 53
          protocol: UDP
        - name: http
          containerPort: 5380
          protocol: TCP
        env:
        - name: TZ
          value: Europe/Zurich
        envFrom:
        - secretRef:
            name: technitium-env-secret
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 5380
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 5380
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /etc/dns
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: technitium-secondary-data
