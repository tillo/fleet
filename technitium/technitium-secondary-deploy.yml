apiVersion: apps/v1
kind: Deployment
metadata:
  name: technitium-secondary
  namespace: technitium
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: technitium-secondary
  template:
    metadata:
      labels:
        app: technitium-secondary
        role: dns
    spec:
      priorityClassName: mdapi-critical
      # Pod-level k8s admission defaults written explicitly so Fleet
      # drift detection doesn't flag the bundle Modified after admission
      # fills them in on the live state.
      restartPolicy: Always
      # Pin this pod's resolver to NextDNS directly (same upstream as
      # Technitium itself). Avoids the dependency loop where the secondary
      # -- which IS part of the DNS chain -- relies on the DNS chain to
      # resolve external names (zone-transfer source, update checks, etc.).
      dnsPolicy: None
      dnsConfig:
        nameservers:
        - 45.90.28.16
        - 45.90.30.16
        searches:
        - technitium.svc.cluster.local
        - svc.cluster.local
        - cluster.local
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30
      securityContext: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  role: dns
              topologyKey: kubernetes.io/hostname
      containers:
      - name: technitium
        # Lane B (boot-safe, pinned 2026-06-12): in-cluster DNS must boot from
        # each node's image cache without needing a registry. Pinned to the
        # latest tagged release 15.2.0 (= primary's version; secondary had been
        # force-polled to an untagged :latest). Renovate owns the bump; keel
        # annotations removed. Do NOT revert to :latest+Always.
        image: technitium/dns-server:15.2.0
        imagePullPolicy: IfNotPresent
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        ports:
        - name: dns-tcp
          containerPort: 53
          protocol: TCP
        - name: dns-udp
          containerPort: 53
          protocol: UDP
        - name: http
          containerPort: 5380
          protocol: TCP
        env:
        - name: TZ
          value: Europe/Zurich
        envFrom:
        - secretRef:
            name: technitium-env-secret
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 5380
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 5380
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /etc/dns
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: technitium-secondary-data
