apiVersion: apps/v1
kind: Deployment
metadata:
  name: technitium-primary
  namespace: technitium
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: technitium-primary
  template:
    metadata:
      labels:
        app: technitium-primary
        role: dns
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  role: dns
              topologyKey: kubernetes.io/hostname
      containers:
      - name: technitium
        # Lane B (boot-safe, pinned 2026-06-12): in-cluster DNS must boot from
        # each node's image cache without the registry. Pinned to its running
        # release 15.2.0 (digest-matched, no content change). Renovate owns the
        # bump; keel removed. Do NOT revert to :latest+Always.
        image: technitium/dns-server:15.2.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: dns-tcp
          containerPort: 53
          protocol: TCP
        - name: dns-udp
          containerPort: 53
          protocol: UDP
        - name: dhcp
          containerPort: 67
          protocol: UDP
        - name: http
          containerPort: 5380
          protocol: TCP
        env:
        - name: TZ
          value: Europe/Zurich
        envFrom:
        - secretRef:
            name: technitium-env-secret
        resources:
          requests:
            cpu: 100m
            memory: 384Mi
          limits:
            memory: 768Mi
        livenessProbe:
          httpGet:
            path: /
            port: 5380
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 5380
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /etc/dns
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: technitium-primary-data
