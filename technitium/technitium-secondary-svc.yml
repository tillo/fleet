apiVersion: v1
kind: Service
metadata:
  name: technitium-secondary
  namespace: technitium
spec:
  selector:
    app: technitium-secondary
  ports:
  - name: dns-tcp
    port: 53
    targetPort: 53
    protocol: TCP
  - name: dns-udp
    port: 53
    targetPort: 53
    protocol: UDP
  - name: http
    port: 5380
    targetPort: 5380
  type: ClusterIP
