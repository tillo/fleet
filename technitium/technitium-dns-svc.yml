apiVersion: v1
kind: Service
metadata:
  name: technitium-dns
  namespace: technitium
spec:
  selector:
    role: dns
  ports:
  - name: dns-tcp
    port: 53
    protocol: TCP
    targetPort: 53
  - name: dns-udp
    port: 53
    protocol: UDP
    targetPort: 53
  type: LoadBalancer
  loadBalancerClass: metallb
  loadBalancerIP: 192.168.1.54
  # Cluster (not Local) so the LB VIP routes to whichever Technitium pod
  # is healthy regardless of which node currently owns the VIP. Trade-off:
  # client source IP gets SNATted to the node IP, which is fine for a
  # homelab resolver (we don't ACL by IP).
  externalTrafficPolicy: Cluster
