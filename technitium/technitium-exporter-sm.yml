apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: technitium-exporter
  namespace: technitium
  labels:
    app: technitium-exporter
spec:
  selector:
    matchLabels:
      app: technitium-exporter
  namespaceSelector:
    matchNames:
      - technitium
  endpoints:
  - port: metrics
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics
