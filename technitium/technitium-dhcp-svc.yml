apiVersion: v1
kind: Service
metadata:
  name: technitium-dhcp
  namespace: technitium
spec:
  selector:
    app: technitium-primary
  ports:
  - name: dhcp
    port: 67
    protocol: UDP
    targetPort: 67
  type: LoadBalancer
  loadBalancerClass: metallb
  loadBalancerIP: 192.168.1.55
  externalTrafficPolicy: Local
