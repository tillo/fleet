apiVersion: v1
kind: Service
metadata:
  name: technitium-primary
  namespace: technitium
spec:
  # Pinned ClusterIP: the secondary's zone-transfer master points at this IP, so it
  # must stay STABLE. A previously-dynamic ClusterIP that drifted on recreate is what
  # silently broke secondary replication. Pod reschedules are already fine (ClusterIP
  # -> current pod via kube-proxy); pinning also covers Service re-creation.
  clusterIP: 10.53.157.241
  selector:
    app: technitium-primary
  ports:
  - name: http
    port: 5380
    targetPort: 5380
  - name: dns-tcp
    port: 53
    targetPort: 53
    protocol: TCP
  - name: dns-udp
    port: 53
    targetPort: 53
    protocol: UDP
  type: ClusterIP
