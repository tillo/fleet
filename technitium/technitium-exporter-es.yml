apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: technitium-exporter-tokens
spec:
  refreshInterval: 1m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: technitium-exporter-tokens
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/technitium/exporter/PRIMARY_TOKEN
      secretKey: TECHNITIUM_API_PRIMARY_TOKEN
    - remoteRef:
        key: /mdapi/technitium/exporter/SECONDARY_TOKEN
      secretKey: TECHNITIUM_API_SECONDARY_TOKEN
