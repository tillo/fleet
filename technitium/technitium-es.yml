apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: technitium-env-secret
spec:
  refreshInterval: 1m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: technitium-env-secret
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/technitium/technitium-env-secret/ADMIN_PASSWORD
      secretKey: DNS_SERVER_ADMIN_PASSWORD
