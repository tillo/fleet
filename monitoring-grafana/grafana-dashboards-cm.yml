              "refId": "C",
              "format": "time_series",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "ha-postgres"
              },
              "rawSql": "SELECT TO_TIMESTAMP(s.start_ts) AS time, s.mean AS \"Intake (cave fallback)\" FROM statistics s JOIN statistics_meta sm ON s.metadata_id = sm.id WHERE sm.statistic_id = 'sensor.carnotzetruuvi_temperature' AND $__unixEpochFilter(s.start_ts) ORDER BY s.start_ts"
            },
