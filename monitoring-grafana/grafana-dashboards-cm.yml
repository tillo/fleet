                "uid": "ha-postgres"
              },
              "rawSql": "WITH r AS (SELECT s.state::float v FROM states s JOIN states_meta sm ON s.metadata_id = sm.metadata_id WHERE sm.entity_id = 'sensor.rack_temperature' AND s.state ~ '^[0-9.]+$' ORDER BY s.last_updated_ts DESC LIMIT 1), i AS (SELECT s.state::float v FROM states s JOIN states_meta sm ON s.metadata_id = sm.metadata_id WHERE sm.entity_id = 'sensor.shelly_temperature' AND s.state ~ '^[0-9.]+$' ORDER BY s.last_updated_ts DESC LIMIT 1) SELECT NOW() AS time, (r.v - i.v) AS value FROM r, i"
