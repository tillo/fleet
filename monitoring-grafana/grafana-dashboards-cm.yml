          "targets": [
            {
              "refId": "A",
              "format": "time_series",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "ha-postgres"
              },
              "rawSql": "SELECT TO_TIMESTAMP(s.start_ts) AS time, s.mean AS \"Rack\" FROM statistics s JOIN statistics_meta sm ON s.metadata_id = sm.id WHERE sm.statistic_id = 'sensor.rack_temperature' AND $__unixEpochFilter(s.start_ts) ORDER BY s.start_ts"
            },
            {
              "refId": "B",
              "format": "time_series",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "ha-postgres"
              },
              "rawSql": "SELECT TO_TIMESTAMP(s.start_ts) AS time, s.mean AS \"Intake (garage)\" FROM statistics s JOIN statistics_meta sm ON s.metadata_id = sm.id WHERE sm.statistic_id = 'sensor.shelly_temperature' AND $__unixEpochFilter(s.start_ts) ORDER BY s.start_ts"
            },
            {
              "refId": "C",
              "format": "time_series",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "ha-postgres"
              },
              "rawSql": "SELECT TO_TIMESTAMP(s.start_ts) AS time, s.mean AS \"Intake (cave fallback)\" FROM statistics s JOIN statistics_meta sm ON s.metadata_id = sm.id WHERE sm.statistic_id = 'sensor.carnotzetruuvi_temperature' AND $__unixEpochFilter(s.start_ts) ORDER BY s.start_ts"
            },
            {
              "refId": "D",
              "format": "time_series",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "ha-postgres"
              },
              "rawSql": "SELECT TO_TIMESTAMP(s.start_ts) AS time, s.mean AS \"Freezer (room fallback)\" FROM statistics s JOIN statistics_meta sm ON s.metadata_id = sm.id WHERE sm.statistic_id = 'sensor.freezer_temperature' AND $__unixEpochFilter(s.start_ts) ORDER BY s.start_ts"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Fan target vs actual",
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "ha-postgres"
          },
          "gridPos": {
            "h": 8,
