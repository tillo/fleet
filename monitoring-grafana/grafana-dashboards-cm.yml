                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 60
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area"
          },
          "targets": [
            {
              "refId": "A",
              "format": "time_series",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "ha-postgres"
              },
              "rawSql": "SELECT TO_TIMESTAMP(s.last_updated_ts) AS time, s.state::float AS value FROM states s JOIN states_meta sm ON s.metadata_id = sm.metadata_id WHERE sm.entity_id = 'sensor.server_room_fan_target' AND s.state ~ '^[0-9.]+$' ORDER BY s.last_updated_ts DESC LIMIT 1"
            }
          ]
        },
        {
