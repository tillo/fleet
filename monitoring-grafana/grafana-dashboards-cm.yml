  frigate.json: |
    {
      "schemaVersion": 36,
      "version": 1,
      "uid": "frigate-overview",
      "title": "Frigate \u2014 Cameras & Detection",
      "tags": [
        "frigate",
        "home-assistant",
        "mdapi"
      ],
      "timezone": "browser",
      "editable": true,
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "refresh": "30s",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {
              "text": "Prometheus",
              "value": "Prometheus"
            },
            "hide": 0
          },
          {
            "name": "camera",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "$datasource"
            },
            "query": "label_values(hass_entity_available{domain=\"camera\"}, entity)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": {
              "text": "All",
              "value": "$__all"
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Cameras online",
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "targets": [
            {
              "expr": "sum(hass_entity_available{domain=\"camera\"})",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Cameras offline",
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
          "gridPos": {
            "x": 4,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "targets": [
            {
              "expr": "count(hass_entity_available{domain=\"camera\"} == 0)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Motion events (24h)",
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
          "gridPos": {
            "x": 8,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "targets": [
            {
              "expr": "sum(increase(hass_state_change_total{entity=~\"binary_sensor\\\\..*cam.*_motion\"}[24h]))",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Person detections (24h)",
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
          "gridPos": {
            "x": 12,
