  solar.json: |
    {
      "title": "Solar \u2014 production & consumption",
      "uid": "mdapi-solar",
      "tags": [
        "mdapi",
        "ha",
        "solar",
        "energy"
      ],
      "schemaVersion": 40,
      "timezone": "Europe/Zurich",
      "refresh": "5m",
      "time": {
        "from": "now-7d",
        "to": "now"
      },
      "editable": true,
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Production now",
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "ha-postgres"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "blue",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1000
                  },
                  {
                    "color": "green",
                    "value": 3000
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area"
          },
          "targets": [
            {
              "refId": "A",
              "format": "time_series",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "ha-postgres"
              },
              "rawSql": "SELECT TO_TIMESTAMP(s.last_updated_ts) AS time, s.state::float AS value FROM states s JOIN states_meta sm ON s.metadata_id = sm.metadata_id WHERE sm.entity_id = 'sensor.power_production_now' AND s.state ~ '^-?[0-9.]+$' ORDER BY s.last_updated_ts DESC LIMIT 1"
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Produced today",
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "ha-postgres"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "kwatth",
