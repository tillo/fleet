  ups.json: |
    {
      "title": "UPS \u2014 Power & runtime",
      "uid": "mdapi-ups",
      "tags": [
        "mdapi",
        "ha",
        "ups"
      ],
      "schemaVersion": 40,
      "timezone": "Europe/Zurich",
      "refresh": "1m",
      "time": {
        "from": "now-7d",
        "to": "now"
      },
      "editable": true,
      "annotations": {
        "list": [
          {
            "name": "Mains out (OB)",
            "datasource": {
              "type": "grafana-postgresql-datasource",
              "uid": "ha-postgres"
            },
            "enable": true,
            "iconColor": "rgba(217, 83, 79, 1)",
            "rawQuery": "SELECT s.last_updated_ts * 1000 AS time, 'Mains out: ' || s.state AS text FROM states s JOIN states_meta sm ON s.metadata_id = sm.metadata_id WHERE sm.entity_id = 'sensor.ups_status_data' AND s.state LIKE '%OB%' AND $__unixEpochFilter(s.last_updated_ts)",
            "target": {
              "type": "dashboard"
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Real Power",
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "ha-postgres"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1800
                  },
                  {
                    "color": "red",
                    "value": 2400
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area"
          },
          "targets": [
            {
              "refId": "A",
              "format": "time_series",
              "rawSql": "SELECT TO_TIMESTAMP(s.last_updated_ts) AS time, s.state::float AS value FROM states s JOIN states_meta sm ON s.metadata_id = sm.metadata_id WHERE sm.entity_id = 'sensor.ups_real_power' AND s.state ~ '^[0-9.]+$' ORDER BY s.last_updated_ts DESC LIMIT 1",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "ha-postgres"
              }
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Battery",
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "ha-postgres"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 0,
              "min": 0,
              "max": 100,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 40
                  },
                  {
                    "color": "green",
                    "value": 75
                  }
                ]
              }
