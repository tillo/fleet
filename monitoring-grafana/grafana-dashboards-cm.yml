      "timezone": "browser",
      "editable": true,
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "refresh": "1m",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {
              "text": "Prometheus",
              "value": "Prometheus"
            },
            "hide": 0
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Garage S3 cluster health",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 1
          },
          "collapsed": false
        },
        {
          "id": 10,
          "type": "stat",
          "title": "Garage instances reporting",
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
          "gridPos": {
            "x": 0,
            "y": 1,
            "w": 4,
            "h": 4
          },
          "targets": [
            {
              "expr": "count(count by (namespace) (cluster_storage_nodes))",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 2
                  }
                ]
              }
            }
          }
        },
        {
          "id": 11,
          "type": "stat",
          "title": "Garage nodes OK (sum)",
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
          "gridPos": {
            "x": 4,
            "y": 1,
            "w": 4,
            "h": 4
          },
          "targets": [
            {
              "expr": "sum(cluster_storage_nodes_ok)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 2
                  }
                ]
              }
            }
          }
        },
        {
          "id": 12,
          "type": "stat",
          "title": "Garage degraded nodes",
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
          "gridPos": {
            "x": 8,
            "y": 1,
            "w": 4,
            "h": 4
          },
          "targets": [
            {
              "expr": "sum(cluster_storage_nodes - cluster_storage_nodes_ok)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            }
          }
        },
        {
          "id": 13,
          "type": "stat",
          "title": "Buckets total",
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
          "gridPos": {
            "x": 12,
            "y": 1,
            "w": 4,
            "h": 4
          },
          "targets": [
            {
              "expr": "sum(table_size{table_name=\"bucket_v2\"})",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          }
        },
        {
          "id": 14,
          "type": "stat",
          "title": "Objects (cluster-wide)",
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
          "gridPos": {
            "x": 16,
            "y": 1,
            "w": 4,
            "h": 4
          },
          "targets": [
            {
              "expr": "sum(table_size{table_name=\"object\"})",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
