        "frigate",
        "home-assistant",
        "mdapi"
      ],
      "timezone": "browser",
      "editable": true,
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "refresh": "30s",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {
              "text": "Prometheus",
              "value": "Prometheus"
            },
            "hide": 0
          },
          {
            "name": "camera",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "$datasource"
            },
            "query": "label_values(hass_entity_available{domain=\"camera\"}, entity)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": {
              "text": "All",
              "value": "$__all"
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Cameras online",
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
