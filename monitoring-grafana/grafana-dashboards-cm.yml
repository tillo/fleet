              },
              "rawSql": "SELECT TO_TIMESTAMP(s.last_updated_ts) AS time, s.state::float AS value FROM states s JOIN states_meta sm ON s.metadata_id = sm.metadata_id WHERE sm.entity_id = 'sensor.rack_temperature' AND s.state ~ '^[0-9.]+$' ORDER BY s.last_updated_ts DESC LIMIT 1"
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "T_intake (garage)",
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "ha-postgres"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "decimals": 1,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "blue",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 20
                  },
                  {
                    "color": "yellow",
                    "value": 24
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area"
          },
          "targets": [
            {
              "refId": "A",
              "format": "time_series",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "ha-postgres"
              },
              "rawSql": "SELECT TO_TIMESTAMP(s.last_updated_ts) AS time, s.state::float AS value FROM states s JOIN states_meta sm ON s.metadata_id = sm.metadata_id WHERE sm.entity_id = 'sensor.shelly_temperature' AND s.state ~ '^[0-9.]+$' ORDER BY s.last_updated_ts DESC LIMIT 1"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Fan target",
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "ha-postgres"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 0,
              "min": 0,
              "max": 100,
              "color": {
                "mode": "thresholds"
              },
