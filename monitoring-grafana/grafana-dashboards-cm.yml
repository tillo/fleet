                      "mode": "fixed",
                      "fixedColor": "#999999"
                    }
                  },
                  {
                    "id": "custom.fillOpacity",
                    "value": 0
                  }
                ]
              }
            ]
          },
          "options": {
            "legend": {
              "showLegend": true,
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
