                  {
                    "color": "blue",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 22
                  },
                  {
                    "color": "yellow",
                    "value": 25
                  },
                  {
                    "color": "orange",
                    "value": 26
                  },
                  {
                    "color": "red",
                    "value": 28
