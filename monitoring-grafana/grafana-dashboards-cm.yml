                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#5cb85c"
                    }
                  },
                  {
                    "id": "custom.lineWidth",
                    "value": 3
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Actual"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#5cb85c"
                    }
                  },
                  {
                    "id": "custom.fillOpacity",
                    "value": 15
                  }
                ]
              }
            ]
          },
          "options": {
            "legend": {
              "showLegend": true,
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "refId": "A",
              "format": "time_series",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "ha-postgres"
              },
              "rawSql": "SELECT TO_TIMESTAMP(s.last_updated_ts) AS time, s.state::float AS \"Target\" FROM states s JOIN states_meta sm ON s.metadata_id = sm.metadata_id WHERE sm.entity_id = 'sensor.server_room_fan_target' AND s.state ~ '^[0-9.]+$' AND $__unixEpochFilter(s.last_updated_ts) ORDER BY s.last_updated_ts"
            },
            {
              "refId": "B",
              "format": "time_series",
              "datasource": {
                "type": "grafana-postgresql-datasource",
                "uid": "ha-postgres"
              },
              "rawSql": "SELECT TO_TIMESTAMP(s.last_updated_ts) AS time, COALESCE((sa.shared_attrs::jsonb->>'percentage')::float, 0) AS \"Actual\" FROM states s JOIN states_meta sm ON s.metadata_id = sm.metadata_id JOIN state_attributes sa ON s.attributes_id = sa.attributes_id WHERE sm.entity_id = 'fan.fanspeed_fanspeed_server_room_exhaust' AND $__unixEpochFilter(s.last_updated_ts) AND sa.shared_attrs::jsonb->>'percentage' IS NOT NULL ORDER BY s.last_updated_ts"
            }
          ]
        }
      ]
    }
