            "x": 0,
            "y": 0,
            "w": 4,
            "h": 4
          },
          "targets": [
            {
              "expr": "sum(hass_entity_available{domain=\"camera\"})",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
