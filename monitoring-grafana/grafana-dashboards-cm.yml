        {
          "id": 2,
          "type": "stat",
          "title": "T_intake (garage)",
          "datasource": {
            "type": "grafana-postgresql-datasource",
            "uid": "ha-postgres"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "decimals": 1,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "blue",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 20
                  },
                  {
                    "color": "yellow",
                    "value": 24
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "textMode": "auto",
