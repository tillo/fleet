        },
        {
          "id": 32,
          "type": "stat",
          "title": "Longhorn volumes degraded",
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
          "gridPos": {
            "x": 4,
            "y": 19,
