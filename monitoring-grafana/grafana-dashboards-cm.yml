          }
        },
        {
          "id": 21,
          "type": "timeseries",
          "title": "S3 API requests / min",
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
          "gridPos": {
            "x": 12,
            "y": 5,
            "w": 12,
            "h": 7
