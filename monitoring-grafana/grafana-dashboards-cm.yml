          "targets": [
            {
              "expr": "sum by (namespace, api_endpoint) (rate(api_s3_request_counter[5m]) * 60)",
              "legendFormat": "{{namespace}}/{{api_endpoint}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 3
              }
            }
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": [
                "last",
                "max"
              ]
