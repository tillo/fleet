                "type": "grafana-postgresql-datasource",
                "uid": "ha-postgres"
              },
              "rawSql": "SELECT TO_TIMESTAMP(s.start_ts) AS time, s.mean AS \"Max\" FROM statistics s JOIN statistics_meta sm ON s.metadata_id = sm.id WHERE sm.statistic_id = 'sensor.elco_dhw_storage_temp_max_24h' AND $__unixEpochFilter(s.start_ts) ORDER BY s.start_ts"
