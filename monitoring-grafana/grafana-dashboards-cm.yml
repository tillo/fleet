                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 5,
                "lineWidth": 2,
                "spanNulls": true
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Rack"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#d9534f"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Intake (garage)"
                },
                "properties": [
                  {
                    "id": "color",
                    "value": {
                      "mode": "fixed",
                      "fixedColor": "#5bc0de"
                    }
                  }
                ]
              },
