          }
        },
        {
          "id": 22,
          "type": "timeseries",
          "title": "Objects + buckets growth (per Garage)",
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 24,
            "h": 6
          },
          "targets": [
            {
              "expr": "table_size{table_name=\"object\"}",
              "legendFormat": "{{namespace}} objects",
              "refId": "A"
            },
            {
              "expr": "table_size{table_name=\"bucket_v2\"}",
              "legendFormat": "{{namespace}} buckets",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 3
              }
            }
          }
        },
        {
          "id": 30,
          "type": "row",
          "title": "Longhorn snapshots & backups",
          "gridPos": {
            "x": 0,
            "y": 18,
            "w": 24,
            "h": 1
