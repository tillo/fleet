              "expr": "sum by (namespace) (rate(block_bytes_written[5m]))",
              "legendFormat": "{{namespace}} write",
              "refId": "A"
            },
            {
              "expr": "sum by (namespace) (rate(block_bytes_read[5m]))",
              "legendFormat": "{{namespace}} read",
              "refId": "B"
