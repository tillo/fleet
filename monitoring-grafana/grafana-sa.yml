## Dedicated ServiceAccount for Grafana. Needed so the dashboard sidecar
## (see grafana-deploy.yml) can be granted a scoped read on the Harvester
## dashboard ConfigMaps in the cattle-dashboards namespace (RBAC lives in the
## grafana-harvester-sidecar-rbac bundle). Grafana previously ran on the
## namespace `default` ServiceAccount.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana
  namespace: monitoring
