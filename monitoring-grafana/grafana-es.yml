apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-env-secret
  namespace: monitoring
spec:
  refreshInterval: 1m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: grafana-env-secret
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/grafana/admin-password
      secretKey: GF_SECURITY_ADMIN_PASSWORD
    - remoteRef:
        key: /mdapi/grafana/ha-pg-ro-password
      secretKey: HA_PG_RO_PASSWORD
