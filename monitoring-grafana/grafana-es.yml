apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-env-secret
  namespace: monitoring
spec:
  refreshInterval: 1m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: grafana-env-secret
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/grafana/admin-password
      secretKey: GF_SECURITY_ADMIN_PASSWORD
    - remoteRef:
        key: /mdapi/grafana/ha-pg-ro-password
      secretKey: HA_PG_RO_PASSWORD
    ## Grafana's own backend DB lives in the `grafana` database on
    ## ha-recorder-pg, owned by role `grafana`. Switching off SQLite
    ## eliminates the Grafana 13 unified-storage SQLITE_BUSY storms.
    - remoteRef:
        key: /mdapi/grafana/pg-password
      secretKey: GF_DATABASE_PASSWORD
