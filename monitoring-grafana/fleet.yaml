defaultNamespace: monitoring
namespace: monitoring
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
dependsOn:
  - name: mdapi-prod-cert-manager
helm:
  maxHistory: 25
# Drift source: VPA may rewrite resources at runtime. Image is on a rolling
# tag (grafana/grafana:latest, pullPolicy Always) so no Keel watching it, no
# tag drift. Strip resources from the diff so Fleet stops flagging Modified.
diff:
  comparePatches:
  - apiVersion: apps/v1
    kind: Deployment
    name: grafana
    namespace: monitoring
    operations:
    - {"op": "remove", "path": "/spec/template/spec/containers/0/resources"}
