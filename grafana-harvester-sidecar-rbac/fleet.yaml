## RBAC granting the custom Grafana's dashboard sidecar (SA monitoring/grafana)
## a scoped read on the Harvester dashboard ConfigMaps that live in the
## Harvester-managed `cattle-dashboards` namespace. Kept in its own bundle
## because monitoring-grafana/fleet.yaml forces namespace=monitoring on all its
## objects, which would rewrite the cattle-dashboards Role/RoleBinding.
defaultNamespace: cattle-dashboards
helm:
  maxHistory: 25
