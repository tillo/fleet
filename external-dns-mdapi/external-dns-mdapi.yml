## Second external-dns instance: drives the mdapi.ch internal split-horizon by
## writing unbound local-data via the custom webhook provider
## (mdapi/external-dns-unbound-webhook). Distinct from the home.tillo.ch
## external-dns (RFC2136 -> Technitium) in the external-dns namespace.
##
## SHADOW MODE until unbound includes the generated ConfigMap: the provider
## writes only `unbound-generated`, which the unbound config does NOT yet
## include, so internal resolution is unchanged. See fleet/split-horizon for
## the cutover (include + drop the now-dynamic static records).
##
## Source of truth: k8s Ingress (host -> 192.168.1.191 ingress VIP).
## Exceptions (resolve to public on-LAN / non-ingress specials) are kept out via
## --exclude-domains and remain static in fleet/split-horizon/unbound-cm.yml:
##   mirror.mdapi.ch (.49), plex.mdapi.ch (.46), ftth.mdapi.ch (.254).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-dns-mdapi
  namespace: split-horizon
---
# Cluster-scoped read of Ingress/Service (they live in every namespace).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-dns-mdapi
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-dns-mdapi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-dns-mdapi
subjects:
  - kind: ServiceAccount
    name: external-dns-mdapi
    namespace: split-horizon
---
# Namespaced: the webhook sidecar patches the generated ConfigMap in-ns only.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: external-dns-mdapi-unbound-cm
  namespace: split-horizon
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-dns-mdapi-unbound-cm
  namespace: split-horizon
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: external-dns-mdapi-unbound-cm
subjects:
  - kind: ServiceAccount
    name: external-dns-mdapi
    namespace: split-horizon
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns-mdapi
  namespace: split-horizon
  labels:
    app: external-dns-mdapi
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 4h"
spec:
  replicas: 1
  strategy:
    type: Recreate          # single writer to the configmap; avoid 2 reconcilers
  selector:
    matchLabels:
      app: external-dns-mdapi
  template:
    metadata:
      labels:
        app: external-dns-mdapi
    spec:
      serviceAccountName: external-dns-mdapi
      imagePullSecrets:
        - name: mdapi-registry      # reused from the split-horizon ns
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.21.0
          args:
            - --source=ingress
            - --domain-filter=mdapi.ch
            - --exclude-domains=mirror.mdapi.ch
            - --exclude-domains=plex.mdapi.ch
            - --exclude-domains=ftth.mdapi.ch
            - --provider=webhook
            - --webhook-provider-url=http://localhost:8888
            - --registry=noop
            - --policy=sync
            - --interval=5m
            - --default-targets=192.168.1.191
            - --force-default-targets
            - --log-level=info
          resources:
            requests: {cpu: 25m, memory: 64Mi}
            limits: {memory: 128Mi}
        - name: webhook
          image: registry.mdapi.ch/mdapi/external-dns-unbound-webhook:latest
          imagePullPolicy: Always
          env:
            - name: DOMAIN_FILTER
              value: "mdapi.ch"
            - name: UNBOUND_CM_NAMESPACE
              value: "split-horizon"
            - name: UNBOUND_CM_NAME
              value: "unbound-generated"
            - name: UNBOUND_CM_KEY
              value: "generated.conf"
          ports:
            - name: http-webhook
              containerPort: 8888
          livenessProbe:
            httpGet: {path: /healthz, port: http-webhook}
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet: {path: /healthz, port: http-webhook}
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests: {cpu: 10m, memory: 32Mi}
            limits: {memory: 64Mi}
