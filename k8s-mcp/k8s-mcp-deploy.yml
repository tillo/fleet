apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-mcp
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-mcp
  template:
    metadata:
      labels:
        app: k8s-mcp
    spec:
      automountServiceAccountToken: false
      containers:
      - name: kube-mcp-server
        image: registry.mdapi.ch/mdapi/kubernetes-mcp-server:latest
        imagePullPolicy: Always
        args:
          - --port
          - "9090"
          - --kubeconfig
          - /etc/kubeconfig/kubeconfig
          - --stateless
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
        volumeMounts:
        - name: secrets
          mountPath: /etc/kubeconfig
          readOnly: true

      - name: caddy
        image: caddy:2-alpine
        ports:
        - containerPort: 8080
        env:
        - name: AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: k8s-mcp-secrets
              key: AUTH_TOKEN
        volumeMounts:
        - name: caddy-config
          mountPath: /etc/caddy
        resources:
          requests:
            cpu: 5m
            memory: 32Mi
          limits:
            memory: 64Mi

      imagePullSecrets:
      - name: mdapi-registry

      volumes:
      - name: secrets
        secret:
          secretName: k8s-mcp-secrets
          items:
          - key: kubeconfig
            path: kubeconfig
            mode: 0600
      - name: caddy-config
        configMap:
          name: k8s-mcp-caddy
