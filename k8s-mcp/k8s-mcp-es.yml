apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: k8s-mcp-secrets
spec:
  refreshInterval: 1m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: k8s-mcp-secrets
    creationPolicy: Owner
  data:
    - remoteRef:
        key: /mdapi/k8s-mcp/AUTH_TOKEN
      secretKey: AUTH_TOKEN
    - remoteRef:
        key: /mdapi/k8s-mcp/KUBECONFIG
      secretKey: kubeconfig
