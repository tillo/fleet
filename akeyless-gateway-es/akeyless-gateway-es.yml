# Delivers the in-cluster Akeyless Gateway's admin access-key from Akeyless
# (via the existing cm-akeyless / CipherTrust gateway) into the akeyless-gateway ns.
# The gateway protects its config with the fragment-independent DFC key
# /mdapi/keys/incluster-gw-config, so NO customer fragment is needed here.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: akeyless-gw-secret
  namespace: akeyless-gateway
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: akeyless-gw-secret
    creationPolicy: Owner
  data:
    - remoteRef:
        key: /mdapi/gateways/incluster-gw/admin-access-key
      secretKey: admin-access-key
