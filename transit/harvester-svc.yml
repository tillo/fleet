## Transit Service for harvester.mdapi.ch -> in-cluster Harvester UI.
## ExternalName points at the harvester-system Service so the resolver
## follows the namespace boundary without needing a hand-maintained
## Endpoint. The old setup pointed at the ingress VIP (192.168.1.191)
## which was circular and broke as of the cluster-VIP rework.
apiVersion: v1
kind: Service
metadata:
  name: harvester
  namespace: transit
spec:
  type: ExternalName
  externalName: harvester.harvester-system.svc.cluster.local
  ports:
    - port: 8443
      targetPort: 8443
      protocol: TCP
