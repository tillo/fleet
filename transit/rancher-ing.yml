apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rancher
  namespace: transit
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
spec:
  ingressClassName: nginx
  rules:
    - host: rancher.home.tillo.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rancher
                port:
                  number: 443
  tls:
    - hosts:
        - rancher.home.tillo.ch
      secretName: rancher-cert
