apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-test
  namespace: transit
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
    nginx.ingress.kubernetes.io/proxy-ssl-name: auth.test.mdapi.ch
    nginx.ingress.kubernetes.io/proxy-ssl-server-name: "on"
spec:
  ingressClassName: nginx
  rules:
    - host: auth.test.mdapi.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: test
                port:
                  number: 443
  tls:
    - hosts:
        - auth.test.mdapi.ch
      secretName: auth-test-cert
