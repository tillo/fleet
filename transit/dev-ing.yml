apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dev
  namespace: transit
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
    nginx.ingress.kubernetes.io/proxy-ssl-name: dev.mdapi.ch
    nginx.ingress.kubernetes.io/proxy-ssl-server-name: "on"
    nginx.ingress.kubernetes.io/auth-url: https://auth.mdapi.ch/admin/oauth2/auth
    nginx.ingress.kubernetes.io/auth-signin: https://auth.mdapi.ch/admin/oauth2/start?rd=https://$host$escaped_request_uri
    nginx.ingress.kubernetes.io/auth-response-headers: Authorization
spec:
  ingressClassName: nginx
  rules:
    - host: dev.mdapi.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dev
                port:
                  number: 443
    - host: '*.dev.mdapi.ch'
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dev
                port:
                  number: 443
  tls:
    - hosts:
        - dev.mdapi.ch
      secretName: dev-cert
    - hosts:
        - '*.dev.mdapi.ch'
      secretName: wildcard-dev-cert
