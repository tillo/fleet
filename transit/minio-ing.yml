apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio
  namespace: transit
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
    nginx.ingress.kubernetes.io/proxy-body-size: 10g
    # MinIO bucket LIST on the 1.27M-object harvester-backup bucket
    # takes well over nginx's 60s default; ingress returned 504 mid-LIST
    # and stalled rclone copy. 300s comfortably covers full-bucket scans.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # Publish api.minio + console.minio A records into home.tillo.ch
    # (Technitium primary) pointing at the harvester-managed ingress VIP.
    external-dns.alpha.kubernetes.io/manage: mdapi
spec:
  ingressClassName: nginx
  rules:
    - host: api.minio.home.tillo.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 30000
    - host: console.minio.home.tillo.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 30001
  tls:
    - hosts:
        - api.minio.home.tillo.ch
      secretName: minio-api-cert
    - hosts:
        - console.minio.home.tillo.ch
      secretName: minio-console-cert
