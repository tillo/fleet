## ClusterIP of the harvester-system/harvester Service as of 2026-06-05.
## Verify with `kubectl -n harvester-system get svc harvester
## -o jsonpath='{.spec.clusterIP}'` if the upstream ever moves.
apiVersion: v1
kind: Endpoints
metadata:
  name: harvester
  namespace: transit
subsets:
  - addresses:
      - ip: 10.53.246.3
    ports:
      - port: 8443
