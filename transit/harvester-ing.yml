apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: harvester
  namespace: transit
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
spec:
  ingressClassName: nginx
  rules:
    - host: harvester.mdapi.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: harvester
                port:
                  number: 443
  tls:
    - hosts:
        - harvester.mdapi.ch
      secretName: harvester-cert
