## harvester.mdapi.ch -> ExternalName transit/harvester ->
## harvester.harvester-system.svc:8443 (Harvester's Rancher-derived UI).
##
## proxy-ssl-server-name + proxy-ssl-name set the SNI on the upstream
## TLS handshake so harvester's vhost matches; proxy-ssl-verify is off
## because the backend serves an internal cert we trust without chain
## validation. WebSocket / long-poll friendly via the read-timeout bump
## (VM console + dashboard streams).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: harvester
  namespace: transit
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
    nginx.ingress.kubernetes.io/proxy-ssl-server-name: "on"
    nginx.ingress.kubernetes.io/proxy-ssl-name: harvester.harvester-system.svc.cluster.local
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: harvester.mdapi.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: harvester
                port:
                  number: 8443
  tls:
    - hosts:
        - harvester.mdapi.ch
      secretName: harvester-cert
