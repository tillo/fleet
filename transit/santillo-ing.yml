apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: santillo
  namespace: transit
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: santillo.tillo.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: santillo
                port:
                  number: 5000
  tls:
    - hosts:
        - santillo.tillo.ch
      secretName: santillo-cert
