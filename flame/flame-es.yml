apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: flame-env-secret
spec:
  refreshInterval: 1m

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: flame-env-secret
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/flame/flame-env-secret/PASSWORD
      secretKey: PASSWORD
