apiVersion: apps/v1
kind: Deployment
metadata:
  name: flame
  namespace: flame
spec:
  selector:
    matchLabels:
      app: flame
  replicas: 1
  template:
    metadata:
      labels:
        app: flame
    spec:
      serviceAccountName: flame
      containers:
      - name: flame
        image: ghcr.io/fdarveau/flame
        volumeMounts:
        - name: 'flame-kubernetes-code'
          mountPath: '/app/controllers/apps/docker/useKubernetes.js'
          subPath: 'useKubernetes.js'
        ports:
        - containerPort: 5005
      volumes:
      - name: 'flame-kubernetes-code'
        configMap:
          name: 'flame-kubernetes-code'
