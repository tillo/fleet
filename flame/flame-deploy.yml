apiVersion: apps/v1
kind: Deployment
metadata:
  name: flame
  namespace: flame
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 4h"
spec:
  selector:
    matchLabels:
      app: flame
  replicas: 1
  template:
    metadata:
      labels:
        app: flame
    spec:
      serviceAccountName: flame
      containers:
      - name: flame
        image: registry.mdapi.ch/mdapi/flame:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5005
        env:
        - name: TZ
          value: Europe/Zurich
        envFrom:
        - secretRef:
            name: flame-env-secret
        volumeMounts:
        - name: flame-config
          mountPath: /app/utils/init/initialConfig.json
          subPath: initialConfig.json
      volumes:
      - name: flame-config
        configMap:
          name: flame-config
      imagePullSecrets:
      - name: mdapi-registry
