apiVersion: apps/v1
kind: Deployment
metadata:
  name: flame
  namespace: flame
spec:
  selector:
    matchLabels:
      app: flame
  replicas: 1
  template:
    metadata:
      labels:
        app: flame
    spec:
      serviceAccountName: flame
      containers:
      - name: flame
        image: ghcr.io/fdarveau/flame
        ports:
        - containerPort: 5005
        env:
        - name: TZ
          value: Europe/Zurich
        - name: PASSWORD
        envFrom:
          secretRef:
            name: flame-env-secret
        volumeMounts:
        - name: flame-patches
          mountPath: /mnt/patches
      volumes:
      - name: flame-patches
        hostPath:
          path: /mnt/pepperpool/flame/patches
