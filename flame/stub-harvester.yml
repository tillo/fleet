apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stub-harvester
  namespace: flame
  annotations:
    flame.pawelmalak/type: app
    flame.pawelmalak/name: Harvester
    flame.pawelmalak/url: https://harvester.mdapi.ch
