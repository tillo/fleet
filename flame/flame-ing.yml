apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flame
  namespace: flame
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    flame.pawelmalak/type: app
    flame.pawelmalak/name: MDAPI Home
    flame.pawelmalak/url: https://mdapi.ch
    flame.pawelmalak/category: General
    flame.pawelmalak/icon: home
    flame.pawelmalak/order: '50'
spec:
  ingressClassName: nginx
  rules:
    - host: mdapi.ch
      http:
        paths:
          - backend:
              service:
                name: flame
                port:
                  number: 5005
            path: /
            pathType: Prefix
  tls:
    - hosts:
      - mdapi.ch
      secretName: flame-cert
