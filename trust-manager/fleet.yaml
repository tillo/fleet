# trust-manager: distribute CA trust bundles (public + MDAPI private root) as
# ConfigMaps across all namespaces, so in-cluster workloads can trust certs
# issued by MDAPI Issuing CA 01 (-> MDAPI Root CA). The Bundle CR lives in the
# sibling `trust-manager-bundle` bundle (raw), which dependsOn this one.
# NOTE: no `namespace:` here (only defaultNamespace) — trust-manager ships
# cluster-scoped CRDs, and a forced namespace makes Fleet reject them.
defaultNamespace: cert-manager
helm:
  releaseName: trust-manager
  repo: https://charts.jetstack.io
  chart: trust-manager
  version: v0.23.0
  valuesFiles:
    - values.yml
