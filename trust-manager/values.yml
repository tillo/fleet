# trust-manager reads Bundle sources from its trust namespace (= release ns,
# cert-manager) and writes target ConfigMaps to selected namespaces.
crds:
  enabled: true
app:
  trust:
    namespace: cert-manager
resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    # 64Mi OOMKilled (2026-06-21); memory scales with Bundle count and the
    # size of the trust ConfigMaps it reconciles (CA bundles are large).
    memory: 256Mi
