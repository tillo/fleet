apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads
  namespace: coiffuredreams
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
