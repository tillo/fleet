## Override the rancher-monitoring chart values for resource limits.
## Rancher Monitoring is installed via the helm-controller HelmChart CR
## (see `kubectl -n cattle-monitoring-system get helmcharts`), which
## reads merged values from any HelmChartConfig with the same name in
## the same namespace. This file is that override.
##
## What we patch and why:
##
##   prometheus-node-exporter.resources -- the chart ships with
##     req=200m / lim=200m (a Guaranteed-QoS hardcap). Under cluster-
##     event bursts (large pod creates, heavy disk-I/O scrape periods)
##     each node-exporter was throttling ~9% of CFS periods, which then
##     makes the underlying metrics arrive late and dashboard rows go
##     stale. Bumping the limit to 1c keeps it responsive; the request
##     stays at 200m so scheduling overhead is unchanged.
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: rancher-monitoring
  namespace: cattle-monitoring-system
spec:
  valuesContent: |-
    ## ── Embedded server stack RETIRED 2026-06-24 — VictoriaMetrics is the
    ## single source of truth ───────────────────────────────────────────────
    ## VM (monitoring ns, vmagent) independently scrapes every
    ## ServiceMonitor/PodMonitor this chart defines, so the bundled
    ## Prometheus/Alertmanager/Grafana are pure duplication (proven: the
    ## embedded Prometheus had 0 jobs that VM didn't already have). Disable the
    ## SERVER components but KEEP the exporters + ServiceMonitors —
    ## kube-state-metrics, node-exporter, and the kubeApiServer/kubelet/coreDns
    ## SMs (via kubernetesServiceMonitors=true, untouched) — so VM keeps
    ## scraping exactly as before. Harvester's own KubeVirt/CDI/Longhorn SMs
    ## are operator-owned and unaffected.
    ##
    ## Why this survives Harvester upgrades: the Harvester Addon CR only manages
    ## `enabled`/`version`; its valuesContent does NOT carry these component
    ## flags, and HelmChartConfig values WIN over the Addon valuesContent on
    ## conflict (verified live: node-exporter cpu-limit "2" from here beats the
    ## Addon's "1"). So the Addon's alertmanager.enabled:true -> false here.
    ##
    ## prometheus-adapter off too: no HPA uses custom/external metrics (all 6
    ## are Resource / rke2-metrics-server), so its v1beta1.custom.metrics.k8s.io
    ## APIService is unused; disabling removes that aggregated API cleanly
    ## instead of leaving it dangling against a dead Prometheus.
    ##
    ## TRADE-OFF: the Harvester dashboard's built-in host/VM graphs and the
    ## Rancher-UI "Monitoring -> Grafana" link go dark (they read the embedded
    ## Prometheus/Grafana). Use grafana.mdapi.ch (VM-backed) instead.
    ## ROLLBACK: remove the four `enabled: false` lines; Fleet re-enables them.
    prometheus:
      enabled: false
    alertmanager:
      enabled: false

    prometheus-node-exporter:
      resources:
        requests:
          cpu: 200m
          memory: 150Mi
        limits:
          cpu: 2000m
          memory: 420Mi

    grafana:
      ## Embedded Grafana SERVER retired (see header) — use grafana.mdapi.ch.
      enabled: false
      ## ...but still SHIP its default dashboard ConfigMaps (Kubernetes / Node /
      ## etcd / CoreDNS / apiserver / kubelet / Prometheus / ...). They land in
      ## cattle-dashboards (grafana.defaultDashboards.namespace), which the custom
      ## Grafana's dashboard sidecar watches, and the annotation routes them into
      ## a "Kubernetes" Grafana folder (sidecar FOLDER_ANNOTATION=grafana_folder
      ## + provider foldersFromFilesStructure). Chart-maintained across upgrades.
      ## NOTE: the Rancher-specific dashboards gate on grafana.enabled (NOT
      ## forceDeployDashboards) so they are NOT shipped here — they're added as
      ## Fleet CMs in the grafana-extra-dashboards bundle instead.
      forceDeployDashboards: true
      sidecar:
        dashboards:
          annotations:
            grafana_folder: Kubernetes
      ## (resources kept-but-ignored while the server is disabled) Chart ships
      ## req=100m / lim=200m; bursts trip ContainerCpuThrottling — CPU lim 1c.
      resources:
        requests:
          cpu: 100m
          memory: 200Mi
        limits:
          cpu: 1000m
          memory: 500Mi

    prometheus-adapter:
      ## Retired (see header): no HPA consumes custom metrics, and it has no
      ## Prometheus to query once the server is gone.
      enabled: false
      ## (kept-but-ignored while disabled) Chart ships NO resource requests/limits (BestEffort QoS) and a tight
      ## liveness (/healthz HTTPS, timeout 5s, failureThreshold 3 -> kill after
      ## ~30s of slow /healthz). Under custom-metrics query load the adapter
      ## burns ~1.3c, its /healthz times out, and it gets liveness-killed in a
      ## restart loop (~31 restarts, "http: Handler timeout"). Note: HPA CPU
      ## metrics come from rke2-metrics-server, not this; only custom metrics
      ## are affected. Give it resources (out of BestEffort) + a tolerant
      ## liveness/readiness so a slow /healthz can't kill it.
      resources:
        requests:
          cpu: 500m
          memory: 512Mi
        # Bumped cpu limit 2->4 (2026-06-15): still ContainerCpuThrottling under
        # custom-metrics query load at 2 cores (the adapter rules are expensive).
        limits:
          cpu: "4"
          memory: 2Gi
      livenessProbe:
        httpGet:
          path: /healthz
          port: https
          scheme: HTTPS
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 15
        failureThreshold: 6
        successThreshold: 1
      readinessProbe:
        httpGet:
          path: /healthz
          port: https
          scheme: HTTPS
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 15
        failureThreshold: 6
        successThreshold: 1

    ## Expose the cpu-throttle-exempt pod label through kube-state-metrics so
    ## the ContainerCpuThrottling rule (monitoring-rules/18-cpu-throttling.yml)
    ## can subtract intentionally CPU-capped, burst-to-lid workloads (frigate,
    ## tdarr, certspotter, ...) via `unless on(namespace,pod) kube_pod_labels`.
    ## A workload opts out by setting on its POD TEMPLATE the label
    ##   monitoring.mdapi.ch/cpu-throttle-exempt: "true"
    ## Scoped to that single key (not pods=[*]) to keep cardinality minimal.
    ## NOTE: this list REPLACES the base value (helm-controller overwrites list
    ## values from a HelmChartConfig), so nodes=[*] must be restated to keep it.
    kube-state-metrics:
      metricLabelsAllowlist:
        - nodes=[*]
        - pods=[monitoring.mdapi.ch/cpu-throttle-exempt]

    ## Disable kube-prometheus-stack default rules that are noisy or
    ## inappropriate for this homelab. Each entry is a one-line note on
    ## why it goes; revisit if any of these turn out to mask a real fault.
    ##
    ##   CPUThrottlingHigh     -- duplicate of our own ContainerCpuThrottling
    ##                            (monitoring-rules/18-cpu-throttling.yml) with
    ##                            proper exclusions for Harvester-managed pods.
    ##   NodeSystemSaturation  -- threshold (load1 / cores > 2 for 15m) is
    ##                            too aggressive for Harvester hosts running
    ##                            VMs; routinely fires without real impact.
    ##   NodeBondingDegraded   -- we don't bond NICs in this cluster.
    ##   NodeDiskIOSaturation  -- routinely fires on qua during background
    ##                            Longhorn rebalance; known noise.
    defaultRules:
      disabled:
        CPUThrottlingHigh: true
        NodeSystemSaturation: true
        NodeBondingDegraded: true
        NodeDiskIOSaturation: true
