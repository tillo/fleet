## One ExternalSecret per IR-critical namespace.
## Each ES pulls the htpasswd password from akeyless and builds a
## kubernetes.io/dockerconfigjson Secret named `zot-pull`, ready to be
## referenced via `imagePullSecrets: [{name: zot-pull}]`.
##
## All ESs share the same Akeyless source secret /mdapi/zot/zot-auth/password
## (the password for the htpasswd user `zot`). To rotate, update the
## Akeyless value and the ESs re-template within their refreshInterval (1m).
##
## NEW NAMESPACE? Copy one block, change `metadata.namespace` only.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zot-pull
  namespace: monitoring
spec:
  refreshInterval: 1m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless
  target:
    name: zot-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {"auths":{"zot.mdapi.ch":{"username":"zot","password":"{{ .password }}","auth":"{{ printf "zot:%s" .password | b64enc }}"}}}
  data:
    - remoteRef:
        key: /mdapi/zot/zot-auth/password
      secretKey: password
