## Bundle deploys one `zot-pull` imagePullSecret per IR-critical
## namespace, so Pods in those namespaces can authenticate to
## zot.mdapi.ch (htpasswd-protected) to pull images from the cache.
##
## Each ExternalSecret sets its own metadata.namespace explicitly, so
## defaultNamespace below is only a fallback / does not affect them.
defaultNamespace: monitoring
dependsOn:
  - name: mdapi-prod-external-secrets
helm:
  maxHistory: 25
  takeOwnership: true
