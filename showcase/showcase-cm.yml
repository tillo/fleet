apiVersion: v1
kind: ConfigMap
metadata:
  name: showcase-html
  namespace: showcase
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>mdapi.ch — a self-hosted Kubernetes homelab</title>
    <meta name="description" content="mdapi.ch is a self-hosted, GitOps-driven Kubernetes homelab. Public showcase of the platform, the sites it hosts, and the services members can request.">
    <style>
      :root{
        --bg:#0f1115; --panel:#171a21; --line:#262b36;
        --ink:#EAEEF7; --muted:#9aa6bd; --accent:#7FA5F9; --accent-2:#a7f3d0;
      }
      *{box-sizing:border-box}
      html,body{margin:0;padding:0}
      body{background:var(--bg);color:var(--ink);
        font:16px/1.6 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
        -webkit-font-smoothing:antialiased}
      a{color:var(--accent);text-decoration:none}
      a:hover{text-decoration:underline}
      .wrap{max-width:980px;margin:0 auto;padding:0 20px}
      header.hero{padding:72px 0 40px;border-bottom:1px solid var(--line)}
      .badge{display:inline-block;font-size:13px;color:var(--accent-2);
        border:1px solid var(--line);border-radius:999px;padding:4px 12px;margin-bottom:18px}
      .statusbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}
      .statusbar .badge{margin-bottom:0}
      .status{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);
        border:1px solid var(--line);border-radius:999px;padding:4px 12px}
      .status:hover{text-decoration:none;border-color:var(--accent);color:var(--ink)}
      .sdot{width:9px;height:9px;border-radius:50%;background:var(--muted)}
      .sdot.ok{background:#34d399}.sdot.minor{background:#fbbf24}.sdot.major{background:#fb923c}
      .sdot.critical{background:#f87171}.sdot.maint{background:var(--accent)}
      h1{font-size:clamp(28px,5vw,44px);line-height:1.15;margin:.1em 0 .3em;letter-spacing:-.02em}
      h1 .dot{color:var(--accent)}
      .lede{font-size:clamp(16px,2.4vw,19px);color:var(--muted);max-width:64ch;margin:0 0 28px}
      .cta{display:flex;gap:12px;flex-wrap:wrap}
      .btn{display:inline-block;padding:11px 18px;border-radius:10px;font-weight:600}
      .btn.primary{background:var(--accent);color:#0b1020}
      .btn.ghost{border:1px solid var(--line);color:var(--ink)}
      .btn:hover{text-decoration:none;filter:brightness(1.08)}
      section{padding:44px 0;border-bottom:1px solid var(--line)}
      h2{font-size:22px;margin:0 0 6px;letter-spacing:-.01em}
      .sub{color:var(--muted);margin:0 0 22px;max-width:62ch}
      .grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
      .card{display:block;background:var(--panel);border:1px solid var(--line);
        border-radius:12px;padding:16px 16px 14px;transition:border-color .15s,transform .15s}
      .card:hover{border-color:var(--accent);transform:translateY(-2px);text-decoration:none}
      .card .t{font-weight:650;color:var(--ink);margin:0 0 2px}
      .card .d{font-size:13.5px;color:var(--muted);margin:0}
      .card .host{font-size:12px;color:var(--accent);margin-top:8px;display:block}
      .members{background:linear-gradient(180deg,rgba(127,165,249,.08),transparent)}
      .pill{font-size:12px;color:var(--muted);border:1px solid var(--line);border-radius:999px;
        padding:3px 10px;margin:0 6px 8px 0;display:inline-block}
      footer{padding:34px 0 60px;color:var(--muted);font-size:13.5px}
      footer a{color:var(--muted);text-decoration:underline}
    </style>
    </head>
    <body>
    <header class="hero"><div class="wrap">
      <div class="statusbar">
        <span class="badge">self-hosted &middot; GitOps &middot; Kubernetes</span>
        <a class="status" id="status-pill" href="https://mdapi.statuspage.io/" target="_blank" rel="noopener noreferrer" title="Live service status">
          <span class="sdot" id="sdot"></span><span id="status-text">Service status</span>
        </a>
      </div>
      <h1>mdapi<span class="dot">.</span>ch</h1>
      <p class="lede">A self-hosted homelab running a production-grade Kubernetes stack at home —
         identity, mail, storage, automation, home-automation and the websites it hosts, all
         declared in public GitOps. This is the front door; the deep dive lives in the docs.</p>
      <div class="cta">
        <a class="btn primary" href="https://docs.mdapi.ch">Explore the docs &rarr;</a>
        <a class="btn ghost" href="https://github.com/tillo/fleet">View the GitOps on GitHub</a>
        <a class="btn ghost" href="https://mdapi.statuspage.io/" target="_blank" rel="noopener noreferrer">System status &rarr;</a>
      </div>
    </div></header>

    <section><div class="wrap">
      <h2>Explore the platform</h2>
      <p class="sub">Documented end to end, and its building blocks are open source — mirrored to
         GitHub. Start with the docs, or dig into the code.</p>
      <div class="grid">
        <a class="card" href="https://docs.mdapi.ch">
          <p class="t">Documentation</p><p class="d">Architecture, security, storage, networking, operations — the full write-up.</p>
          <span class="host">docs.mdapi.ch</span></a>
        <a class="card" href="https://github.com/tillo/fleet">
          <p class="t">GitOps (Fleet)</p><p class="d">The whole Kubernetes platform, declared in public GitOps.</p>
          <span class="host">github.com/tillo/fleet</span></a>
        <a class="card" href="https://github.com/tillo/mirror">
          <p class="t">mirror</p><p class="d">Turnkey public-mirror container: HTTP(S) + FTP(S) + rsync in one image.</p>
          <span class="host">github.com/tillo/mirror</span></a>
        <a class="card" href="https://github.com/tillo/opennic-tier2">
          <p class="t">opennic-tier2</p><p class="d">Turnkey OpenNIC Tier 2 DNS server container — BIND9 + auto zone refresh.</p>
          <span class="host">github.com/tillo/opennic-tier2</span></a>
        <a class="card" href="https://github.com/tillo/certspotter">
          <p class="t">certspotter</p><p class="d">SSLMate certspotter — a Certificate Transparency monitor — as a container.</p>
          <span class="host">github.com/tillo/certspotter</span></a>
        <a class="card" href="https://github.com/tillo/joplin-mcp">
          <p class="t">joplin-mcp</p><p class="d">HTTP/SSE wrapper around joplin-server-mcp with bearer-token auth.</p>
          <span class="host">github.com/tillo/joplin-mcp</span></a>
        <a class="card" href="https://github.com/tillo/autoconfig">
          <p class="t">autoconfig</p><p class="d">Multi-domain Thunderbird/Outlook mail autoconfig + autodiscover (Python).</p>
          <span class="host">github.com/tillo/autoconfig</span></a>
      </div>
    </div></section>

    <section><div class="wrap">
      <h2>Public projects</h2>
      <p class="sub">Public-interest infrastructure run from the cluster and contributed back to the
         internet — anti-censorship relays, alternative DNS, a package mirror and public time.</p>
      <div class="grid">
        <a class="card" href="https://mirror.mdapi.ch">
          <p class="t">Public mirror</p><p class="d">A free, fast mirror for BlackArch, Gentoo, Tails and ArchStrike.</p>
          <span class="host">mirror.mdapi.ch</span></a>
        <a class="card" href="https://snowflake.torproject.org/">
          <p class="t">Tor Snowflake</p><p class="d">A Snowflake proxy helping people on censored networks reach Tor.</p>
          <span class="host">torproject.org</span></a>
        <a class="card" href="https://www.torproject.org/">
          <p class="t">Tor WebTunnel bridge</p><p class="d">A WebTunnel bridge giving censorship-resistant access to Tor.</p>
          <span class="host">torproject.org</span></a>
        <a class="card" href="https://www.opennic.org/">
          <p class="t">OpenNIC DNS</p><p class="d">A public resolver for the community-run OpenNIC alternative DNS root.</p>
          <span class="host">opennic.org</span></a>
        <a class="card" href="https://www.ntppool.org/">
          <p class="t">NTP Pool</p><p class="d">A time server contributing to the global pool.ntp.org project.</p>
          <span class="host">ntppool.org</span></a>
      </div>
    </div></section>

    <section class="members"><div class="wrap">
      <h2>For members</h2>
      <p class="sub">Family &amp; friends get a personalised portal — your apps, plus a marketplace
         where you can request your own services. Sign in to see what's yours and what you can ask for.</p>
      <div style="margin-bottom:18px">
        <span class="pill">📬 a personal @name mailbox</span>
        <span class="pill">🌐 your own website</span>
        <span class="pill">📁 file / SFTP space</span>
        <span class="pill">🔗 a subdomain + certificate</span>
      </div>
      <a class="btn primary" href="https://start.mdapi.ch">Sign in to your portal &rarr;</a>
    </div></section>

    <footer><div class="wrap">
      Built on RKE2 · Rancher · Fleet · Longhorn · Ceph · cert-manager.
      GitOps is public at <a href="https://github.com/tillo/fleet">github.com/tillo/fleet</a>.
      Live status at <a href="https://mdapi.statuspage.io/">mdapi.statuspage.io</a>.
      Neighbours of the En&nbsp;Vuassu association: <a href="https://www.envuassu.ch">envuassu.ch</a>.
    </div></footer>

    <script>
    (function(){
      var DESC={none:'All Systems Operational',minor:'Minor Service Issue',major:'Partial Outage',critical:'Major Outage',maintenance:'Under Maintenance'};
      var CLS={none:'ok',minor:'minor',major:'major',critical:'critical',maintenance:'maint'};
      fetch('https://mdapi.statuspage.io/api/v2/status.json',{cache:'no-store'})
        .then(function(r){return r.json();})
        .then(function(d){
          var i=(d&&d.status&&d.status.indicator)||'none';
          var t=(d&&d.status&&d.status.description)||DESC[i]||'Service status';
          var dot=document.getElementById('sdot');
          if(dot){dot.className='sdot '+(CLS[i]||'ok');}
          var el=document.getElementById('status-text');
          if(el){el.textContent=t;}
        })
        .catch(function(){
          var dot=document.getElementById('sdot');
          if(dot){dot.className='sdot ok';}
        });
    })();
    </script>
    <script src="https://mdapi.statuspage.io/embed/script.js"></script>
    </body>
    </html>
