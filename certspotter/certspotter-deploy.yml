apiVersion: apps/v1
kind: Deployment
metadata:
  name: certspotter
  namespace: certspotter
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
spec:
  selector:
    matchLabels:
      app: certspotter
  replicas: 1
  template:
    metadata:
      labels:
        app: certspotter
    spec:
      initContainers:
      - name: prepare-file-system
        command:
        - sh
        args:
        - -c
        - chown -R 65534:65534 /certspotter/.certspotter && ln -sf /certspotter/base-hooks.d /certspotter/.certspotter/hooks.d
        image: docker.io/busybox
        imagePullPolicy: IfNotPresent
        volumeMounts:
        - name: certspotter-config
          mountPath: /certspotter/.certspotter
      containers:
      - name: certspotter
        image: registry.mdapi.ch/mdapi/certspotter
        env:
        - name: TZ
          value: Europe/Zurich
        - name: CS_DELAY
          value: '3600'
        - name: CS_DOMAINS
          value: .tillo.ch .mdapi.org .mdapi.ch .dellambrogio.ch .dellambrogio.com .dellambrogio.org .maurodellambrogio.com .icebow.org .coders.ch .lithia.eu .r3h.ch .kyos.ch
        - name: CS_DEBUG
          value: '1'
        - name: CS_CMD
          value: /certspotter/bin/certspotter -stdout -start_at_end
        envFrom:
          - secretRef:
              name: certspotter-env-secret
        volumeMounts:
        - name: certspotter-config
          mountPath: /certspotter/.certspotter
      volumes:
      - name: certspotter-config
        persistentVolumeClaim:
          claimName: certspotter-config
      imagePullSecrets:
      - name: mdapi-registry
