apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: certspotter-env-secret
spec:
  refreshInterval: 1m

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: certspotter-env-secret
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/certspotter/certspotter-env-secret/CS_PUSHOVER_TOKEN
      secretKey: CS_PUSHOVER_TOKEN
    - remoteRef:
        key: /mdapi/certspotter/certspotter-env-secret/CS_PUSHOVER_USER
      secretKey: CS_PUSHOVER_USER
