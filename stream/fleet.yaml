defaultNamespace: stream
namespace: stream
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
helm:
  maxHistory: 25
  releaseName: stream
  # EverTrust Stream (PKI/CA backend for Horizon). Anonymous chart repo (same as
  # horizon) — trailing slash REQUIRED so Fleet resolves the index's relative
  # chart URL correctly. Private bit is the image (registry.evertrust.io), via the
  # evertrust-registry imagePullSecret in extraObjects.
  repo: https://repo.evertrust.io/repository/charts/
  chart: stream
  version: 2.1.0          # Lane-B pinned (appVersion 2.1.10); bump deliberately
  valuesFiles:
    - values.yml
