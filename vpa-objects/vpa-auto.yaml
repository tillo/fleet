# tv namespace: moved from Off → Auto on 2026-06-04 after radarr OOM-looped.
# All these workloads recover from eviction within seconds to a couple
# minutes; chasing per-container OOMs by hand was the wrong default.
# minAllowed = safe baseline so VPA doesn't shrink below working size.
# maxAllowed = generous ceiling so VPA can grow during scans/transcodes.
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: radarr
  namespace: tv
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: radarr
  updatePolicy:
    updateMode: Auto
  resourcePolicy:
    containerPolicies:
    - containerName: radarr
      minAllowed:
        cpu: 25m
        memory: 256Mi
      maxAllowed:
        cpu: 2000m
        memory: 4Gi
---
