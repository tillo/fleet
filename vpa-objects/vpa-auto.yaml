# Plex: 2-replica streaming/transcoding workload. Eviction interrupts
# active streams (~5-10 s blip while clients reconnect to the second pod).
# minAllowed reflects the steady-state baseline; maxAllowed accommodates
# multi-4K-transcode burst with hardware acceleration disabled.
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: pms-docker
  namespace: tv
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pms-docker
  updatePolicy:
    updateMode: Auto
  resourcePolicy:
    containerPolicies:
    - containerName: pms-docker
      minAllowed:
        cpu: 100m
        memory: 2Gi
      # 2026-06-06: raised maxAllowed.cpu 4 -> 8 to match the deploy
      # limits.cpu bump; the 4 CPU cap was triggering ContainerCpuThrottling
      # at >50% during transcoding / library-scan bursts.
      maxAllowed:
        cpu: 8000m
        memory: 10Gi
---
# tdarr: transcode workers. Eviction mid-transcode wastes wall-time but
# tdarr re-queues incomplete jobs on next boot.
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: tdarr
  namespace: tv
spec:
  targetRef:
    apiVersion: apps/v1
