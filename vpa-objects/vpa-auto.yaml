# VPA Auto mode — right-sizing for stateless workloads with no PVCs.
# Pods may be evicted and recreated with updated requests/limits.
# Safe because all targets here have replicas:2 + minAvailable:1 PDB.
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: joplin-mcp
  namespace: joplin
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: joplin-mcp
  updatePolicy:
    updateMode: Auto
  resourcePolicy:
    containerPolicies:
    - containerName: joplin-mcp
      minAllowed:
        cpu: 10m
        memory: 128Mi
      maxAllowed:
        cpu: 500m
        memory: 1Gi
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: joplin
  namespace: joplin
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: joplin
  updatePolicy:
    updateMode: Auto
  resourcePolicy:
    containerPolicies:
    - containerName: joplin
      minAllowed:
        cpu: 50m
        memory: 256Mi
      maxAllowed:
        cpu: 1
        memory: 2Gi
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: keycloak
  namespace: keycloak
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: keycloak
  updatePolicy:
    updateMode: Auto
  resourcePolicy:
    containerPolicies:
    - containerName: keycloak
      minAllowed:
        cpu: 50m
        memory: 512Mi
      maxAllowed:
        cpu: 2
        memory: 3Gi
---
