# VPA Auto mode — right-sizing for stateless workloads with no PVCs.
# Pods may be evicted and recreated with updated requests/limits.
# Safe because all targets here have replicas:2 + minAvailable:1 PDB.
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: joplin-mcp
  namespace: joplin
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: joplin-mcp
  updatePolicy:
    updateMode: Auto
  resourcePolicy:
    containerPolicies:
    - containerName: joplin-mcp
      minAllowed:
        cpu: 10m
        memory: 128Mi
      maxAllowed:
        cpu: 500m
        memory: 1Gi
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: joplin
  namespace: joplin
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: joplin
  updatePolicy:
    # Initial, not Auto: VPA right-sizes requests at pod creation but never
    # evicts running pods. Auto-mode eviction churn left the 2-replica
    # Deployment at 1/2 for ~3.5 min while the evicted pod's replacement
    # re-pulled the 563 MB joplin/server:latest image, tripping the
    # replica-availability alert.
    updateMode: Initial
  resourcePolicy:
    containerPolicies:
    - containerName: joplin
      minAllowed:
        cpu: 50m
        memory: 256Mi
      maxAllowed:
        cpu: 1
        memory: 2Gi
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
