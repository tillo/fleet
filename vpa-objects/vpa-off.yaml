# VPA Off mode — recommendations only, no eviction, no pod mutation.
# Check recommendations after 7+ days: kubectl describe vpa -n <ns> <name>
---
# home-assistant uses 4+ GiB actual memory with zero requests/limits set.
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: home-assistant
  updatePolicy:
    updateMode: "Off"
---
# frigate: 4.7 cores + 2.9 GiB actual, no limits — node pressure risk
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: frigate
  namespace: frigate
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frigate
  updatePolicy:
    updateMode: "Off"
