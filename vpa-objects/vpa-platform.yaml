  namespace: owncloud
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: owncloud
  updatePolicy:
    updateMode: Auto
  resourcePolicy:
    containerPolicies:
    - containerName: "*"
      # RequestsOnly: VPA sizes requests but never the limit, so the
      # Deployment's memory limit is an authoritative hard ceiling
      # (recursive MOVE ops were OOMKilled by the ratio-scaled limit).
      controlledValues: RequestsOnly
      minAllowed:
        cpu: 10m
        memory: 64Mi
      maxAllowed:
        cpu: "1"
        memory: 1Gi
