---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: windmill-workers-default
  namespace: windmill
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: windmill-workers-default
  updatePolicy:
    # 2026-06-14: recommend-only (NOT Auto). This is the bursty python worker
    # (cold-cache `uv` dep installs, tarball stream + base64 buffers). The chart
    # sets only a memory LIMIT (4Gi, no request) deliberately for burst headroom.
    # Under updateMode:Auto, VPA pins request==limit==recommendation *target*
    # (~1.5Gi, Guaranteed QoS) -- not maxAllowed -- so the limit sits at ~p90 of
    # usage with zero burst headroom and bursts OOMKill (observed: a pod created
    # at the new 1.48Gi limit still OOMed on its cold dep-install burst). "Off"
    # lets VPA recommend for visibility while the chart's flat 4Gi limit stands.
    # Precedent in this file: windmill-postgresql / keycloak / nextcloud are "Off".
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
    - containerName: "*"
      minAllowed:
        cpu: 10m
        memory: 64Mi
      # maxAllowed kept at the chart's 4Gi ceiling so the recommendation (now
      # recommend-only) isn't artificially clamped in the VPA status/UI.
      maxAllowed:
        cpu: "1"
        memory: 4Gi
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: windmill-workers-native
  namespace: windmill
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: windmill-workers-native
  updatePolicy:
    updateMode: Auto
  resourcePolicy:
    containerPolicies:
    - containerName: "*"
      minAllowed:
        cpu: 10m
        memory: 32Mi
      # 2026-06-14: align ceiling with the chart's 2Gi native-worker limit
      # (was 512Mi; same stale-clamp pattern as the default group, not yet
      # OOMing since native idles ~200Mi, but bump to prevent a burst clamp).
      maxAllowed:
        cpu: 500m
        memory: 2Gi
---
apiVersion: autoscaling.k8s.io/v1
