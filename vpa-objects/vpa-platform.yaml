# Platform services: joplin/keycloak DBs, windmill, envuassu, owncloud, openldap, akri, keel, longhorn
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: postgres
  namespace: joplin
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: postgres
  updatePolicy:
    updateMode: Auto
  resourcePolicy:
    containerPolicies:
    - containerName: "*"
      minAllowed:
        cpu: 10m
        memory: 128Mi
      maxAllowed:
        cpu: 500m
        memory: 1Gi
