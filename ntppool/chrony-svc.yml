apiVersion: v1
kind: Service
metadata:
  name: chrony
  namespace: ntppool
spec:
  type: LoadBalancer
  loadBalancerClass: metallb
  loadBalancerIP: 192.168.1.58
  externalTrafficPolicy: Local
  selector:
    app: chrony
  ports:
  - name: ntp
    port: 123
    protocol: UDP
    targetPort: 123
  - name: nts-ke
    port: 4460
    protocol: TCP
    targetPort: 4460
