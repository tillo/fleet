apiVersion: apps/v1
kind: Deployment
metadata:
  name: chrony
  namespace: ntppool
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 4h"
spec:
  # Recreate so the old pod releases /dev/ttyUSB0 before the new one
  # tries to claim it (GPS USB serial, single-writer).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: chrony
  replicas: 1
  template:
    metadata:
      labels:
        app: chrony
    spec:
      # Pinned to the node that physically hosts the GPS USB UART.
      # Pod is privileged, so /dev access is granted unconditionally —
      # no device plugin needed. Edit this if the GPS is moved.
      nodeSelector:
        kubernetes.io/hostname: qui
      containers:
      - name: chrony
        image: registry.mdapi.ch/mdapi/chrony:latest
        securityContext:
          privileged: true
        ports:
        - name: ntp
          containerPort: 123
          protocol: UDP
        env:
        - name: TZ
          value: Europe/Zurich
        - name: NTP_SERVERS
          value: "81.94.123.16,81.94.123.17,194.242.34.149,193.5.68.2,192.33.96.101,192.33.96.102,84.16.73.33,84.16.67.12,193.134.29.11,193.134.29.12"
        - name: NTP_DIRECTIVES
          value: "rtcsync\nclientloglimit 100000000\nleapsectz right/UTC"
        - name: NOCLIENTLOG
          value: "false"
        # GPS temporarily disabled: the FT232R USB-serial adapter on qui is
        # faulty (2026-05-21) and the current image's startup hangs on the
        # wedged device. chrony serves as a stratum-2 NTP server from
        # NTP_SERVERS meanwhile. Re-enable (value "true") once the adapter is
        # replaced AND the rebuilt image is live — chrony@60fe16f makes the
        # startup degrade gracefully, so ENABLE_GPS=true is safe again then.
        - name: ENABLE_GPS
          value: "false"
        resources: {}
      imagePullSecrets:
      - name: mdapi-registry
