apiVersion: apps/v1
kind: Deployment
metadata:
  name: chrony
  namespace: ntppool
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
spec:
  selector:
    matchLabels:
      app: chrony
  replicas: 1
  template:
    metadata:
      labels:
        app: chrony
    spec:
      containers:
      - name: chrony
        image: registry.mdapi.ch/mdapi/chrony
        securityContext:
          privileged: true
        ports:
        - name: ntp
          containerPort: 123
          protocol: UDP
        env:
        - name: TZ
          value: Europe/Zurich
        - name: NTP_SERVERS
          value: "81.94.123.16,81.94.123.17,194.242.34.149,193.5.68.2,192.33.96.101,192.33.96.102"
        - name: NTP_DIRECTIVES
          value: "rtcsync\nclientloglimit 100000000\nleapsectz right/UTC"
        - name: NOCLIENTLOG
          value: "false"
        resources:
          limits:
            akri.sh/akri-chrony: "1"
          requests:
            akri.sh/akri-chrony: "1"
      imagePullSecrets:
      - name: mdapi-registry
