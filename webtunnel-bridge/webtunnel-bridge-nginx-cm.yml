apiVersion: v1
kind: ConfigMap
metadata:
  name: webtunnel-bridge-nginx
data:
  default.conf.template: |
    server {
      listen 8443;

      # The webtunnel-server itself does not validate the URL path — that is
      # this sidecar's job. The SECRET_PATH is injected via envsubst at
      # container start from the webtunnel-bridge-secret Secret, so the
      # actual secret never appears in this ConfigMap or in git.
      location ~ ^/api/v1/proxy/${SECRET_PATH}(/.*)?$ {
        proxy_pass http://127.0.0.1:15000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
      }

      # Vanilla 404 for everything else — indistinguishable from any other
      # misrouted request hitting an nginx app server.
      location / {
        return 404;
      }
    }
