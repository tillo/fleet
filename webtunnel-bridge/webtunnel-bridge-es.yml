apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: webtunnel-bridge-secret
spec:
  refreshInterval: 1m0s

  secretStoreRef:
    kind: ClusterSecretStore
    name: cm-akeyless

  target:
    name: webtunnel-bridge-secret
    creationPolicy: Owner

  data:
    - remoteRef:
        key: /mdapi/webtunnel-bridge/secret-path
      secretKey: secret-path
