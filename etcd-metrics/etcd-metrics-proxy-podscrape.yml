## Scrapes the etcd-metrics-proxy DaemonSet (node IP :2382 -> etcd 127.0.0.1:2381).
## vmagent-mdapi has empty scrape selectors, so this is auto-discovered.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMPodScrape
metadata:
  name: etcd-metrics-proxy
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: etcd-metrics-proxy
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      scheme: http
      interval: 30s
