defaultNamespace: monitoring
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
helm:
  maxHistory: 25
  # Adopt the pre-existing etcd-metrics-proxy DaemonSet (created via kubectl
  # apply before this bundle existed; it has no Helm ownership metadata) so the
  # helm install can manage it instead of erroring "cannot be imported into the
  # current release: invalid ownership metadata".
  takeOwnership: true
