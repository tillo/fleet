crds:
  enabled: false # CRDs pre-installed; hook job times out in Fleet

admissionController:
  enabled: true
  replicaCount: 1

recommender:
  replicaCount: 1

# Updater disabled initially — gather recommendations first for ~1 week,
# then enable to allow VPA to evict+resize pods. Safe to enable once
# PDBs are in place (minAvailable:1) and recommendations look sane.
updater:
  enabled: false
