defaultNamespace: kube-system
namespaceLabels:
  cd.mdapi.ch: fleet
  cdenv.mdapi.ch: prod
helm:
  maxHistory: 25
  releaseName: vpa
  repo: https://cowboysysop.github.io/charts/
  chart: vertical-pod-autoscaler
  # Intentionally no `version:` -- Fleet tracks the repo's latest chart
  # and applies any new release on the next GitRepo poll cycle.
  valuesFiles:
    - values.yaml
