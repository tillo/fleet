# EverTrust horizon-issuer — cert-manager external issuer for Horizon (eval).
# The controller image is private (registry.evertrust.io); pull secret + the
# ClusterIssuer + auth/registry ExternalSecrets live in the sibling
# `horizon-issuer-config` bundle (this chart has no extraObjects hook).
manager:
  replicas: 1
  imagePullSecrets:
    - name: evertrust-registry
  # Chart default (limit 128Mi) OOMKills the controller: it watches ALL
  # CertificateRequests cluster-wide (dozens here) and the informer cache exceeds it.
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Install the Issuer/ClusterIssuer CRDs with the chart; keep them on uninstall.
crd:
  enable: true
  keep: true

# Disable the metrics server (its TLS would otherwise require cert-manager wiring;
# nothing scrapes it yet). Sets --metrics-bind-address=0 on the manager.
metrics:
  enable: false
prometheus:
  enable: false
certManager:
  enable: false
rbacHelpers:
  enable: false
